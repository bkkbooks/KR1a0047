body:
  text: 童溪易傳卷二十一宋王宗傳撰坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸徃彖曰萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸徃順天命也觀其所聚而天地萬物之情可見矣易之有萃云者謂天也人也鬼神也君與臣也民也物也交相㑹通之時也故其卦德曰萃亨而彖則釋之曰萃聚也夫萃之所以為聚者合兊與坤而言之則曰順以說即五與二而言之則曰剛中而應此萃聚之故也夫坤順也而在下則下有以順乎上也兊說也而在上則上有以說乎下也下既有以順乎上而上又有以說乎下此上下之萃也以九居五剛而中者也上有剛中之君而下應乎柔中之臣剛柔相應君臣聚㑹此君臣之萃也所謂萃聚之故如斯而已矣故曰萃聚也順以說剛中而應故聚也王假有廟致孝享也此又言人神之萃也胡安定曰夫人之生則精神萃於身及其死也雖欲見其容貌而有不可得王者觀萃之卦設為廟祧以萃祖宗精神於其閒以盡孝子之心使天下當萃之時皆知尊事其祖先也王謂九五也假至也盡也所謂致孝享是也利見大人亨聚以正也此又言君民之萃也大人亦謂五也夫當萃之時天下之人所以惟見大人之為利者以九五大人所以萃天下者以其有是中正之德故也河南曰人聚則亂物聚則紊非大人治之則萃所以致爭亂也萃不以正則人聚為苟合財聚為悖入安得亨也故利在於正用大牲吉利有攸徃順天命也此又言天人之萃也夫時在天隨乎時者在乎人當損之時二簋可用享則萃之時用大牲非吉歟當剥之時不利有攸徃則萃之時有攸徃非利歟蓋不如是非所謂順天命也天命即天理也隨時而動无違天理此所謂順天命也用大牲吉亦承上文所謂王假有廟而明用大牲之意然當此之時凡事皆吉於用大亦不特大牲而已也成大功立大事興大利去大害凡此皆吉於用大者也故繼之以利有攸徃謂凡有所徃惟此時為利故也夫觀坤兊之順說而知上下之萃觀二五之相應而知君臣之萃觀致孝以享廟而知人神之萃觀以正聚人而又知君民之萃觀天命之不可不順而又知天人之萃則天地萬物所以萃聚之情豈容有所遯乎哉故蔽之曰觀其所聚而天地萬物之情可見矣程河南曰凡有者皆聚也有无動静始終之理聚散而已故觀其所聚而天地萬物之情可見矣象曰澤上於地萃君子以除戎器戒不虞澤水上聚於地則其聚者多矣故為萃之象然所聚者既多則播蕩匯漾之患生矣故地大而物衆人繁而事叢則兼取并奪之禍常生於此時若以為時方和㑹也而忘其所可戒此正秦人夷名城而銷鋒鏑者也夫四海已囊括矣天下已席卷矣當此之時自以為豪傑既徂海内一統子孫萬世帝王之業故向之天下之兵今也聚之咸陽為十二金人宜其无有可慮者矣居无何陳渉以氓𨽻之人斬木為兵掲竿為旗天下雲合響應而秦亡矣是何也不知不虞之為可戒也龔深甫曰兵作於睽偃於萃萃久則弊然則除其弊而新之惟此時為然兵法曰天下雖安忘戰必危此之謂也初六有孚不終乃亂乃萃若號一握為笑勿恤徃无咎象曰乃亂乃萃其志亂也初與四居相應之地以隂而應陽萃之正也然三以无應與四相此而有近而相聚之嫌故初之孚於四也而不終其孚焉故曰乃亂謂相信之志疑亂而不一也然居萃聚之時上下相求下順而上說故初之志雖疑亂而不一而四也必說而應之故曰乃萃若號謂乃亂也一握為笑謂乃萃也夫初之志既疑亂而不一也故有若號之象焉謂以憂疑自沮也四也說以應之則一握之頃復變號咷而為笑樂矣謂得其所聚也夫如是則初也又何必憂疑自沮而至於若號乎故戒之曰勿恤夫既勿用憂恤而徃應於四則亦孰我咎乎故又勉之曰徃无咎大抵初以隂柔之才而居下位才與位俱不足者也當萃之時其才與位既俱不足而六三又以无應而與四有相聚之嫌故初疑四之不已應也而相信之志至於疑亂而不一聖人於此可不戒之而勉之乎六二引吉无咎孚乃利用禴象曰引吉无咎中未變也孟子曰丈夫生而願為之有室女子生而願為之有家父母之心人皆有之不待父母之命媒妁之言鑚穴隙相窺踰牆相從則父母國人皆惡之此言正喻君臣相聚之道然也故又繼之曰古之人未嘗不欲仕也又惡不由其道不由其道而徃是鑚穴隙之𩔖也夫必由其道而徃此六二之所以吉於有引也蓋以六居二正也而九五在上亦正也二五居相應之地而其聚也以正故无不由其道之失五之於二也既有引而進之之禮則二之於五也亦必吉於引矣故其聚也以正其誰咎之夫孚者萃之本也二以正道許五則所謂中心之誠然者未始或變也如此則上下相聚不待文飾而誠意交通矣猶之祭也以誠敬為主故雖簡薄可用以薦也孚乃利用禴禴祭之簡薄也謂誠意交通又何以文飾為哉雖然同此時也彖以用大牲為吉而六二以用禴為利何也曰備物者王者所以隨其時有孚者人臣所以通乎上六三萃如嗟如无攸利徃无咎小吝象曰徃无咎上巽也當萃之時以隂比陽若有所萃也故曰萃如然萃貴於正三之於四非萃之正也故若有萃而實无所萃也故曰嗟如謂欲萃於四而不𫉬也夫欲萃而无所萃又何利乎故又曰无攸利夫三與上居相應之地雖非正應猶愈於无所萃者若徃而與之萃則亦所謂以𩔖聚也又況各居順說之極下順而上說以同𩔖相與又何咎歟故又勉之曰徃无咎曰小吝云者夫以隂與陽萃則以晦求明以弱資强而萃聚之道為有益也今以隂萃隂特求免於窮悴无萃之嗟爾何所益哉此於萃聚之道小而吝也上六无與為萃者若六三者徃而與之萃則巽而受之此亦上六之所欲也故曰徃无咎上巽也九四大吉无咎象曰大吉无咎位不當也當萃之時上比九五之君得君之聚也下比羣隂得民之聚也得上下之聚可謂善矣然四以陽居隂非正也雖得上下之聚必大吉然後无咎大周徧之義也无不周然後為大夫天下之聚固有不由正道而得者非理枉道而得君者自古多矣非理枉道而得民者蓋亦有之如齊之田常魯之季氏是也其得為大吉乎得為无咎乎此程河南之說也九五萃有位无咎匪孚元永貞悔亡象曰萃有位志未光也五萃之主也夫當萃之時為萃之主莫大於有其位又莫大於有其道蓋位也者所以一天下之聚者也而道也者又所以久天下之聚者也九五曰萃有位則所以一天下之聚者謂有是位也又曰元永貞則所以久天下之聚者又必有其道也夫當萃之時有是位而无是道則九五之志豈得謂之光大矣乎雖能无咎而天下不我信者亦衆矣故曰匪孚謂天下之人容有言曰上之人但以位而萃我也而其道則未至也此豈能无未光之悔乎故必元永貞而後悔亡元始也永終也貞不變之謂也惟夫九五之德居中履正而能終始不變焉則萃天下之道无餘事矣故无未光之悔而曰悔亡也程河南曰元永貞者君之德民所歸也故比天下之道與萃天下之道在此三者上六齎咨涕洟无咎象曰齎咨涕洟未安上也夫以隂柔之才而處萃之上位而欲下之已聚者難矣又況當萃之時諸爻剛柔皆有其應而上六獨无焉其安能居此上位乎宜其齎咨嗟嘆而至於涕洟也鄭康成曰目出曰涕鼻出曰洟夫上六萃之終也說之極也萃久則散說極則悲蓋其𫝑然也當是之時比五而居上此蓋小人之得志者也宜若得所萃矣然萃久則散說極則悲向者以為甚安也今也反以為未安焉小人而乗非所據故不能終保其位大抵然也其曰无咎云者在君子以為无足咎之故也巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也夫天下之事有所謂日進而不窮者蓋亦順夫理而已矣夫苟於理而未順未有能日進而不窮者此易之所以有升而卦德則曰元亨也夫升之所以元亨者以坤居巽上而言之則曰柔以時升合巽與坤而言之則曰巽而順指九二之於六五而言之則曰剛中而應此其所以元亨也夫柔之為物非能强進者也自非務順乎理安能升乎其曰柔以時升云者時之在天也積百刻而成日積日而成月積月而成時積時而成嵗初若甚微終則甚著初若甚近終則甚逺柔之能升也蓋亦如此而巳矣何也與時俱升故也故曰柔以時升坤順也巽亦順也下巽而上順其曰巽而順則亦无適而不用其順也以此為升非順乎天理矣乎以九居二剛而中者也上應六五柔中之君故曰剛中而應夫當升之時雖曰以柔而升也然猶之木也其能自下而升諸上者苟其中之不剛則亦委靡而巳矣此又柔之不可无剛也故以九二之剛中而上應六五之柔中内有所主而外有所應以此為升是亦順乎理者也合是三者以言升此升之所以元亨也故曰是以大亨用見大人勿恤有慶也南征吉志行也此又申言大亨之效有所戒有所勉而使君子之必知所升也夫升之所以大亨也如此則用此道以見大人又何憂其不升也故二之與五剛柔得中君臣相應何慶如之夫苟或憂其不升而遽已焉則安能大亨矣乎其曰勿恤云者戒之也南明方也升之所謂大亨者蓋亦捨晦而趨明之謂也故以南征為吉而曰志行也夫君子之志亦志於明而已矣不志於明又安能大亨者也其曰南征云者又勉之也夫聖人之彖升也既言其所以大亨如此又有所戒又有所勉為君子者可不務乎然則人臣之進君學者之進學臨事而從長皆然也象曰地中生木升君子以順德積小以髙大天下之物由微以至著自下而之上者地中之生木也何也順使然也蓋坤順也巽亦順也以順生順故坤地之中生巽之木始於毫末終於尋丈者以順故也此升之象然也德之在君子亦猶木之於地也何也君子之性順也而德出於性亦順物也以順生順故其積也不已則始於小善終於為聖為賢其髙且大孰禦焉孟子曰孩提之童无不知愛其親及其長也无不知敬其兄夫愛親仁也敬長義也君子之仁始於愛親而已及其以愛親之仁積之而至於无所不愛則仁滿天下矣君子之義始於敬兄而已及其以敬兄之義積之而至於无所不敬則義滿天下矣夫由愛親而至於无所不愛由敬兄而至於无所不敬者非順德不能也吾故曰天下之事亦有所謂日進而不窮者蓋亦順乎理而已矣初六允升大吉象曰允升大吉上令志也升以柔升者也然初六以柔巽之才居升之初非有剛明之援與之同升則亦未易升也惟初也以柔巽欲升之志上承九二剛明之賢故九二亦以其同體也而與之合志以同升焉故曰允升允信也夫九二方且信我而與我合志以同升焉則其為吉也孰大於此蓋謂之大吉則當升之初上下相信而不相疑由此而升則功業可以被天下矣所謂吉之大者實基於此故也九二孚乃利用禴无咎象曰九二之孚有喜也彖曰剛中而應謂二之於五也當柔升之時卦惟二剛而九二剛而中又巽體也故无過剛之失而足以上應柔中之主故曰孚乃利用禴无咎謂二五剛柔之得中而君臣之相應故也夫君臣之志患不相孚苟孚也則雖簡薄可用也何也无事於文飾故也故以用禴為利謂以誠敬為主也如是當柔升之時庸詎以過剛為咎乎河南曰自古以剛强之臣事柔弱之君又當升之時非誠意於交其能免咎乎夫九二能以誠意上通於君亦豈為臣之道无咎而已乎道合而志行則其利澤可以被於天下此九二之孚所以有喜也萃以上萃下者也故六二引吉无咎而復以孚乃用禴繼之升以下升上者也故九二曰孚乃利用禴而復以无咎繼之此雖升者萃之反而九者六之反也而以誠敬上通乎五則亦一也九三升虛邑象曰升虚邑无所疑也夫當柔升之時而九三之升也乃獨以剛過之才升焉如渉无人之墟故有升虚邑之象夫其升也如升虚邑然又何疑沮之有哉龔深甫有曰李元量耿希道皆以此爻為湯武之升而以六五為舜禹之升蓋六四王用亨于岐山既為文王之升矣則以此爻為湯武六五為舜禹故也今輒依之李元量博士曰初與二臣之升也過乎二則非純臣之象是以九三之升惟湯武足以當之方夏之未商之季法度廢矣禮樂墮矣故國雖大謂之邑其曰虚又若无人耳六四王用亨于岐山吉无咎象曰王用亨于岐山順事也六四以柔順之德居謙虛之位順之至也昔者文王有君民之大德又有事君之小心故自處謙順而其德則升其道則亨故六四之升有王用亨于岐山之象蓋謂文王嘗用此至順之道而亨于岐山矣以是為亨則吉于亨矣其誰咎之乎乃若後世之權臣强諸侯不知王者有至順之事而包藏禍心至於攘奪僭竊者難免乎萬世之咎矣況欲吉得乎李博士曰孔子曰我欲托之空言不如載之行事為深切著明也蓋謂示後世已然之事其功過於空言故明夷取於箕子升取文王岐山凡此亦載之行事欲其深切著明也六五貞吉升階象曰貞吉升階大得志也彖曰柔以時升蓋謂五也李博士曰凡人君皆升乎天位而所以升則不同有去民之害順乎天而升若湯武者矣有功德被於天下薦諸天而升若舜禹者矣六五貞吉而後升階蓋言於正既吉升而有序堯舜禹是也故以階言之謂賔主以揖遜而升者也耿希道曰舜禹之事聖人所欲也湯武之事豈聖人所欲哉故貞吉升階為大得志也若夫明夷之九三其所以大得者乃南狩之志爾非聖人之本心也上六冥升利于不息之貞象曰冥升在上消不富也升至上六无所復升矣坤隂既極冥昧无覩故曰冥升夫消息盈虛之理曷可常也有息必有消有盈必有虚升至上六无所復升矣而猶不已則有消而无息有虚而无盈矣上六曽不知此冥於升者也故曰冥升在上消不富也然以上六不知止息之心用之或得其正則又利矣故復曉之曰利于不息之貞孟子曰仁義忠信樂善不倦此天爵也此不息之貞也惟施於此為利若施於消息盈虚之際則不富矣坎下兊上困亨貞大人吉无咎有言不信彖曰困剛揜也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也易之六爻大率以陽為君子隂為小人如姤復等卦則隂陽雖分多寡而有消長之漸至泰至否則隂陽之勢均矣然亦大率以徃來屈信為君子小人之勝負至困則隂陽之勢亦均此雖非消長之卦不以徃來屈信論而陽爻又雜於羣隂之中為之掩隔此君子不偶之象也故聖人名其卦曰困而彖曰困剛揜也所謂剛者九二九四九五是也二之剛為初與三之所揜四與五之剛為三與上之所揜故曰困剛揜也此指三陽爻見揜於三隂以言困也險以說此又合坎兊二體之用以言乎困之道也夫困也者所謂險難之時也當險難之時而能說以處之則樂天安義而不失其所守故時雖困矣而其道則亨也夫時雖困而道則亨此非君子不能也故繼之以困而不失其所亨其惟君子乎子思子曰君子素患難而行乎患難无入而不自得焉此之謂也若小人則安平无事之時猶失所守況當險難之時乎又焉得亨矣正大人吉以剛中也此又指二五之剛中而能盡處困之道也夫正者在天則為命在人則為性而在事與物則為理古今有殊時而此正則不變萬物有成敗而此正則固存故是正者在困之爻則二五是也在人則大人是也何者以其剛中故也其中也剛則此正不移投之困窮險難之地何徃而不吉乎非能吉也能不失其正故吉也或曰君子或曰大人云者亦无異義也卦德於大人吉之後又繼之以无咎之辭謂當此之時以大人之德不能无困然在我者有處困之道故有吉而无咎也彖文省此二字者謂既吉則无咎矣朱子發引范諤昌之言曰彖文脫无咎二字恐未必然有言不信尚口乃窮也此又指兊說在上或至於尚口以為處困之戒也夫當險難之時固在於說以處之然不知自說之道而徒尚口舌以求說於人欲以免夫困人誰信之哉祗自取困窮爾故曰有言不信尚口乃窮也前言以說處困而亨此又言尚口乃窮者蓋言當此之時自說可也說人不可也此聖人重複發明兊說之㫖恐萬世之下處困之君子誤用其心也象曰澤无水困君子以致命遂志澤也者水之所鍾之地也今也坎水在下兊澤在上見澤而不見水澤无水者也夫其澤存其水亡此困乏之義也故為困之象君子當困窮之時而至於空乏其身行拂亂其所為冝然而不然若澤之无水焉者此世人所謂有不可知者存也而君子於此則務致其命焉子曰不知命无以為君子也又曰窮理盡性以至於命君子之學不至於命如處困窮何故處困窮之道在於致命謂欲至其所至之地也命之學至之而无餘則在我之志者亦无所不遂者矣君子之志志於行吾義而已學而不至於命則一為窮困患難之所攖必至於喪其所守矣義何在焉故夫知義與命之為一者可與處困矣初六臀困于株木入於幽谷三嵗不覿象曰入于幽谷幽不明也夫柔之所附者剛也剛既見揜則柔亦失所附矣夫剛揜則剛困柔失所附則柔困故初之與四雖居相應之地然四方困於見揜而未能下應於初初欲上應於四又為九二之剛所礙則居失所安矣故有臀困於株木之象株木指九二也夫隂柔之人一有所礙遂不能安其所遇而至於迷惑自失入于困窮幽暗之地放曰入于幽谷謂坎險之底而不能自拔也夫不能自拔於幽暗之地則雖上有九四之應也三嵗之久其能覿乎此无他隂柔之人既无明見一遇困難遂至顛冥失錯理固然也故象曰入于幽谷幽不明也九二困于酒食朱紱方來利用享祀征凶无咎象曰困于酒食中有慶也彖曰正大人吉以剛中也夫以大人剛中之才而處人臣正中之位則九二是也九二以剛居中則安其所遇故雖困窮險難曽何足以動其心但處人臣正中之位而未能推君之惠澤以充足天下之願欲而使之飽滿酣適焉則吾以是為困也故曰困于酒食雖然二五之大人以正相應亦不終困也故又曰朱紱方來利用享祀蓋朱紱方來云者五之下接乎二也利用享祀云者二之上通乎五也夫朱紱之為服者王者所以蔽膝也九五方來下接乎二故取蔽膝之服以為象享祀之禮以至誠黙通乎神明者也九二自守於下利用至誠以上通乎五故取享祀之禮以為喻夫上有以接乎下而下有以通乎上此大人以正相與而不終困者然也然又以征凶无咎戒之者謂方困之時為九二者若不知以至誠自守而徃求遇合此非大人之道也犯難罹凶乃其自取爾又誰咎乎夫以九二之剛中猶不免於戒處困之道庸可易乎故象又申之曰困於酒食中有慶也蓋謂當是時也雖未能推君之惠澤以遍及天下惟以剛中自守而无庸有所徃焉則自有朱紱方來之慶矣程河南曰自昔賢哲困於幽逺而德卒升聞道卒為用者惟自守至誠而已六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乗剛也入于其宫不見其妻不祥也石堅重之物也而非隂柔之才所能勝也往而犯之祇自困爾故繫辭曰非所困而困焉名必辱謂九四九五二剛在上堅重不可犯也而三犯之以取困也蒺藜蔓草之有角刺者不正之人濫乗非據而處正人之上豈所安也故繫辭曰非所據而據焉身必危謂九二之剛中豈可乗也而三乗之非其所安猶藉刺負芒然也夫六三所以輕犯二剛以取困者徒以上六吾配故也六三隂也而居陽自以為陽也故求配於上六然上六宫則是也而非其妻故曰入于其宫不見其妻小人輕進妄動无與親合危辱困極如此豈吉祥之徴也哉故不免於凶禍也繫辭於此又言其所以凶也而曰既危且辱死期将至妻其可得見邪蓋甚之也以是觀之當困之時不善處困者三隂之爻皆然也然君子為之商其尤不善者六三是也初六次之上六又次之九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也坎中之一陽下礙初六故曰株木其為材也剛上衝九四故曰金車凡此皆九二之象也夫初既困于株木而不能上進四又困于金車而不能下逮何咎如之然九二有朱紱方來之慶九五又有徐有說之理二五自以同德相應而九四應初之志可以徐徐而來也徐徐謂有困窒而未遽前也夫處不當之位動輒有礙而未遽如意所賴者有與在下終必遂志非終困也故雖吝而有終河南曰有終者事之所歸者正也初四正應終必相從也寒士之妻弱國之臣各安其正苟擇勢而從則惡之大者不容於世矣九五劓刖困于赤紱乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也彖曰正大人吉以剛中也夫以大人剛中之才而處人君正中之位則九五是也然當困之時剛有所揜而志未得通故有劓刖之象劓之謂傷於上也刖之謂傷於下也上下皆揜於隂為其傷害故也夫五之困如此故逺近隔絶應效未至故其說未遽有也故徐徐焉爾而象又推原九五所以致説之道而曰中直也蓋言二五大人以此道相許久矣但時方困剛方揜故其說徐有也祭祀者人君所以禮神也夫祭祀之事必以誠敬為主而後𫉬福祐之報九五之下交於二也不以誠敬黙通乎二安能獲其應助之力乎故曰利用祭祀受福也夫二五皆以至誠相感通故同以祀事明之然要之獲應助之力者五也此受福也之言所以獨歸之五焉禮有祭天神祀地祇享人鬼之别五居尊故言祭二在下故言享各以其所當用也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也困至上六困之極矣六三非其正應也徒以隂柔相纒繫而已非果能脫已之困束也故困于葛藟九五不可乗也陽剛中正之君方務去剛揜之困而上以隂柔乗之豈其所安故又曰于臲卼夫上六有此二困而不知物極則反困極則通何也无乃自謀之拙乎曰云者自謀之辭也如是自謀曰動則有悔也姑求安於臲卼之地而甘心於纒繫之人也而不知不動乃所以有悔也然則為上六者又何錮於不動而以動為諱乎故聖人於此明以告之以征吉謂其舎臲卼乃所以安釋纒繫乃所以脫其困束也由是觀之甘心於纒繫者未為計之當也若以動為悔乃所以有悔也則莫若吉於行也聖人所以為上六謀者至此可謂審矣為上六者舎其自謀以從聖人可也朱子發曰范睢困於鄭安平虞卿困於魏齊猶能解相印以全其軀況體易之君子乎童溪易傳卷二十一
