body:
  text: 童溪易傳卷七宋王宗傳撰乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也邵康節曰至哉文王之作易也其得天地之用乎故乾坤交而為泰坎離交而為既濟也夫天本居上地本居下而泰則乾下而坤上此天地之用也亦猶火本炎上水本趨下而既濟則離下而坎上此水火之用也程河南曰易變易也隨時變易以從道也其是之謂乎學易者知隨時從道之説則天地之用得之矣夫泰者通也天地之用交相通之謂也天地之道不能有陽而無隂人之道不能有君子而無小人故泰否二卦隂陽適平君子小人各相半焉雖然時乎泰通則陽為主而隂為客君子之勢伸而小人之勢屈故小者不能以病大往者不能以遏來隂時出而佐陽小人日聽命於君子此泰之道所以吉且亨也故曰小往大來吉亨亨即泰也關子明曰乾來內坤往外則君子闢小人闔故名之曰泰反是則名之曰否作易者其闢君子而通小人之闔也故以君子名其卦以天地言之乾來居內天氣之下降也坤往居外地氣之上騰也此天地之泰也故曰天地交而萬物通也萬物通生理遂也以君臣言之二上應五而五下之五下應二而二承之此君臣之泰也故曰上下交而其志同也其志同趨向一也以天地人事而兼言之內陽而外隂則發生自我而隂則順承之內健而外順則建立自我而衆則皆退而聽之此天下之泰也故曰內君子而外小人君子道長小人道消也夫內外勢也消長時也勢然則時亦然時然則勢亦然此天理人事所以無二道也象曰天地交泰后以財成天地之道輔相天地之冝以左右民朱子發曰泰者天地之交也財成輔相以人道交天地也以左右民立人道也夫天地之道隂陽四時是也天地之宜則春宜生夏冝長秋冝收冬冝斂之類是也財成其道輔相其冝則因天之時用地之利耕墾播殖疏導糞溉各有法制以授之人使之不失其利以盡生養之道此左右之也司馬溫公曰夫萬物生之者天也成之者地也天地能生成之而不能治也君者所以治人而成天地之功也非君則天地何以得其通乎此以人道交天地之謂也初九拔茅茹以其彚征吉象曰拔茅征吉志在外也君子之行違視時而已矣時乎泰則君子之道亦泰故以其彚征時乎否則君子之道亦否故以其彚貞此否泰之初皆有拔茅茹之象而以其彚征以其彚貞之隨以異也茅之為物生於草野側陋之地然以潔白為質君子在下之象也茹云者其根茹然而從引類之象也時乎泰亨則君子之類莫不上進故猶之茅也其所謂茹然者皆以類從也故曰以其彚征吉彚類也征進也當是時君子之類吉於上進故也九二九三乃初九之同類者也隂來下陽外有其應故象曰志在外也程河南曰君子之進必以其類不惟志在相先樂於與善實乃相賴以濟九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也六五泰之主也九二以剛中之才居相應之地所謂上下交而其志同者故當君子道長之時以天下人才為已任而君子之類兼收而並用之無有或遺之者然亦非有所謂朋比者一以大公為心故能以剛中之德而上配夫六五柔中之主以共成此泰亨之治何也初九之君子處草野側陋之地有茅茹之象而九二則從而包之故曰包荒九三之君子以剛健過中之才艱難以守正而九二則從而用之故曰用馮河馮河云者謂其歷涉艱難之才也荒者不包歷涉者不用則有忌賢嫉能之失矣豈能親近羣才而與之同升乎故曰不遐遺荒者能包歷涉者能用則有兼收並用之德又豈牽於私昵而有朋比之嫌邪故曰朋亡如此則九二以剛中為行得以上配夫柔中為行之主此豈淺中狹褊者之所能與哉故曰包荒得尚於中行以光大也謂其當君子道長之時能以天下人才為已任無所遺棄無所朋比一以大公為心大臣之道不狹且陋如是也象舉包荒一語而下文之義亦兼舉矣此亦省文之例也昔者伯禹之宅百揆傳説之求俊乂周公之舉百工皆以天下人才為已任者然也下至李唐之世房喬杜如晦為相如王魏善諫則遜以直英衛善兵則濟以文夫王魏二子其初亦皆疏讐之臣爾英衛二將又非所謂馮河越險之勇者也皆得以行其志者蓋以房杜為相故也九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也嗚呼吾觀諸泰至於九三而知物理之變誠若循環然也又知易之為君子謀也何其深且至也夫物極則反天地之理也九三乾之極也而當天地交際之地在下者必升在上者必降則泰極而必否矣夫何疑邪故當是時也為之戒曰無有安平而不險陂者謂泰道之無常也無有往於外而不復於內者謂三隂之必復也平者陂而往者復則泰反而為否矣此物理之循環也君子於此時以剛健過中之才處天地交際之地何修而可以保泰之福哉曰當泰之時人情狃於久安而不知安之將危人情惰於因循而不知時運之將往而我乃不敢安逸艱難守正以人待天以義勝命如此則可以保其泰而無咎矣故又戒之曰艱貞無咎蓋天人有交勝之理故也夫上下之相與不可以不孚亦不可以必孚三與上居相應之地夫苟恤上之孚已也則亦相胥而為否矣又何艱貞之云乎故又戒之曰勿恤其孚於食有福以言勿恤上之孚已而艱以自守焉則可以保泰而食有福矣易之為君子謀也又何其深且至也夫陽降於下必復於上隂升於上必復於下往來升降之理有如循環如此九三當天地交際之地可不戒哉故象又申其戒曰無往不復天地際也關子明曰象生有定數吉凶有前期變而能通故治亂有可易之理大哉人謨其與天地終始乎則九三之艱貞勿恤有福是也六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也夫泰之世君子在內小人在外在內則居中以制乎命在外則退聽乎我而不敢違君子小人各安其所此所以泰也然陽必求隂隂必求陽隂陽之情也上必應下下必應上上下之道也三陽道長相率而上故三隂失實各復於下六四當三隂志於下復之初故曰翩翩不富以其鄰夫鳥之飛也非能有志於髙也翩翩然回翔四顧蓋將卜物而即之焉爾當泰之時三隂志於下復以應乎陽也非能應乎陽以其久此泰也應之者將以成否也夫陽以得隂為富隂亦以得陽為富小畜六四曰有孚惕出上合志也九五有孚攣如不獨富也是也今六四之應初九也與其鄰之六五上六皆志於下應而謂之翩翩不富以其鄰則皆非以得陽為富也非以得陽為富則皆失其應陽之實矣故曰應之者將以成否也君子之借助於小人也其始雖若順適吾志而未有深害遽患之可覩也逮其終也則小人為主君子為客為客者日負為主者日勝夫然後患害可見矣此隂陽之所以易位姦人之所以逞毒闕而至於不可制也否泰升降之理如此吁可畏也原其初蓋亦本於隂陽之情知相信而已而無有致其戒於其間也夫隂陽相求上下相應當通泰之時徒知相與交通以盡吾心之所願欲而已曷嘗致戒於其間而後為此相信也哉逮夫三陽上升三隂下復則否泰又反其類矣則所謂不戒以孚云者非隂之罪也乃陽之過也故曰四與初居隂陽相應之地而易則寓其旨於四曰不戒以孚責初九也而九三之艱貞無咎則明以戒之曰勿恤其孚又何有於上六之應也哉張橫渠曰易為君子謀不為小人謀於此益可見矣六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也程河南曰隂陽之升降乃時運之否泰或交或散理之常也泰既過中則時變矣故聖人於三之艱貞則曰有福蓋知戒則可保至四理必變也故專言始終反復之道五泰之主也則復言處泰之義帝乙歸妹泰之義也書曰自湯至於帝乙則湯至帝乙二王也而子夏傳乃曰帝乙歸妹湯之歸妹也湯一曰天乙京房亦載湯歸妹之辭曰無以天子之尊而乘諸侯無以天子之富而驕諸侯隂之從陽女之從夫天地之義也往事爾夫必以禮義則帝乙歸妹湯之歸妹也六五以柔德居君位而下應於九二剛中之賢而順從之故有帝乙歸妹之象以祉元吉謂當泰之時去其驕泰之心而以禮義往應乎二於以受其祉福而且元吉也象曰以祉元吉中以行願也謂以柔中之德而行此志願以合乎下故能受其祉福且元吉也夫惟六五中以行願故九二得尚於中行矣所謂上下交而其志同如此上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也泰至上六極矣治極必亂髙極必危理之常也上六坤之終也坤之四積而至於上六髙而危危而覆矣故曰城復於隍夫穴土以為隍纍土而髙之以為城亦猶治道積纍以成泰也今也當泰之極將反於否則前日所纍之土復反於隍之象也夫上失其道民散久矣當泰之極習於晏安而民心日離思亂者衆當此之時人誰我用哉故曰勿用師邑親近之地也自邑告命謂既不我用方且從其親近而告命之則其所告命也雖得其正而從之者亦鮮矣故曰貞吝夫令焉而莫不聽命焉而莫不從者上下之心一也今焉上有命而下從之者鮮則慢令而逆命者多矣故象曰城復於隍其命亂也坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也嗚呼吾觀否泰二彖君子小人之用心備見而無遺矣夫君子小人之相為往來固也泰之彖特曰小往大來吉亨而否之彖先之以否之匪人不利君子貞而後繼之以大往小來云者我知之矣夫君子之與小人其道固異其設心亦異久矣君子得志則使小人各安其所吾之心未嘗不利乎彼也故小者既往則大者必來若天理之自然也故泰直曰小往大來吉亨初無他事也故無他説也若否則不然矣彼小人者不與吾君子無齟齬不合之勢則君子必不引去而小人亦未必果來也故其設心必先有所不利乎我而後君子盡去彼得以自肆矣故否曰否之匪人不利君子貞大往小來也匪人所謂非君子人也人非君子則平時與吾君子如枘鑿之不相入者正斯人也匪人得志則君子之道否塞而不行矣夫正道之在天下不可以一日無也今也吾君子之道否塞而不得行者皆否之匪人不利乎貞是也使小人而利君子之貞則天下不否矣蓋小人之心同乎已者則利之異乎已者則不利也所謂不利云者非必害之也彼此之勢若枘鑿然而不相入故也夫惟彼已之勢既不相入故大者往而小者來也然則小人之心非不利吾君子也不利吾君子之正也使君子言非正言行非正道則彼固利之久矣嗚呼此吾於否泰二彖所以備見君子小人之用心也經曰否泰反其類也惟反其類故彖之所言一切相反以天地言之乾往乎上而天氣不下降坤來乎下而地氣不上騰天地之不交如此萬物何由而通乎此天地之否也故曰天地不交而萬物不通也以君臣言之三陽往居於外各安其位於上三隂來居於內各安其位於下此上下之不交如此天下何由而有邦乎此君臣之否也故曰上下不交而天下無邦也不云其志不同而云天下無邦何也曰時乎泰也上下同志非志於逸豫也為民而已書云明王奉若天道建邦設都不惟逸豫惟以亂民當否之時上下不交則所謂邦者未嘗無也然亂民之責屬之誰乎故有邦猶無邦也曰無邦云者甚之之辭也猶詩人所謂周餘黎民靡有孑遺是也以天理人事兼言之內隂而外陽則隂為主而陽為客隂陽之易位也內柔而外剛則柔為主而剛為客剛柔之易位也猶詩云枝葉未有害本實先撥是也不云內順而外健而云內柔而外剛何也曰健順以用言也至否則君子之正道否塞而不行非可以用言也此天下之否也故曰內小人而外君子小人道長君子道消也原其所以致此者無他也否之匪人不利君子貞而然爾吁彼小人者真可畏也哉象曰天地不交否君子以儉德避難不可榮以祿否君子道消之時也聖人屢稱君子云者亦猶坤之上六為其嫌於無陽故稱龍焉之意也所謂天道不可一日而無陽天下不可一日而無君子是也然吾觀易之於君子何其愛之之深而慮之之周也蓋於否之時見之矣何也彖曰不利君子貞斯言也以小人之吾忌也吾獨奈之何哉故有大往小來之説以言當此時也吾不得不往以聽其來也至象又明告之曰以儉德避難告之以斯言盡之矣又繼之曰不可榮以祿則愛之之深慮之之周如是哉故張橫渠曰易為君子謀者此也夫天地閉賢人隱吾於此時祈於無咎無譽足矣若不避小人之鋒而乃瞭然於人曰當斯世也非我不可也則難不可逃矣故當儉吾德如天地之閉焉而後可夫祿仕人之所榮也然有所可有所不可視時而已矣當此時也若干祿欲仕之心作於其中有不能已者則難亦何可避邪此惟寂惟寞之人所以不免於投閣之禍也初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也程河南曰泰與否皆取茅為象者以羣陽羣隂同在下有牽連之象也泰之時則以同征為吉否之時則以同貞為亨始以內小人而外君子為否之義復以初六否而在下為君子之道易隨時取義大抵然也夫否之初六雖有其應然當此之時上下隔絶而不通故初六無上應之義惟其以彚守吾正而已彚謂六二之類也吉亨泰之時為然也而初六以其類貞而亦吉且亨者詘身以伸道故無往而不吉亦無往而不亨也吉謂免禍亨謂信道也雖然君臣之義不可廢也時方否塞故以彚守正於下若反否而為泰則亦如初九之以彚征也故初九之象曰志在外也而初六之象亦曰志在君也以言行止雖繫於時而君子之志於君亦無往而不在也六二包承小人吉大人否亨象曰大人否亨不亂羣也六二處三隂之中其質則隂柔也其居則中正也當否之時小人歟大人歟小大之辨不可以一言判也故易於此兩言之或曰小人吉大人否亨以言當此之時處此之地惟所擇焉爾在已之下者包之初六是也在已之上者承之六三是也當上下不交之時五雖正應無由而通故取之左右以盡包承之義此亦小人之常態也故吉乃若大人則不然矣拔之羣流之中此身雖否不以非道而求合於衆吾無所棄何以包為吾無所忤何以承為此身雖否而此道不否而亨也又豈務為小人包承之事以雜亂於羣流之中而不自知也邪夫大人之所為其與小人固不可同日而語久矣易於此特兼言之者蓋為否設故也然則善處否者非大人其孰能之六三包羞象曰包羞位不當也泰與否時雖不同而往來循環之理則一也泰至九三而否之形已兆於此時故曰無平不陂無往不復否至六三而泰之形亦兆於此時則所謂無平不陂無往不復亦可知也何也此皆天地交際之地故也然九三之在泰也艱難以守正而能食泰之福君子不以為愧六三以不中不正而居此地不知時運將變而有不當位之羞矣謂之包羞云者以言未罹於禍則其為羞也尚包藴而未發若夫已罹於禍則向之包者發矣如卯金修德之祥已兆於哀平之季為揚子雲者妙極理數非不知也乃且著書立言以伊周安漢公至新室既成又且作為文章劇秦而美之此否之六三所謂包羞也俄而天祿之禍作於匪夕遂貽羞於千古君子以謂雄之所包者至是而發矣九四有命無咎疇離祉象曰有命無咎志行也否道至九四而革矣雖然非四與五同德相濟君焉有命而臣行之臣焉有志而君命之則君子之類何所恃乎大抵古者君子有能為之才當可為之時居當為之地而天下之難固賴我以濟天下之功亦賴我以成然非君命我焉則有專命之嫌矣此專謀專對專盟專伐春秋所為譏也今也九四有濟否之才而九五之才又豈特十倍於四四也苟不稟命而行則上下不交之否又何時而已邪故曰有命無咎以言必待君命則無春秋之譏而濟否之志可得而行矣疇類也離麗也祉福也夫一君子之志行則衆君子皆得以行其志如泰之初九所謂以其彚征吉也孰不蒙其福乎程曰當君道方否之時處逼近之地所惡在居功取忌若能使動必出於君命威柄一歸於上則無咎而志行矣九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也雖有其位苟無其德不可已天下之否也雖有其德苟無其位亦不可已天下之否也以九居五其德與位稱矣乎此天下之否所以己於九五之大人也故曰休否大人吉而象曰大人吉位正當也雖然休否易使天下終無否難其亡其亡繫於苞桑此無否之戒也夫休否為泰者五也然去否未逺也去否未逺夫茍昧其所可戒而謂已安已治矣則否未可休也故心之危懼終日栗栗常虞否之復來而曰其亡乎其亡乎而後可也桑之為物也既條而復苞則亦既苞而復條其榮悴之不可常殆亦反掌之間爾譬之今日之否休矣又烏保來日之無否乎故其亡其亡常繫於苞桑之戒而不敢少忘焉則否庶幾乎其可無也唐太宗嘗問侍臣曰創業守成孰難為元齡者則曰創業難為魏徵者則曰守成難太宗曰元齡從我冒百死出一生故知創業之難徵常恐我驕奢生於富貴禍亂生於所忽故知守成之難然創業之難既已往矣守成之難方將與諸公謹之噫若太宗者其能繫念苞桑之戒乎上九傾否先否後喜象曰否終則傾何可長也泰之上六城復於隍泰之傾也否之上九直云傾否而無所假象云者人心所在無待於旁引而曲喻也經曰聖人之情見乎辭為是故也夫方否之時人情壅塞而不通其亦可知也已忠言嘉猷不接於冕旒德意志慮不孚於兆姓民瘼不求也遺才不收也姦豎佞嬖日與端人為仇也貪夫暴吏日與善類為蟊也則亦既已久矣一旦否塞之患傾倒而無餘則人之情孰不灑然而醒濯然而明如屈獲信如縶獲行矣故曰先否後喜而象曰否終則傾何可長也夫由否終則傾之言以觀則否極而泰此固理之常也由傾否之言以觀則上九傾否而不云否傾人力居多焉何者以陽剛之才而處否之終固所優為故也程河南曰反危為安易亂為治必有剛陽之才故否之上九則能傾否也屯之上六不能變屯也童溪易傳卷七
