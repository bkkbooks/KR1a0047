body:
  text: 童溪易傳卷二宋王宗傳撰文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞諸卦有彖有象而乾坤則加以文言易之藴在乾坤故也乾之文言視坤又加詳焉坤效法於乾而乾者坤之倡故也四德六爻未易以一彖一象盡之故文言所以言彖象之未言也彖釋元亨利貞有及於萬物以言元亨利貞之在物也文言釋元亨利貞有及於君子以言元亨利貞之在我也以在我言之則元者此性之始也孟子曰性無不善稟受之初萬善咸備夫以萬善之多而咸備於一性之微方其初也雖其菁英未甚發見而生長於方寸之內者已紛紛焉肇其端矣故曰元者善之長也長生長也亨也者此性之明也始生之性至此而明則衆美於焉而咸會矣謂菁英發見於此時也故曰亨者嘉之會也於元曰善於亨曰嘉始生之性而至於亨則善為有加故也利者此性之用也利宜也義亦宜也益之象曰君子以見善則遷有過則改而九卦論益亦曰益以興利蓋利於性者無過乎善害於性者莫大於過遷善而改過非善之所宜然乎故曰利者義之和也曰和云者不悖於義之謂也故孟子如此説故曰天下之言性也則故而已矣故者以利為本貞者此性之體也夫性得其正則推而見於事為之際無適而不正其本在我故也夫元亨利貞其在我者如此孰能推而行之君子也故以君子繼之體仁足以長人則推吾此性之善能仁已而又能仁人也長人者吾知其體仁於己而已初無不仁之舉以害於人而人自長育於吾仁之中故曰足以長人若家至而長之則有不足者矣夫子語顔淵曰一日克已復禮天下歸仁是也嘉會足以合禮則此性之中衆美咸會而動容周旋之際雖非有意求合於禮自然與禮合矣不然則窘束迫促而無容與之態此非盛德者之事而不足以合禮矣利物足以和義説者多以義者刻制之具非利以和之徒義也此蘇明允之意也竊謂利物者順適物理而行之也君子盡吾此性之用順適物理則其於已也見善必遷有過必改其於人也遏惡揚善以順天之休命如此則與義不悖矣故曰足以和義義者時措之宜也貞固足以幹事者夫貞則固不貞則不固也固則萬物不能搖物之所以不能我搖者以正勝之也在我之性以貞而固萬事膠擾於吾前而吾恢恢若運之掌矣所謂能定而後能應也故曰足以幹事張橫渠曰天下之理得元也會而通亨也説諸心利也一天下之動貞也夫天之與我以此性也惟君子為能推而行之行此四德則天在我矣故終之曰君子行此四德者故曰乾元亨利貞初九曰濳龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔濳龍也初九之隱也吾非無意於斯世也特其所守以天不以人故曰不易乎世謂守其道不隨世而變也吾非假隱以媒祿也何恤乎名之成不成故曰不成乎名謂晦其行不求聞於時也遁世而無悶窮亦樂也不見是而無悶舉世非之不加沮也梁鴻之隱作五噫之歌賈誼之遷賦弔湘之文非無悶也無他其所養非龍德故也樂則行之見可而動也憂則違之知難而避也行違視天故也行違視天而不以人參焉則富貴不能淫貧賤不能移威武不能屈故曰確乎其不可拔濳龍也九二曰見龍在田利見大人何謂也子曰龍德而正中也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也庸言之信庸行之謹間邪存其誠善世而不伐德博而化此正九二正中之德也昔者夫子嘗有言曰中庸之德其至矣乎民鮮久矣九二之於庸言庸行但知謹信而止爾積而至於德博而化此中庸之至德也原其所以然則亦不忽於細微故也吾嘗論之矣正中之德無他事也如日必作夜必息暑必絺寒必裘順吾常而已矣吾常之不順則必作意於此作意於此則易棄矣非正中之德也邪者誠之賊也邪之不間不能存是誠也誠之不存善世不能不伐也善世不能不伐則纍於心者未必決去也夫纍於心者未能決去吾見其小耳何博之云吾見其有所繫矣何化之云若夫德博而化則天地之大即吾之德也天地之運即吾德之所不窮也原其初則亦自庸言庸行中出也中庸曰夫婦之愚可以與知夫婦之不肖可以能行所謂庸言庸行也孟子知此説而曰大而化之之謂聖其初亦不外於可欲之善有諸已之信夫子亦以入則孝出則悌謹而信為弟子者之職業以言舍是則不可與入德矣二與五均大人也宜無不同之德在五則德與位稱在二則位不足而德有餘也故曰君德也以言雖非君位君之德也顔氏子擇乎中庸得一善則服膺拳拳而弗失為邦之問夫子告之以四代事業君德也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣君子之於德業未嘗廢進修乾之三與四特曰進德修業者處惕或之地尤不可以舍是故也德何由進忠信所以進德也傳曰忠德之正也信德之固也既正且固則內有所主而德自此進矣業何由修修辭立其誠者所以修業也業修矣故可居夫兩言之則曰忠信一言之則曰誠而已德與業非二事誠與忠信亦非二物也誠在內修辭以立之則形見於外上焉足以取信於君下焉足以取信於人君臣之間交孚而無疑則大臣之業可得而居有之矣太甲之三篇周公之鴟梟此古之大臣修辭立誠以居業之實也知至至之此主進德而言也始焉知德之可至吾之進之必欲極其至也非知幾者安能如此故曰可與幾也謂其知有可至之理故從而至之也知終終之此主居業而言也終焉知業之可終吾之居之必欲保其終也非能守義者安能如此故曰可與存義也謂其知有可終之理故從而終之也程河南曰知至至之致知也所謂始條理者智之事也知終終之力行也所謂終條理者聖之事也此學之終始也三在下卦之上故曰在上位猶未離乎下體也故曰在下位不驕不憂此學力也學力既至則知處上處下之道驕憂兩無而恐懼獨存焉故曰乾乾因其時而惕雖危無咎矣九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎九陽也而居上四隂也而居下故曰上下無常九陽也而主進四隂也而主退故又曰進退無常夫處人臣之位上下宜其有常也今也上下無常則疑於作為回邪矣進退宜其有常也今也進退無常則疑於離去羣匹矣然九四之躍雖躍矣而不脫於淵則人臣之位分吾未嘗或踰焉以此知其不為邪不離羣也既非為邪又非離羣何為是之不寧也亦曰進德修業欲及時云爾此所以不遑寧居而有上下進退之勞焉程河南曰君子之順時猶影之隨形可離非道也恆即常也恆之卦曰恆久也恆常初無異義九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也大凡心之同者則誠意交孚而其聲斯同德之同者則惟馨發聞而其氣斯同同聲相應同氣相求以言二五心德之同也水者隂中之物而其流濕則下與隂同火者陽中之物而其就燥則上與陽會水流濕火就燥凡以致精神之運以言二五之所以同心也龍者東方之畜而雲從之則物賴其澤虎者西方之獸而風從之則物被其威雲從龍風從虎凡以致仁義之化以言二五之所以同德也是故聚精會神而昭徹四海懷仁附義而生成庶類此聖人作興而萬物之所以咸覩歟五天位也而曰飛龍在天此本乎天者也二上應五故曰親上二地位也而曰見龍在田此本乎地者也五下應二故曰親下文言推廣利見大人之義於萬物則言覩於二五則言親親如父子如魚水覩則拭目觀瞻而已言各有旨也夫九五大德之君也固欲得大德之臣而任之九二大德之臣也必欲得大德之君而事之上與下交相親故曰則各從其類也程河南曰五以龍德升尊位人之類莫不歸仰況同德乎上應於下下從於上又曰乾之二五則聖人既出上下相見共成其事上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也生殺豫奪之權已擅於五故曰貴而無位謳歌獄訟之心已歸於五故曰髙而無民同心同德之佐又已應於五故曰賢人在下位而無輔經曰聖人大寶曰位位可無乎書曰后非民罔以辟四方民可無乎又曰后非賢不乂輔可無乎無此三者有悔必矣其曰是以動而有悔也以言無動而非悔也濳龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也濳龍勿用陽氣濳藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則闕而聖人之大寶亦曰位互文以見義也乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也文言之於四德也首章以人分而釋之此章以天道合而論之其分也以言其先後之有序其合也以言其功用之不分各有所指也乾元者始而亨者也謂始物者乾元也而亨物者亦乾元也萬物自有始之後其所以日長月化形遷如流者孰使之然歟乾元實為之也人知始物元也而不知亨物亦乾元也故以始而亨一歸之於乾元此有以見元與亨功用之不分也利貞者性情也謂利得其正則情無非性矣程河南曰亭毒化育皆利也不有其功常久而不已者皆貞也夫動而生物者乾之情也所謂亭毒化育之利也正而不變者乾之性也所謂不有其功常久而不已之貞也利萬物也以貞則是性其情也王輔嗣曰不性其情何以久行其正故曰利貞者性情也此有以見利與貞功用之不分也夫利物而得其正者又誰歟亦乾無也故於利貞者性情也之後又繼之以乾始能以美利利天下不言所利大矣哉乾始元也美利亨也亨者嘉之會美亦嘉故也利天下利也不言所利貞也所謂不有其功常久而不已者也故贊之曰大矣哉大亦元也此又有以見元亨利貞功用之不分也自大哉乾乎以下又廣言四德之餘旨以明乾之所以大故又先贊之曰大哉乾乎乾惟大哉故剛健中正純粹精也不可以一德名也六爻發揮旁通情也不可以一義求也時乘六龍以御天也不可以一用盡也雲行雨施天下平也不可以一方拘也夫剛乾之體也健乾之用也剛故不變健故不息一氣之運動無非時中也自然之天理無不順正也所謂純者專一而不雜也可以卦畫見之夫八卦皆純也奚獨乾歟曰六子隂陽雜也而坤又嫌於無陽也故稱龍焉則所謂純一不雜者莫乾若也乾有是純一不雜之德故稟之於已則為粹貸之於物則為精剛不干時乾之粹也精氣為物乾之精也揚子雲曰天精天粹萬物作類是也乾之德如此其不一也故悉而數之曰剛健中正純粹精也乾有不一之德六爻自初至上其所以發而揮之者果何事歟亦曰不外乎是德云爾是德也發而揮之於六爻之間故初之勿用則養其剛三之乾乾則行其健二五中也而三與四之重剛又警其不中三五正也而上之有悔又欲其不失正乾元用九則其純也天德不可為首則其粹也以至萬物資始於乾元則其精也乾之難見之情無所不通如此然則乾之情其所以旁而通之者即乾之六爻也其所以發而揮之者又即乾之不一之德也豈有他哉故既言乾之德而繼之以六爻發揮旁通情也六爻既以發揮則知時潛時見時躍時飛與夫時行時極各乘其時而不紊乘此六爻之時以當天運此乾元用九所以乃見天則也故又繼之以時乘六龍以御天也六氣順序則乾之功用慱矣故以雲行雨施天下平也終焉雲行雨施天之澤也而所以為雲為雨者乾元之餘用也夫乾元之大也為萬物之所資始則雲行雨施而天下均被其澤者乃其餘事耳故曰雲行雨施天下平也乾之德不可以一德名乾之用不可以一用盡乾之爻不可以一義求乾之澤不可以一方拘其曰大哉乾乎信乎其大也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也行之於德如影之隨形不可以強無之也特因其所處如何耳時方隱伏則雖有是德而無是行乃若出潛離隱則以是德為是行也猶之植木於幽暗之地表未始不存而影未始可見何也隱使然也若夫大明方中無有欺蔽向之植於幽暗者舉而移之顯明之地則表立而影隨矣此君子之道所以不可誣也德之在我患未成爾行未成非所慮也德既成則推此以為行乃其餘事爾所謂日可見雖欲俄頃少蔽之不可得也初云龍德而隱德非不足也位不足也夫君子之心不敢以天之所豫我者自私久矣今也吾身隱而未見則吾心之所欲施者亦未見其可也故曰行而未成行而未成則不成乎名矣此時也非我志也然則如之何曰與其有千時之愆無寧隱居以求其志也故曰是以君子弗用也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也君子得之於天者與人同也所以輔其天與人異也既有以得於天而無以輔其天棄天也學問之道無他輔吾之天也吾之天既有餘地則寬居仁行何往而不暇所謂君德如此而已子曰吾十有五而志於學又曰我非生而知之者好古敏以求之也自夫十有五以往良知良能之外何事非學前言往行未際於耳目艱難險阻未經於履歷此非學不可學以聚之則所得富矣所得既富不問以辨之則孰為得孰為失孰為是孰為非則懵然矣故繼之以問辨也學聚問辨其德成矣九二出潛離隱則以成德為行此其時也故又繼之以寬居仁行寬以居之涵養是德於已也仁以行之推行是德於人也君子將以推是德於人而在已者無雍容涵養之素則事至而應亦有所不給矣故寬以居之所以涵養是德也至於仁以行之則德施普矣前章言庸言之信庸行之謹學問之力也間邪存其誠善世而不伐德博而化涵養之功也二之見龍在田而生養之利無不被非由學問先自涵養何以至此九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎子曰過猶不及以言過與不及皆非中也九三重剛而不中過乎中也下乘九二初九之剛故曰重剛而不中九四重剛而不中不及乎中也上乘九五上九之剛故亦曰重剛而不中易以中為貴以不中為戒故三與四均致意於此上不在天謂非五也下不在田謂非二也而四處人物之表近君之地謂之中不在人又不得為九三也三既惕矣四烏得而不或邪昔魏徵謂王仲淹曰聖人有憂乎曰天下皆憂吾獨得不憂問疑曰天下皆疑吾獨得不疑若三之愓則不得不憂矣四之或則不得不疑矣經曰作易者其有憂患乎是故其辭危乾之九三九四是也三與四處危疑之地故其辭亦危何危乎當是時也上有堯舜則揖遜之事興上有桀紂則湯武之變成詎勝言哉故居此地者皆當因時進德修業而勿忘惕或之念夫然後得俱免無咎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且不違而況於人乎況於鬼神乎至理無乎不在在天地則為覆載之德在日月則為晝夜之明在四時則為寒暑之序在鬼神則為禍盈福謙之吉凶均一理也一理所在以心契之故無往而不合無往而不合則大矣故天地以無私為德日月以無私為明四時以無私為序鬼神以無私為吉凶而大人則以無私為心以此無私合彼無私宜其大也夫至理純乎天而已矣故天全是理為造化之主地配天也日月四時鬼神皆分任其造化之職者也大人全盡是理則亦天而已矣故先天而天弗違大人即天也後天而奉天時天即大人也吾不知其分焉雖然後天而奉天時猶有天在也先天而天弗違則大人之外無别有天矣故終之曰天且弗違而況於人乎況於鬼神乎言人與鬼神相與晦明於大人之天之中而不自知也夫始於無所不合終於無所弗違所謂大人造化也以此亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎無危不平無易不傾易之理也故有進必有退有存必有亡有得必有喪知其一不知其二過矣此上九之所以亢也其唯聖人乎知進退存亡而不失其正者其唯聖人乎此廣言六爻用九之道以終文言一篇之意乾之六爻皆聖人也故知進退存亡而不失其正如初之潛則知以退為正也二之見則知以進為正也四之進退無常則知進而又知退矣三之在上不驕在下不憂則知存而又知亡矣五之下見二則知退托以求助而不敢保其存也凡此皆不失其正也上九亦聖人也宜無失正之舉容有不知乎此而至於亢者易之示戒深矣夫自亢言之則有進有退有存有亡有得有喪自聖人言之則雖有進退存亡而實無得喪於其間也何也謂其因時順天而吾無容心故也故言知進退存亡而不及於得喪焉終始兩言其唯聖人乎深嘆上九之不失其正也夫不失正則不失聖矣童溪易傳卷二
