body:
  text: 童溪易傳卷十三宋王宗傳撰震下艮上頤貞吉觀頤自求口實彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時義大矣哉頤合艮震而成體上下二陽中含四隂上止而下動外實而中虚頤之象也頤養也頤之卦德曰貞吉而彖釋之曰養正則吉也以言君子之所養不可以不正也昔者樂正子之從子敖遊也孟子曰我不意子學君子之道而以餔啜也穆公之亟餽子思也子思不恱摽使者出諸大門之外北靣稽首再拜而不受曰今而後知君之犬馬畜伋則君子之所養其可以不正矣乎謂之養正則吉則養以不正其凶又可知矣觀頤觀其所養也謂自内觀外觀夫人之所養也所養者正歟則君子也所養者不正歟則小人也觀其所養則人之正不正无所逃矣自求口實觀其自養也謂自外觀内反觀已之自養自養者正歟則君子之道也雖貧且賤不去也自養者不正歟則小人之道也雖富且貴不處也觀其自養則凡自實諸口者所謂正不正亦无所逃矣然則有一言足以盡頤之道曰正而已矣雖然頤之道不正則本不立不大則用不周聖人将欲極言頤之道故又言天地聖人之所養以賛其大正以始之大以終之頤无餘藴矣夫萬物之生盈乎天地之間或動或植无有不得其生者實天地有以養之也聖人之於萬民也亦然故養賢以及萬民昔漢文帝之詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於危亡而莫之省憂為民父母将何如其議所以振貸之嗚呼漢文帝養萬民者也惜夫不知所以養萬民也夫聖人之心其與天地之心亦一矣然聖人與天地必欲同其功則不可以若是屑屑也有要道焉曰養賢是也盖養賢者乃所以養萬民也孟子曰堯舜之仁不徧愛人急親賢也是也使其家賑而戸貸之則布帛酒肉之賜今日之惠也其如來日何此无他天地固天地而聖人則人耳其所養豈不有次第矣乎故曰天地養萬物聖人養賢以及萬民卒也聖人與天地同其功而人亦不以所養之次第議聖人此之謂善法天地者也論頤至此則頤之時豈不大哉故賛之曰頤之時義大矣哉程河南曰或云義或云用或止云時以其大者言也萬物之生養時為大故云時象曰山下有雷頤君子以慎言語節飲食山物之善止者也雷物之善動者也山下有雷則動有止之謂也頤之在人也則亦下動而上止故以動有所止為頤之象言語自内出者也飲食自外入者也頤養也謹言語者所以養德節飲食者所以養生此内外交相養之道也夫言語不謹則招禍飲食不節則生疾皆非自養之道君子觀動有所止之象則有得於養之道也河南曰在身為言語於天下則凡命令政教出於身者皆是也慎之則无失在身為飲食於天下則凡資財貨用養於人者皆是也節之則无傷初九舍爾靈龜觀我朶頤凶象曰觀我朶頤亦不足貴也頤之成卦爻之具陽德惟初九上九是也上九以陽德在上尸頤之功凡出乎其下者皆由之以養故曰由頤初九以陽德在下其視上九亦何慊焉然初震也上艮也動而下者則其視止於上者有慊者多矣故頤之初爻設爾我之辭而深尤乎初之自失焉靈龜云者以況則初九有可貴之質也初九以諸爻皆由上九以養故舍其可貴之質而亦求養於上九爾謂初也初有可貴之質不能操而存之而輕動以求養於人故爾之我謂上也上以陽德止於一卦之上而尸頤之功故我之朶頤云者諸家皆云朶動也非也朶无動意草木之華擎乎枝葉之上謂之朶上九以一陽在羣隂之上此朶頤之象也而初自下觀之故曰觀我朶頤河南曰初之所朶頤者四也此泥於爻應也而亦以朶動其頤為義非也䝉之九二䝉之主也故彖曰童䝉求我我謂二也上九在上頤之主也故初之觀也而曰觀我朶頤若泥於爻應而曰我四也則失之矣盖六四隂也隂求養於陽之不暇安能養初乎夫初之舍其可貴之質而動以求養於人則其所貴者復安在邪此所以為凶而象謂其亦不足貴也樂正子所謂善人也信人也一從子敖遊而孟子以餔啜罪之盖閔其舍其可貴者而亦不足貴故也六二顛頤拂經于丘頤征凶象曰六二征凶行失𩔖也頤之中爻二三四五皆隂莫不正於六三莫正於六二與六四也二與四皆曰顛頤二與五皆曰拂經何也曰二處四隂之下此頤之顛也四處艮體之下亦頤之顛也故皆曰顛頤隂與陽居相應之地此易之經常也二之于丘頤五之從上皆非易之經也故曰拂經夫六二處四隂之下而顛以自反以自養其正可也然不得謂之吉如六四者二亦震體不以靜退許之上九頤之主也然二之於上九非其應也然不能固其靜退之操則亦不顧其非已之應也而動以即之故其征也為凶丘在外而髙者謂之上九也上九艮也艮為山故有丘象夫不固其靜退之操而自反以養其正而即其非已之應以求養焉以是為行所失甚矣故象曰六二征凶行失𩔖也盖言上九雖頤之主而非二之應𩔖也夫六二雖以隂居隂正也然屬震體故有征凶之戒六三拂頤貞凶十年勿用无攸利象曰十年勿用道大悖也頤之卦德曰頤貞吉彖曰養正則吉也以六居三正乎其與頤之卦德大相悖逆故曰拂頤貞凶所謂養正則吉養不正則凶也夫六三之自養如此而上九與之居相應之地則上九之所養失其人亦可知矣故戒之曰十年勿用无攸利然則此雖六三之罪也而上九亦不能无失焉何者養道之大悖也以諸葛孔明之智也而失之魏延楊儀以魏鄭公之賢也而失之杜正倫侯君集小人之小有才而不可用者例皆如此君子與之居相應之地不亦過乎十數之終也其曰十年勿用云者深戒之辭也六四顛頤吉虎視眈眈其欲逐逐无咎象曰顛頤之吉上施光也以六居四正也而又處艮體之下所謂自反以養其正者也故曰顛頤吉曰吉云者未嘗求養於上九而上九頤道之成也其光自然有以下施乎四故也何也同體以相賁故也夫四之與初固其應也然初九方且舍已之靈龜以觀上九之朶頤巳且不能自養六四何賴焉故四當艮之初止於其所自養以正而以隂靜自守下无賴於初而上亦无求於上故有虎視眈眈其欲逐逐之象焉夫虎之視也眈眈然其閑雅之態自若也何者不騁其欲故也謂之其欲逐逐云者何也猶之曰其欲逐去而无餘也如此則當頤之時下无賴於初上无求於上其所以自養也庸何咎乎夫六二之與六四皆正也而四則曰吉曰无咎而二俱无有焉反有征凶之戒者震動之與艮止其體性不同故也六五拂經居貞吉不可渉大川象曰居貞之吉順以從上也五君位也而以六居之養道之不足也養道之不足而資養於上九上非其應也但以在已之上故近而比之亦曰拂經雖然於經雖拂而上九以陽德在上尸頤之功而六五謙虚无我以隂承陽陽上而隂下故有居貞之吉而象曰順以從上也以言六五非正也以隂承陽以順從上隂陽各正其所故曰居貞吉也五之於上雖曰拂經而有居貞之吉二之於上亦曰拂經而於征則凶何也曰五之於上以其同體而比之所謂親賢也二之於上非其同體若動而即之則附勢而已矣大川在艱難變故之地也六五以隂柔之才方賴剛明之賢以養於已若施之艱難變故之地則不可也故曰不可渉大川河南曰以成王之才不至甚柔弱也當管蔡之亂幾不保於周公況其下者乎故艱難之際非剛明之主不可也上九由頤厲吉利渉大川象曰由頤厲吉大有慶也程河南曰上師傅之位也夫以剛明之德居師傅之任而以養道佐五以養天下而天下由之以養故曰由頤夫權重位髙則易危古者人臣之當此任也上足以保乎君下足以信乎人内足以保其身使君臣上下兼受其福夫豈偶然乎哉是必以危厲自處常懐兢畏而致然也故曰由頤厲吉而象曰大有慶也利渉大川云者夫以六五之才不足以濟難而上賴於已則當此任也茍不竭其才力以濟天下之艱危則天下何賴邪盖以君民上下之心而濟天下之難何施而不利乎故曰利渉大川豫之九四天下由之以豫故曰大有得頤之上九天下由之以頤故曰天有慶也巽下兊上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸徃乃亨大過之時大矣哉易以陽為大以隂為小大過之成卦二隂居初上之地四陽聚於中爻陽過乎隂者也故曰大者過也夫天下之物夫茍小大多寡之適均也則亦未為過也大過四陽而二隂大者多而小者少則大者過矣亦由小過四隂而二陽小者多而大者少則小者過也天下之事固有正理此豈可過邪然古今天下固有所謂非常之事者如堯舜之揖遜湯武之放伐是也若以理而論則揖遜也放伐也亦无非君子之時中也特其事大勢重不常見爾四陽聚於中爻棟之象也初上二爻俱隂柔也則中雖剛強而兩端柔弱豈能勝此剛强之任哉故於棟為橈而曰本末弱也本末不弱則棟亦不橈矣經曰其初難知其上易知本末也則初上之地一卦之本末也本末既弱則四陽居中凛然其危也欲无橈得乎觀此之象則大過之時於剛雖過而二三四五俱在中爻也巽而說行此又即巽兊二體以釋卦德之所謂利有攸徃也夫當大過之時剛既過矣苟不得中復不能巽不能說則是以剛為行也其所徃也安能利乎不能利安能亨乎惟中則雖剛而不過惟巽則有以順物之理惟說則有以服人之心以此而行此所以利有攸徃而亨也朱子發曰剛過而中所謂時中也過非過於理也以過為中也猶之治疾疾勢沉痼必攻之以眩瞑之藥自其治㣲疾之道觀之則謂之過自藥與病相對言之則謂之中又曰夫剛過而不反不肖之心應之未有不為君子害也東漢之季清議太勝君子小人至不相容大過已極而君子不自知是以不亨夫大過之時非常時也君子之所以濟是時也亦不可以常時處之故易於此賛之曰大過之時大矣哉河南曰如立非常之大事興不世之大功成絶俗之大德皆大過之時也象曰澤滅木大過君子以獨立不懼遯世无悶物理之相資養以適平而止澤有至說之性而萬物說之故木之所賴以養者澤也今也巽木在下兊澤在上是謂澤滅没乎木者也豈不過甚矣乎故為大過之象君子之當斯時也獨立不懼遯世无悶此其所以大過人歟夫獨立而懼則不能獨立矣遯世而悶則不能遯世矣此勉强矯激者之所為非本心之誠然者孔子曰勇者不懼仁者不憂當大過之時獨立而不懼遯世而无悶非所養之大過人者不足以語此初六藉用白茅无咎象曰藉用白茅柔在下也當大過之時陽過乎隂者也初六柔巽不震之才而居在下之位安其素分可也或不知時識分非自謹之道也故其象曰藉用白茅无咎繫辭釋之曰茍措諸地而可矣藉之用茅何咎之有謹之至也夫茅之為物薄而其用可重也謹斯術也以徃其无所失矣夫大過之初以茅為象者非薄其物也以其在下也有可重之用故取之云爾大過之時四隂居中其視在下之柔若无物焉者而初也自謹自潔不敢少自輕焉可不謂之賢矣乎藉以白茅過於謹也其在大過之時其過可无矣故曰无咎九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也夫物極則衰楊之為木陽氣易感之物也雖然易感而亦易衰也大過陽過也天下之物所謂陽之易過者楊之為木也故九二九五俱有枯楊之象夫楊之枯陽巳過也其在人則夫之老也夫夫既老矣冝若无所冀也然或得女妻焉則其生育之理猶在也初六以隂柔在下而二比之得女妻之象也夫楊既枯而或有感焉則有旁生之稊稊蘖也易家謂稊根也或曰楊之實也非也楊既枯矣而有稊蘖之生焉夫既老矣而有女妻之得焉則其在物也在人也所謂无不利也何者物不至於極陽不至於過故也而象則曰老夫女妻過以相與也何也曰老夫過於老者也女妻過於少者也老者與少者適相比焉此之謂大過之時也然其相與也而生育之理復自此始矣正所以救陽過之失也向使枯楊之不復生稊老夫之不得女妻則陽道之失伊誰救之邪此所謂易之不窮之理也非知道者孰能識之司馬温公曰初過於弱二過於强强弱相濟厥功乃成其於國也如剛毅之君以寛柔之臣輔之故无不利也蜀人之浮屠者曰四爻之剛雖同為木然或為楊或為棟棟負衆榱則材之强者也楊為早彫則木之弱者也盖大過本末皆弱二近於本五近於末故均為木之弱也九三棟橈凶象曰棟橈之凶不可以有輔也大過陽過隂弱陽爻以陽居隂為濟過之道而九三復以陽居陽在下體之上而不中過乎剛者也夫以過甚之剛在物之上則强愎自用如棟之橈不可支輔而有顛覆之患矣是以凶也夫九三之與上六正居相應之地則上六者九三之輔也然九三以陽居陽其剛過甚上六純隂而末弱其能支輔之乎象云棟橈之凶不可以有輔者以言九三剛過之才而非上六之柔弱所能支輔之也其曰不可云者又有以見九三之强愎自用之失也昔者周公負荷周室重任其材固有大過人者然吐哺握髪以來天下之助未敢以驕矜自處故夫子有曰如有周公之才之美使驕且吝其餘不足觀也已豈如九三之以陽居陽其剛過甚以至如棟之橈不可以支輔乎其曰不可云者所以深尤九三也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也九三九四列之中爻之中譬如屋室衆材咸集而棟則居中矣故皆有棟之象然九三之棟則橈而九四之棟則隆而不橈以陽居陽而居下體之上與以陽居隂而居上體之下其理勢之不同也夫以陽居隂則有濟過之道不專以剛强自恃也故其在下者有可支輔之勢而无傾覆之患此所謂不橈乎下不凶而吉也下謂初六也初與四正居相應之地四既居隂不恃其才之剛强則在下者有剛柔相濟之勢此所以謂不橈乎下也或曰彖以棟橈本末弱也為言則初六之本弱與上六之末弱均也而九四則棟隆之吉不橈乎下何也曰統論一卦之體則陽過隂弱故彖有棟橈本末弱也之言就諸中爻而别之則九三以陽居陽而非上六純隂之所能支也九四之以陽居隂而初六又以隂居陽其本末摇而所支載者亦不至剛過此棟之所以隆而不見橈於初六也易可以槩論之乎雖然譬之一室九三之棟既橈而九四之棟亦安能獨隆也上六之末既弱而初六之本亦安能不弱也以言居中者與處本末之地者可以相有不可以相无也故又曰有它吝猶之曰此之棟雖隆矣雖不橈矣其如它之不然乎吝所謂有所不足也孟子曰一薛居州其如宋王何此之謂大厦之傾而非一木之所能支也九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可乆也老婦士夫亦可醜也楊既枯矣以其耗竭之餘盡發而為華則其零落也可立而待也夫何益於枯也此上六之窮隂无益於九五之生育也上六窮隂處大過之極老婦之象也九五純陽處上六之下士夫之象也婦既老矣雖得士夫復何冀哉以言俱无益於事也不云士夫得其老婦而云老婦得其士夫者九五守中保庸非有過也其過在上六也何者以隂乗陽以妻乗夫故也九五无過故曰无咎輔弼非人終无成功故曰无譽夫當大過之時處大過之任隂陽相資而不能成大過之功而惟守中保庸求无過而已然至於无譽之可聞故可醜也司馬温公曰上以衰隂附於盛陽其於國也如驕盈之君以愚庸之臣輔之雖幸而无咎不足以有譽也夫隂在卦初女妻之象隂在卦末老婦之象求之卦象則下體巽也巽為長女而反曰女妻上體兊也兊為少女而反曰老婦易之取象如此其不一也而泥於象者象既不足求之卦變卦變不足求之動爻而易之㫖愈失矣上六過渉滅頂凶无咎象曰過渉之凶不可咎也處過極之時而為過極之事非有大過人之才不可也苟无其才而務為過極之事此小人行險以僥倖也上六以隂柔之才當澤滅木之時又大過之極履險蹈禍而无益於救難故曰過渉滅頂凶夫渉以能過為功今也至於滅没其頂則反見溺矣其何能濟之有无咎者自取滅没无所歸咎也夫不度時不量力而自取滅没其可歸咎於人哉故象曰過渉之凶不可咎也坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚徃有功也天險不可升也地險山川邱陵也王公設險以守其國險之時用大矣哉六子之卦各以隂陽所居之位而取義焉陽居二隂之下非所處也故動此震也陽居二隂之上得所處也故止此艮也若夫陽陷於二隂之中則為坎矣隂居二陽之下柔伏於内故入此巽也隂居二陽之上柔見於外故說此兊也若夫隂麗於二陽之間則為離矣夫坎以一陽陷於二隂之中在物為水水之流動陽也其止靜隂也流動之物處乎隂中者陽陷乎隂也水性善陷陷為險難坎固為險矣謂之習坎者險中復有險也故曰習坎重險也此以上下二坎言坎之所以為險也初六曰習坎入於坎窞凶是也盖初六居二坎之底故也然則八卦皆重也而坎特加一習字者聖人指重險以示人欲其知所戒懼其仁深矣水之為物止之斯為淵䟽之斯為川水流而盈然後出險流而不盈斯為坎矣夫不舍晝夜水也故語天下之物所謂至有信者莫水若也其流行也雖歴渉險阻而能不失其信者此所謂有孚也君子之行乎險難者實似之故此心也質之天地謀之鬼神稽之千古之聖賢契之詩書之所載无適而不合者以其在我之信未嘗少失故也故繼之曰維心亨心之為物所謂操之在我者而信其所出之地也求之於卦則坎中之一陽是也夫隂在外險也剛在中則亨也夫惟剛實之德在中而能亨此所以行險而不失其信也君子之歴渉險阻也身雖陷難其心則亨者盖以剛實之德在中故也夫惟其心亨也則其見於有行也无險之不濟矣行有尚謂出險也水之流行也不舍晝夜盈科而後進放乎四海故曰徃有功也水之徃而有功也為江而為海君子之徃而有功也國治而天下平究其本原之所自出亦曰有孚維心亨而已矣此孟子所謂有本也大哉孚乎坎之用在乎險故聖人於此又廣言天地之險以明王公之所以守其國者不可以或忽乎是也夫積氣於上者天也故蕩蕩蒼蒼不可紀極者皆氣之積而然也故曰天險不可升也積形於下者地也故髙者為山次者為邱為陵深者為淵皆形之積而然也故曰地險山川邱陵也王公觀諸天地之險故亦設其險而有城郭溝池之固者所以守衛其國而效法天地也韓文公守戒之説曰今人有宅於山者而知猛獸之為害則必髙其柴援而外施陷穽以待之宅於都者而知穿窬之為盜則必峻其垣牆而内固扄鐍以防之此野人鄙夫之所及而非有過人之智而後能也今之通都大邑介於屈强之間而不知為之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈才力為之不足歟盖以謂不足為而不為爾然則當用險之時其用甚大其可以或忽乎是歟故賛之曰險之時用大矣哉而孟子乃曰固國不以山谿之險呉起對魏武侯亦有在德不在險之論者此又為恃險者設而非險之罪也象曰水洊至習坎君子以常德行習教事坎者水之科也二坎相仍習復之義也故以水洊至為習坎之象洊亦重也以謂上之坎既盈則重至於下坎故也此孟子所謂盈科而後進也夫盈科而後進不舍其晝夜之功也故曰君子之德行貴乎有常而教事貴於習熟德行而有常則其視屋漏暗室无異於十目十手之地也教事而習熟則困而知學而知其與生而知一也勉强而行利而行其與安而行一也此不舍晝夜之功也其在彖所謂不失其信是也中庸曰自明誠謂之教此教事也初六習坎入于坎窞凶象曰習坎入坎失道凶也坎之下體所謂坎中之坎也而初六爻居二坎之底所謂坎之陷也故曰習坎入於坎窞凶夫當坎險之時以行有尚為功而行險之道則以不失其位為本初以隂柔之才而居二坎之底安能出險乎是以失處陷之道而凶也六三亦入于坎窞者也爻曰勿用象曰无功而未如初六之失道而凶者所處太下則初六是也然无其才而不能出險則初與三大抵同也九二坎有險求小得象曰求小得未出中也二當坎險之時處二隂之中所謂坎有險也然以剛中之才求以濟險亦可小濟但未能出坎險之中爾故曰求小得未出中也若能出坎險之中則其得所求也豈特小得而已哉此非才之罪也居使然也雖然以九五之才且有坎不盈中未大也之辭則九二之求小得未出中也夫何尤焉六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也乾之九三處二乾之間故曰終日乾乾坎之六三處二坎之間故曰來之坎坎來謂下而即三也三坎也之謂徃而之四也四亦坎也以言進退皆險也夫居進退皆險之地自君子處之其恐懼不安何如也然三乃以隂柔不正之才不知恐懼乃於險而且枕焉則以不安之地為可安也故入于坎窞而不能出險无以異於初焉三以柔居剛故有險且枕之象處上坎之底故亦曰入于坎窞其曰勿用云者戒之之辭也夫當坎險之時求以濟險而或如六三之所處則何險之能濟哉故曰勿用三下之終也故曰終无功六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也六四九五俱无其應而處君臣相際之地故處剛柔相濟之義而為濟難之道焉以言天下未嘗有无難之時而亦未嘗无相與以濟難之人故也樽酒陽物也貳之以簋以隂際陽也缶者朴素之器謂六四以隂居隂也約者誠信以相契之謂也牖者暗室之明處也夫當坎難之時上欲以見信於君而濟天下之難則不可以无上交人主之道也一樽之酒貳之以簋而復以瓦缶朴素之器用焉此以況人臣以質實為尚而无事於浮飾也其質實如此又當納約自牖因君心之明處而開導之則雖當艱險之時忠言可以見納天下可以无難矣故終无咎也程河南曰自古能諫其君未有不因其明者也故訐直強勁者率多取忤而温厚明辨者其說多行漢髙祖愛戚姬將易太子是其蔽也羣臣爭之者衆矣嫡庶之義長少之序非不明也其如蔽而不察何四老人者髙祖素知其賢而重之此不蔽之明心也故留侯因其所明以及其事則悟之如反手且四老人之力孰與張良羣公卿及天下之心其言之切孰與周昌叔孫通然而不從彼而從此者由攻其蔽與就其明之異爾左師觸讋諫趙王太后事相𩔖九五坎不盈祗既平无咎象曰坎不盈中未大也彖曰水流而不盈則九五是也故曰坎不盈夫九五剛而中者也然而不盈則中而未大也若坎而盈則放乎其外出險而難平矣故繼之曰祗既平无咎祗大也平謂坎之盈也猶之曰若坎而盈則中之大而至於平矣難平則有功而无咎今也坎既不盈則其中未大而險難未至於平未可以言无咎也其曰祗既平无咎云者盖深望之也夫九五以剛中之才居得尊位猶未能平此險難而剛中之效未至於光大者重險之難既深二方有險未能出中餘爻皆隂柔非濟險之才當險難之時下无應助獨濟難矣祗與復初九无祗悔之祗同祗祈支反大也上六係用徽纆寘于叢棘三歳不得凶象曰上六失道凶三歳也耿希道曰居險貴於過過則身免於險用險戒於過過則人罹其害上六在上非居險者乃用險者也夫過於用險則强人而使我服故拘之囚之无所不用其威雖然其威既窮而不得其情猶昔也則上有失道之名而下无所說之禍矣故曰係用徽纆寘于叢棘三歳不得凶夫徽纆刑威之具也叢棘刑威之地也係之徽纆寘之於叢棘之中三歳之乆猶不得其情則在人者乆罹其害而在上者愈増失道之愆矣故曰上六失道凶三歳也夫子生三年然後免於父母之懐故先王之制服也亦三歳而服闋天道三歳一變歩天之術亦三歳一閏然後四時猶故也則天人之道至於三歳未有不終而更者也今上六沮人以威用險太過至於三歳之乆猶不得其情則居上之道所失多矣安得而非凶歟夫居下而失居險之道者初六是也居上而失用險之道者上六是也故語坎之失道而凶者惟初上二爻焉何者初太下而上太過故也童溪易傳卷十三
