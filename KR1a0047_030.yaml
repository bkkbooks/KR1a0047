body:
  text: 童溪易傳卷三十宋王宗傳撰繫辭下易之興也其於中古乎作易者其有憂患乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履以和行謙以制禮復以自知恆以一德損以遠害益以興利困以寡怨井以辨義巽以行權前章言於稽其類其衰世之意此章復言易之興也其於中古乎作易者其有憂患乎而繼之以九卦之德至於再至於三而不能已也吾以是知易之為易聖人不特為衰世之民而作也亦聖人自蹈衰世之憂患而作也文王羑里之囚是矣孔子贊易及此其亦涉衰周之難乎夫六十四卦之卦德皆聖人之德此章特言九卦者蓋言文王當時之事也使文王之在當時先有是德其能脫於憂患之域乎故後章亦曰易之興也其當殷之末世周之盛德邪當文王與紂之事邪文王之德始見於羑里之囚是履虎尾涉患難為文王進德之基故曰履德之基也又以謙德順事於紂有事君之小心而曽無犯上之舉則持循於已者蓋有所執守而然也故曰謙德之柄也文王至此君子之道長矣出入無疾朋來無咎而隂虛不能害天地之心即我之心也故曰復德之本也自此受命作周而周家王業愈固而不可拔故曰恆德之固也又自此虞芮質厥成江漢被其化損以修政益以裕民故曰損德之修也益德之裕也困之彖曰困而不失其所亨其惟君子乎以言非君子則當剛掩之時不免於困矣文王經歷憂患至此而亨於西土三分天下有其二君子小人之辨其在此時乎故曰困德之辨也文王養人之功至此不窮往來井井咸即有周而無適彼之思故曰井德之地也終焉上順天心下順人心申命從事而大勳集於其子武王盟津之會八百諸侯聽其命而不違故曰巽德之制也雖然履所以為德之基者蓋和而至也苟不和而至其能脫羑里之囚乎謙所以為德之柄者蓋尊而光也苟不尊而光則當此之時其能亨而有終乎復所以為德之本者蓋小而辨於物也苟不小而辨於物則一陽來復君子之勢尚微其不為隂虛所害乎恆所以為德之固者蓋雜而不厭也文王與紂之時仁暴並施善惡相勝可謂雜矣而帝遷明德串夷載路天命人心至此有歸無有厭斁夫文王者故曰恆雜而不厭損所以為德之修益所以為德之裕者蓋先難而後易與長裕而不設也文王治內治外之政始於憂勤終於逸樂則損以修政豈非先難而後易乎關睢之化行則賢人衆多鵲巢之化行則庶類繁殖則益以裕民豈非長裕而不設乎不設云者文王有自然之化而非容心於其間也困所以為德之辨者蓋窮而通也夫困者剛為隂所掩也羑里之難可謂窮矣而文王於此時則窮而通也故曰困而不失其所亨井所以為德之地者蓋居其所而遷也以言非文王求於下民惟民歸於文王也苟非居其所而遷則文王亦有心於求下民矣惟井也居其所而不捨此養人之功所以變遷而不窮也巽所以為德之制者以言稱而隱也稱者揚也隱者入也巽之為卦二陽在上揚也一隂在下入也故巽為風風之為物鼓動萬物莫見其迹而君子之德風也由文王至於武王風化之行厥惟舊哉此四方莫不聽命而不知其所以然也非巽稱而隱而何夫惟履和而至故可以和行説應乎乾履虎不嘻此和行也謙尊而光故可以制禮裒多益寡稱物平施此制禮也復小而辨於物故可以自知不善未嘗不知知之未嘗復行此自知也恆雜而不厭故可以一德久於其道天下化成此一德也損先難而後易故可以遠害而損之卦德曰利有攸往益長裕而不設故可以興利而益之卦德亦曰利有攸往以言當損而損當益而益無往而非利也若夫困窮而通則致命遂志而已矣夫何怨云故曰困以寡怨伯夷叔齊困孰甚焉然彼之志未嘗不遂也故夫子以為求仁而得仁又何怨聖賢之設心大扺如此井居其所而遷則或居也或遷也命也有義焉故於以辨義舍井焉不可此聖人之德不可以人不我求之為不足人必我求之為有餘也巽稱而隱故可以行權蓋權也者所以稱物也其或抑或揚皆欲當夫時中而已矣是理也雖稱而隱非可與權者不知也故孔子亦曰可與立未可與權然則權也者即文王之所以為文武王之所以為武也吾夫子之於九卦也凡三致其意如此學者其可不刳心矣乎易之為書也不可遠為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利遠者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉此章言易之為書也凡三致其意焉大抵皆論六爻有不一之用於以明易之道以示人也夫易之為書也奚可遠求云乎哉而布在此書者不過六爻之用云爾舍六爻而求易則為道遠矣夫六爻之用易之道也其為用也不一故為道也屢遷屢遷云者變動不居周流六虛上下無常剛柔相易不可為典要唯變所適此所謂屢遷也夫居則不變動六虛位是也所謂初二三四五上也變動則不居周流於六虛位之間是也所謂九與六也九在某卦或居初三五之陽位或在二四上之隂位六在某卦或在二四上之隂位或居初三五之陽位或上或下之不常其居故曰上下無常此之爻以九居初剛也而彼之爻則以六居初是以柔易剛也此之爻以六居二柔也而彼之爻則以九居二是以剛易柔也或剛或柔無一定之主故曰剛柔相易不可為典要其所以然者蓋唯變之是適云爾此其道所以屢遷也易之道如此苟非知所戒懼之人即其所以然者而見於躬行則亦道自道爾人自人爾道豈能虛行乎蓋道待人而後行故也故聖人之作此書也於其出入之際以度內外欲使夫人之知所戒懼以躬行是道焉其出入云者以八卦之內外言之也出者自內而之外入者自外而之內於其出入之際以度內外則知消息盈虛之變出處進退之際蓋有所不可逃者此所以能使人之知懼也然此書之作又明夫人之所當憂患與其所以致憂患之故者詳悉以告之則夫人至此鮮有不知懼者矣知懼之心油然而生則雖無師保不邇父母而不敢有自肆之心焉以其知內外之懼明憂患之故也初初爻也六爻之理其初難知故此書之作也於其初爻也率其所以然之辭而後揆之以一卦之方則一卦之體立矣故曰既有典常下文所謂初辭擬之卒成之終是也方其剛柔之相易也則不可為典要初辭既率而一卦之體立則向之所謂剛柔相易者又不離乎一卦之內矣豈有不典常乎此易之道雖曰變易也而能垂萬世不易之法歟然則是道也苟非其人其能躬行是道而無負於聖人所以垂法之意歟故曰苟非其人道不虛行易之為書也原始要終以為質也如上文所謂初率其辭而揆其方是也是書之作於其初也而原其始於其上也而要其終以為一卦之體質體質既立則六爻之所謂九與六者相雜於一卦之內蓋有是時則有是物時在卦也物在爻也如復之時則有初九姤之時則有初六是也初爻在下時物之未著也故曰難知上爻在終時物之已著也故曰易知如乾之初有潛龍之象此難知也至上則為亢龍矣豈不易知乎咸之初有咸其拇之象此難知也至上則咸其輔頰舌矣豈不易知乎何者卦有終始事有本末故也唯其難知也故聖人於初爻之辭擬之而後言故曰初辭擬之惟其易知也故聖人卒而成之以終盡其義故曰卒成之終凡此論六爻之初上者然也若夫揉雜剛柔之物撰成一卦之德使是與非各得其辨則非二三四五之中爻不能盡此義也故曰非中爻不備然則剛柔之物既雜則有存亡吉凶之判而易之存亡吉凶之理聖人又於彖辭而明之彖辭既作則一卦之德由此而撰矣其在易也豈復有難知之患噫亦要其存亡吉凶則居可知矣又曰智者觀其彖辭則思過半矣夫惟如是故聖人又即中爻而有同功異位之説二與四俱柔也故其功同卦分內外故其位異若以其善論之則又有多譽多懼之不同何者遠於君者其𫝑伸故多譽近於君者其𫝑屈故多懼是以乾之九二有見大人之利而九四則不免於或焉月望日則蝕臣近君則屈理勢然也故四多懼而曰近也柔之為道不利遠者此則言以二之柔宜非致遠之才今也多譽何也蓋以其要在於用柔中而無咎故多譽也咎者譽之反也既無咎則其多譽也宜矣三與五俱剛也故其功同卦分內外故其位異三多凶五多功者以其有貴賤之等也三既多凶則比之五也不復言其善之不同以其無善之可録也故聖人賤之又曰其柔危其剛勝邪聖人若曰三之所以無善之可録而取賤於人者蓋謂以其柔居此位則不當位而危以其剛居此位則其過剛而勝故也然則所謂雜物撰德辨是與非非中爻不備於此蓋可見矣存亡吉凶之理豈曰難知矣乎雖然多譽多懼多凶多功六十四卦凡為中爻者未必盡然今也云爾何也特從其多者言之爾夫是書之作人皆知其有所謂六爻也然而未知其故也故聖人於此又言天地與人之道不越乎是而六爻變動而有是吉凶之異者此非聖人之私智也故曰易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也夫易以六爻兼三才而兩之故六爻以五與上二畫為天之道而居上蓋立天之道曰隂與陽上則隂而五則陽故也以初與二二畫為地之道而居下蓋立地之道曰柔與剛二則柔而初則剛故也以三與四為人之道而居中蓋立人之道曰仁與義而三與四則仁義之用也易之為書三才之道無所不有故曰廣大悉備分而言之則大者天也廣者地也悉備者則處諸天地之間者是也而上繫亦曰夫易廣矣大矣而繼之以備矣之辭若曰遠則不禦者天也故曰大邇則靜而正者地也故曰廣天地之間者萬物也故曰備與此所言無異義也然則六爻之為義此其故也而三才之道實寓乎其中矣豈有他哉夫爻之為義則亦取其效三才之道有所謂變動云爾爻有剛柔之等即於九六焉見之物即上文所謂時物也九六相雜而成交錯之文則或剛或柔有不可掩若夫文之不當或以陽居隂而吉或以隂居陽而凶又或以隂居隂以陽居陽而有吉有凶凡此之類皆所謂文不當也此聖人因故六之辭而有及於故曰爻故曰物故曰文故吉凶生焉以詳明夫六爻之所以然也學者於斯其可忽諸易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生遠近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈嗚呼豫學易至下繫之末章感慨竊嘆而益知聖人所以興易之意也是何也不有所喪則無所興故也夫窮則變變則通通則久易之道也世道不喪於殷之末世則是易也吾知其未必興於有周盛德之主矣雖然天下之事有本有末有盛有衰本末者世運之終始也盛衰者主德之明暗也本末相禪盛衰相軋此文王與紂之事然也當是時也易雖欲不興可乎哉吾又知其必興於此時也故前文亦曰易之興也其於中古乎作易者其有憂患乎夫惟聖人之作易於其有是憂患而作也故其辭亦不得不危大凡人之涉世處事也危其危則無危故易於此危者使平如所謂栽者培之是矣易其危則必危故易於此易者使傾如所謂傾者覆之是矣以乾九三重剛而不中可謂危矣然以惕懼自處則雖危無咎處豫之初隂弱居下可謂易矣然以逸豫而鳴則志窮而凶是道也散在天地之內物物皆然不特人如是也上而日月之明晦寒暑之往來下而草木之榮謝蟲魚之生死莫能逃此本末盛衰之理故得時者昌失時者亡其在人主則文王與紂之事是也故曰其道甚大百物不廢雖然天人有交相勝之理吉凶無不可求之道知其説者則可以有安而旡危有存而無亡不在乎他在乎終始以致其懼而已然則易之辭所以危者蓋欲人之知懼也惟能知此則無過咎易道之要莫要於此嗚呼此文王所以有是盛德而脫羑里之難也夫文王之盛德即前章所謂九卦之德也合九卦之德以為文王之盛德而文王盛德之本則又本諸乾坤故又以乾坤之德行繼之夫所謂乾坤之德行者易簡是也有得於乾坤易簡之德行以為吾之德行則天下險阻艱難無不盡知之矣且夫德行之貴於有常也久矣無常不可謂德行乾之德無時而不易故曰恆易坤之德無時而不簡故曰恆簡然乾坤之德行所以恆易恆簡者以其至健至順也使乾之健坤之順而不極其至則所以為德行者詎能恆乎孔子曰中庸之為德也其至矣乎民鮮能久矣夫有是至德而鮮能久者斯民之無恆心也若聖賢則不然故上繫之首章其論易簡也以可久可大為賢人之德業惟恆易恆簡故能説諸心惟知險知阻故能研諸侯之慮易簡者我心之所固有優遊涵泳其味無窮能無説乎險阻在前憂慮疚懷往來於中能無所研乎研究也諸侯謂文王也而諸家皆以侯之一字為衍字誤矣夫險阻者易簡之反而説心亦研慮之反也文王當殷之末世倘非有得於乾坤之易簡以説吾此心其能處困厄之世而脫羑里之難乎不能脫羑里之難非所謂乾坤之至健至順也又倘非於險阻艱難無不盡知以研吾此慮其能推吾歷涉患難之道以與民同患而興易乎不能與民同患而興易亦非所謂乾坤以易簡示人之意也故又繼之曰以定天下之吉凶成天下之亹亹者夫易有爻有象爻象也者所以效天下之易簡也故爻象動乎內吉凶見乎外功業見乎變則定天下之吉凶成天下之亹亹者皆易簡之為也使存諸我者不易且簡則吉與凶之不齊固未易定而亹亹者之無窮亦未易成也變化天道也云為人事也聖人以天道人事本無二理故其興易也即人事以明天道非舍人事别有所謂天道也上繫曰擬之而後言議之而後動擬議以成其變化是也故於此而曰變化云為一天人也夫天下之吉凶與天下之亹亹者即人事也而聖人定之成之則以天道律人事也人有言而云有動而為無往而非天道則得聖人所以興易之意矣且夫人之事有得夫易之吉事歟則必有上天所降之祥人之事有得夫易之象事歟則必知聖人所制之器人之事有得夫易之占事歟則又知遠近幽深之來物凡此皆天道也孰謂天道人事之為二乎夫惟天道人事之無有二也故天地設位於上下而聖人成能於兩間此乾坤之德所以全盡於聖人也所謂人謀即成天下之亹亹者是也所謂鬼謀即定天下之吉凶是也天人合一幽顯無遺則百姓日用於是道之中者莫不樂推而不厭矣故即其能以與聖人以為聖人之能成其能故也朱子發曰伏羲氏始畫八卦不言而告之以象者至簡易也後世聖人演之而為六十四卦有爻有彖以人情變動言之於其辭知險阻也且八卦成列剛柔雜居吉凶已可見矣然道有變動變則通通則其用不窮所以盡利者不可不言也故變動以利言吉凶以情遷巧厯之所不能計也聖人惟恐遷之而失其正矣故爻彖以情言變動者何情偽之所為也人之情偽難知矣以情相感則利生以偽相感則害生近不必取遠不必舍則悔吝生愛惡不一起而相攻則吉凶生吉凶生而悔吝著情偽其能掩乎是則情偽相感也遠近相取也愛惡相攻也爻有變動也有利害斯有悔吝有悔吝斯有吉凶吉凶以情遷也悔吝者何凡易之情隂陽相求內外相應近而不相得則偽不可久物或害之害則凶將至矣悔吝者利害吉凶之界乎害之而悔則吉且利矣吝之而不悔則凶聖人不得不以利言之而使之遠害也故曰聖人之情見乎辭然則何以知其情偽邪考其辭可矣將叛者其心愧負故其辭慙中心疑者其心惑亂故其辭枝吉人守約故其辭寡躁人欲速故其辭多誣善之人妄故其辭遊失其守者窮故其辭屈吉人辭寡以簡易知之也五者反是以知險知阻而知之也簡易則吉險阻則凶其辭雖六其别則二情偽而已矣上繫言易簡而天下之理得矣下繫終之以易簡而知險知阻故曰同歸而殊塗一致而百慮説卦昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也雷以動之風以散之雨以潤之日以烜之艮以止之兌以説之乾以君之坤以藏之帝出乎震齊乎巽相見乎離致役乎坤説言乎兌戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所説也故曰説言乎兑戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮神也者妙萬物而為言者也動萬物者莫疾乎雷橈萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兑説也乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兑為羊乾為首坤為腹震為足巽為股坎為耳離為目艮為手兑為口乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曵其於輿也為多眚為通為月為盜其於木也為堅多心離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上稿艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節兑為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊序卦有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反於家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之巽巽者入也入而後説之故受之以兑兑者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉雜卦乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也無妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁無色也兊見而巽伏也隨無故也蠱則飾也剝爛也復反也晉晝也明夷誅也井通而困相遇也咸速也恆久也渙離也節止也解緩也蹇難也睽外也家人內也否泰反其類也大壯則止遁則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也童溪易傳卷三十
