body:
  text: 童溪易傳卷二十六宋王宗傳撰兊下巽上中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中説而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也昔左氏以信不由中責周鄭二國易有中孚信之由中者也以成卦觀之在二體則為中實在全體則為中虛蓋中不虛則有所纍有所纍害於信者也中不實則無所主無所主則又於信為失矣故曰中孚柔在內而剛得中此指三四之中虛與二五之中實以言中孚之成卦也夫在人有自然之心天下有自然之理得其自然之心而順其自然之理則説於下而巽於上矣此非誠信足以為感化之本其能致然歟故曰説而巽孚乃化邦也此指兊巽二體之用以言中孚之及萬民也中孚卦德有取於豚魚吉者蓋豚躁而魚畏物之難感者也信能感豚魚則其信至矣朱子發曰先王之交萬物無非信也取之必有時用之必有節風有騶虞信及豚也頌有潛信及魚也動物蕃息莫如豚魚信及豚魚上下草木鳥獸無所不及而至誠之道可以贊天地之化育如是乃吉故曰豚魚吉信及豚魚也此指豚魚以言中孚之及物也夫誠信之道無所不利仗誠信以濟險難則如乘虛舟而無覆溺之害矣豈有不利者乎朱子發曰乘木之利乘桴不如乘舟重載以越險不如乘舟之為安仗誠信以蹈大難猶乘木而其中枵然豈復有風波之虞哉古人虛已遊世五兵兕虎不能害用此道也故曰利涉大川乘木舟虛也此又指卦畫之中虛以言中虛之可以濟難也夫誠者天之道也天之道在人則曰性而在性則曰正而巳矣正者中孚之本故中孚之卦德所利者貞而此性之貞發為是孚無非用中之信也天人相感通之理盡在是矣故曰中孚以利貞乃應乎天也此又指中孚之所本者正以言中孚之可以應天也夫誠信之道大可以化邦微可以及物髙可以應天險可以濟難此非中虛而無所纍中實而有所主其效豈足以至是哉象曰澤上有風中孚君子以議獄緩死程河南曰水體虛故風能入之人心虛故物能感之風之動於澤猶物之感於中故為中孚之象夫物之感動乎中者無若刑獄之最可惻者也蓋死者不可復生而刑者一成而不可變故君子於此加惻焉而盡吾中心之誠以處之臯陶之稱舜也而曰罪疑惟輕又曰與其殺不辜寧失不經故漢法於疑獄則有讞而周官亦有八議之辟蓋不如是以其一成而不可變之刑而加諸不可復生之死非君子所謂盡心者故議獄者所以緩其死謂其有未必死者存也程河南曰君子之於天下之事無所不盡其忠而議獄緩死最其大者是故中孚之象有取於此初九虞吉有他不燕象曰初九虞吉志未變也夫君子以自信為本不能自信而汲汲焉以求人之我信則末矣世之庸人淺夫中無所得人之見信則以為喜或不之信則歉然也夫豈知君子有自信之學也哉九以剛明之才處中孚之初於位則下於事則始也當此之時固宜審度以自信為本故曰虞吉夫苟未能自信而求信於人則是有他也志或有他則中心搖搖失其所安矣故曰有他不燕謂其信否不卜之已而卜之人故也夫惟當中孚之初必先自信而不變其志以求信於人此初之所以吉於虞也故象曰初九虞吉志未變也九二鶴鳴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也中孚二五爻義互相發明蓋二與五以同德居相應之地分則君臣也義猶父子也而其莫逆則朋友也故夫五唱於上而二和之則有鳴鶴在隂其子和之之象五有好爵而與二靡之則有爾我之稱夫五與二居相應之地中有二隂為之隔此鳴鶴之在隂也五以誠信發之於上而二亦以誠信應之於下此所謂其子和之也故象特指之曰其子和之中心願也謂二以中心之孚願應乎五也我謂五也五中孚之主故也爾謂二也五有好爵而與二共之則五亦以中心之孚願應乎二可知也好爵美爵也靡徐音云亡彼反韓詩云共也大抵五有唱於上而二亦既和之於下矣苟不與之共天位食天祿此孟子所謂士之尊賢而非王公之尊賢者也夫惟上有九五為之君下有九二為之臣上下以同德相應而後中孚之化可成此二五爻義所以互相發明也六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也二與五以同德逺而相應三與四以同德近而相比近而相比故曰得敵謂得與四為匹敵如艮所謂敵應也朱子發亦引子夏傳云三與四為敵是也夫三與四雖均以隂虛處一卦之中然六三德不當位豈四之比哉故或鼓張而作又或罷廢而止或悲泣而憂又或歌樂而喜此所謂無常之人也豈足與言誠信也哉此無他不中失正而非中孚之所尚故也故象曰位不當也六四月幾望馬匹亡無咎象曰馬匹亡絶類上也夫隂道畏盈而孚志貴一中孚所以為中孚者三與四也夫三既不足與四比矣則四也處近君之位為成孚之主當以滿盈為懼而一志以從上故有月幾望馬匹亡之戒夫月望則與日敵矣隂盛則與陽角矣惟月幾望而不至於滿盈焉則得臣道之正矣夫四與三均以隂虛居一卦之中近而相比然處近君之位不惟五之承而三之比焉則孚之志不一矣故爻曰馬匹亡無咎而象曰絶類上也夫兩馬為匹匹類也詩曰兩服上襄兩驂鴈行是也凡駕車用馬四謂之駟車兩服在前故曰上襄兩驂次之故曰鴈行今四不三之比而惟五之承焉故有馬匹亡之象謂云絶其匹類而獨上承乎五也此所以為成孚之主而無滿盈之咎也然則三雖得敵而四又亡其匹隂道畏盈而孚志貴一也如此夫九五有孚攣如無咎象曰有孚攣如位正當也五中孚之主也近而六四以謙虛承我者也逺而九二以剛中應我者也而五復以剛實之德位乎正當之位所謂以誠信交誠信者也故曰有孚攣如謂自近及逺以誠信之道綢繆固結如相攣引然也當孚之世有君如此又何過之可言哉此九五之所以無咎也上九翰音登于天貞凶象曰翰音登于天何可長也上巽體也説卦曰巽為雞翰音雞也禮曰雞為翰音夫雞謂之翰音者蓋雞之鳴也鼓其羽翰而後鳴猶詩所謂斯螽動股莎雞振羽是也夫雞非登天之物向使鼓其羽翰蓋亦不免於控地而已矣何可長也處中孚之極誠信之道不能悠逺故有是象夫正也者中孚之所利也誠信之道不能悠逺豈所謂利歟於正為凶故曰貞凶艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上冝下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不冝上冝下大吉上逆而下順也昔者聖人之重卦也以兊重巽四陽聚於中爻故命其卦曰大過謂陽過也以震重艮四隂分於上下故命其卦曰小過謂隂過也陽過於中則本末弱也故大過有棟橈之象隂過於上下則上逆而下順也故小過有飛鳥之象蓋易者象也有是理則有是象有是象則起是義程河南所謂至微者理也至著者象也體用一元顯微無間是也夫陽大而隂小者安能亨哉以過故亨也天下固有越常救失之事如象所謂行過乎恭喪過乎哀用過乎儉是也不有所過安能亨哉故曰小過小者過而亨也然過道又利於貞不利於貞則凡有所過者皆偽也所謂正云者不失時冝之謂也蓋事固有時而當過者過之則以為當不過則以為失如夏葛冬裘隨時而已故曰過以利貞與時行也柔得中謂二與五也剛失位而不中謂三與四也二五之柔俱得中位故當小過之時可小事而已故曰是以小事吉也乃若所謂事之大者則非陽剛之才得位得中不能濟也今也三與四俱失位而且不得中失位則無所用其剛不中則其才又過乎剛故當小過之時不可以大事故曰是以不可大事也夫小過之成卦四隂分與上下故取飛鳥為象蓋鳥之飛也羽翼分張故小過上下四隂有兩翼之象而初與上皆取象於飛鳥而曰飛鳥以凶又曰飛鳥離之凶大抵過道順行則吉逆施則凶猶之飛鳥也騰上決起時或有遺音焉安能上徹乎此所謂不冝上也何者上逆故也音遺於下下所共聞也此所謂冝下也何者下順故也以卦畫考之五與上二隂爻下乘四與三剛爻故曰上逆初與二二隂爻上承三與四二剛爻故曰下順夫過冝然而然則雖過非過也而以逆順為吉凶此所以取象於飛鳥也故曰有飛鳥之象焉飛鳥遺之音不冝上冝下大吉上逆而下順也夫卦德以冝下為大吉則以不冝上為大逆可知何者逆順之不同故也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉雷之始也出於地上及其壯也在於天上今也山上有雷小有所過之象也行過恭喪過哀用過儉時乎當然故君子不得不少有所過也蓋不如是則不能矯正一時之失矣故夫當過而過不以為過苟不當過而過則過矣朱子發曰考父之過恭髙柴之過哀晏平仲之過儉非過於理也小有所過乃所以為時中也初六飛鳥以凶象曰飛鳥以凶不可如何也夫當過而過不以為過不當過而過則過矣初以隂柔在下當隂過之時輕動躁疾有飛鳥之象犯不冝上冝下之戒此所以凶也象曰不可如何也謂不冝然而然蓋甚之也鼎之四不知自信以至覆餗故曰信如何也小過之初不知其不可以至於凶故曰不可如何也皆甚之之詞也下之九三之象凶如何也亦是意也六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也初一卦之始也故有祖象二居其上所謂過其祖也二與初同體也近而相比故曰遇其妣三成艮之主也故有君象而六二居其下所謂不及其君也二以隂乘陽以下奉上故曰遇其臣蓋對祖言之故曰妣對君言之故曰臣妣與臣皆二也曰遇云者適當其時與分之謂也六二或過或不及皆適當其時與分而不愆於中焉此在過之道為無過也故曰無咎劉仲平博士云過乎祖則有繼世之譽過乎君則有犯上之嫌故象曰不及其君臣不可過也九三弗過防之從或戕之凶象曰從或戕之凶如何也以九居三在他卦則為過剛在隂過之時則不以剛過為過也故曰弗過夫九三既不以剛過為過矣則當以陽剛艮止防遏隂過故又曰防之苟失此戒不知預防之道而惟隂之是從焉則隂道過盛莫之止遏而陽為之傷矣故又戒之曰從或戕之凶夫隂道過盛為君子者不知預防其害於其未害之前及其委已而從之而為其所害也則無及矣故象又曰從或戕之凶如何也重為之戒云九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也隂過之世聖人閔九三九四二剛之失位而不中也為之再三以致其戒恐其罹害故也又皆以弗過言之謂當此之時所過者隂也而非陽也然九三之剛弗以為過者處二隂之上在於防遏二隂為三者不知防之而反從之焉則有或戕之凶九四之剛弗以為過者處二隂之下適與二隂相遇為四者剛不當位不能止遏二隂惟以謹守自處為本故先之以無咎之辭而後之以往厲必戒勿用永貞戒之蓋二隂過盛處一卦之上九四不幸適與之遇既不能止遏其𫝑惟以謹守自處為去小人之道可也苟或不知量時度勢而往往與之角則陽道危矣豈可用此以為常乎蓋以陽制隂此永貞之道也如九三之下防二隂是矣九四剛不當位又非三比也故曰往厲必戒勿用永貞聖人再三為君子謀也如此象曰往厲必戒終不可長也者朱子發曰盛衰相循無小人常過君子之理又引陸震云小人之過終不可長也戒而悼之以俟其復斯言是也大抵四震之主也然所居者隂而又位二隂之下其𫝑與位俱不足也苟恃剛動之才而輕與隂角此聖人之所戒不若戒謹以俟其復之為無咎也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也五尊位也當隂過之時而以隂德居之故與小畜同其象而曰密雲不雨自我西郊蓋小畜之所以為小畜者六四之一隂也而小過則四隂之過也以六居五又隂居盛位故有是象夫隂氣過盛而陽不之應安能和而雨乎故曰密雲不雨西郊隂位也我謂五也自我西郊以言隂之過盛實自五致之小畜曰密雲不雨尚往也以言密雲之所以不雨者徒知尚往故也此為四戒也今此象曰密雲不雨已上也則為五戒也然則隂其可以過盛矣乎羿莽操懿之禍此四賊皆過也蓋自此西郊發之蘇東坡曰已上者𫝑不可復下之辭也六五之權足以為密雲而終不為雨者次於西郊而不行豈真不能哉其謀深也當是時也必有穴其間而為之用者故戒之曰公弋取彼在穴君子之居此苟無意於盜莫若取其在穴者以自明於天下而天下信之矣蓋在穴者隂物也所謂五之腹心是也公謂五也五若無他則於彼在穴者弋而取之而去其所謂腹心之隱疾則隂過之禍庶乎其可無也故易於此公之所以救其過也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也四隂之過極於上六又處震動之極豈復有與物相遇之象惟有過亢而巳故曰弗遇過之而象曰已亢也初六在下犯不冝上冝下之戒故曰飛鳥以凶上六隂極以亢豈復能下也哉亢而不已猶之飛鳥也必離之凶而後已謂終離網罟之害也是以謂之災眚河南曰災者天殃眚者人為豈惟人眚天災並至謂天理人事皆然也離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也坎離者天地之用也故上經終於坎離既濟未濟者又坎離之用也故下經終於既濟未濟既濟之象水火相交相與為用而生養之功成故曰既濟其為爻也三隂得位三陽下之子夏傳曰陽已下隂萬物既成是也故亦曰既濟夫以陽下隂冝若非正矣惟下之者亨之也此以大亨小之義也蓋既濟之世聖賢之功業既成教化已行無一民一物不得其所至於至纎至悉無所不亨故卦德曰既濟亨小而彖曰既濟亨小者亨也此以三陽下三隂言既濟之所以亨小也朱子發曰彖文當曰既濟亨小小者亨也脫一小字考之文義當然胡安定曰亨小者蓋傳寫之誤也按彖曰小者亨也當曰小亨而程河南則曰小字在亨下語當然也若言小亨則為亨之小也當從河南説夫既濟之道所利者貞故初九九三九五陽皆居陽六二六四上六隂皆居隂隂陽各當其位此正也其在人則君子小人各安其分而無失正之嫌此既濟之所利也故曰利貞剛柔正而位當也此又以三隂三陽當位而言既濟之所以利貞也夫天下之功常成於可為而壞於無為既濟之功離明在下無所不燭六二之柔來濟夫剛得中而亨此既濟之功所以吉也及其終也以天下為無事而不復有所事故以廢怠而止而坎離復作矣上六之濡其首厲何可久也是也此既濟之終所以亂也故曰初吉柔得中也終止則亂其道窮也此又指卦之初終而言既濟之戒也胡安定曰創業之主蓋得於憂勤故多吉守成之君蓋生於宴樂故多忽然則聖人特於此言初吉終亂也者將以為萬世守成之戒象曰水在火上既濟君子以思患而豫防之水火相交相與為用而生養之功成此既濟之象也然常人之情每當此時則飲食無營而已寧復有所思乎蓋謂無復有患故也而不知鴆毒常生於宴安而馬跌常在於平地其可不預防之乎昔者益戒舜曰警戒無虞傅説告髙宗曰惟事事乃其有備有備無患此守濟之道也初九曳其輪濡其尾無咎象曰曳其輪義無咎也九剛動之才也故有輪象初一卦之後也故有尾象當濟之初搖曳其輪進雖不亟也濡潤其尾濟雖不速也然而君子不之避也蓋以時方圖濟而吾有能濟之才苟以其難也而避焉則功業何時而成險難何時而濟乎夫惟如是故於濟之義而無過咎蓋所以成大功而濟大事者其初不能無難故雖有能濟之才亦不能亟進而速濟惟其任其難而不辭此當濟之初所以無咎也六二婦喪其茀勿逐七日得象曰七日得以中道也六二隂虛守中既濟之純臣也九五陽盈在上既濟之驕主也當此之時以純臣而事驕主則在上者與賢之意或消而在下者行道之志不遂故二有婦喪其茀之象茀車之蔽也婦人之車喪其所蔽則不可行五不下應為二者以中正自守可也若逐其所喪從物而往則失其素守矣故戒以勿逐雖然志不行於今亦必行於後蓋中正之道無終廢之理故易於此又必其辭曰七日得謂先之喪而後之得也卦有六位往復數之故曰七日七日而得其所喪此以時變推之也象曰七日得以中道也者蓋謂二以柔中之道自處而不汲汲於用捨得喪之間此理之所在有所不能違者故七日而得其所喪也河南曰自古既濟而能用人者鮮矣以唐太宗之用人尚怠於終况其下者乎於斯時也剛中反為中滿坎離乃相為戾矣九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也既濟至九三濟道已盛矣當思有以保其盛可也不知出此則將勞內而事外勤兵以伐逺故雖以賢聖之君僅有克獲之功亦不免於有過剛之失而失於困憊也故曰髙宗伐鬼方三年克之而象曰憊也夫髙宗古所謂賢主也鬼方其小醜也以賢主而伐一小醜歷時滋久至於三年而僅克之則其功固不足多而在我者老師費財亦已甚矣况用小人乎蓋小人之心不過於貪功而肆忿貪功則生事肆忿則殘民外難未去而內難復作矣豈不為濟道害耶故以小人勿用戒之衛霍連年出伐而漢業已虧此用小人之明驗也六四繻有衣袽終日戒象曰終日戒有所疑也六四已離下體此濟道將革之時也夫濟道將革則罅漏實生於此時四坎體也故取漏舟為義王輔嗣程河南蘇東坡龔深甫皆云繻作濡謂濡漏也衣袽衣之絮也夫舟之濡也必有衣袽以窒其隙漏終日疑懼不忘戒謹而後可以免覆溺之患此舟師之智之所及也濟道將革獨不知其所以戒也而可乎故既濟六四其象若此九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也諸家皆以東鄰九五也西鄰六二也而胡安定又以紂居東都文王居岐山言東鄰西鄰者取文王與紂之事也竊以謂東鄰固既濟之九五也而西鄰則未濟之六五也何以知之曰以象之所釋知之也象曰東鄰殺牛不如西鄰之時也曰時云者謂既濟之時與未濟之時其時既異則其事之豐約而誠意之所寓自有厚薄之不同故也大抵既濟之主以豐盈自居雖有殺牛之盛禮而誠意不加故不如未濟之主以謙光為德雖禴祭之薄實足以受大來之福何者時使然也夫未濟求其濟既濟不求濟二者雖相鄰而甚相反有如東西之異位故聖人以二卦之相為反復也而曰此固時使然也而皆自其君致之故於既濟九五而兼發是義以謂人主持心處已當如未濟之六五而後有受福之實也不然雖有盛禮縟儀抑文具爾此豈守濟之道歟上六濡其首厲象曰濡其首厲何可久也夫濟道既終治極必亂之時也而又以隂柔之才居諸上位其晏溺可知夫處一卦之上故有首象其體坎也坎水善溺當斯時也無救於濟道乃且晏溺以速傾危故曰濡其首厲而象曰何可久也彖曰終止則亂其道窮也其是之謂乎坎下離上未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也既濟終亂濟道窮矣故序卦於未濟則曰物不可窮也故受之以未濟終焉易之道諱窮也如此蓋未濟者事之未然功之未成而不窮之理復自此始故也故卦之德曰未濟亨亨則不窮矣夫未濟之所以能亨者以六五之柔得中故也六五以柔得中故能虛己任賢賴之以濟此所以近而九四以剛而承逺而九二以剛而應故所以濟者在人而享其成功者在五此所以能亨也小狐汔濟未出中也此謂二也夫濟道以謹畏為本故取狐為象蓋狐疑物也涉而善疑故無不濟汔幾也小狐尤其勇也然幾於濟而未能出夫險之中者是必有以為之纍者則初六之濡其尾是也故繼之曰濡其尾無攸利不續終也蓋初居一卦之後故有尾象夫以九二之剛勇自可出險今幾於濟而未出中者是乃初以隂柔無能濟之才見濡於尾猶之勇小之狐固有必濟之才而為尾所纍也夫終之不續則前功廢矣此所以無攸利也蘇東坡曰初六濡其尾雖九二亦病矣是也雖不當位剛柔應也此人指六爻而言也夫六爻如初六六三六五皆以隂居陽九二九四上九皆以陽居隂此所謂不當位也然皆以柔應剛剛應柔剛柔之相濟如此孰謂其無可濟之理乎苟能順時度𫝑上下內外同力共濟未有不濟者也此所以濟者在人而六五得以享其成功而亨歟象曰火在水上未濟君子以慎辨物居方夫水在火上則水火相交相與為用今也火在水上豈惟不相為用也而又不當其處焉夫物不當其處則禍害至矣君子觀此象不得不致其謹而審處之是故辨其物冝使之各居其方而不相侵害是乃善處乎物者也夫當未濟之世濟道未成而禍害先見此豈圖濟之道也哉冝乎君子莫先致謹於此也初六濡其尾吝象曰濡其尾亦不知極也未濟之初與既濟之初俱在二卦之後故同謂之尾未濟之上與既濟之上俱在卦之首故同謂之首然二卦之初所謂濡其尾則同而其義則異也何也時方既濟九有能濟之才然不免於濡云者當濟之初不能速濟故也時方未濟初無能濟之才而亦求濟焉此豈所冝哉是蓋不知𫝑極力殫而淪胥以溺以至於此也此既濟初九濡其尾所以無咎而未濟初六濡其尾所以為吝而象曰亦不知極也才殫力微曰吝九二曳其輪貞吉象曰九二貞吉中以行正也若夫未濟九二與既濟初九位雖曰不同而同曰曳其輪其言則一也何也其才同故也夫當既濟之初雖有能濟之才猶不免於亟進之難况未濟之時乎又况二居險中乎又况初六之尾不能為吾助而反為吾纍矣乎其不能亟進可知矣然當是時也五以謙光在上而所賴以共濟者外則有四內則有二而已二與四分內外之任故專征伐之權以戡難於外者四也而二不知騁運動之才以濟難於內者二也而四不知時方艱難濟道未成為九二者又焉得而易諸故雖搖曳其輪體剛居中以行吾正君子不以為怯也故象曰九二貞吉中以行正也六三未濟征凶利涉大川象曰未濟征凶位不當也既濟至九三濟道已盛猶戒勿輕用其盛未濟至六三其曰利涉大川猶為未濟也何也六三之才不足以有濟故也夫才不足以有濟則雖位此髙位而無補於未濟之萬一有所往則凶敗隨之矣故曰未濟征凶位不當也然六三既曰征凶又曰利涉大川何也曰時當然也而三之才則非必能然也夫三處下體之上語其位則甚髙語其才則甚歉當此之時居此之位而居之以利涉大川則未必能當焉聖人於斯時而為是言也蓋亦所以愧耻天下後世之位髙位者九四貞吉悔亡震用伐鬼方三年有賞於大國象曰貞吉悔亡志行也未濟者既濟之反故既濟之三即未濟之四也是以二爻皆有鬼方之伐然其事則同而其義則異也何也九三勞內以事外而九四則捍外以安內故也故九三則以剛履剛不免於過用其剛而至於憊九四則以剛履柔剛柔得冝故貞吉而悔亡蓋剛柔得冝則不愆於正而吉而用剛之悔可亡矣又何惡於用剛矣乎故誅不庭則震吾之威以用燮伐之道雖三年之久而下不告勞大國有賞而功無不報大臣濟世之志皆得以行於此時者蓋有貞吉以為之本故無可悔之事故也故象又曰貞吉悔亡志行也六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也四之貞吉謂履柔也五之貞吉謂體柔也四有用剛之悔故貞吉而悔亡五無用剛之悔故貞吉而無悔何者六五體柔居中蓋未濟之謙主也夫惟如是故當圖濟之時謙光下逮而人信之近而九四以剛而乘逺而九二以剛而應故所以濟者有其人而享成功者在乎我離明之德不顯而自光由中之孚不言而自信何吉如之故曰君子之光有孚吉象曰君子之光其暉吉也者程河南曰暉者光之散也光盛則有暉然則暉生於光而光又生於謙此六五所以為未濟之謙主也豈非能用禴於西鄰而有受福之冝而既濟九五之所以不如也乎上九有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也未濟至上九濟道既成此武王在鎬飲酒樂豈之時也夫武王在鎬之樂至幽王之時君子猶思之而為之賦魚藻焉夫豈有不見信於人而容有非咎之者此上九所以有曰有孚于飲酒無咎也若夫濟道既成而無思患預防之念如幽王之荒廢無度而興衛武公初筵之刺焉則沉湎淫佚而有濡首之失矣故威儀一也而有反反幡幡抑抑怭怭前後之異焉豈不失是孚也哉故其詩曰不知其秩又曰不知其郵此象所謂飲酒濡首亦不知節也然則飲酒亦一也為武王則君子思之為幽王則武公刺之此無他有是孚與失是孚之異故也夫易有三百八十四爻而成書其半隂也其半陽也然易為君子謀故以乾之初九始焉而未濟之上九終焉者貴陽道也是以聖人於乾之初九也則戒之以潛龍勿用於未濟之上九也則戒之以飲酒濡首嗚呼吾以是益知易之始終為君子謀也蓋周童溪易傳卷二十六
