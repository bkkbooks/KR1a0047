body:
  text: 童溪易傳卷二十七宋王宗傳撰序曰嵗在戊戌予著易傳計三十卷其於繫辭序卦雜卦未暇也然早夜思之慊然於中若有所負盖以謂勤苦述著未及終篇不得為全書故也越三載嵗在辛丑蒙恩賜第還鄉加我之年兹惟其時日月逾邁不敢不勉噫此續傳之所由作也淳熈八年冬十月二十有四日丁丑宗傳謹識繫辭上繫辭有三繫於卦下者卦之辭也如乾曰元亨利貞坤曰元亨利牝馬之貞之𩔖是也故經曰聖人設卦觀象繫辭焉而明吉凶又曰設卦以盡情偽繫辭焉以盡其言此指卦之辭而曰繫辭也繫於爻下者爻之辭也如乾初九曰潜龍勿用坤初六曰履霜堅氷至之類是也故經曰繫辭以斷其吉凶是故謂之爻又曰繫辭焉而命之動在其中矣此指爻之辭而曰繫辭也繫於易後者亦謂之繫辭此上下二繫是也亦如卦辭經謂之彖辭經曰彖者言乎其象也又曰觀其彖辭則思過半矣而夫子釋彖之辭亦謂之彖曰不以為異也天尊地卑乾坤定矣卑髙以陳貴賤位矣動静有常剛柔㫁矣方以𩔖聚物以羣分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相盪鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣嗚呼予學易至繫辭首誦此章乃知聖人作易之大㫖盡在於是无遺藴也何以明之曰聖人本天地以作易非有他也故所以發明人心之妙用人心之妙用即天地之變化也天地之變化見於萬物成象成形之際與夫雷霆風雨日月寒暑之運動人心之妙用則為可久可大之徳業其實皆无越乎自然之理而已矣所謂自然之理者易簡是也是理也天得之而尊以位乎上地得之而卑以位乎下人得之則參天地以位乎中而三才之為三才吾不知所以異矣然則吾於此章知聖人作易之大㫖其果有餘藴矣乎何謂聖人本天地以作易曰天尊地卑乾坤定矣此聖人本天地以設卦卑髙以陳貴賤位矣此聖人本天地以立爻動静有常剛柔㫁矣此聖人本天地以論易之體方以𩔖聚物以羣分吉凶生矣此聖人本天地以論易之用在天成象在地成形變化見矣此又聖人本天地以論易之功試詳言之夫天有自然之尊而位乎上聖人作易以三竒之乾象之故乾為天則乾以天之尊而定矣地有自然之卑而位乎下聖人作易以三耦之坤象之故坤為地則坤以地之卑而定矣故曰天尊地卑乾坤定矣此聖人本天地以設卦六爻自初至上其位有等威之别有貴有賤而其序不紊此卑高以陳也盖卑者陳於下則其位為賤高者陳於上則其位為貴以天地定體言之則曰尊卑積平以為高則曰卑高而卦爻之畫亦自下而上而後六爻已備故曰卑高以陳貴賤位矣此聖人本天地以立爻天地其初亦一物爾陽動而隂静則判而為二體夫惟有二體也故動静有常夫所謂有常云者豈足以盡易也哉特謂乾坤剛柔之辨乃陽動隂静各有其常而然也故曰動静有常剛柔㫁矣此聖人本天地以論易之體然曰㫁云者初非謂剛自剛柔自柔柔矣而无待於剛剛矣而无待於柔兩者不相為用也乃若變動不居剛柔相易則有常之動静又不足以㫁剛柔矣方諸儒之說皆異也初不知聖人本天地以立卦即八方之卦而重卦故以一重八遂盈八八之數如以坤重乾是以為泰以震重乾是以為大壯之𩔖也此八方之卦各以𩔖而聚也物諸儒之說亦異也初不知聖人本天地以立爻即隂陽之物而為物如所謂乾陽物也坤隂物也凡麗乎隂陽者无非物也故聖人即是而立爻而以剛柔别之其在六爻則九與六是也此隂陽之物皆以羣而分也八方之卦皆以𩔖而聚隂陽之物皆以羣而分夫然後相親相離或近或逺而情偽不同則吉與凶自爾而生如經曰吉曰終吉曰凶曰終凶之𩔖是也故曰方以𩔖聚物以羣分吉凶生矣此聖人木天地以論易之用而下文遂以變化之說繼之易之道无乎不在亦无乎不為在天在地此易无乎不在也成象成形此易无乎不為也人皆曰日月星辰此在天所成之象也山川草木此在地所成之形也噫未之盡也物物皆有是象物物皆有是形象與形亦非二物也吾嘗論之矣形之未著者謂之象象之既著者謂之形下文所謂乾知大始坤作成物是也變化之功天與地相與為用象與形相為終始顧其所在如何耳而成功見之故曰在天成象在地成形變化見矣此又聖人本天地以論易之功是故剛柔相摩八卦相盪以至乾以易知坤以簡能此又詳言變化之功其在天地循環終始而不窮者乾與坤實尸其任也夫剛柔相摩八卦相盪曰相云者則有常之動静是誠不足以㫁是剛柔也易之為易其在兹乎故乾以剛而摩坤之柔則為㢲為離為兌坤以柔而摩乾之剛則為震為坎為艮而八卦立矣八卦既立則各居其方而變化終始循環不窮故萬物出乎震以㢲盪震則萬物於此乎齊以離盪㢲則萬物於此乎相見以至以坤盪離以兌盪坤以乾盪兌以坎盪乾至於以艮盪坎而復以震盪艮變化循環无有窮也孰得而名之所可得而名之者變化之迹也何謂變化之迹曰震雷離電巽風坎雨離日坎月相與為用播其功於天地之間而寒暑迭推是也原其所以然則震坎艮三男之陽實本諸乾故曰乾道成男㢲離兌三女之隂實本諸坤故曰坤道成女然相與致用以成變化者六子也而尸是變化之功者乾坤也故以乾知大始坤作成物繼之夫太始者萬物有生之始也物生之始有是象而未兆有是氣而未形當是時也乾全體之而不遺故无不知成物者萬物成體之後也枝葉具於根荄羽毛備于胎卵當是時也形噐既具自此而漸形日長月化莫知其然然非有以作之曷爾哉此則坤之功也夫物之太始亦不一矣而乾之知之无乎不知也夫豈物物而求知之哉隨其自然吾无容心而在物之有始者舉不遺乎我以此理而知之故曰乾以易知謂其无難也物之成形亦不一矣而坤之作之无乎不能也亦豈物物而求作之哉亦隨其自然吾无他事而在彼之有形者亦不遺乎我以此理而作之故曰坤以簡能謂其不煩也於乾曰易於坤曰簡自然之理亦非有二也乾始物坤代終隨所寓而云爾雖然自然之理其在天地者然也聖人奚取焉取其在人心者與其在天地者本无以異也故又發明乾坤之易簡人能盡之以成德業則可以與天地參矣乾以易知坤以簡能此自然之理在天地也易則易知簡則易從此自然之理在人心也夫自然之理既云易矣夫何難知之有既云簡矣又何難從之有人之所以異於天地者心志本來簡易故也吾嘗論之矣易之為易乾坤是也乾坤之為乾坤易簡是也易簡之為易簡又吾心之所以自然者是也知吾心之所以自然者則乾之易坤之簡在我而巳其所以成德業而參天地者又何難乎人以是理為難知乎生而无不知愛其親長而无不知敬其兄愛敬之外初无異事夫豈難知也故曰易則易知又以是理為難從乎即无不知愛之心以愛其親則為仁即无不知敬之心以敬其兄則為義夫豈難從也故曰簡則易從是理也非難知也故非獨吾之親吾之長於我也而有所親而人之親人之長於我也而亦有所親此无他易知故其相親信也亦易若夫禽獸之為物或可馴而狎也然其中有不可測者存終非可親也故曰易知則有親是理也非難從也充无不知愛之心以為仁則仁滿天下而有不可勝用之仁充无不知敬之心以為義則義滿天下而有不可勝用之義此无他易從故其所成就也亦易若夫暴虎而憑河人或能之也然終非可為也功何有焉故曰易從則有功曰有云者實然之辭也凡人之情不相親信則雖朝夕焉不可也烏可久哉苟相親信則不膠漆而固不纒索而附矣故曰有親則可久天下之事勞而无功則雖計纎悉之效不可也烏可大哉苟為有功則積微以至著由近以達遠矣故曰有功則可大曰可云者决然之辭也久焉者是理之存夫吾心未嘗一日忌也雖與天地同其久長可也故曰可久則賢人之德大焉者是理之見夫日用未嘗一日怠也雖與天地同其廣大可也故曰可大則賢人之業德與業非有二物也猶之易與簡亦非有二理也曰賢人云者以言非賢於人不能進是也猶之孟子謂能勿喪爾必曰惟賢者若夫伏羲氏神農氏黄帝堯舜氏禹湯文王孔子氏之所以聖亦皆自此塗出也由是觀之則天下之理其有外於乾坤之易簡矣乎吾於天下之理既巳有得則吾之徳業配天地之高厚吾之中處參天地之高卑仰天俯地寕有或慊矣乎故曰易簡而天下之理得矣天下之理得而成位乎其中矣然則予前所謂本天地以作易正所以發明人心之妙用而聖人作易之㫖盡在於是豈虛言哉聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利前章既言本天地以作易所以發明人心之妙用要其成功則與天地參此章復言作易之中所示无非天理人能盡之則居處動作无適而非中矣聖人之有望於天下不其至乎夫有是卦則有是象易之為卦也不一則其為象也亦不一然是卦未設則是象也何從而觀之所謂卦之象者其在物也則為天地雷風水火山澤與夫為馬為牛為龍為雞之𩔖其在人也則為父為母為男為女為君為臣與夫爲首爲腹爲耳爲目之類其在理也則下文所謂吉凶悔吝變化剛柔是也卦之始設能觀其象而知其此為吉此為凶此為悔此為吝與夫變化剛柔之所以然者聖人也如古今之君子欲觀其象而无可玩之辭則安知變化剛柔吉凶悔吝之所以然哉此卦之既設而辭又不可以已也聖人以是不可已之辭或繫之卦下也則為卦之辭或繫之爻下也則為爻之辭卦爻之辭有所不可已者非有他也明吉與凶將以使夫人知所趨避故也吉凶既明則悔吝亦明矣舉重以見輕也夫吉凶悔吝生乎動者也易者變動不居之道於六爻焉見之所謂六爻者九六以剛柔相推是也陽為主隂為客剛推柔也隂為主陽為客柔推剛也此變化之所由以生也故下文以吉凶悔吝變化剛柔之四象為六爻之動夫見乃謂之象於其見者而觀之則凡𨼆而未彰者皆可以𩔖推矣故夫得失之理微吉凶之驗著觀易之吉凶而得失可知故吉凶為失得之象也曰失得云者易之道貴於因失而為得猶之曰卑高即積卑以為髙也憂虞存乎人心悔吝見於行事觀易之悔吝而憂虞可知故悔吝為憂虞之象也進者不驟進也退者不驟退也若夫變化則昔之進者今且退矣昔之退者今且進矣故又觀易之變化而知進退之漸此變化為進退之象陽明為畫隂晦為夜晝夜循環无毫髪之間而有晦明之異此剛柔相推不窮之道也故又觀易之剛柔而知晝夜之别此剛柔為晝夜之象凡此數者皆聖人設卦之中有象其别則見諸六爻之動而有不可揜其詳則聖人皆於繫辭焉明之夫六爻之動其為吉凶悔吝變化剛柔所以示人者莫非天理之當然是謂時中之道而天地與人皆所不能違也故曰六爻之動三極之道也極中也聖人以是時中之道教詔天下君子於此何所容其心哉所居而安者易之序也所樂而玩者爻之辭也而已矣所謂易之序者消息盈虛之有其時是也居之而安則盛行不加窮居不損而與易為一矣苟為居而不安則其去也必速猶不居也所謂爻之辭者是非當否之有所命是也樂之而玩則黙而成之不言而信而與爻為一矣苟為樂而不玩則其得也淺猶不樂也君子居處動作无非天理而易中所示曰象曰辭曰變曰占皆天理也惟君子為能觀而玩之夫變生於象占本乎辭象之在易消息盈虛之不可泥則謂之變非於象外有是變也辭之在爻是非當否之不可誣則謂之占非於辭外有是占也觀其象玩其辭蓄吾之用也此居而未動者之事觀其變玩其占用吾之用也此變動不居者之事夫易純乎天而君子則純乎易純乎易乃所以純乎天也君子純乎天而不能違乎天天亦其能違君子乎以吉祐之復以无不利祐之宜哉彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震无咎者存乎悔是故卦有小大辭有險易辭也者各指其所之前章既言聖人設卦觀象繫辭爻變而終之以君子觀象玩辭觀變玩占此章復言彖言乎象爻言乎變而終之以辭也者各指其所之雖曰申前言之所未盡其大㫖則无非前後反復推明吉凶悔吝之理欲夫人之知所趨與所避也夫吉凶悔吝之理已著而不可揜是謂之象有是卦必有是彖而彖之所言无非此理也此彖者言乎其象者也若夫六爻之動惟變所適而吉凶悔吝之别又以逐爻見之此爻者言乎其變者也得失之理微吉凶之騐著若非吉凶則是失得也誰與言其所以然哉悔吝之在人未為大過也言乎小疵而已於過疵之微小者或能悔之而不吝亦或吝之而不悔則吉與凶自此成矣此无咎者本有過也有過而能補其過故无其咎而聖人則因其善而善之吉凶也悔吝也无咎也凡此數者又皆不外乎彖之所言之象與爻之所言之變也雖然爻者言乎其變也而列貴賤者又存乎位彖者言乎其象也而齊小大者又存乎卦夫六爻固有貴而无位如乾之上九有以貴下賤如屯之初九者此亦以變言也如以位言則自初至上卑髙以陳貴賤位矣髙者貴卑者賤而成列有序此列貴賤者存乎位也陽大而隂小陽卦多隂則陽為之主隂卦多陽則隂為之主卦之小大雖或不齊而剛柔得位為一卦之主則未始不齊也此齊小大者存乎卦也若夫繫辭焉而明吉凶則吉凶之辨舎是辭何以哉介云者細微之物也所謂小疵也小疵形於心憂患恐懼兹惟其時若漸長則憂无及矣凡人之情有所畏者斯寡過无所畏者斯多愆是故以震驚而𫉬无咎者必以其能悔也由小大之卦觀吉凶悔吝之辭則辭之吉者斯平易反乎此者斯險艱如乾之九二見龍在田利見大人則其辭易矣困之六三入于其宫不見其妻凶此豈易辭哉此无他其為辭也吉凶悔吝各有所指而非固異也故曰辭也者各指其所之所之者何險易之地也易與天地凖故能彌綸天地之道仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之說精氣為物㳺魂為變是故知鬼神之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣此章又言聖人本天地以作易易之書與天地準易之道與天地相似而終之以君子之道鮮矣道之在人初无不足而人之於道不能无限量之殊也然深味此章自故能彌綸天地之道至故君子之道鮮矣凡有十故雖句讀長短之不齊文理昭然而先儒不察妄分劑數不可不辨也準則也易之書所以準則天地故也凡天地之所有者易皆有之彌滿也綸理也天地之道即下文所謂一隂一陽是也是道也其在天地則為幽明寓於始終則為生死見於物變則為鬼神易之為書彌滿无間綸理有序而天地之道盡在此書故在文為明在理為幽仰觀俯察而幽明之故无乎不知故者其所以然也始出為生終入為死原始反終而生死之說无乎不知說者其所謂也大凡物之為物以精與氣相聚而然也精氣之散則為遊魂故謂之變即諸物變而鬼神之情狀又无不知情狀猶言體叚也程河南曰萬物終始聚散而巳鬼神造化之功也然則幽明之故死生之說鬼神之情狀无非天地之道苟非易之書與天地準彌滿而无間綸理而有序則是數者何從而知之惟其如是故易之道即天地之道也天地之道即易之道也存諸易者如是則存諸天地者亦如是爾故曰與天地相似惟其相似也又何背違之有揚子雲法言之作所以準語也然而非語太元之作所以準易也然而非易是无他求其似而卒不似也求其似而卒不似故不免自相牴牾而多謬於聖人欲其不違得乎自知周乎萬物以至君子之道鮮矣此又詳言易之道與天地所以相似也夫无所不知者易之知也无所不及者易之道也知周萬物无所不知則有過物之知道濟天下无所不及又无過物之道故曰不過道濟天下旁行也知周萬物不流也有濟天下之道而又知无不知而不淪胥於萬物此易之時中也兹其所以為不過歟樂天安土此又言易之道无適而非天地也夫天者制命之君也土者宅生之地也而易則性命之學也樂天則消息盈虛與時偕行初无冐昧于時之失盖所知者命也所知者命則无一毫之非吾命夫何或憂之有安土則素其位而行无入而不自得初无厭惡不平之念盖所敦者仁也所敦者仁則无一物之非吾仁又何不愛之有知命命之學也郭仁性之學也故曰易性命之學也而天地盡在是矣天地之化而隂陽二氣之相為推移是已而易範圍之則易之為書其模範一出於天地而聖人无與焉故无過差之可指萬物之生雖同於負隂而抱陽也而有萬不同則至不一也曲而成之則亦與為不一故无一物之或遺晝夜之道闔闢徃來无一毫之間而易之為易无所偏滯通乎此道故也通乎此道則无乎不知故知幽明知死生知鬼神初无二知也如此則盡天地之妙用窮隂陽之奥機无在而无不在故曰神无方无為而无不為故曰易无體神與易亦非二物也張横渠曰語其推行故曰道語其不測故曰神語其生生故曰易其實一物指事而異名矣朱子發曰一隂一陽在天日月之行也晝夜之經也寒暑之運也在人屈信也動静也語黙也推而行之故以是名之為道然是道非可以他求也求之在我而已矣在我所謂本然之善者乃所以繼是道也在我所謂同然之性者乃所以成是道也何者善出於道而性无不善故也然仁者見之是道也則止謂之仁一於静也知者見之是道也則止謂之知一於動也至於百姓日用是道也則又習焉而不察行之而不著漠然而无所知也要之是道也仁者知者鮮克全之百姓之愚鮮克知之此豈在我之善有所不足在我之性有所不同歟非也蓋在限量使然爾君子之道烏得而不鮮歟朱子發曰君子之道仁知合體用一兼體隂陽而无累通乎晝夜之道而知君子者具仁知之成名得道之大全也顯諸仁藏諸用鼔萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神夫易廣矣大矣以言乎遠則不禦以言乎邇則静而正以言乎天地之間則備矣夫乾其静也專其動也直是以大生焉夫坤其静也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至德子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門前章言易之書與天地準易之道與天地相似而終之以仁者知者鮮克全之百姓日用鮮克知之此章復言易該𨼆顯絶憂累覆被萬物則為德為業流行乎天地之中在易為乾為坤在蓍龜為占在人為事在變化為神而終之以夫易聖人所以崇德而廣業也夫聖人德之崇業之廣以至於效天法地此即易之盛德大業也是理也非聖人孰能盡之夫易之為道天地所以鼓舞萬物生成而不遺故曰顯諸仁然其所以然而然者宻庸而无迹故又曰藏諸用仁與用即天地之德業也故其見於鼔舞萬物也變化難名此下文所謂隂陽不測之神也惟其如是故化工之運行初無容心夫何憂云其生其殺咸其自取天地未嘗加毫末於其間也程河南謂天不為堯存不為桀亡是也若夫聖人則成能於天地一物之不得其生則曰此吾之責也故不能无憂張横渠曰繫辭之言或說天或說人率歸一道鼔萬物而不與聖人同憂則於是分出天人之道不可以混鼓萬物而不與聖人同憂此言天徳之至也故聖人又賛之曰盛德大業至矣哉以言宻庸之化如此其至也聖人以是說而垂法於易之書故盡發其秘以示夫人惟恐此道之不明吾言之不盡而後學之不知抑以見聖人有憂也故以其富有則謂之大業以其日新則謂之盛德至於曰易曰乾曰坤曰占曰事曰神此所謂盡發其秘以示乎人也吾故曰此聖人之有憂也張横渠曰富有者大而无外也日新者久而无窮也夫惟如是故其德業盛大也孰禦焉是說也以其變易言之則為易觀夫四序迭遷八卦相盪而萬物之終始出入咸不外乎是故陽極生隂隂極生陽生生不窮循環无端此所謂易也經曰乾坤其易之門耶盖言萬物自此出也夫萬物之生有象有法法之始兆者謂之象象之既呈者謂之法亦非二物也相為隐顯相為終始而已矣故成象者兆端自乾初无不足至於坤則因其有是法也而效之亦非有所増益也易曰乾知大始坤作成物是也法象既著則吉凶之變可以前知故極天地之數遂知來物此所謂占也如惠迪必吉從逆必凶消息盈虛之理不逃乎進退從違之間故變而能通者常得之窮而不知變者常失之所謂事者即吾之日用是也故曰通變之謂事此又易之在人也人能審此變化云為无一毫之有戾於易則易有不戻於我矣夫萬物之生不外乎隂陽惟神也變化難明則運乎隂陽而莫知其然故曰隂陽不測之謂神自此以後又申言夫易夫乾夫坤以言能盡乎此者惟聖人也故終之以崇德廣業之說夫乾為大矣坤為廣矣合乾與坤以為易則所謂廣矣大矣云者必歸之易故乾以健久為用坤以静固為體以言乎逺盖謂乾也以言乎邇盖謂坤也然則不禦之功无有窮已乾實以之静正之體未嘗變易坤實以之此所以為坤之廣乾之大也廣大之中化出萬有盈乎天地之間靡所不備此又乾坤之功用也而易實該之故又曰備矣經曰易之為書也廣大悉備有天道焉有地道焉有人道焉亦即此所謂廣矣大矣備矣之謂也聖人言此又慮夫人未知所謂乾坤之所以廣與大者何如也復以静專動直静翕動闢以詳明乾坤之㫖夫陽動而隂静此乾坤之有常也乃若乾坤合德以成化育之功則未有乾行而坤止也故乾動也而坤亦與有焉坤静也而乾亦與有焉此所謂合德也然其動静亦不无其辨焉故乾之静也專謂其制命自我也及其動也直則乾曰時乘六龍以御天是也故其大也生於專直坤之静也翕謂其載物自我也及其動也闢則坤曰含萬物而化光是也故其廣也生於翕闢此又聖人以乾坤之所以為廣大者而詳示夫人也然聖人又不獨發明乾坤廣大之義如此也其曰變通曰隂陽之義曰易簡之善无非因此廣大以發明乾坤之㫖使人即此以知彼也且人有不知乾坤之廣大乎觀諸天地足矣苟知天地之廣大則知乾坤之廣大无或異矣故曰廣大配天地人有不知乾坤之變通乎觀諸四時足矣苟知四時之變通則又知乾坤之變通无或異矣故曰變通配四時以至不知乾坤隂陽之義觀諸日月亦足矣苟知日月之隂陽則知乾坤隂陽之義庸有異歟故曰隂陽之義配日月不知乾坤易簡之善觀諸至德亦足矣苟知至德之易簡則知乾坤易簡之善又有異歟故曰易簡之善配至徳夫大而能覆廣而能載兹非天地之廣大乎而乾之静專動直坤之静翕動闢其廣大若是此之謂配天地生長揫歛循環不窮兹非四時之變通乎而乾之始物於始坤之成物於終其變通若是此之謂配四時或顯乎晝或顯乎夜此日月之隂陽也而乾元用九坤元用六二者相與為用乾坤隂陽之義若是故配日月愚者與知不肖能行此至德之易簡也而乾以易知坤以簡能易簡之外初无難事乾坤易簡之善若是故配至徳雖然易之理亦一而巳矣初无彼此之間又何配之云乎蓋无有所配者理之一致也亦必有所配者將以致乎一也聖人欲人明乎一致之學也故即其所配者而示之欲其易曉焉爾故㫁之曰易其至矣乎以言乾坤之至理即易也是理也惟聖人為能盡之故繼之以夫易聖人所以崇德而廣業也夫德吾性也作此易以崇之業吾德之及物也作此易以廣之則與天地同其髙明卑順髙明知也卑順禮也即知與禮以效法乎天地之崇卑此聖人之徳所以崇而業之所以廣也夫天以髙明之體位乎其上地以卑順之質位乎其下易以盛德大業流行乎天地之中聖人之德業乃能與天地較崇度廣則是易也又在聖人矣故曰是理也惟聖人為能盡之原其所以然亦不過於即吾此性而以智禮成之故能存之而弗失是以或為徳或為業或效天或法地无所往而不當於道合於義則是道義又從吾性中而出也豈不猶易之行乎天地之中邪故曰成性存存道義之門何謂存存猶之曰存之至云爾惟存之至故足以配天地之設位而道義自此而出噫自非聖人其孰能與於此張横渠曰知極其高故效天禮着實處故法地又曰成性須是知禮存存則是長存知禮亦如天地設位斯可得之矣童溪易傳卷二十七
