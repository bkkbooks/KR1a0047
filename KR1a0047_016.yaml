body:
  text: 童溪易傳卷十六宋王宗傳撰坤下離上晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉合離坤而成體離明在上坤順在下上明而下順文明之主作於其上而順德之臣相屬於下王者寵遇諸侯之日也夫晉之為義則進是也猶之曰需須也明出地上即坤與離之象以明晉也順而麗乎大明即坤與離之義以明晉也柔進而上行又即六五之爻以明晉也夫明出地上則萬物咸仰此大明在上之象也故曰順德之臣當此時得以附麗於大明之君而相與以成康民之功焉故曰順而麗乎大明其在爻則六二受兹介福于其王母六三衆允之志上行也是也柔進而上行謂六五以柔順之道進而行乎上而離之中爻方其乾坤之相索也亦實自坤來今居五位故曰柔進而上行也夫文明之主作於其上順德之臣得所附麗而被其寵光焉而五也又以柔順之道行乎上而逮乎下故曰是以康侯用錫馬蕃庶晝日三接也夫諸侯者王者所與共安此民也故曰康侯當晉之時所謂侯者各以順體而奉承於上而无有異志焉又所謂治世之臣也夫馬有行地之才而又有承上之德王用錫之馬也而又至於蕃庶多焉者所以稱其才而表其朋𩔖之紛如也不惟錫予如此之多且厚也又見親禮晝日之間其按遇之也至於再三焉則寵遇之隆一至於此為諸侯者何修而得此於大明之主哉曰以其能為治世之臣而有安民之功故也故易於此諡之曰康侯其曰晝日云者正明出地上之時也在詩之崧髙其三章曰王命申伯式是南邦其四章曰王錫申伯四牡蹻蹻其五章又曰王遣申伯路車乗馬此詩為宣王能建國親諸侯襃賞申伯而作也烝民之詩其三章曰王命仲山甫式是百辟七章曰仲山甫出祖四牡業業又曰四牡彭彭八鸞鏘鏘王命仲山甫城彼東方其卒章又曰四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸此詩為宣王能任賢使能而作也至於韓奕之詩其一章曰韓侯受命王親命之其二章曰四牡奕奕孔修且張韓侯入覲以其介圭入覲于王王錫韓侯淑旂綏章簟茀錯衡其三章又曰其贈維何乗馬路車其卒章又曰王錫韓侯其追其貊奄受北國因以其伯此詩為宣王能錫命諸侯而作也至於江漢之詩也其二章曰經營四方告成于王四方既平王國庶定其三章曰王命召虎式辟四方其四章曰王命召虎來旬來宣又曰肇敏戎公用錫爾祉其五章又曰釐爾圭瓚秬鬯一卣告于文人錫山土田此詩又為宣王能命召公平淮夷而作也夫即是四詩以觀之則申也甫也韓也召也其在周宣之世所謂康侯也而宣王也又能施寵遇之禮如此其隆且至也則周家王業之所以能再隆而有光者此固諸侯之力也然究其所以然則宣王實使之故序詩者於崧髙之詩則曰能建國親諸侯襃賞申伯焉於烝民之詩則曰能任賢使能周室中興焉於韓奕之詩則曰能錫命諸侯於江漢之詩則曰能命召公平淮夷其曰能云者盖以其功歸之宣王也若宣王者其能寵遇諸侯如此在易之晉則所謂文明之主也不然何以有是之文明燦然以逮下也哉象曰明出地上晉君子以自昭明德地者隂晦之所也明出地上則離隂晦之所矣夫所謂隂晦之所者何也其在人也則冥然无所覺知之地是也夫无所覺知之地既已冥昩則雖父不能詔之子雖兄不能曉之弟非其中心自能明了如明出地上駸駸而日進焉則不可也故曰君子以自昭明德夫人性本明其或不能遽然而明者是必有所䝉蔽而然也今也在晉之時其進有漸始於晦終於明其於吾之所謂固明者而不失其明焉此自昭明德之謂也程曰明明德於天下昭明德於外也明明德於己故云自昭初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也晉也者以柔進也以柔而進則與六五同德矣初六之進也乃與九四居相應之地夫九四之在晉也非所謂以柔進也故目之曰鼫鼠而初與之居相應之地則嫌疑之不免也故戒之以晉如摧如貞吉又戒之以罔孚裕无咎言當升進之時為初六者固當痛自摧抑獨行其正无渉於九四然後吉也罔孚裕无咎者无與九四相孚也无與九四相孚則獨行吾正自有餘地不如鼫鼠之貪且畏也故能裕而无咎不然則窘束迫促若无容身之地矣未受命云者吾既痛自摧抑獨行吾正進退有地則在已无過而在人亦不見咎惟未受命者能之初六在下其位甚卑謹其所予乃其分也上命未至而諂以求進非善處下之道也六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也夫既得是位而懼其无以稱是位既得夫君而憂其无以報乎君此君子所以自盡為臣之道者然也當晉之時其道上進在他人以為喜而在君子以為愁者非以為偽也寵遇既厚則其憂懼有加故也夫食人之禄必懐人之事乗人之車必載人之憂凡委質以事人者舉皆然也而况六二處中正之位而上有同德之主寵遇於已也既厚則其憂懼可以自已乎故曰正吉謂以中正之德處中正之位必如是而後吉也王母六五也以柔居尊位故曰王母六二知憂知懼以中正而𫉬吉者是乃受此介相之福于六五故也彖曰康侯用錫馬蕃庶晝日三接其受兹介福之謂乎六三衆允悔亡象曰衆允之志上行也三與五同功而異位當晉之時又其同德者也坤為衆三居坤極順之至也以順之至而上同乎五此同𩔖之所從也故曰衆允之悔亡云者六三居非正中而與五且非其應然當柔進之時順德既至而衆臣從之以上進五雖非其應乃其同德者也故其悔可亡或曰志上行也烏知六三之志非進與上九為應乎曰六五晉之主也彖曰順而麗乎大明大明五也當晉之時初以卑而在下未受命也猶知舍四而獨行乎正三居人臣之髙位而乃不知惟五之從舍乎同德之主而應乎進不以柔之人乎夫苟舍同德之主而應乎進不以柔之人則衆亦不允之矣能使悔之亡乎必不能也噫此爻又不可以應論也學易者當權輕重之義以論爻可也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也當晉之時諸爻皆以柔進也而九四上九獨以剛進焉於晉之時義悖矣雖然就此二爻論之上九處一卦之外其進也非有迫乎五也而所謂迫乎五者惟九四焉盖九四以炎上之性上侵故也然五君位也當晉之時所謂文明之主也其寵遇之禮所以逮乎下也亦既厚矣而下之所以相率而順附乎上者亦衆矣而四也豈能為之患乎故以進之時而以鼫鼠目之鼫鼠正詩人所謂碩鼠也食我黍食我麥食我苖貪而畏人之物也子夏傳亦作碩鼠是也夫當柔進之時而九四處近君之位而獨以剛進焉其冐進竊位如此而五又有不可犯之勢則貪而畏人故有鼫鼠之象象曰鼫鼠貞厲位不當也者謂當柔進之時獨以剛進失進之義故於貞為厲於位為不當也然則當此之時居此之位如之何而可也曰以六居四以柔而進則於位為正當矣何厲之云六五悔亡失得勿恤徃吉无不利象曰失得勿恤徃有慶也凡經所謂悔云者有所不足於此也所謂恤云者有所係念於此也晉之六五以柔進而上行冝若於剛德有所不足也然柔而得中則柔不為過故曰悔亡六五離明之德无所不照如日之升光被萬物亦未嘗以察察為明也故曰失得勿恤夫恤其得失則明之所及者自以為得而明所不及者則以為失過矣故以勿恤戒之惟夫不以得失為恤也則大君之道无徃而不吉亦无徃而不利矣夫苟恤其得失而以察察為明則天下或有蒙其禍者矣如漢宣之核實而蕭韓諸賢俱受其戮如顯宗之慧察至自撞即而鍾離意輩得以為言至如德宗以强明自任疑蕭復輕已謂姜公輔為賣直至用盧杞趙賛則至於敗亂而不知悔是也安能慶及臣庶乎故象又曰失得勿恤徃有慶也曰有慶云者則无是漢唐諸君之失矣上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也晉也者以柔進也上九以剛而進進至上九无所復進也故有進其角之象角之為物在物之首剛而銳者也此以九居上之謂也程河南曰伐四方者治外者也伐其居邑者治内者也言伐邑謂内自治也晉之上九晉至其角无所復進矣惟能自反自克而内自治焉則知所以危厲自警而𫉬吉矣此所以无剛進之咎也然在柔進之時而以剛進焉又必自反自克而後可以无剛進之咎則於正道固有所虧而未光者矣故於貞為吝惟以自反自克為用者盖所以救其正道未光之失也夫晉至上九進極必退窮上反下易之道然也剛又知變故上九之爻辭如此離下坤上明夷利艱貞彖曰明入地中明夷内文明而外柔順以䝉大難文王以之利艱貞晦其明也内難而能正其志箕子以之晉者明盛之時也明君在上故羣賢於焉而並進明夷者昏暗之時也暗君在上故賢者於焉而見傷此明入地中與明出地上反也夷傷也明而傷焉當此之時其在人君則為昏暗其在賢人則為晦藏也明入地中此合離坤之象以言明夷也内文明而外柔順此合離坤之用以言明夷也利艱貞晦其明也此又即以六居五之義以言明夷也夫離在坤下明入地中之象也明入地中則其明滅矣故為明夷以二體言之内體離也故内文明外體坤也故外柔順其在人也則文明之德藴於内而不耀柔順之心施於外而无忤傳所謂有君民之大德而又有事君之小心是也以此道而䝉犯大難用能脫其厄禍而不失其明聖此文王所用之道以處暗世然也故曰文王以之明夷之時暗主在上賢者切而近之不敢逃去故利於處艱厄而不失其正謂能𨼆晦其明而然也其在爻則六五切近上六而以隂晦居五是也夫箕子紂之諸父也當是時也罹此家難故曰内難然正其志以自守不敢逃去而亦𫉬免害焉非能晦藏其明者能之乎此箕子所用之道以事暗君然也故曰箕子以之經曰易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危明夷之六五曰箕子之明夷而夫子之於彖又以文王箕子兼釋之而紂之事愈彰彰矣象曰明入地中明夷君子以涖衆用晦而明昔者嘗即三不欺優劣之論以論涖衆之道矣西門豹治鄴民不敢欺子産治鄭民不能欺子賤治單父民不忍欺魏文帝問羣臣三不欺於君德孰優鍾繇華歆王朗對曰臣以為君任刑則下畏罪而不敢欺君任察則下畏覺而不能欺君任德則下感義而不忍欺優劣之縣在於權衡非徒低昻之差乃鈞銖之較也夫任刑固非涖衆之道矣而任察尤非涖衆之道也涖衆之道在於有寛厚含容之德而不任察以為明也夫苟无寛厚含容之德而徒任察以為明則以人不能欺之為得計也而不知人情由此臲卼而不安疑懼以生變而羣起以軋我矣此又非計之得也由是觀之則莫明於用晦而莫不明於任察也昔有問安邉之䇿於班超者超告之曰凡居邉者𩔖非忠臣孝子察見淵魚不祥問䇿者笑曰此但平平爾忽其言不用而邉果以叛聞豈非莫明於用晦莫不明於任察乎明夷之象曰明入地中明夷君子以涖衆用晦而明信乎用晦而明也凡居人上者不可不知此初九明夷于飛垂其翼君子于行三日不食有攸徃主人有言象曰君子于行義不食也初九居明夷之初初見傷者也上六暗主之在上也初之於上位卑而勢隔然明者見㣲而慮早故為是飛揚之計龔深甫曰明夷之難在上而初極逺之冝下而不冝上者也故明夷于飛垂其翼不冝上而就下也夫君子于行謂去其禄也三日不食謂去其禄位則義不食其禄故也謂之三日則雖飢而死不顧也此初九在下位之事也夫當暗亂之世處下位而无益於人之國家而力又不能復還夫暗主之明則義當引去夫苟復為是徃就之計則主人亦莫我信矣何補乎故曰有攸徃主人有言以伊尹之五就桀也終不能移桀而之善徒以促其亡爾以三仁之在商也所謂周親也而不能囬商辛之聽而免宗國之覆疎逺之臣其如之何得以免害幸矣此初九之君子所以義在引去而不顧也六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也六二文明之主也彖曰内文明而外柔順以䝉大難傳曰有君民之大德而又有事君之小心則六二是也盖以六居二又為柔順之至也而夫子釋之曰六二之吉順以則也此爻非文王而當明夷之時其誰當之而諸家或以初爻為伯夷太公此爻為太顛閎夭夫以初爻為伯夷太公猶可也何者以其避紂也以太顛閎夭當此爻此何義哉豈不以在下體而輔諸九三乎未也盖諸家或以九三為文王之爻非也此徒泥不可疾貞一言而謂此文王之事也此未識爻義也夫九三武王之爻也非文王事也欲盡文王小心事紂之義而以救世為心又能脫于厄禍而不失明聖則非六二一爻不足以盡之夫股在下而有行之具也明夷于左股則左股嘗見傷矣此所謂羑里之厄也六二隂也故曰左股然左股見傷而强壯者猶无恙焉則所以為文王者猶故也謂非禍難之所能害也雖然彼君也我臣也天命未革則為臣之分吾所不敢違也而上以承乎君下以安乎民此吾之心不敢不自盡也當此之時用拯之道豈敢不用力哉所謂用拯之道何也曰上欲拯吾君而為无過之君下欲拯斯民而為无難之民此吾所以不敢不用其力也此文王自盡之道然也故曰馬壯吉夫馬之所以吉於壯者徒以能拯載乎人也而文王之心亦曰吾之用力上以承乎君下以安乎人者盖不敢不如是之自盡也以吾之順德而不敢失乎為臣之則者然也而賛易者則推原其本心而因其馬壯之吉也而賛之曰六二之吉順以則也此可謂得文王之本心也吾故曰六二一爻在明夷之時非文王不足以當之九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也他卦九三與上六為正應在明夷則為至明克至暗之象也盖九三明之極也而在下卦之上上六暗之極也而處窮極之地此以明除暗之義也程曰斯義也其湯武之事乎是也九三離也離明方也在明夷之時而興除亂去害之事故曰明夷于南狩然南狩之志在于得其大首而不可疾貞之也上六居一卦之上大首也當明夷之時所謂暗亂之魁者也故當克而𫉬之不可疾貞者耿希道曰以明除暗如晝夜之進退何可疾哉按史記載盟津之役諸侯不期而㑹者八百諸侯皆曰紂可伐也武王曰女未知天命未可也乃還師歸居二年聞紂暴虐滋甚於是告諸侯曰殷有重罪不可以不畢伐師渡盟津諸侯咸㑹武王乃作泰誓故泰誓一作而殷亡矣此所謂不可疾貞也若疾以貞之則武王為不知天矣夫聖人之志亦志於除亂去害而已矣若志不在此則悖亂之為也故象曰南狩之志乃大得也猶之曰九三之志所以大得者以南狩也曰南云者謂其有是明也曰狩云者謂其除亂而去害也然則有湯武之德然後可以為湯武之事六四入于左腹𫉬明夷之心于出門庭象曰入于左腹𫉬心意也六爻自初至五當暗亂之世明者見傷故初曰明夷于飛二曰明夷于左股三曰明夷于南狩五曰箕子之明夷惟四也以隂居隂屬坤隂之體无明之可傷而爻辭但曰入于左腹獲明夷之心此正以隂邪柔從為事程河南所謂邪臣之事暗君必先蠱其心是也而諸家或泥于出門庭之一語而曰此㣲子去商歸周之義也則亦誤矣夫邪臣之事暗主其能易獲其心意者盖必有深入而隂中之計也左隂所也腹善容納者也入于左腹謂六四之所以見納於上者以柔邪之道從隂僻中而入也夫如是故有以得乎暗主之心矣方當暗亂之世以小人為之君必以小人而為之臣其心同志合豈待至深至乆而後至此哉方其因縁獲進之初而深入隂中之計已行矣故曰獲明夷之心于出門庭然則此非小人之姦巧而入之之易也盖君心暗亂而入之之不難也此心意之所以易獲也夫人君之心或不謹而易為隂小之所入天下雖欲不為暗亂之世得乎禹之戒舜曰安汝止惟幾惟康其弼直夫汝止不安則易動而易惑不知幾康之是念故輔弼之臣安得而直邪佞之人安得而不易入乎然則大智如舜而禹之戒猶及於此況愚暗之主乎六五箕子之明夷利貞象曰箕子之貞明不可息也他卦六五鮮有非君之位者此卦乃以為箕子之爻何也曰以六居五内陽明而外隂晦此乃晦其明之義以紂之暗亂又將有失位之象不足以當此爻也箕子其親臣也義不逺去其君此時商家无主故易於此乃以六五處箕子為其能晦其明而且切近上六故也上六隂暗之極則移紂以居此位以隂暗既極有在上而失位之象也此易之㣲義也不如是則非易矣夫上六隂暗之極其在明夷之時故為明夷之主六五切近明夷之主若不能自晦其明則必見傷害故箕子之當此時也義既不當逺去其君而忠言至諌又不能入乃不得已而為是徉狂之計以免於害故在彖則曰利艱貞晦其明也而在爻則曰箕子之明夷利貞夫箕子之當此時也能晦其明故其明不可息滅夫箕子之明所以不可息滅者何也亦曰吾正此志以事君此身可滅而此正不可滅也夫吾之正不滅此其明所以不可息滅也嗟乎事君若箕子可矣上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也上六居明夷之極明傷之極也明傷之極者何坤之終也居坤暗之終則明傷之極矣故曰不明晦謂不明而晦也此與晦其明反也夫人君之道无他在乎終始惟一而已矣伊尹之訓太甲曰常厥德保厥位厥德靡常九有以亡夏王弗克庸德皇天弗保又曰今嗣王新服厥命惟新厥德終始惟一時乃日新盖嘗即是說而論之夫人君之始服厥命也雖至庸懦之主盖亦知所謹也何也始可能也而卒為難此所謂初登于天照四國也及其晚也欲心一萌則以天下之莫我尊莫我貴也吾縱吾所欲皇恤乎惟其如是此主道所以日㣲君德所以日失天下日駸駸而入於暗亂之世矣此所謂後入于地失則也司馬温公曰其言失則者何國家之所以立者法也故為工者規矩繩墨不可去也為國者禮樂法度不可失也度差而機失網絶而綱紊紀散而絲亂法壊而國家從之嗚呼為君子者可不謹哉童溪易傳卷十六
