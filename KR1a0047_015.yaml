body:
  text: 童溪易傳卷十五宋王宗傳撰艮下乾上遁亨小利貞彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉嗚呼吾於易之遁而知聖人憂道之心深且切也而其憂天下之心尤深且切也夫隂陽之進退人事之消長君子小人之勝負何嘗無此而聖人之於遁也必欲君子之崇重其義者而懼其或有以凂辱夫我也以為不如是則殆亦與小人無以異也其用心深且切如此此非特為君子憂也為道憂也夫天下事勢既已乖且非矣冝若不可為矣而聖人於此猶有遲遲冀望之意凡可以致力者無不為也又以為不如是則天何生於君子而天下亦何賴於君子也其用心又深且切如此此非強聒以逆天也為天下憂也嗚呼此吾於遁而知聖人之心有如是不一之憂也經曰遁則退也則遁者陽退之卦也然二隂雖長其勢尚微四陽在上其勢猶盛何遽為此退避之計邪經曰往者屈也來者信也當此之時若以勢論則不論盛衰論屈信也蓋二隂雖微其勢來而信四陽雖盛其勢往而屈也所貴乎君子者知時而識機也故當此之時退藏以信吾道吾身雖退而其道則亨矣故遁之所以能亨者以遁而亨也吾故曰聖人之心為道而憂者此也雖然當遁之時君子處之亦未有必遁也何者二隂之長為遁則六二者遁之主也九五以剛陽之德處中正之位所謂剛當位也下與六二居相應之地而以中正相與則當此時也而猶有此人也夫豈不足與有為乎夫苟至誠相與而盡其所謂扶持安全之道則天下亦未遽亂而國家亦未遽亡也此盡人謀以聽天命者也故曰與時行也小利貞者指六二而云也六隂也故曰小以六居二正也故曰利貞其曰小利貞云者猶之曰當此之時大者之志雖在於遁而亨而小者苟利於貞而無有他也則雖當隂道浸漸而長之時猶可助五以有為而為是扶持全安之計毋棄是正以害君子而與君子為仇可也此聖人責望六二之辭也吾又曰聖人之心為天下而憂者此也夫當遁之時所謂遁之大義也則亦有二焉而已矣二者何也曰速而去之所以逺害一也遲而不去所以救害二也二之義也當遁之時無大於此二者故聖人又嘆之曰遁之時義大矣哉程河南曰遁者隂之始長君子知微故當深戒而聖人之意未遽已也故有與時偕行小利貞之教聖賢之於天下雖知道之將廢豈肯坐視其亂而不之救必區區致力於未極之間強此之衰艱彼之進圖其暫安苟得為之孔孟之所屑為也河南此釋其得孔孟之心歟象曰天下有山遁君子以逺小人不惡而嚴山固髙矣然而有所止也若天之髙則蕩蕩蒼蒼而無所紀極焉故語天下之物極尊極髙極逺極大者惟天也遁之象有取於天下有山云者天非有心而與山較髙下也而山之於天自有不可侵不可及之勢焉其曰天下有山則吾非汝去也而汝自不吾及也故為遁之象君子之於小人也亦然由君子之心以視小人憐其愚憂其害憫其平日用心之非有一善未大於毫髮則為之咨嗟嘆賞而曰此所由以為聖為賢也其用心如此何嘗惡小人也雖然吾不汝惡似與汝合矣而卒非汝合也其剛正嚴毅之氣有不可犯豈得而親狎之乎猶之觀天也自下而觀之以為山之巔即天也乃據山之巔以觀天而天愈髙愈逺愈不可及矣此君子與小人遼絶之勢然也初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也尾之為物在物之後事體之最小者也六在初之象也大壯以初為本上為末如乾如比之類則以上為首夫上在一卦之上也既以為首則在遁之初為尾之象矣蓋遁以居前者為先遁居後者為後遁初六在一卦之上故為尾之象也夫隂道浸長陽懼罹害故為是遁避之計而初六以隂小在下何預汝事苟亦遁焉過計也但處一卦之後而以厲自警可也若不知以危厲自警則觀陽之遁而吾亦遁焉此非遁也乃追陽之逋也夫追陽之逋則與陽為仇矣此聖人所甚惡也故戒之曰勿用有攸往以言汝之往則陽不利矣惟能以危厲自警無傷陽之心而自安其瑣尾之分則是不往也不往則陽亦遂其遁避之計何見傷害也故象曰遁尾之厲不往何災也初六隂之始長也聖人防之遏之而微其辭曰遁尾厲又昌言以戒之曰勿用有攸往至爻贊又曉而譬之曰遁尾之厲不往何災也此非為小人謀為君子謀也六二執之用黃牛之革莫之勝説象曰執用黃牛固志也遁之所以為遁者在此一爻也聖人於彖既戒之以小利貞爻辭又戒之以執之用黃牛之革所以責望六二也深矣以為不如是則自此以往棄正害陽小人道長君子道消而為否矣故此爻獨不言遁而以固執其志取義焉牛順畜也黃中色也革堅物也以六居二而以中順之志自堅而至於莫能脫去焉則隂道未至於遂長而君子未至於不利矣夫隂陽消長此天道之盈虛也在聖人亦豈能加損益於其間然於隂長陽退之卦則深致之意焉故於初六則戒之以勿用有攸往於六二則戒之以執之用黃牛之革使之在下位而不敢動焉以謂苟縱之使動則其禍亟矣故婉其辭而戒之嗚呼聖人好惡之旨盡在是矣九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也九三艮之主也艮止也止於內體而為二隂之主故當遁不遁有所牽係而不能逺去夫以剛陽之才而牽係於隂小之人此所謂有疾厲也謂情有所溺而志有所昏故其疾至於耗憊而危亡無日也夫隂小之人所謂臣妾是也初與二處已之下而九三為之主則畜臣妾之象也當陽進之時不知退藏以逺禍而乃係志於隂小之人不知疾生於所溺而危亡將至甚矣其惑也蓋隂小之人怙寵而得志則陽道必至於衰危此豈九三之吉邪其曰畜臣妾吉者以言在臣妾則吉在九三則危也夫陽大而隂小陽貴而隂賤以九三剛陽之才而係志於隂小之人豈能及於逺大之謀邪夫九三所謂逺大之謀何如也曰遁藏以逺禍是也不為此舉則必致疾憊而危亡無日矣故曰畜臣妾吉不可大事也亂世之君子不知全身逺害而貪位慕祿日與小人為偶而忘其明哲保身之道如西漢之揚雄東漢之范滂唐之王涯賈餗是也九四好遁君子吉小人否象曰君子好遁小人否也四屬外體已遁在外矣夫身既遁夫外寧復內顧乎故雖有初六之應舍之而不顧矣故曰好遁好如姻好之好謂與初相好者也夫君子有所好愛然義當遁去則舍其所好而去之不疑所謂以道制欲以義斷事者也故曰君子吉若小人則不然牽於所愛昵於所私如所謂係遁有疾厲是矣此不知變通者然也故曰小人否謂不通也九四復設小人之戒者以陽居隂而復應隂懼其或泥而不通故有此戒九五嘉遁貞吉象曰嘉遁貞吉以正志也傳曰嘉偶曰妃六二九五之嘉偶也舍之而遁焉故曰嘉遁夫六二九五皆中正也而居相應之地以中正之道相與可也而五又何為而遁去夫二也曰當此之時六二以靜為正者也而九五則以動為正焉以靜為正者嫌於動也動則害陽矣以動為正者嫌於靜也靜則見害於隂矣此遁之時義也故九五不得不遁去夫二也若不以遁去夫二為義而惟其應之相求焉則消長之義亟矣象曰以正志也云者言當此之時陽之志以遁為正遁則不失正矣程曰遁非人君之事故不言君然人君之所以避逺者乃遁也蓋嘗論之人君之所以避逺者何事也曰天下之治亂社稷之存亡君子小人之賢否生靈之利害吾身動靜之吉凶避凶而從吉除害而去利舍否而用賢戒亡而圖存去亂而即治其所避逺者此其凡也在彖則曰剛當位而應謂應夫二也而在爻則以避去夫二為義而不取乎應者非相戾也當時行則與時行當正志則正志固也上九肥遁無不利象曰肥遁無不利無所疑也昔揚子雲以范蠡遺文種書而曰至蠡䇿種肥哉蓋嘗論之夫為人謀而不忠乎莫若蠡之䇿種也而謂之肥可乎且以蠡之身既遁於五湖之上其姓名既遁而為鴟夷子皮又遁而為陶朱公矣三徙成名資纍巨萬散而復積是遁也可謂肥矣可謂無不利矣然而文種今日得書明日復得賜劒而不得為子皮朱公之肥者蓋教人疑人是乃所以促人之死也蠡遺種之書曰蜚鳥盡良弓藏狡兔死走狗烹越王為人長頸烏喙可與共患難不可與共安樂子何不去此教人疑人也夫蠡教種疑勾踐是乃教勾踐疑種也種今日得書明日復得賜劒又何怪乎遁上九之象曰肥遁無不利無所疑也則以蠡䇿蠡可也所謂無所疑也以蠡䇿種不可也所謂教種疑勾踐也夫教種疑勾踐是乃教勾踐疑種也豈得謂之無所疑也乎吾故曰為人謀而不忠者莫若蠡之䇿種也子雲身居亂世竊祿苟容欲為遁去之計如大夫蠡而不可得日懼文種之禍至故其取舍貿亂方寸不寧無惑乎有是云也然亦可哀也哉耿希道曰上九最逺於內不係於隂無所疾憊故稱肥乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣四陽之長為大壯壯盛也陽居其四而隂則二爾此陽盛之卦也故曰大壯也夫物之壯也其基厚則壯自初至四皆陽也其基厚矣故其壯為大剛以動故壯此合乾震二體之用以言壯也夫下剛而上動則上動而下不搖非壯者能之乎然大壯之道利於正而已矣壯而不利於正則強暴之為爾此豈大者之事乎所謂大者在爻則剛陽在人則君子是也正大云者正而大也正而大則其發用也無適而非正矣所謂無適而非正者天地發生之用是也今夫天地之發生也生而為春長而為夏揫而斂也而為秋與冬此所謂天地之情也時乎春也則生時乎夏也則長時乎秋與冬也則揫而斂而未嘗或失吾正焉故萬物於此莫不各正性命而無夭閼之患此正之大也故欲見天地之情即正大而可見矣此天地之所以為壯也使其非壯則正大之理安能如此之不窮乎程曰天地之道常久而不已者至大至正也正大之理學者默識心通之可也象曰雷在天上大壯君子以非禮弗履天健物也以雷之威而在其上威而健者也故為大壯之象天下暴亂之禍惟禮可以已之故語天下之壯者莫如禮禮天理也君子克去已私事事欲與天理合為一此又非勇而健者不能也其曰非禮弗履則凡一舉足必惟禮之是循也以謂履之非禮之地則必至失足而陷於禍敗矣此非所以為壯也初九壯于趾征凶有孚象曰壯于趾其孚窮也初九以剛在下而勇於前進用壯于趾之象也故曰壯于趾夫以剛用壯雖在上猶不可况居下乎征往也以此而往其凶必矣故曰征凶有孚孚信也謂信其征之凶也所謂征之凶者困窮而致敗之謂也故又曰壯于趾其孚窮也謂信其有困窮之凶也語曰人而無恆不可以作巫醫子曰不占而已矣不恆其德或承之羞以言人而無恆則不占而信其有羞也大壯之初九曰征凶有孚曰其孚窮也則亦不占而信其有困窮之凶也九二貞吉象曰九二貞吉以中也夫居柔而處中則剛不為過九二是也大壯陽盛之卦也夫苟又以陽居陽則剛過矣王輔嗣曰未有違謙越禮而能全其壯者也故陽爻皆以居隂為美夫陽爻而居隂非九二與九四乎然九四之比九二又不如二之中矣故九二之所以貞吉以中也而九四之貞吉又必以悔亡繼之謂以九居四非中也故有悔以其吉於正也故悔亡然則以剛履柔而不用壯以為壯此所謂壯之正也而又得中焉何吉如之程曰貞非以九二為戒乎曰易取所勝為義以陽剛健體當大壯之時處得中道無不正也在四則有不正之戒人能識時義之輕重則可以學易矣九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也九三以剛處剛此雖正也而過乎中剛之過也夫他卦以剛過而居多凶之地皆不免於危厲況大壯陽盛之時乎故以小人目之而曰小人用壯君子知危知懼而不以壯為用者也故曰君子用罔罔無也謂無所用也猶之曰罔有所用云爾其所以剛有所用之者居剛正之位而當以危厲自警故也故曰貞厲苟不知此則用壯之過而有羝羊觸藩之象矣夫九四居前間在二卦之間而為二體之限此藩象也藩之為物也不純乎柔亦不純乎剛九四是也而三用壯以觸之其能全其壯鋭矣乎故有羸其角之戒程曰凡物莫不用其壯齒者齧蹄者踶角者觸羊壯於首羝為喜觸故取為象夫兊為羊九三乾也乃取羝羊為象六五上六震也而亦取象於羊坤為大輿而九四震也則曰壯于大輿之輹易之取象大率類此故坤非馬也而曰牝馬離非牛也而曰牝牛頥之初九震也而有取於龜六四艮也而有取於虎凡此類者豈泥諸爻象以求之乎求之不得則卦變動爻伏象互體無所不取而聖人之意愈失矣此學易之大戒也世之嗜竒好異者徒知左右附會而僅得之則曰學易者當如是也而何以正直坦夷之説為哉此豫之所否也王輔嗣曰義苟合順何必坤乃為牛義苟應健何必乾乃為馬而或者定馬於乾按文責卦有馬無乾則偽説滋蔓難可紀也輔嗣此言不可謂不知易也九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也大壯之卦德曰大壯利貞謂以陽居隂其在此時不用其壯故得謂之正也於正既吉則於悔斯亡矣四之所謂悔者以其不得如九二之中故也故必於貞既吉則不中之悔可得而亡之矣六五以隂虛居前藩決之象也藩限既決則陽道尚往而無阻礙之傷矣故曰藩決不羸四不取羝羊之象而但曰藩決不羸云者四居隂處謙非九三用壯之比故也此所謂以正為壯者也夫四震動之主也而當四陽上進之時以正為壯前無所礙故有壯于大輿之輹之象輿善載而能行之具也輿大而輹壯前無所礙當陽長之時故曰尚往也四謙虛之位善載者也故為大輿乾以三陽居下輔上而能行者也故其輹壯此所以尚往也夫在事有是理則貞吉悔亡是也在時有是勢則藩決不羸是也在我有是器則壯于大輿之輹是也由是理乘是勢而用是器此君子之道所以獨盛於此時也六五喪羊于易無悔象曰喪羊于易位不當也程曰羊羣行而喜觸以象諸陽並進五以柔居上若以力制則難勝而有悔惟和易以待之則羣陽無所用其剛是喪其壯於和易也以言人君治壯之道不可以剛也此説似矣然按旅之上九有曰喪牛于易凶謂旅人於其平易之時而喪其在已之順德今旅以剛亢在上故莫之與也夫上九之牛既於上九取義而無與於他爻則六五之羊亦不當於羣陽取義也審矣又況九四方當尚往之時而有大輿壯輹之象五君也決其藩籬以來之不暇豈容阻遏其上進之勢乎果有此心則失人君進善納賢之道矣大抵羊剛很之物也五君位也而以六居之則於其平易之時務喪去其自已剛壯之勢而不用惟以謙虛無我自處使下之羣陽由已以上進而略無阻礙之勢此九四所以有藩決之象者蓋指六五之謙虛而云也夫當陽長之時苟以妨賢拒善為心則不能喪其在已之剛壯而以謙虛為用也必矣其能無在上之悔乎其曰位不當也者正所謂去其剛壯之勢而不用也夫惟如是則當陽長之時其能無悔冝矣上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也上六隂柔亦取羝羊為象者居震之極壯之終也夫震之極則不能自止壯之終則終於用壯故亦稱羝羊然上六之藩何所取也曰處隂虛之地旁若無物而蹢躅用壯然不能退而自止復不能進而遂意進退舉無所利亦若有所限隔而然也故亦設觸藩之象焉然羝羊觸藩以其有剛鋭之角也今不以角取象則是無角也夫無角而務觸藩此上六隂柔而用壯之象也以其用壯故曰羝羊以其純隂故不以角取象也小人之用壯也亦未必皆有剛壯之才如九三然也狂躁妄動不能詳審以自安愚分而至於進退舉無毫髮之利以自貽厥咎者則大壯上六是也中庸曰愚而好自用賤而好自專生乎今之世反乎古之道如此者災及其身者也此皆不能詳審之過也然易於此又有艱則吉之戒者閔其用心之非而開其自省之路也夫不量已之賢愚不度勢之可否則於進退之間亦何所利哉如知其非所利也而艱畏以自處而戒其妄動之失故易於此又以吉豫之而曰咎不長也以言若上六之為也本有咎也如知其非利也而艱畏以自處則其咎可以損去而獲吉也嗚呼聖人之設心若此其仁矣哉童溪易傳卷十五
