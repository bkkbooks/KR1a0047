body:
  text: 童溪易傳卷五宋王宗傳撰乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也有所濟者君子之才有所待者君子所以全其才有是才矣而不知所以全之則或恃其在我者而不知相其在彼者鮮克有濟矣夫乾以剛健之才運乎萬物之上則莫我或抗今也處乎坎險之下前有險而未可逞吾有才而未可恃當是時也能無待乎此卦之所以為需需須也有所待之謂也至誠自信全其在我而不拂其在彼者此需之道也惟能盡需之道則時行乃行險不能陷故需之九五位乎天位而有中正之德以乾德之發用而不窮者得位得時如此也此其為效豈不光亨矣乎故曰剛健而不陷其義不困窮矣然則有孚者乃需之道而有所須者乃所以全其剛健之才者也將以全其才也而無至誠需時之心則未有不輕進躁動而自置於陷敗之地其能免於困窮矣乎需之剛健而不陷故乾德之發用得位得時而為需之九五此所以謂其盡需之道則曰有孚謂其有不困窮之義則曰光亨謂其得位得時而有正中之德則又曰貞吉也夫以剛健能濟之才而不陷於坎險則排大難定大患何往而不利故又曰利涉大川往有功也夫始焉有所須未始有功也知有孚而已矣終焉有所往未始不利也故又繼之以有功焉則有孚者乃有功之本而有功者又有孚之效也噫孚之時用大矣哉象曰雲上於天需君子以飲食宴樂序卦曰物稚不可不養也故受之以需需者飲食之道也則需云者又有養物之義此象所以有飲食宴樂之説而九五亦曰需於酒食也夫雲上於天欲雨之象也故為萬物之所需何須乎須此以養故也物得所養則得其生矣故樂也飲食者所以養人也宴樂者所以樂其所養也人君之於天下也固非家至而飲食之也亦非人人而宴樂之也不過使之而各盡其耕鑿之利云爾此養天下之道也又使之仰父俯子嬉遊順適而無追胥勞擾之害云爾此宴樂天下之道也夫天下之心所以有待乎上者蓋亦不過乎此也君子在上有以慰適天下之望而使之各盡其有生之樂焉此則需之義也初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也天下之亨勢有逺近之不同君子之處事亦隨其勢之所異需之坎險在前逼近則為泥九三是也漸近則為沙九二是也最逺則為郊初九是也故迫近於難則欲致其敬漸近於難則欲處以衍最逺於難則欲其不失常也夫處無事之地則不可以越常而犯難初於坎水為尤逺所謂無事之地也故曰需于郊而以安常守分為用者乃其所利也夫處無難之地而不以犯難越常為行而以安樂守分為用庸何咎乎或曰需之險在前也非無難之世以初九剛明之才豈無救世之志歟曰當需之時位卑而時未可患難未切於已而不可以輕試於難若以越常犯難為行孟子所謂鄉鄰有鬭被髮纓冠而往救之惑也九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也沙視郊則去坎水為近矣然未之溺也故曰需于沙沙平衍之地也九二以剛居中故又曰衍在中也故君子之濟夫難也豈務與之交相為敵歟夷然以寬裕自處亦還以寬裕處夫物而期於吾不彼攖彼不吾傾而已矣夫如是則始焉雖不免薄有所嫌小有所疑終焉釋然禍去而難平矣故曰小有言終吉此君子之善濟夫難也昔諸吕之難亟矣而陸賈乃從容於平勃之間未嘗少激其勢也俄而將相交歡而左袒一呼吕宗覆矣若賈者可與論需之終吉也其能身位俱榮冝哉九三需于泥致寇至象曰需于泥災在外也自我致寇敬慎不敗也泥視沙則去坎水為已迫矣是與寇難相鄰已不容髮矣故曰需于泥致寇至夫寇自外至而九三處內外之交而與之鄰焉亦勢使然也今而謂之自我致寇何哉曰警之之辭也夫禍難之至苟以為時勢之使然而我無與焉則或坐視其禍而不救者有矣或知救之而不知敬戒之術以致敗也亦有矣韓文公守戒之説曰宅於山者知猛獸之為害則必髙其柴援而外施陷穽以待之宅於都者知穿窬之為盜則必峻其垣牆而內固扄鐍以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於屈強之間而不知為之備噫亦惑矣故曰自我致冦敬慎不敗也此聖人警九三之辭也六四需于血出自穴象曰需于血順以聽也需之六爻由初九九二九三言之則在內者有以待乎外何也坎險在前故也故初之需于郊二之需于沙三之需于泥皆謂坎險之在前也由六四上六言之則在上者有以待乎下何也三陽上進故也故四之出自穴上之入于穴皆謂三陽之上進也而五之中正則又廣言人君待天下之道也是亦有以待天下也夫三陽以剛健之才在下而有待也亦久矣至於六四則涉隂虛之地而莫遏其進如入無人之墟矣故四之當是衝也需其至而弗之入焉則有傷矣為四計者莫若出其窟穴而順以聽夫三陽之進若安其位而與陽角焉所傷多矣血隂物也穴隂所也皆謂四也夫方三陽之需于下也則指坎之地曰險曰難曰冦曰災及至於四而三陽有必濟之勢也則如蹈無人之墟而所謂曰險曰難曰冦曰災咸無焉聖人闔闢隂陽之旨至是而益明矣九五需于酒食貞吉象曰酒食貞吉以正中也司馬溫公曰有孚光亨貞吉人君所以待天下之道也夫九五居中履正以待天下之須中則養天下而不過而有以盡時措之冝正則不有其功常久而不已此人君待天下之道也夫酒食所以養人也中正之君使天下皆足其量無求而不獲如酒食之適其醉飽焉此則需之義也而蘇東坡乃曰九五以酒食待乾乾必心服而為用陋哉斯言也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也出自穴謂當三陽之衝失所安也入于穴謂上與九三居相應之地不拒其進而初九九二皆因之而前不見傷焉得所安也夫在彼者有所待而來則在我者亦必有以待其來彼三陽者有待而來亦久矣故曰不速之客彼既有待而來而吾無以待之則其失大矣何謂待之之道曰敬之而已矣夫子戒司馬牛曰君子敬而無失與人恭而有禮四海之內皆兄弟也彼三人者雖九三獨吾應而九二與初亦吾所不失其親之人也故居需之終而獲吉焉夫上六以隂居隂當位也象曰不當位何也曰陽為客隂為主而且居一卦之上是不當位也不當位則失隂陽上下之義矣然敬則無失以隂而為主於上彼三陽者吾能敬以待之故曰雖不當位未大失也或曰六四之順以聽也則三客之來亦知敬之矣而且與初九居相應之地何為其出自穴不若上六之安需于血不若上六之無所傷也曰三之應上也三居先焉而下二陽因之以進故上得所安而無所傷初之應四也初居後焉而上二陽不因之以進故四不得所安而有所傷也經曰凡易之情近而不相得則凶或害之悔且吝此之謂也坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也凡訟必有能訟之才亦必有兆訟之心有是才而無是心則訟何由而生有是心而無是才則訟何由而成訟之成體乾以剛居上剛則健而不可屈此能訟之才也坎以險而居下險則深而不可測此兆訟之心也以不可測之心而濟之以不可屈之才此所以訟也故曰訟上剛下險險而健訟此以卦才言之也坎之九二之剛實自乾來也而居下體之中是以成訟則二其致訟之主也夫以剛居中則中實中實有孚也天下之事無小大皆不可以匪孚而訟之匪孚尤不可也訟而匪孚則妄而已矣故訟以有孚為本窒塞也惕懼也有孚而見窒則不得已而訟窒而不自惕則是好訟也二以一陽而居坎陷之中故為窒坎為加憂為心病故知惕中吉者夫剛未為凶德也過剛則凶矣故訟以剛得中為吉以過剛為凶終凶謂過乎剛也上九之終其訟是矣夫訟所以求直吾情也吾情之既直則亦可以已矣而復不已則其於人也豈惟擠之罪罟之地而後已而吾之為德也亦不得為吉德矣故曰終凶訟不可成也大人者謂九五也五居中履正是能以中正之道聽夫訟也故為天下之所利見夫天下之所爭惟中正可以已之故訟之所尚者中正而已蘇東坡曰夫使川為淵者訟之過也天下之難未有不起於爭今又欲以爭濟之是使相激為深而已朱子發曰剛險不相下君子小人不相容難始作矣聖人見其訟也戒之以中正戒之以不可成若濟之以爭是以亂益亂相激而為深矣漢唐之亂始於小人之為險君子疾之已甚其終至於君子小人淪胥以敗而國遂亡故曰不利涉大川入于淵也噫聖人示戒之意亦深矣象曰天與水違行訟君子以作事謀始天上運水下注天下之物其行相違莫甚於此故為訟之象凡事終之不善始之不善也夫始善而終不善者有矣未聞始不善而終善者也故君子於作事之始必也絶其爭端窒其亂源使訟無由而生是之謂謀始孔子曰聽訟吾猶人也必也使無訟乎無訟之道舍謀始不可也初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也訟以得中為吉以終訟為凶故於初而致其戒曰不永所事而象曰訟不可長也初六之才柔而順者也非能訟也然當訟之時而亦有所不能已也故曰小有言謂得罪於四而在我亦不能無言也初六何以得罪於四乎曰初與四居相應之地四下應初疑二間已又疑初之舍已而比二也故當此之時初六不得其平而至於不能無言然二與五兩剛不相能而二方且自下訟上則亦何暇間四之應而初亦何心以比二也故小有言而是非之辨如此其明也其初亦非有罪者也故曰終吉以言初之於四始雖不得無言而終相得也九二不克訟歸而逋其邑人三百戶無眚象曰不克訟歸逋竄也自下訟上患至掇也九二九五在乾在中孚則為同德在訟則為不相能之兩剛也夫二五之不敵故也而二自下訟之義乎故曰不克訟邑人三百戶二之居有其資比之尺地莫非王土一民莫非王臣奚翅於千萬也而二訟之多見其不知量也逋竄也避也眚禍也掇取也二若反而安其在我而避其為敵之地則可以居有其資而無禍患矣苟為自下訟上而不知其為不義則患之至也乃其自取也或曰訟之九二必與五訟乎曰凡恃已之才不安其位分而怨天逆天者皆訟五之謂也六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也訟者剛健之事而非柔順者之所能為也故初與三皆云終吉然初之終吉即其初而知其終之有是吉也三之終吉居其終而安享是終吉也夫三以柔順之才而居下體之終是能以素分自足也何謂素分從乎上者已之素分也謂本與上應故也故曰食舊德貞固也厲危也貞固以自守而無九四九二上下之交焉則雖處危險之極而終吉也或從王事無成者夫訟生於其行之相違而天下之爭又起於矜功而伐能三與上居相應之地以柔而從剛以下而從上而不以成功自居是能無訟也故訟之六爻不言訟惟三為然夫一於守而不知義之所當從介者之所為也一於從而不知義之在所守徇夫人之所為也而三則舉無是也故曰食舊德又曰或從王事無成而象則曰從上吉也朱子發曰竇嬰之於田蚡上下相激至亡其身不知六三之吉也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也尊則無敵無敵則義不可訟二之於五是也柔則不競不競則無與為訟四之於初是也故二與四皆曰不克訟四體剛履柔雖有能訟之才安於所止是亦能反而歸諸正邪故曰復即命渝命正理也賜不受命則不知所謂正理矣渝變也變前之為則能安於正理矣復而不變變而不安危也於正理何有哉夫訟非吉德也以知止為吉吉則無失德矣故象又曰復即命渝安貞不失也夫九二之歸而逋九四之復而渝皆貴於知反者也故聖人皆以不克訟戒之戒之者懼其恃夫剛也然四有安貞之吉而二無有焉則知自下訟上者聖人所深惡也九五訟元吉象曰訟元吉以中正也得時措之冝之謂中循天理之自然之謂正吕刑曰咸庶中正則中正之道獄訟之所以恃也尚矣訟之九五以天德居中履正而聽天下之訟則天下莫不赴焉故彖曰利見大人而爻曰元吉元吉吉之大者也夫九五之吉而大天下之人見大人而利舍中正其可乎故利見大人尚中正也則知中正之道人情之所同尚也九五元吉以中正也則知中正之道以之者九五也舜語皋陶曰刑期于無刑民協于中中也又曰惟兹臣庶罔或于豫正正也孟子以獄訟者不之堯之子而之舜而曰此天也而不知此中正也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也上九以剛之極處訟之終此極已之剛而終夫訟者也鞶帶之為服者不純乎剛亦不純乎柔而為中體之飾六三之象也三本應上而以素分自足有從上之吉無他志也當此之時諸爻方訟而三實間於九二九四之間上九或疑其有上下之交也故終其訟焉夫以剛極而終夫訟而三以柔順不較應之或錫之鞶帶也然或錫之吾受之以為冝也夫何愧受之不以其道而以訟受焉則雖得之必失之兹榮也祇所以為辱也故三之從上則未始或失乎吉而上之以訟受服則亦曰不足敬也上九乾之終也乾為日故曰終朝自三至上凡歷三爻三褫也夫訟逆德也上九以極剛而終夫訟而昧不可成之戒聖人所以愧恥上九也亦深矣坎下坤上師貞丈人吉無咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣師以一陽為衆隂之主居險難之地用衆之象也此卦所以為師夫用衆之道正而已矣所謂止者順夫理也用衆而不順夫理則攘襲變詐之為也以攘襲變詐為事豈足以服人心哉惟用衆得其正則足以服人心而為天下之所歸矣故曰能以衆正可以王矣謂王道上於正也丈人者尊嚴之稱也謂九二也均是人也人之所以畏服順從之不暇者必其尊嚴之人也有是正矣而又有尊嚴之人以行是正此師所以吉而無咎也剛中而應謂二之於五也行險而順合坎與坤而言也夫九二以剛處中中則剛而無過有以上應夫五也蓋不殺者帝王之本心而命將行師者帝王之所不得已二而剛則既足以除亂而解棼剛而中則吾君之心我實得之也故曰剛中而應戰危事也所謂行險也夫驅天下於險難之地而人不以為險難者是在我者有以順夫人故也蹈危履險而有以順乎人其孰不惟我之從乎故曰以此毒天下而民從之夫殺戮之慘供億之苦勞民而費財所以毒天下也然殺人以安人害除而利至人孰不曰此所以安我也此所以利我也故相率而從之不暇此無他有以順之故也夫我有以順乎人而人亦還以從乎我此所以曰吉又何咎矣司馬溫公曰毒之者其志將以安之也若針砭所以已疾也所謂吉無咎者師以功成為吉以人心服從而莫之或違為無咎象曰地中有水師君子以容民畜衆散漫而不一者水也衆之象也翕受而無遺者地也君子之德也吾嘗謂用衆非小人之事也或曰古今小人有才略者亦多矣何其不能用衆也曰能驅之而已矣僥幸其功亦有之矣語其以心服人則未也故夫有翕受含洪之德則平居暇日使之自然有尊君死長之義油然作於其心而有不能自已者一旦驅之死地則捐軀效命孰不為吾用也故師之象曰地中有水師君子以容民蓄衆謂容之蓄之者所以能用之故也初六師出以律否臧凶象曰師出以律失律凶也程河南曰初六師之始也故言師出之義與行師之道也何謂行師之道曰號令詳明是也何謂師出之義曰兵出有名是也兵出無名號令不明皆失律也故於師之初而致是意焉否失律也臧善也謂有功也師不以律雖有功亦凶謂不合於道與義而非王者之師也齊桓公之伐楚也楚人曰君處北海寡人處南海風馬牛不相及也曷至是哉齊人曰包茅不入王祭不供寡人是問此雖假義也然亦幾於有名矣李廣與程不識同時制軍廣之軍廢刁斗逐水草自便而已而不識則日夜持嚴常若敵至諸軍樂廣而苦程不識也然不識未嘗遇敗也而廣雖以勇名竟以勇敗此所謂失律也九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也夫居人臣之位而得專制其事者其在易也惟師之九二為然古者人君當命將出師之日也謀之於廟遣之以禮餞之於國門之外敬而授之鉞曰閫外之事將軍制之朕不敢與也故將軍得以行其志而後世乃以刑餘監軍事從中覆殊失古之義也所謂行其志者非專殺恣戮之謂也時然則然時止則止或威或懷而不失乎時中之義也雖然王者之師志於懷而已矣威之者非吾心之得已也然非有威之之具則彼小人者罪惡既逞欲其我懷未也師之九二在師中吉所謂或威或懷而不失乎時中之義也彖曰吉無咎九二亦云此正為二設也夫吉天也無咎人也在師中吉則有以得乎天也故曰承天寵也天且寵之而况於人乎其無咎冝矣王三錫命因天之寵也夫功之多也則其錫之也必不薄王錫之命而至於三焉則功之多可知矣故曰懷萬邦也九二以懷萬邦為功而獲王者三錫之命則與血刃相屠結禍於斯人者有間矣余故曰不殺帝王之本心剛而中則吾君之心我實得之也九二是也六三師或輿尸凶象曰師或輿尸大無功也昔昌國君樂毅為燕上將軍并護趙楚韓魏之兵以伐齊盡虜其財寶祭器以輸之燕既而又下齊七十餘城皆郡縣其地以屬之燕功信偉矣及田單反間既行而騎劫代至齊師遂轉戰逐燕北至河上盡復侵城此師之六三所以師或輿尸凶也輿集衆木而成也故有衆義説卦曰乾為大輿衆尸主也師或輿尸不一其所主也夫師之權專則有功不專則致敗九二師之主也而六三復居其上外柔懦而內剛很之人也斯人而兼主軍制豈不兼喪前功邪故曰大無功也晉以戴若思遙制祖逖遂使黃河以南不旋踵而復陷於羣胡亦此意也故六五復申其戒曰長子帥師弟子輿尸凶象曰弟子輿尸使不當也六四師左次無咎象曰左次無咎未失常也有決戰之師有持重之師決戰之師利於速戰不速戰則非惟老師而費財也脫兔之機一失則無復成功之可冀矣持重之師利於退守不退守則以肉餌虎而宗社存亡之命一決於俄頃間矣諸葛亮武侯崎嶇自蜀中出與司馬宣王對壘屯田之䇿非得已也而巾幗之遺其意正在速戰也辛佐治一杖節立軍門而魏師竟無戰意遂以不殺却敵人此持重之師也六四重隂隂主靜退故曰師左次左次退舍也左亦隂也退而有待相時故也故曰無咎若冝進而退則有咎矣夫冝進而進冝退而退亦師之常也故曰未失常也程河南曰度不能勝而全師以退愈於覆敗逺矣易發此義以示後世其仁深矣六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也九二處帥師之任而征伐賞罰實自五出故六五詳言興師任將之道以示其戒夫以六居五柔暗之主也柔則易以奪暗則易以惑居天下之利勢而征伐賞罰之權實自我出何施而不可然師出無名事故不成名其為賊敵乃可服師無故而興焉此柔暗之主之所輕而王者之所重也故曰田有禽利執言無咎用得其人其功乃成用失其當前功反喪帥師之任無故而易置焉此亦柔暗之主之所輕而王者之所重也故曰長子帥師弟子輿尸貞凶夫興師以討有罪猶之田也凡田狩之役以有禽也害我苗稼義當獵去王者之師亦曰取彼凶殘我伐用張云爾此有名之師也故曰利執言書曰奉辭伐罪謂辭在我故也此之謂執言夫苟得已而不已焉非所利也程河南曰秦皇漢武皆窮山林以索禽獸者也非田有禽也長子謂九二也弟子謂六三也夫當其可之謂中二有剛中可用之才而五用之用得其當故曰以中行也三以過中不當之才而五又用之用失其當故曰使不當也命自君出正也用使不當則雖正亦凶矣司馬溫公曰舉國家之衆而委之一人此安危之機存亡之端不可以不謹擇其人人君之職守也故曰長子帥師弟子輿尸貞凶者雖正猶凶也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也上六師之終也所謂師休之日而論功行賞之秋也夫用師之日不可以用非其人而師休之日尤不可以用非其人也師休之日而用非其人則一亂去而一亂生矣師何時而休邪蓋當師休之日智者謀力者角人爭售其所長未必皆君子故也亂略既平海內一統上有所命而下莫不聽故於此時得以稱大君焉功之多者命之開國以為諸侯功之次者命之承家以為卿大夫此所謂正功也夫分茅胙土之任不以付之非其人焉此休師之道也乃若小人之有功者厚之以金帛優之以祿位不害其為賞功也所以勿用之者謂其必亂邦也昔我太祖當大業既定之後語諸將曰君曹何不釋去兵權擇良田美第歌童舞女以終天年諸將感泣而謝曰此陛下生死而肉骨也故二百年間無小人挾勳跋扈之禍夫語三代而下得御將之道不動聲色者惟我太祖也漢唐諸君不足與焉童溪易傳卷五
