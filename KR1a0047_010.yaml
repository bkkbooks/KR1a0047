body:
  text: 童溪易傳卷十宋王宗傳撰巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也東坡曰器久而不用則蠧生謂之蠱人久宴溺而疾生之謂蠱天下久安無為而弊生之謂蠱易曰蠱事也夫蠱非事也以天下為無事而不事事則後有不勝事矣此蠱之所以為事也剛上而柔下巽而止此合二體之材而言蠱也夫剛上艮也柔下巽也艮少男也男至少而居上巽長女也女雖長而在下剛柔上下各正其位冝若已安已治矣當是時也在下者有巽順而無違忤在上者有止息而無動作則禍亂之萌乃生於已安已治之中遂至於敗瓌而不可勝矣此剛上而柔下巽而止所以成蠱也雖然飭蠱之道不在乎他在乎上下之志交通而無壅如器欲常用體欲常勞天下欲常事事則不弊而治矣夫上下之志既巳大亨則往有事乎蠱雖涉大難而亦利矣何往而不通乎故曰利涉大川往有事也於蠱而言涉大川者蓋天下之深患極弊常伏於人情無所事事之地大川蠱之大者濟天下之大難飭天下之大蠱非上下之志大亨其可乎且夫天道之運行往來推遷而至於不窮者此所謂大亨也故能終則有始而無愆伏之弊聖王之飭蠱也盡始終先後之道如天之行則弊革而患除矣故有取於先甲三日後甲三日之説夫甲者數之始也於其造事之始也反復思慮蘄以善其始此先甲三日之謂也於其既造事之後也則反復思慮蘄以善其終此後甲三日之謂也程曰先甲謂先於此究其所以然也後甲謂後於此慮其將然也一日二日至於三日言慮之深推之逺也究其所以然則知救之之道慮其將然則知備之之方善救則前弊可革善備則後利可久此古之聖王所以新天下而垂後世也然則飭蠱之道固人事也而天理實在是矣何謂天理曰其所以終而有始行而不窮者是也夫惟不窮是故無弊此蠱之卦德所以貴于元亨歟象曰山下有風蠱君子以振民育德山之為物以止靜為體風之為物以散動為用夫以山之止靜冝若無事矣而下有風則草木為之撓亂坎竅為之呌號則又有事焉此有事生於無事之地者然也故為蠱之象君子以為天下之事常伏於無事之地也故平時暇日其於民也務振作其氣使之力其所謂相生相養之道而無廢惰自安之人其在巳者務涵養其德使之日新又新而無逸豫自止之意則君子之所事孰有大於此二者中庸曰成物智也成已仁也合內外之道也故時措之冝也蠱之君子其知合內外之道而盡時措之冝乎初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也東坡曰蠱之災非一日之故也必世而後見故爻皆以父子言之明父養其疾至子而發也朱翊善曰蠱之患非一世譬如人嗜酒色餌金石傳氣於子孫者潰為癰疽死與不死在治之如何耳秦皇漢武窮兵黷武一也秦亡而漢存者始皇無子而武皇有以幹之故也姑以武昭之事言之孝昭以八歲即皇帝位承武帝雕弊之後此正蠱之初而以六之柔弱之才居之也其元年則遣使者行郡國舉賢良問疾苦其二年則遣使者賑貸貧民其六年則采賢良文學之議罷鹽鐡榷酤元平之元年又詔罷不急官減外徭減口賦錢凡此皆因武帝既弊之事而力幹之也武皇得不與始皇同科者賴有此子爾故曰考無咎曰考云者謂得其所以有終之道也向使武皇非有孝昭則大漢之業其能復存而有終矣乎天下萬世之議其萃於武皇矣烏得無咎厲終吉者夫以柔弱之才當幹父之初茍不日懷兢畏自危自厲如恐不勝則逮其終也安能吉乎故當此之初必以危厲自警終乃獲吉也夫以意而承考與事事而承考不同也事有可否理有是非故時有損益不可以盡承之也於其所不便者量其可否度其是非從而行止之而不失乎損益之冝此其子道也若事事承之以為孝此則六四裕父之蠱而非所謂幹蠱者也此豈特厥考之咎歟其咎抑有歸矣九二幹母之蠱不可貞象曰幹母之蠱得中道也二隂位也而屬內卦之中體九陽德也而居內卦之中位則以剛明之才而幹內庭之事之象也故曰幹母之蠱夫幹父之蠱易幹母之蠱難父與母人子之所尊而敬親而愛之所在也固冝遵命從令之不暇然以王季為父以太任為母則為文王者可以無憂其或作之於前者未能無後日之弊則承之於後者可無果敢救弊之道歟又况至難幹者母之蠱也將以幹之使之不違乎道果無其術乎九二實巽之體也九雖剛也而其體性則順巽也巽以入之從容輔導以馴誘之漸反其惡以之於善使其勢不激而力無勞焉則無矯拂傷恩之害故曰不可貞以言非直正之也亦非不正之也優遊不迫使之身正而事治若出於自然而非矯拂迫促之也故曰得中道也魯莊公之有威儀技藝也然而不能防間文薑故詩人為之賦猗嗟也其卒章曰四矢反兮以禦亂兮蓋其不及中道也鄭莊公以叔段之故也遂置武薑于城潁而誓之而激潁考叔之肉諌而公亦曰爾有母遺伊我獨無蓋傷其過於中道也然則幹母之蠱欲其不失正又欲其不可直以正之非九二之得中道不可也君子之事君其當閫密之寄也亦然盡其道者則唐之魏鄭公是也故太宗忘其正直而反以為嫵媚焉可不謂之善幹其蠱矣乎九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也九三之才視二為剛過而不中矣然此乃幹父之蠱用力之地不得不然也昔者曽子問於孔子曰敢問子從父之令可謂孝乎子曰是何言歟是何言歟天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義故當不義則子不可以不爭於父臣不可以不爭於君故當不義則爭之從父之令又焉得為孝乎九三之剛過父之爭子也其事父也不從其令而以爭事焉此小有悔也然其爭也所以免父於不義也謂之非孝可乎此君子之所豫也故曰無大咎三下體之終也故又曰終無咎也然則小有悔者九三之不獲已而終無咎者九三之所願欲也歟六四裕父之蠱往見吝象曰裕父之蠱往未得也昔者嘗讀太史遷史記至秦本記而知始皇之所以失者蓋不勝計也末年以遊豫之失遂亡厥軀而驪山阿房之役民不堪命在後之似所冝鑒而懲之也胡亥今日即位明日與趙髙謀曰先帝循行郡縣以示威強服海內今宴然不巡行即見弱矣乃東行郡縣至會稽盡刻始皇所立刻石石旁著大臣從者名以彰先帝成功盛德還至咸陽又曰先帝謂咸陽朝廷小故營阿房今釋阿房弗就則是彰先帝舉事過也其令復作阿房宫如始皇計嗚呼此蠱之六四所謂裕父之蠱也夫當斯時也不能幹其蠱而增裕之何也太史遷曰胡亥極愚驪山未畢復作阿房以遂前策又稱誦其言曰凡所以為貴天下者肆意極欲大臣至欲罷先君所為嗚呼彼以罷先君之所為之為失也而不知裕父之蠱之未為得也夫始皇成功盛德何在而舉事之過正在巡行與營築也今而刻所立石復營阿房乃所以益彰其過也豈能少損其過之萬一歟其視初之意承考也殆異也此無他六隂也四亦隂也隂暗而無覩此史遷所謂極愚也故曰往見吝又曰往未得也謂其以隂暗無覩之才凡有所往皆見鄙吝於人有失而無得不然何以有極愚之諡歟六五幹父之蠱用譽象曰幹父用譽承以德也夫君子之創業垂統以貽諸後人也未必有弊也亦未必無弊也在乎繼之者善與不善如何爾且以有周論之文王武王之謨烈所以啓佑後人也在書既曰咸以正罔缺矣何蠱弊之云乎其或繼之者宜若無所事矣而大雅之譽成王也則有鳬鷖之什焉而曰太平君子能持盈守成也蓋曰盈而不持成而不守則傾覆隨至何太平之云乎以太平君子譽之為未足也而又繼之以假樂之嘉焉其首章曰假樂君子顯顯令德以假樂君子譽之為未足也而又繼之以卷阿之作焉卷阿之二章曰豈弟君子俾爾彌爾性似先公酋矣夫大雅之譽成王亦云足矣而於最後卷阿之作則有及於似先公酋矣云者豈非文武之謨烈其能以似以續者其在成王乎若然則君子之創業垂統以貽諸後人未必有弊也亦未必無弊也又得君子如成王者從而承之以其能持盈守成也則曰太平之君子以其能冝民冝人也則又曰假樂君子以其能求賢用吉士也則又曰豈弟君子夫何修而有是譽也哉蓋曰有是實則有是譽隨之矣夫以成王之所謂是實者何也曰持盈守成也曰冝民冝人也曰求賢用吉士也以六五之象所謂幹父用譽承以德也上九不事王侯髙尚其事象曰不事王侯志可則也九以剛明之才處蠱之終事之外也故此爻獨不以蠱言而曰不事王侯髙尚其事夫古之人固有功成身退知足不辱而處事之外者亦有懷才抱德不偶於時而處事之外者亦有潔介自守無意於斯世而處事之外者是三槩者其志各不同而其不事王侯髙尚其事則一也功成身退知足不辱而處事之外者若伊尹所謂臣無以寵利居成功是也懷才抱德不偶於時而處事之外者若孟子所謂我無官守言責進退有餘裕是也介潔自守而無意於斯世而處事之外者若齊國羊裘男子不屑於諫議而老死於富春者是也然則象之所謂志可則也其將奚則歟曰伊周孔孟之道時中之道也則之可也富春之道時中乎則之過也昔范文正公嘗以此爻子冨春矣而曰不事王侯髙尚其事先生以之又曰先生之風山髙水長而君子之論則曰子之可也則之過也兊下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也臨有二義以爻之剛柔言之則以浸長之剛而臨乎浸消之柔以位之上下言之則以在上之位而臨夫在下者序卦曰臨者大也此指浸長之剛以臨夫柔而言也六五曰大君之宜此指在上之位而臨夫下而言也以剛臨柔消長之序然也故君子不可以不知天以上臨下統屬之道然也君子不可以不知人知天知人則知盡人以事天而臨之義得矣故夫卦之所以為臨者以二陽剛浸長於下位也故曰剛浸而長其在爻則初九九二是也浸漸也一氣不頓進故一陽而為復而後二陽而為臨也夫陽剛之長也有漸而不暴則以和恱不忤為德而羣隂順之亦不相拒違也故曰説而順其在卦則兊説而坤順是也兊之性既説而二之剛又中此剛之所以不暴也以剛中之德而上應乎柔中之主則可以贊成有臨之治矣故曰剛中而應此又在爻則九二之於六五是也夫循天理之自然而無容偽之謂正天之道固難名也然可以一言盡者曰正是也剛之浸而長也説而無不順也剛之中而有所應也此所謂循天理之自然而無容偽之謂也臨之所以能大亨者以是故也故卦之德曰元亨利貞而彖釋之曰大亨以正天之道也不知大亨以正為天之道而或以人偽參焉則剛之長也必以有漸不暴之為非愜吾意欲人之已順也而已乃不能先以順剛而每過乎中也則反咎乎人之不我應嗚呼如此而欲大亨可乎夫以二陽浸長未遽消也而易為君子謀則又慮之深而防之早故於方長之日也而豫以警之曰至於八月有凶蓋陽生於復長於臨隂生於姤長於遁遁者臨之反也其在月建則自子至未凡八月而二隂長君子之道實於此時而消焉故曰有凶夫隂陽相為消長循環而不窮蓋亦理之固然也而易於此必預以警之者無他也於其方長之時而告之以將消之理則庶乎其知所戒也故曰消不久也朱翊善曰臨在復泰之中方長而誡之不俟乎極也故堯舜禹三聖人相戒必於臨民之初過此而無及也象曰澤上有地臨君子以教思無窮容保民無疆澤上有地地臨澤也地臨乎澤非徒臨之也而以容而保之也夫地臨乎澤乃所以容保乎澤則澤有所恃無流離放溢之虞而有泮渙瀜洄之適矣此澤所以鍾莫説之性也君子之於民也亦然非徒臨之也乃所以容而保之使之恃夫我以有得居有漸濡之益而心有理義之説也夫漸濡之益理義之説其氣味深長不可遽已也此所謂無窮之教也教而不思有所謂無窮之味焉則人易厭矣此非所可説也然無窮也又生於無疆容保之道不能有是無疆則教亦不能有是無窮也無窮澤之不竭也無疆地之博厚也君子之漸濡夫民也如澤之不竭焉故曰教思無窮君子之容保乎民也如地之博厚焉故曰容保民無疆然則無窮之與無疆其亦相為長久也歟此臨之要學也初九咸臨貞吉象曰咸臨貞吉志行正也初九九二當剛浸而長之時皆以陽而應隂自內而感外所謂以剛而臨柔者也故均謂之咸臨咸感也隂陽之氣相感而相應故也初九當君子道長之初所居者正位所行者正道而所與相感而相應者又皆履正之人當此之時行正莫吉焉故曰貞吉蓋四與初居相應之地皆以正相與而其勢又足以援初故初之志得以行其正於此時也九二咸臨吉無不利象曰咸臨吉無不利未順命也臨之為卦在此一爻也夫九二之在臨剛德之長也剛於此時而浸長之勢方駸駸焉然剛雖浸長也比之衆隂其勢未敵九二以方長之剛而臨衆隂衆隂未遽順命也當是時也為二之計則奈何曰亦如初九之於六四以咸臨之可也以咸臨之則咸感之道無所不通故六五吾應也還以柔中而應乎我六三吾同體也説極知憂而不忌嫌乎我上六與吾雖非應也又非吾同體也亦必有在內之志而順乎我矣如是則九二之咸為臨也施之於吾應而吉施之於非吾應而亦無不利施之於吾同體而吉施之於非吾同體而亦無不利又何未順命之云乎六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也六三兊之主也以隂柔之才媚説之性下臨二剛徒以媚説乎同體為事而巳非所冝也故曰甘臨無攸利夫二剛之長雖曰以漸然剛上變已特旦暮事爾徒事媚説彼二剛者豈以其媚説之故而已其長邪其不見受必矣剛不受媚説則三之技必窮故説極而憂生焉雖然剛上變已此三之憂也小人之棄而君子之歸其所獲又大矣豈不能補其前愆邪故曰既憂之無咎象曰咎不長也則剛上變已特旦暮事爾此易開小人遷善之門而速之入也六四至臨無咎象曰至臨無咎位當也六四坤體也其曰至臨則坤之所謂至哉之至也夫臨以上臨下之謂也隂之下體剛浸而長則以剛臨柔至四則釋下體而以上臨下也雖然其所以臨下亦未大有所隔絶也其與下體至相親故也故曰至臨以言上下二體莫親於此也夫四以六居之其與初正相應之地也初九之剛其所以浸長而為二也四與有力焉蓋以謙虛無我而援乎下使下之剛得以浸而長則在四寧有過歟故易於此以無咎與之象曰位當也則以六居四之謂也或曰六四正也不曰位正當也而曰位當也何也曰當臨之時大亨以正大者之事也故不以正豫隂也六五知臨大君之冝吉象曰大君之冝行中之謂也五君位也在臨則所謂君臨也然當剛長之時未至於剛而亦不純乎柔柔而履剛而又居中剛柔之得中也夫當臨之時以剛柔之中而臨乎下所謂知柔知剛者也故曰知臨六五居君臨之位凡所謂柔與剛者皆屬乎有德之下故曰大君臨以剛陽為大至五亦曰大君云者謂其以上臨下而居大寶之位故也當是時也處此位也純以柔臨之則不可欲以剛臨之則時勢之所未至故其所冝者莫冝乎剛柔之得中也夫惟居剛而用柔則在下之剛陽其情有以上通吾不忌其長也而從而應之則有臨下之治不勞而成矣是能居中以有臨而又以剛柔之中而行之也臯陶之稱舜曰帝德罔愆臨下以簡御衆以寬何謂舜罔愆之德亦曰剛柔之中而行之之謂也然則所謂簡與寬云者居剛而用柔之道也故在舜則曰罔愆而在六五則曰冝又曰行中之謂也上六敦臨吉無咎象曰敦臨之吉志在內也經曰安土敦乎仁故能愛上六坤之極也敦厚之德則亦莫極乎此也以此為臨夫豈有一毫嫌嫉介乎其心哉想其樂道從善之誠雖隔宇宙異古今而有向慕之志曽不少減也而况同是臨之時乎夫臨之剛浸而長初九九二實在內也而上六之志則有向慕而無拂逆此非敦厚其德無有忌嫉而能至是乎故易於此以吉豫之猶之曰上六無忌嫉之心而有敦厚之德此吉德之君子也夫舜有天下選於衆舉臯陶湯有天下選於衆舉伊尹臯伊之進曽何預於孔門之子夏也而樊遲見夫子而問智猶不達其舉直錯枉之義而復有問於子夏子夏乃援臯伊而語之此所謂隔宇宙異古今而向慕之誠曽不少減也而況上六之於九二同是臨之時乎其曰志在內也冝矣坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣昔者嘗與先友阮齡元膚議易元膚曰觀之卦名音官邪官渙反邪子曰如王輔嗣朱子發所釋皆云觀盥而不薦則音官也如胡益之程正叔則取為觀於下之義則官渙反也以陸德明釋文考之於觀之卦名則曰官渙反是也又曰觀盥而不薦風行地上觀與注家釋六二所謂處大觀之時不能大觀廣鑒亦音官又曰王肅亦以大觀在上為音官徐本云中正以觀天下惟此一字作官渙反夫易中發卦之辭其義例亦有二而已矣如泰如隨如豫之類則於立卦立名之後方舉其義曰小往大來曰利建侯行師曰元亨利貞如履虎尾如否之匪人如同人于野之類則就卦名而設義不復有所間斷也觀盥而不薦亦此例也所謂觀盥而不觀薦是也夫事神之禮亦豈有盥而不薦之理第觀盥而不觀薦猶夫子所謂禘自既灌而往者吾不欲觀之意也蓋取其精誠之至在誠而不在物故也故嘗謂觀盥而不觀薦之義為長元膚曰子之言然夫觀之為卦二陽在上而下為四隂之所觀然上九又居一卦之外則所謂大觀在上居中而履正者惟九五也觀天觀民觀我無所不用其觀焉此所謂大觀也故先儒有廣鑒之義其視初之童觀二之窺觀夫豈相千萬而已哉此指九五一爻以言觀也順而巽則合坤巽二體以取義也中正以觀天下此又言九五之德足以觀示天下而然也徐本云惟此一字作官渙反是也夫萬物有自然之理大觀在上豈能違是乎亦不過順萬物之自然而巽以行之云爾莊周曰聖人觀於天而不助則順而巽云者不助之謂也夫惟不助故無偏無陂無反無側以此道而建極於上使凡厥庶民皆惟皇作極而後已此所謂中正以觀天下也夫宗廟之禮所以致敬也散齋七日致齋三日祭之初迎尸入廟天子洗手而後酌酒獻尸尸得酒灌地而祭以求神三獻而薦腥五獻而薦熟則盥者洗手之時而未灌之初也其精誠之至其在此時可知矣觀盥者當此之時有得於其所謂精誠之至則其孚誠亦有見於顒然而觀感之際矣此以誠感誠之道也豈有得之觀感而不化其誠矣乎若至於薦也則三獻五獻禮文繁數雖強有力者亦不能無倦惰之容此夫子所謂吾不欲觀也然則下之觀上也在誠而不在物其為道豈不甚簡而不煩矣天下之所觀者聖人也而聖人之所觀者天也聖人何取於天哉以其不言之教見於四時之自行而無有差忒此所謂神道也神即誠也體於心而謂之誠妙於物則謂之神一物也聖人之設教於人舍天何觀焉其能使下觀而化則不言之教寓於始盥之時此所謂神道也其曰天下服者非服聖人也服夫神也或曰昔者夫子嘗欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉夫何言之教其在聖門如子貢者猶有所未悟今而曰聖人以神道設教而天下服何也曰服有二有知而服之者有不知而服之者民日遷善而不知為之者此不知而服之者也如七十子之服孔子也此知而服之者也子貢曰子如不言小子何述焉此一子貢也又曰夫子之言性與天道不可得而聞也此又一子貢也象曰風行地上觀先王以省方觀民設教風行地上披拂鼓舞無所不暨有遊歷周覽之義故為觀之象夫省方之禮所以觀民也觀民則教之所由設也其在虞舜之時則當嗣位之初歲二月東巡守至於岱宗五月南巡守至於南嶽八月西巡守至于西嶽十有一月朔巡守至于北嶽各覲其方之后協其時日同其器數修其禮物自此以往則五載一巡守羣后四朝其在周官則六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大明黜陟夫先王省方之禮非固為是煩擾也以謂不如是則無以觀覽夫民俗而施設其教條也孟子曰昔者齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放於琅琊吾何修而可以比於先王觀也晏子對曰善哉問也天子適諸侯曰巡守巡守者巡所守也諸侯朝於天子曰述職述職者述所職也無非事者春省耕而補不足秋省斂而助不給夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度夫由晏子之言則先王之觀亦不過曰省耕省斂以為補助之政云爾故曰為諸侯度此觀民設教之大旨也其在後世則不然故流連荒亡如秦皇之出遊漢武之行幸徒為是煩擾而無補於海內之萬一矣故曰為諸侯憂其視先王觀民設教之意不亦逺乎初六童觀小人無咎君子吝象曰初六童觀小人道也當觀之時大觀在上以中正之德為天下之所觀初逺於五在六爻之下而以隂眇之才居之則童然識見之無取也故曰童觀夫童然識見之無取則小人之道也無責焉爾矣故曰小人無咎若君子而然也則可少矣故曰君子吝以言當大觀在上之時不可以無所觀也六二窺觀利女貞象曰窺觀女貞亦可醜也六二以隂柔之才居坤之正位其與九五正相應之地也然以隂柔暗弱之才上觀九五未必能盡見之也故曰窺觀如所謂窺豹之一班是也夫女子之貞蓋不務乎外觀也家人曰無攸遂在中饋詩曰無非無儀惟酒食是議此女子之貞也蓋知有內事而不知是外觀故也故曰窺觀利女貞若夫當觀之時處大臣之位而與九五居相應之地不能盡見剛中正大之道而以女子之貞為貞則是長孫無忌輩之事太宗也昔唐太宗嘗謂無忌等曰朕欲自聞其失公等冝直言無隱無忌等曰陛下無失他日又問無忌等曰人苦不自知其過卿等可為朕明言之無忌等又曰陛下武功文德臣等將順之不暇又何過之可言夫居大臣之位當觀之時其他無所見也而務以女子之貞為貞焉陋哉斯見也故曰窺觀女貞亦可醜也六三觀我生進退象曰觀我生進退未失道也我生云者吾身之動作施為者所謂自內而達諸外者是也六三當觀之時處下卦之上則進也處上卦之下則又退也處進退之兩間則冝誰從曰進退者時也可以進者可以退者我也反觀吾之動作施為者如何而後決其進退可也何也以六居三吾之所謂自內而達諸外者未能深滿吾意故也何也不正故也夫六三容有未能深滿吾意者而能觀我生以決其進退何也曰三坤順之極也處坤順之極故能以至順之性順時以進退也夫惟能順時以進退此所以未失乎進退之道也六四觀國之光利用賔于王象曰觀國之光尚賔也觀以逺為晦以近為明故觀之衆隂上觀諸五惟四為最近焉惟其最近而且體巽以居正得君之深者也以五之所以顯設而藻飾者在四無不歷歷而親見之故曰觀國之光當是時也若不以賔于王為利昧於觀者也程曰古者有賢德之人則人君賔禮之故士之仕進於王朝則謂之賔尚志尚也當此之時其所志尚以賔于王為利故象曰觀國之光尚賔也昔湯之三聘伊尹也尹乃幡然而改曰豈若吾身親見之哉謂與樂堯舜之道於異世不若吾身親見堯舜之君之為樂也則六四之觀國之光是也孟子曰湯之於伊尹學焉而後臣之故不勞而王則尹也得君如此向使其初無幡然之志而不以賔于王為利焉此豈尹之所觀也歟九五觀我生君子無咎象曰觀我生觀民也書之周誥曰古人有言曰人無于水監當于民監今惟殷墜厥命我其可不大監撫于時書之所謂大監即九五之大觀也夫監之水則徒見其形監之民則凡吾身之動作施為其見諸民者歷歷可覆矣故一嚬一笑係人情之休戚一舉一措為天下之安危人情之休天下之安則是吾之所以出乎身加乎民者得其道也人情之戚天下之危則是吾之所以出乎身加乎民者失其道也中庸曰君子之道本諸身徴諸庶民然當觀之時大觀在上可不觀諸民以察已乎此九五之觀我生必于其民而觀之也王輔嗣所謂觀民之俗以察已道是也君子無咎者夫堯舜率天下以仁而民從之桀紂率天下以暴而民從之當觀之時堯舜在上則君子之化行桀紂在上則君子之化息故當此之時人君之動作施為行於上而效於下者必君子而後無咎不然則人心一訛民俗一壞不可復理矣能無咎乎九五中正以觀天下君子之在上也故曰君子無咎然必云爾者警之也上九觀其生君子無咎象曰觀其生志未平也觀以二陽在上而下為衆隂之所觀九五居中履正故為觀之主上九以聖人之德處一卦之外而當觀民之極其將何所取義乎曰以聖人之德處一卦之外而當觀民之極此所謂省方觀民之聖人也夫古者以人情之未叶民俗之未一而民隱之未究也故其志亦為之未平而有省方巡狩之禮所以協其時日正其器數修其禮物又如晏子所謂省耕省斂而救其所謂補助之政凡以一民俗求民瘼而協民情也此之謂其生謂天下人之動作施為者而周覽洞究其利害休戚者而為之興去也及後世則不然巡行遊幸止為逰觀之象而流連荒亡勞動騷擾寃苦失職者無告而萬乘千騎所至徒有供億之苦此無他知有一身之樂而不知以萬民為憂故也庸免天下萬世之議乎故處觀其生之任亦必君子而後無咎何者君子之志不以一身為樂而以萬民為憂故也使其以一身為樂則無有所謂未平之志者矣童溪易傳卷十
