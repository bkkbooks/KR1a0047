body:
  text: 童溪易傳卷三宋王宗傳撰坤上坤下坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉程河南曰坤元亨利牝馬之貞利字不連牝馬為義如云利牝馬之貞則坤只有三德大抵四德具乃謂之乾德配乾乃謂之坤坤云四德同於乾而貞體則或異者乾以剛固為貞坤則柔順而已故有取於牝馬之貞蓋牝馬柔順故能承順乎人坤以柔順故能承順乎天夫乾為馬以其健於行也若乾行而坤止則無以共成其化育之功矣故坤亦取諸馬而又取其牝馬者以謂不牝則不順非馬則不能往應於乾相為無窮故也夫坤以柔順為貞故能往應於乾君子之進為於世也夫豈專恃吾有能行之才歟必也待人君命焉而後承駕焉而後騁以務合坤之德而已故繼之以君子有攸往謂其以承順為行則無干時冒上之愆而有所往也先迷謂其行也隂或先陽則迷謬而失正後得主利謂陽倡而隂從之則得主而利也得主猶曰得君也為坤之主也誰乎曰乾也坤得乾以為主有順利而無迷謬非能自後寧至是乎上六其道窮也先迷也六三或從王事無成有終後得主利也自西至南隂位也而坤位西南之維故曰得朋謂其類皆隂也得其朋類相與以贊成生育之功也自北至東陽方也而東北之維艮實位焉此萬物成終成始之地也隂之類於此絶矣故曰喪朋然乾元於此資始則坤元以資生應之未有乾行而坤止也故生育之功又肇於此焉則雖喪也乃所以為得也故彖有乃終有慶之説大抵坤之為德以後順為貴得朋以贊成生育之功後順也喪朋以往應於乾而肇生育之功亦後順也此之謂得主而利也故終之曰安貞吉謂牝馬之貞坤之貞也安於此而不變則無先陽之迷故吉也彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆乾稱父坤稱母父道尚尊尊故大母道尚親親故至此大與至之别也故曰大哉乾元至哉坤元萬物資始於乾而有氣則資生於坤而有形乾動而坤隨乾授而坤受是故乾始而坤生順而承之不敢違也故曰乃順承天乾元之既始乎物也其功用未已也又有以資而育之雲行雨施是也則坤元之於物也亦豈特生之而已哉又有以宅其生而使之輯寧泮涣自適自遂而後已是故坤厚載物宅其生也含𢎞光大則又輯寧泮渙其生也此乾坤功用之不窮也夫其所積不厚則其所載者無力舉天下之物吾所生也又吾所載也此豈無力者能之乎故曰坤厚載物以謂不如是則其德不能配天矣無疆天之無疆也德合無疆地之無疆也以此無疆合彼無疆非厚能致然邪含𢎞光大以言其德之無疆也夫萬物盡生於我而或有流離迫促之態而不能自適自遂焉則其責又在我矣故坤之為德也必有以容之使不流有以舒之使不迫容之使不流輯寧其生也所謂含𢎞也舒之使不迫泮渙其生也所謂光大也含𢎞德之器也光大德之化也凡此皆無疆之謂也萬物於此雖欲不自適自遂得乎故曰品物咸亨取諸牝馬者以其地類也地隂德也故牝馬其類也牝馬柔順而亦健於行則能往應於乾故曰行地無疆謂之行地無疆則無疆之德地固有焉此所以德合無疆也夫牝馬之行地無疆也以其柔而利貞也君子之有行也舍是其可乎故柔順利貞君子攸行亦猶乾之文言釋元亨利貞又繼之以君子行此四德者易之取象明義凡以為君子設故也先何為而迷邪以其失坤順之道也牝雞之晨密雲不雨此先迷也後何為而順邪以其得坤道之常也君倡臣和男行女隨此後順也得常所謂得主而利也西南得朋以君子言之仕進之初也初貴引類故泰之初有拔茅之征與類行也東北喪朋得君之終也終貴道行故大畜之上有何天之衢亨終有慶也朱子發曰得君者臣之慶得親者子之慶得夫者婦之慶夫不有其功常久而不已者貞也坤以柔順為貞安於貞而不變此地道所以為無窮也故曰安貞之吉應地無疆君子之有行亦務合於坤德安於貞而已夫天有是無疆也而坤以厚德合之故為地之無疆地有是無疆也而君子以安貞之吉應之則又為君子之無疆矣象曰地勢坤君子以厚德載物天其運乎故乾之象以天行言地其處乎故坤之象以地勢言行則貴其不息勢則貴其所積之厚而不輸爾載也子思子曰地以一撮土之多及其廣大載華嶽而不重振河海而不泄蓋言所積之厚然也夫德之在我我所固有君子固無以異於人也然語其任天下之重者則類非狷薄者之所能勝也是必積纍之素見於平日之所養而後能然爾鼎之九四鼎折足覆公餗夫子曰德薄而位尊知小而謀大力小而任重鮮不及矣德非厚德故也初六履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也乾之初九一陽在下其曰潛龍勿用者懼其傷也坤之初六一隂在下其曰履霜堅冰至者防其長也懼其傷愛之也防其長忌之也夫隂陽天地之道消長往來為晝夜為寒暑為古今一息不停也聖人何容心於其間而有所愛有所忌也哉張橫渠曰易為君子謀不為小人謀惟易為君子謀也故陽君子道也則必委曲愛護惟恐其或傷也惟易不為小人謀也故隂小人道也則思杜其漸防其微惟恐其遂長也夫涓涓不遏將成江河毫末不去將尋斧柯隂氣始凝霜也凝而不已則其至堅冰也必矣此無他馴致之故也惟見微慮早之君子知天下有所謂必至之理故謹其辨於履霜之初則馴致之禍亦或幾乎熄矣鄭莊公之寵弟不用祭仲蔓草之諫而待其自斃遂至於同氣交兵子母相失噫此無他昧履霜早辨之戒也六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也坤六爻惟二為盡地道何者以順德居正位順之至也故循理而行無所容偽直也隆殺厚薄各當夫物方也直方故大大則能配天矣此坤德之自然也夫天下之理本諸自然者則其功順成初無所待不習無不利也六二之動直以方也以承天而時行見之行其所無事六二之直也時措之宜六二之方也夫習而後利者有之矣然其利有限也六二直方之德根諸所性乾動而坤隨德與天合豈有所限之利哉此地道之所以光也光者六二之所不可掩者所謂大也程河南曰不習謂自然在坤道則莫之為而為也在聖人則從容中道或曰乾之二五以同德相應坤之二五亦同德也何以無相應之義曰程河南曰二坤之主故不取五應不以君道處五也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也邵康節曰陽知其始而亨其成隂效其法而終其勞夫效其法而終其勞坤之六三是也三陽也而明於內六隂也而晦於外含章也六三非正也居下位之尊當靜晦之時而有含章之智亦可謂之貞矣然含章不發非不發也發於從事之間而若未嘗發焉爾故繼之曰或從王事而象曰以時發也曰時云者義所當為吾必為之但含晦其美不敢居其成功也然則不知含章不可謂正含章不以時而發可謂之正乎亦不可也無成有終謂不敢居其成功惟後順以終其勞爾夫時晦而晦非不盡忠也時發而發非好從事也故晦而不發非智也發而不晦亦非智也智也者晦其所發發而必晦之謂也故贊之曰智光大也古之人所以無智名勇功者以此後世君子身處髙位以含晦為心則或至於拱默無營以強聒為事則或至於矜伐而取忌由六三言之何暗如之六四括囊無咎無譽象曰括囊無咎愼不害也乾九四曰乾道乃革則坤六四亦坤道乃革之時也以周正考之建酉之月革秋而為冬則六四是也當是時也隂氣既凝萬物歸根小人道盛而君子不利故曰括囊括囊謹密以遠害也知所以遠害則寵辱不至故曰無咎無譽韓退之所謂刀鋸不加車服不維是也蘇東坡曰咎與譽人所不能免也出乎咎必入乎譽脫乎譽必麗乎咎咎所以致罪譽所以致疑也甚矣無咎無譽之難也然當是時也譽亦所以致疑則譽亦咎也故象曰括囊無咎謹不害也太元以馴準坤而次六有曰囊夫括珍寶泄此則不知謹密而致害也六五黃裳元吉象曰黃裳元吉文在中也易中以六居五蓋半矣莫非君也在泰在大有之類則為謙順之君在離在未濟之類則為文明之君在豫在恆之類則為暗弱之君惟坤也五雖君位坤實臣道故不取君義但微婉其辭而致之意曰黃裳元吉夫黃中色也裳下飾也惟中也故通逹為臣之理而不可失惟下也故謹守為臣之分而不可踰如此則中有所養外無所越吉孰大焉程河南曰黃裳既元吉則居尊為天下大凶可知又曰在坤則隂居尊位隂者臣道也婦道也臣居尊位羿莾是也婦居尊位女媧武氏是也非常之變不可言也故有黃裳元吉之戒而不盡言也文在中也謂積至美所養既厚則能謹守其分六三六五皆隂外而陽內故三曰含章五曰文在中也上六龍戰于野其血玄黃象曰龍戰于野其道窮也隂道馴致於初至五而盛矣至上則其道不得不窮蓋六隂極於亥至子而一陽來上六亥也乾位亥前正隂陽交戰之地故説卦曰戰乎乾以言隂陽勝負之機實決於此時也夫隂小人之道不可以過盛而與陽敵故於六隂之極而稱龍焉存陽道也存陽道者存君子也在剝之上五隂既盛一陽雖存凛凛乎其危也而上九侈言之曰碩果不食又曰君子得輿以言天道不可以一日而無陽天下不可以一日而無君子故邵康節曰夫易聖人長君子消小人之道也及其長也闢之於未然及其消也闔之於已然一消一長一闔一闢渾然無迹非天下之至神其孰能與於此上六在一卦之外隂既失所而陽未正其位故曰戰于野當是時也以強弱較之隂既盛而陽猶微以時勢論之陽當信而隂已屈俱不能無傷故曰其血玄黃用六利永貞象曰用六永貞以大終也乾之用九用得其當則吉用不得其當則凶惟坤亦然故用六之利在於永貞而已永貞謂久其貞也彖以安貞為吉則用六以永貞為利可知也夫坤之德所以能配天者以其久於其貞也貞則大大則能配天矣故曰用六永貞以大終也或曰二之直方三之含章四之括囊五之黃裳是皆善用夫六者謂之永貞可也隂道馴致於初而窮於上得為永貞矣乎曰隂與陽循環無端不有所始則不有所終不有所終則亦不有所始易之道然也惟君子見微而慮遠於履霜則知堅冰之必至於龍戰則識隂道之已窮亦如乾之勿用於初而不可以久於上也夫是之謂永貞文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行乾之文言首釋元亨利貞之四德甚詳且明也至於末章乾元者始而亨也以下之文則間引釋彖數語而參錯之今坤之文言其於四德則疑若未始釋之也亦間用釋彖文義而兼足之其文莫適為先後與乾文言末章大略相似聖人文章體制變化不一如此蓋不如是則不謂之文言故也然即坤至柔而動也剛至靜而德方二語以觀之則坤之四德亦昭然而默存矣夫至柔至靜則坤元所謂至哉也其動也剛則亨與利在其中矣所謂德方則其正也天下之理不至其至則變通宰制之權不屬諸我至柔至靜此坤之所以至其至也柔至而動剛靜至而德方亦其理之必至也惟其動剛故能德應乎乾而成萬物化育之功惟其德方故能不拂乎正而順萬物性命之理此坤之德所以能配天也後得主而有常則申後順得常之義含萬物而化光則申含𢎞光大品物咸亨之義聖人贊坤至此間用釋彖文義而兼足之莫適為先後也豈固為是異同邪申之者確之也積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也善人之於善也力其所積而不必其所可必小人之於不善也亦然聖人之於善人也原其所積而必其所可必其於不善人也亦然蓋君子之心知盡其在我者而已故不以小善為無益而弗為及其積也不已則報效也亦不已小人之心知任其在我者而已故不以小惡為無傷而弗去及其積也不已則其報效也亦不已此必至之理易者進君子而退小人之具故陽為善而隂為惡陽為君而隂為臣坤之初六一隂始凝象取履霜謂不善之積實基於此時也苟不於此時辨其萌芽去其漸長則凡天下所謂弒文與君之大惡無所不至矣此必至之餘殃也原其所以然亦以積小而大由微而著事勢之順成也故曰蓋言順也朱子發曰先儒常以乾坤論之謂君子之道有時而消於是有坤化陽滅者矣然而復出為震者餘慶之不亡也小人之道有時而消於是有陽息隂盡者矣然而姤極生巽者餘殃猶在也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也直者何正是也方者何義是也夫循理而行無所容偽之謂正直也者正而無偽也隆殺厚薄各當夫物之謂義方也者義之所當然也君子敬以直內則所謂正而無偽者存諸我矣如是則內有所主雖一毫人欲不能入吾舍心正而意誠也義以方外則所謂義所當然者當夫物矣如是則外得其宜雖起居出入未踰吾間國治而天下平也夫學力不至則內外間斷君子之學合內外之謂也主敬以直吾內則敬立矣行義以方吾外則義立矣敬義既立則物我無異而天下歸仁矣此德之所以不孤也不孤所謂大也知有內而不知有外知主敬而不知行義非不孤之德也君子之德大而不孤則性與用一物也用與性一源也所謂行其所無事而不失乎時措之宜者雖屬之我而不知所以然而然也如是則行之事物之際殆如履吾室中庸何纎芥之疑乎或問既曰直其正也不曰正以直內而曰敬以直內何也曰正云者有靜意也敬云者有活意也六二正也欲發明六二之動故又曰敬而正在其中矣隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也坤之六二以順德而處正位六爻所謂盡地之道者莫二若也故曰地道光也而三之無成有終亦曰地道何哉曰地道以處下得中為正三下卦之成也聖人懼其以成功自居故為之戒云而以臣道妻道兼言之所以示戒也詳矣三之章五之文文言釋之或曰有美或曰美在其中文與章皆美物也隂雖有美含之以從王事非有美而不發也發之於從事之間而若未嘗發云爾夫發之於從事之間而若未嘗發非不發其美也不暴其美故也有美焉而不暴則吾知惟王事之從而已爾吾知代天之功以終其勞而已爾所謂成功吾何有焉此六二之智所以光大也晉武之平吳也王濬每進見陳其功伐之勞王通謂曰卿功則美矣然卿所以居美者未盡善也濬曰何謂也通曰卿旋斾之日角巾私第口不言平吳之事若有問者輒曰聖主之德羣帥之力老夫何力之有焉如斯顔子之不伐龔遂之雅對何以過之噫此坤六二光大之智也濬何足以語此天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也六二六四皆以柔處柔順之至也然二則居下履正盡坤之道而四則坤道乃革之時視二為失位也夫以至順之德處失位之地當是時也何不用吾順乎曰順乎時而已矣故曰天地閉賢人隱然必先之以天地變化草木蕃者以言天地變化草木亦蕃而況於賢人乎天地閉塞賢人亦隱而況於草木乎互文以見義也雖然後世之隱有二槩有避咎而隱者有好名而隱者避咎而隱者志於無咎而反有譽好名而隱者恥於無譽而反有咎谷口鄭子真耕於巖穴之下而名振於京師此志於無咎而反有譽所謂避咎之隱者也梁鴻作五噫之歌而時君惡之此恥於無譽而反有咎所謂好名之隱者也然則六四爻贊既曰括囊無咎謹不害也於此又曰括囊無咎無譽蓋言謹也豈不為好名者設邪君子黃中通理正位居體美在其中而惕於四支發於事業美之至也君臣上下固有不易之理亦有不易之位中無所養而於理不通者則雖冒昧竊位而有隕越之禍不顧也況欲身安道隆功著名顯其可得乎惟夫所養之至富貴利欲不足以動其心故雖躡髙顯係衆望曽無欣艷於其間若詩人所謂公孫碩膚赤舄几几是也夫黃中美在其中也德美存其中則為臣之理豈有不通曉者乎於理既通則能正為臣之位而不失居下之體矣凡此皆美在其中而然也存諸中者既不可誣則形諸外者亦不可掩故其生色也暢於四肢無非粹然盛德之容其成務也發於事業無非犂然當於人心者此非所飬之至詎至是邪故又終之曰美之至也盡乎此者求之古人則周公其人也隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃天下之理不可以有所極也有所極則有虧苟有所極而曽無所虧之處則不可常矣故隂陽之相推相蕩而相與為無窮也知道者未嘗不曰此理之固然也而聖人特假是以為隱惡揚善進君子退小人之説焉則其所寄之旨亦微矣張橫渠曰及其消也闔之於已然謂隂也夫坤之上六之隂陽不疑其軋已也則必不至於戰至於戰者陽之不得已也亦隂之不肯已也不肯已者與其不得已者駢然而作敵焉此亦理勢之所必至也而聖人則曰天道不可一日而無陽天下不可一日而無君子故稱龍於盛隂之時者存陽道也當此之時不可以無陽故也夫苟無陽此聖人之所嫌也張橫渠曰及其長也闢之於未然則稱龍於此時之謂也大抵易於嫌疑之地聖人必深致其意焉乾之九四言或躍在淵而不稱龍者為其嫌於近五也坤之上六言龍戰于野而必稱龍者為其嫌於無陽也然九四之或自疑也上六之疑陽疑之也自疑自省也人疑之則不知自省矣此君子小人之辨也繫辭曰方以類聚乾曰各從其類謂隂陽各有其類也今也隂陽紛爭雌雄未決均不免於或傷故曰猶未離其類也故稱血焉又曰夫玄黃者天地之雜也天玄而地黃若已離其類而無雜揉之傷則陽道反正而無事矣此光武勇於大敵之後所以投戈而息馬也童溪易傳卷三
