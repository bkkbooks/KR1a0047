body:
  text: 童溪易傳卷一宋王宗傳撰發題易果何物邪聞諸夫子曰生生之謂易又曰易無體又曰其為道也屢遷又曰危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也蓋嘗即是數語而兼味之夫天下有生生不窮之理隨在隨有無所間斷在天地則為變化在事物則為消息在生民則為日用在聖賢則為德業在君子小人則為進退在晝夜則為晦明在古今則為往來新故之迭更也是理也相軋相推有當有否而吉凶以生聖人憫斯人之流轉於吉凶之域而莫知所避所就也故告之以無危不平無易不傾之説而曰此物理之固然者而莫之廢也人能終始以致其懼則無咎矣然則易之為易其大旨可知矣程河南曰易變易也隨時變易以從道也殆謂是歟乾下乾上乾元亨利貞程河南曰乾坤古無二字作易特立此二字以明難明之道竊原易之始作也則亦本諸一竒一耦而已矣天下之理有動必有靜有剛必有柔有屈必有伸有消必有長蓋亦未有無對待而能不窮者故曰一隂一陽之謂道聖人得其説據依之以為易故一竒一耦立而隂陽興隂陽興而動靜剛柔屈伸消長之理在是矣然一竒未足以為天下之至健而必三焉一耦未足以為天下之至順而亦三焉而後乾坤之材備乾坤之材備則凡出乎其中者自此而不窮矣是故乾坤相索而六子以生八卦相重而萬物之變已盡易始乾坤父母萬物之義也夫乾坤健順之理散在萬物亦不特為天地而已也而語天下之物所謂至健至順者則天地是也天惟至健故其行不息地惟至順故其德配天此聖人之於乾坤必推本天地而言焉元亨利貞至健之目也夫萬物以陽熙以隂凝元與亨其德陽也利與貞其德隂也絪緼以始之草昧而已此元也至亨以極其高大則草斯文昧斯明陽德之成也肅殺以終之揫斂而已此利也至貞以正其性命則揫斯息斂斯藏隂德之成也元而亨出之序也亨而利利而貞入之序也出而入入而出循環不窮迭為四序此乾所以為天下之至健也朱子發曰乾具此四德故為諸卦之首程明道曰一德不具不足謂之乾欲知聖人一言足以盡夫乾曰元亨利貞是矣初九濳龍勿用八卦始作三材之道具於三畫兼三材而兩之又六畫而成卦經曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義是也此乾所以有在天在田在人之别五稱在天則知上為天之表故曰貴而無位三稱君子則知四為人之表故曰中不在人田地之表也而二稱之則知初之濳又為地之下矣自初至上奇耦相間其位也所謂分隂分陽是矣九與六或剛或柔其爻也所謂迭用剛柔是矣九與六何以明爻經曰乾之䇿二百一十有六坤之䇿百四十有四夫乾爻六一爻之䇿三十有六四九之積也故乾用九坤爻六一爻之策二十有四四六之積也故坤用六此大衍之法所以定隂陽之數也然則乾用九坤用六是亦不得不用九用六也而諸儒紛紛之説皆過也九陽之純初位之下也純陽天德也在下位不可以有為也初九之在乾也德非不足也位不足也故有濳龍之象程河南曰理無形也必假象以明義龍之為物其奮也其蟄也隨乎時而已矣又天類也其神不測而其功足以利澤萬物故以象乾道之變化陽氣之消長其在人則聖人之進退也時乎潛也則當蓄用以待用夫苟強聒以求用非知時者也故曰勿用九二見龍在田利見大人五陽位也而居上卦之中故為君之正位二隂位也而居下卦之中故為臣之正位聖人之於天道乾之六爻皆聖人也而二以天德居之聖人之為人臣者也田地之表也耕稼之區也斯人所資以生殖也施澤不至則斯人失所資矣見龍在田則陽氣播於地上以長育萬物聖人見於有道之世以施澤萬民也二與五俱稱大人者以同德處相應之地程河南曰臣利見大德之君以行其道君亦利見大德之臣以共成其功天下利見大德之人以被其澤是也乃若他爻則德非不同也位不同也九三君子終日乾乾夕惕若厲無咎安其危則必危危其危則無危此易之道也九三處下卦之上重剛而不中可謂危矣然間乎二乾之間往來皆乾是能盡乾乾之道也故曰君子終日乾乾然其所以乾乾者何事也惕然以危厲自警云爾故又曰夕惕若夕亦終日也凡人之情未有不謹於朝而弛於夕君子不以隱顯二其心其視屋漏暗室無以異於十目十手之嚴也況日之夕而輒改其度乎夫惟居常以危厲自警則雖處危地而無危矣故曰無咎咎過也經曰無咎者善補過也九三之重剛不中此在易所謂過也唯乾乾以自警則其過可無也經曰懼以終始其要無咎九三有焉三下卦之終也故乾之三則曰終日坤之三則曰有終九四或躍在淵無咎躍陽之性也淵隂之所也九四以陽居隂陽動而隂靜動靜之無常也故稱或或者疑辭也九四何疑乎亦曰重剛而不中云爾夫三以重剛不中而惕乃能無咎則四以重剛而不中而或亦獲免咎固其所也然雖躍矣躍而不脫於淵則吾之位分固未嘗或離也此文言謂其非為邪非離羣而爻謂其無咎九五飛龍在天利見大人九五以天德居天位聖人之得志莫盛於斯也故曰飛龍在天夫龍之潛於初見於二雖屈伸之不同然皆非其所也必也在乎天而後稱焉蘇東坡曰飛者龍之正行也天者龍之正處也則九五聖人之位可知矣當是時也臣之於君君之於臣民之於上各相利見此二五所以獨稱利見大人上九亢龍有悔易以中為貴以不中為戒諸卦皆然況純剛之乾乎三與四重剛而不中故惕與或乃能無咎上九六陽已極一隂將生又非特不中而已也故曰亢龍有悔亢極也有過則有悔事而至於有悔則無及矣惟聖人知進退存亡而不失其正則不至於有悔焉此前儒所以引堯老舜攝之事而證之乾之六爻皆聖人也宜無亢極之悔而上九云爾者以明危者使平易者使傾之理而示萬世帝王之戒也用九見羣龍無首吉九天德也天之德剛健是也夫剛健之德用得其當則吉用不得其當則凶傳曰天為剛德猶不干時乾之六爻自初至上皆九也用得其當則時濳則濳時見則見時躍則躍時飛則飛以至時行則與之偕行時極則與之偕極而無干時之愆是之謂善用夫剛者故曰見羣龍無首吉羣龍即諸陽爻是也無首謂時然則然各循乎天而無干時之愆也程河南曰乾之動無不時也又曰以剛為天下先凶之道也然非用九則六爻無首之吉何自而見之不特此爾易上下二篇凡一百九十二陽爻皆用九實自乾來也凡一百九十二隂爻皆用六實自坤來也用有當否而吉凶從之矣彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧王輔嗣曰彖者統論一卦之體經曰智者觀其彖辭則思過半矣即乾以推他卦則元亨利貞之類乃具體而微之彖辭也得吾夫子而後其義浸顯故釋彖之文通謂之彖大哉乾元萬物資始乃統天此釋元也夫莫衆於萬物而所資以始者誰乎乾之元也乾以元德為萬物之所資始而無一物之或吾捨焉則其大可知矣故以大哉贊之天者萬物之祖也然萬物之所以祖天者非祖天也祖元也天恃元故能祖物則元之大益可知矣故曰乃統天雲行雨施品物流形此釋亨也謂乾既以元德始萬物而亨德繼之也夫始萬物者乾無也生萬物者坤元也然使乾元知始物而已而生物之職則一付之坤吾無與焉則萬物既生之後亦未有能遂其生者矣故夫雲行雨施乾元之餘用也乾元有餘用故始物者我也育物者亦我也物得所育則遂其生矣品物流形則向之有始者今焉各有品目流動遷改得以極其高大也大明終始六位時成時乘六龍以御天此又即卦之初終與爻之用九以推明元亨之用也夫卦之初終乃天道之終始則見卦之六位各以時成而不紊故時濳則濳時見則見時躍則躍時飛則飛以至三之與時偕行上之與時偕極無非因時循理之謂也乘此六爻之時以當天運則乾元用九之道得矣故曰以御天也乾道變化各正性命保合大和乃利貞此釋利與貞也夫萬物由資始以至於流形而天道之運行見於發育者舉無愆忒如此則變化之妙自有不知所以然而然者凡蒙生育者孰不各全其天哉故自資始流形之後性有剛柔緩急之不齊命有長短大小之或異莫不各得其正不虧其全是之謂各正性命保合大和也保合大和謂絪緼之氣所以始萬物者至此而不散離也程河南曰天地之道常久而不已者保合大和也乃利貞者謂性命之既正大和之不虧所以利且貞也首出庶物萬國咸寧此二語所以結一彖之文也説卦曰乾為首以其尊無與敵也故曰首出庶物又曰乾為君以其命無不聽也故曰萬國咸寧乾具是四德而萬物莫不服之也謂聖人之體乾也以德化為元氣而萬民資此以生養以膏澤為雲雨而萬民自我以生殖對時育物而無干時之愆存神過化而有妙物之道以民躋仁壽俗入陶甄則其首出庶物萬國咸寧殆與天同尊矣象曰天行健君子以自強不息道外無器器外無道故經曰易者像也又曰彖者言乎其象也彖之所言者卦之象也彖所未言者又於大象盡之六爻之贊亦曰象易無非象故也程河南曰至微者理也至著者象也體用一源隱顯無間天乾之象也健乾之義也夫周天三百六十五度有竒一日行一度一時周一方一嵗遍八極終則有始其行不息如此其健也夫孰使之然哉自然而然也自然誠也誠者天之道也君子之為君子何容心哉亦天而已矣故曰自強不息以言自強則不息也猶之曰至誠無息堯兢兢日行其道舜業業日致其孝自強也周公戒成王以無逸伊尹勉太甲以日新非自強也有以使之也雖然安而行之利而行之勉強而行之及其成功一也又烏知人之非天歟潛龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也此爻贊也古文易以此爻贊連於象文諸卦皆然不獨乾也漢儒鄭康成之徒散爻贊於逐卦爻下獨此乾卦存古文也後人遂有大象小象之説龍變化物也其所以濳而勿用者以陽德之在下位故也故夫時乎出濳離隱則雖欲勿用得乎此見龍在田德施所以不得不普也然二德之施所以普者亦恃有五也若非應五則吾獨善之不暇如普何三與四在卦所謂中爻也中爻人道也終日乾乾或躍在淵求免乎人道之患而已矣故二爻俱有無咎之辭三在下卦之上有止義故曰反復道也以言往來皆乾造次必於是也四在上卦之下有進義故曰進無咎也以言吾之位分未嘗敢離於此而進夫何咎也飛龍在天而曰大人造也造之一辭有以見聖人之功用與天同焉天何容心哉聖人亦何容心哉不識不知順帝之則而已矣故造之一辭見聖人之功用即天也而德施之普即付之二焉夫中正之位五是也而猶不已則亢而滿矣故盈不可久也天下之理所可久者中也猶之注水於器也中則正滿則覆此物之固然者有人焉而曰吾弗顧其覆也而注之不已焉此可久邪上九之亢蓋酌水於器而不已而弗顧其覆之謂也故爻謂之有悔而夫子謂之不可久也用九時中之謂也時濳則濳時見則見時躍則躍時飛則飛三則與時偕行上則與時偕極昧夫此者非有不及時之失則有先時之過不及時狷者之為也先時狂者之為也凡易之道於狷者則吝之於狂者則戒其有悔不知有悔則凶矣故亢龍有悔則曰盈不可久也用九則曰天德不可為首也不可之一辭以言乾之六爻皆聖人也宜無不知時之失特詳緩其辭以善其戒所以待聖人者厚矣童溪易傳卷一
