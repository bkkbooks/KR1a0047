body:
  text: 童溪易傳卷十二宋王宗傳撰震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎復之初九即剝之上九也經曰往者屈也來者伸也剝之上九雖居五隂之上其勢往而屈也此一陽之窮也復之初九雖居五隂之下其勢來而伸也此一陽之亨也故曰復亨剛反云者謂是剛也自剝之上反而為復之初此復之所以亨也動而順行則又合坤震二體以明復之所以亨也夫震動而坤順剛既來反則陽動於下以順而行於上自此以往無非順理而動也夫如是則剛反為復陽降而入剛動以時陽升而出其出也其入也羣隂莫之能害故曰出入無疾夫復之一陽出入乎羣隂之中而羣隂莫之能害則其以朋類漸進而來又何咎乎程曰所謂咎者在陽氣則為差忒在君子則為抑塞夫一陽始生至微也固未能勝乎羣隂以發生萬物也必待諸陽之來然後能成生物之功一君子始進未盛也亦未能勝乎羣小人以利澤天下也必待衆君子之進然後能成澤民之功此一陽之復既出入而無疾則其朋類之來自無咎矣夫隂生於午其卦為姤姤陽之始消於隂也凡厯七變而後成復則隂陽消長之道反復迭至凡七日焉天之運行如是也故曰反復其道七日來復天行也一陽既復則君子道長實自此始也故自復而往為臨為泰為大壯以至為乾孰禦之哉故曰利有攸往剛長也夫一陽始長而天地發用之機實發於此時故萬物之生布在天地者皆天地發用之功也而發用之機則實係於復之一陽此所謂天地之心也故曰復其見天地之心乎程曰一陽復於下乃天地生物之心也先儒皆以靜為見天地之心蓋不知動之端乃天地之心非知道者孰能識之象曰雷在地中復先王以至日閉關商旅不行后不省方天地有無窮之用曰動與靜是也人皆知動也者天地之用也而不知靜也者乃所以養其動也夫當動而動動而不括此豈偶然而然也哉蓋有以養其動故爾雷在地中陽氣復於不動之地非不動也安靜以養之將以致不窮之用云爾先王順天之道故當至日一陽之始生也亦務安靜以養其動焉夫關也者所以時其出入也於至日而閉關焉則使旅商不行人君不巡省四方者凡以靜吾之動而仰順乎天道也初九不逺復無祇悔元吉象曰不逺之復以修身也陽君子之道也復反善之義也九以陽剛居復之初復之最先者也故曰不逺復謂其失也不逺而能復也王輔嗣所謂比復好先是也祇大也元亦大也夫有過則有悔初九之不逺復非無過也有不善未嘗不知知之未嘗復行所謂不二過也故雖不免於有悔而無大悔矣夫既無大悔則其為吉也斯大矣蓋大吉之與大悔此二物也不可以相有故也夫聖人無復故於其身若無事於修不逺之復則所以修其身之不善者以復於善爾然其失者不逺而復焉此顔子之學也故夫子以此爻豫之而贊之曰顔氏之子其殆庶幾乎六二休復吉象曰休復之吉以下仁也休止也六二震體震動也以六居二不動而止者也夫二之不動而止者何也曰知所止而止焉故也夫二何為而知所止也曰初九之君子修身居下而二比之此正六二之所冝親焉故也故六二當復之時以下仁為吉而謂之休復焉語曰泛愛衆而親仁初九之君子所謂克已復禮為仁之人也而六二之於初九親而下之可謂知所止而止焉者也求之孔門則曽子之於顔子是也觀其嘗有言曰以能問於不能以多問於寡有若無實若虛昔者吾友嘗從事於斯矣噫若曽子非能下仁其能知斯人而友之乎六三頻復厲無咎象曰頻復之厲義無咎也孟子曰人恆過然後能改困於心衡於慮而後作復至六三再三之復也所謂恆過而能改也故曰頻復頻復之厲所謂困於心衡於慮而後作也故曰無咎夫易之道在於知變聖人之於人不咎其有過也而咎其不能改過蓋所以開小人遷善之門也故六三之頻復不咎其恆過也而豫其頻復雖然頻復未足豫也必也知以危厲自警則雖頻而咎可無也不然復雖頻矣而復頻失咎何時而可無邪夫茍如此則失復善之義矣六四中行獨復象曰中行獨復以從道也復之六四即剝之六三也方其為剝也六三處五隂之中失上下以應上及其為復也六四行乎五隂之中獨復以應初此二爻者知賢識善如此其可以隂柔少之乎又可不謂之賢矣乎故嘗謂君子之在天下無所往而不可貴也方衆隂之剝陽也上九以一陽處一卦之外疑若失位也而六三能失上下以應之故曰剝之無咎及剝之來復也初九以一陽處一卦之下疑若尚微也六二近而比之而曰下仁六四逺而應之而曰從道誠以道之所在可從而不可違也如此然則初九固賢也而六二之下之六四之從之可不謂之賢矣乎夫六四一爻逺應初九其在後世則揚子雲所謂晞顔之人也六五敦復無悔象曰敦復無悔中以自考也博厚者地之德也五體坤德而得尊位大中當復之時逺於剛陽之應躬自厚者也故曰敦復夫以自厚為德則求其在已者而巳矣其與所謂下仁從道者又異矣蓋下仁從道之復資諸人者也而敦復之復則資諸已者也夫資諸已以為復而能自厚其德則無失之可指矣故曰無悔又不特無大悔而已也何也未嘗過乎中故也考稽也動稽諸中而未嘗過乎中焉非躬自厚者而能之乎故曰敦復無悔中以自考也曰自考云者以明敦復之復非資諸人而然也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也在復之上而以隂柔之才居之隂則暗而無睹柔則懦而無從故於復則為迷也夫曰迷云者失道之謂也在上而失道則無適而非凶矣何謂無適而非凶曰有天之災有已之眚用之行師則終有大敗用於其國則為君之凶以至於十年之久終不能有所征往也凡此皆凶之目也夫復則合道今也於復而迷焉則與道相反矣烏得而不凶邪故曰迷復之凶反君道也上六在復之上而迷故易於此極言凡為君而在上者之道至此而有所反也其所以示後世在上者之戒也可謂詳且明矣震下乾上無妄元亨利貞其匪正有眚不利有攸往彖曰無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉無妄合乾震以成卦乾天也震動也其動以天之謂也夫其動也以天動靜語默無非天理而人為無與焉此之所謂無妄也蓋天下有自然之理純乎天而巳矣天理所在不可以一毫私意妄加於其間者所謂正也故在理則為正在人則為性在天則為命一也剛自外來而為主於內謂初九也初九之剛乾一索於坤而得之是以為震而無妄之外體又乾也則初九之剛實自乾來故曰剛自外來震以初爻為主其在無妄則內體也故曰為主於內夫以九居初正也為主於內也得其正則無妄之大本立矣動而健謂震乾之用也剛中而應謂五之於二也夫無妄之本既立於內則由是而動動而不窮矣故健也茍無其本此妄也欲動而健得乎以九居五剛而中也九五以剛中在上而六二以柔中應之二五各得其正此又無妄之大體也故曰大亨以正夫所謂無妄者正而巳矣初九以是正立無妄之大本九五六二以是正成無妄之大體則當無妄之時致天下於無妄其為亨也不亦大乎此卦之德所以有曰元亨利貞也天命即天理循天之理不以一毫人偽參焉則理之所在天命之所在也故大亨以正天之命也何也曰天道之與天命亦非二物也其在臨也則言剛柔消長之理故曰天道無妄則言其動以天而人為不與焉故曰天命其匪正有眚不利有攸往者夫初九九五六二正也正則能大亨六三上九不正也不正則妄矣故有眚災也六三所謂無妄之災上九所謂窮之災也是也夫以正而往則亦何往而不利故初九云往吉六二云利有攸往茍匪正焉則當無妄之世何所往而利哉故曰有眚又曰不利又曰天命不祐甚哉匪正之為害也然則正之所在而天之祐常向焉而君子則曰此非天之我祐也吾自祐也象曰天下雷行物與無妄先王以茂對時育萬物雷之為物也其發聲也其收聲也必以其時故語物之行乎天下而無妄者惟雷足以當之萬物之生固有所謂自然之天因其自然之天而感發之者雷也故雷行於天下未嘗妄發而物之洪纎髙下隨其賦豫而能各全其天者實自雷發之故曰物與無妄以言天之發育萬物也以天而物亦因是而全其天也先王之於萬物也亦豈能紊其自然之天矣乎對無妄之時育無妄之物而已矣蓋天有是時吾非能先後之也對而循之云爾物有是生吾非能加損之也育而成之云爾夫是之謂無妄茂盛也朱子發曰不茂不足以育物不對則妄矣如春毋麛毋卵夏毋伐大木之類初九無妄往吉象曰無妄之往得志也初九震之主也初以震動之才而動於下在無妄之時而吉於往者何也以九居初正也正則不妄矣夫以正而動則無適而非正故曰無妄往吉而象曰無妄之往得志也河南曰誠之於物無不能動以之修身則身正以之治事則事理以之臨人則人化無所往而不得其志也六二不耕穫不災畬則利有攸往象曰不耕穫未富也以六居二柔而靜者也靜則無事然六二實震體也震動也又能動而有行焉靜而無事故有不耕穫不災畬之象動而有行故又曰利有攸往謂以無事為行故也夫耕穫災畬雖有始終先後之異然均為治田者之事六二靜而無事故曰不耕穫不災畬猶之曰不耕不穫不災不畬俱未始有事也然屬震體而與九五居相應之地所謂以正相與者也以正相與則當無妄之時而盡無妄之用矣故曰利有攸往夫隂以得陽為富知以無事自處而不知以正而往應於五此豈六二之欲富乎是必有攸往而後利也故象曰不耕穫未富也若六二者其能以無事而為行也歟夫惟以無事為行此無妄之尤者也六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也無妄之卦德曰元亨利貞其匪正有眚六三以不正據六二正人之上而阻二五中正之應此妄人也故在無妄之時冝其有災也故曰無妄之災牛者具隂順之性六二以順為正者也而上應九五牛之象也六三居前而阻之或繫之牛也行人之得謂六二也邑人之災謂六三也二利有攸往故曰行人三居前而阻二故曰邑人然六二得順道而行無往而不利此得牛之象也六三以不正徒自取災爾由是觀之則禍福得喪之理蓋亦無甚難明也特在正與不正之間爾九四可貞無咎象曰可貞無咎固有之也易以隂居隂以陽居陽則謂之正如初九六二九五是也以隂居陽以陽居隂則謂之不正如六三九四上九是也然與其以隂居陽寧以陽居隂而剛柔小大之猶有其敘也則無妄之九四是也故可貞無咎猶之曰此非正也僅可為正而已不猶愈於六三矣乎夫正者人之性也人之性或至於失其正而妄者非性之罪也不能有是正之過也今也於正而未至於失而猶有所謂可正云者則亦知有是正而存之矣蓋是正也非外鑠我者也我固有之也因其固有而不失之此易之所豫也故曰可貞無咎而象曰固有之也若四者其亦不失其正性也歟九五無妄之疾勿藥有喜象曰無妄之藥不可試也嘗聞聖人之治天下也刑罰不可妄施於人兵師不可妄加於下國刑罰而妄施於人則為失刑兵師而妄加於下國則為失師當無妄之世蓋亦處之以無妄而已矣夫茍不能自克已私而人欲以勝則天下生靈之禍自此始矣此無妄於九五而有無妄之疾勿藥有喜之戒也夫以九居五正也正則不妄彖所謂剛中而應大亨以正者謂九五也容有不知此乎曰以商之髙宗史謂有德可髙者也而傅説猶有惟甲胄起戎惟干戈省厥躬之戒又況後世好大喜功之主如漢武帝唐太宗代不乏人也乎蓋有是疾而後試之以是藥則藥不為妄無是疾而試之以是藥則妄矣武帝蓋嘗試是藥於胸奴矣太宗嘗試是藥於髙麗矣皆無疾而藥而反以致憊者也欲有喜得乎其曰勿藥曰不可試云者蓋所以深著後世為君者之戒也上九無妄行有眚無攸利象曰無妄之行窮之災也上九以剛過之才處無妄之極已既失正又欲進而不知止所謂其匪正有眚不利有攸往者也故曰無妄行有眚無攸利夫以正而往則其往也必利初九六二是也已既失正居上窮之地猶不知止其能免災乎故無妄之世若上九者妄之極者也曰眚曰災眚即災也先儒謂在人曰眚在天曰災固有是説也今觀上九之爻贊以災釋眚則知災即眚也眚即災也天即人也人即天也乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也大畜所畜之大也夫所畜之大者何也曰於已則畜德於人則畜賢也故夫剛健篤實輝光日新其德此畜德也剛上而尚賢能止健此畜賢也然畜德也者畜賢之本也畜賢也者畜德之效也夫苟已無是德則賢不我慕望望然去之矣吾能彼畜乎此大畜之彖其言畜德畜賢固自有次第也剛健篤實輝光日新此合乾艮之用以明人君之畜德也夫剛健乾也篤實艮也輝光日新乾艮相得而不窮之用所由生也乾不得艮則徒健而已矣艮不得乾則徒止而已矣夫惟剛健篤實兩者相與為用而輝光日新自此而不窮矣此人君之畜德然也剛上而尚賢能止健此則指上九之爻又合艮乾之用以明人君之畜賢也夫上九以剛而在一卦之上此人君尚賢之象也乾健之物也而處乎艮之下受止而不辭所謂能止健也天下之人所謂賢而有德者人君則尚之尚之者尊之也所謂健而有才者人君則止之止之者使之不吾舍也非有以畜之而然歟此人君之畜賢然也大畜之卦德曰大畜利貞至彖則推原卦德之所以然而以畜德畜賢而兼釋之從而蔽之曰大正也者蓋言人君之畜德也而至於輝光日新其畜賢也而至於尚賢而止健此非所畜之大而得其正詎能至是乎故曰大正也此大畜利貞之本旨也不家食吉養賢也此乂言畜賢之義夫人君之所尚者則謂之賢而所止者則謂之健合而言之皆賢者也蓋德之賢於人者謂之賢而才之賢於人者亦謂之賢故也今夫賢者之不家食而吉者非謂居天位食天祿一身之吉也天下之吉也天下之吉係於養賢則挾天下之人才而與之共濟何所適而不可故繼之曰利涉大川夫賢者之進退天意之從違也挾天下之人才而與之共濟則天意之所在可知矣故曰應乎天也六五之君謙虛無我以下賢乾之九二居相應之地故有應乎天之説夫天髙而在上也今也六五下應九二亦謂之應乎天以明天之理無乎不在也為人君者不必求之天可也求之賢者則賢者即天也噫此大畜之實也象曰天在山中大畜君子以多識前言往行以畜其德天下之物所謂最大者天也今也在山之中此其藴畜之大可知也夫前言往行耳目之所不接也君子於耳目之所不接者則多而識之考其迹以觀其用察其言以求其心而古人之所以為古人者皆在我矣夫德固有我也然我心之所同然者古人先得之即其所先得者而以畜成吾德則其所畜不亦大矣乎故曰性無內外也道無古今也初九有厲利已象曰有厲利已不犯災也大畜之為卦也艮止也而在上乾健也而在下彖所謂止健也初九當乾健之始而六四以隂止之陽方上進而見止於隂隂陽相持而其勢危矣故曰有厲雖然上下之勢不敵固也而又當止畜之時其可不知所止乎故其利在於巳而不進也夫惟利於巳而不進則不犯災危矣此所以示在下者輕進之戒也九二輿説輹象曰輿説輹中無尤也小畜之九三見畜於六四而曰輿説輹四説其輹也大畜之九二受畜於六五亦曰輿説輹自説其輹也夫説人之輹與自説其輹語其勢之逆順蓋有間矣何者九三剛過而九二則剛得中故也剛而得中則進止無失夫何尤乎程河南曰初與二剛健而不足以進四與五隂柔而能止時之盛衰勢之強弱學易者所冝深識朱子發曰初剛正也二剛中也四五柔也柔能畜剛剛知其不可犯而安之時也夫氣雄九軍者或屈於賔贊之儀才力蓋世者或聽於委裘之命故曰大畜時也九三良馬逐利艱貞日間輿衛利有攸往象曰利有攸往上合志也在他卦則初九之於六四九二之於六五為正應在大畜則以正應為相止畜在他卦則九三之於上九為敵應在大畜則以敵應為同志而同於上進不復有相止之義也夫惟九三上九不復有相止之義也故三以剛健之才往而上進以與上合志而有良馬逐之象焉逐追也乾為良馬上九在上三以剛健之才從下而追之良馬逐也雖然九三之馬固良矣然其如剛過何故以利艱貞戒之蓋九三正也所謂馬之良也茍不於過剛之是戒而惟良之是恃焉則泛軼之患不可謂無也夫戒之以利艱貞何説也曰間輿衛是也是輿也方其在九二也嘗説其輹而不進矣非不進也其所以為不亟進者乃所以為九三之進也則居此地者可不即前日既説之輿間而衛之以致其戒乎夫如是則利有攸往矣此其所以與上合志也六四童牛之牿元吉象曰六四元吉有喜也夫四與五能以柔畜剛者由其自畜之道素施故也夫不能自畜安能畜人四之所以自畜之道何也曰以六居四順之至也夫惟順之至也故有牛象艮為少男故又曰童牛當止畜之時故又有童牛之牿之象夫童犢始角而加之牿焉則制其抵觸之性於其未發之時此自畜之道素施也惟能自畜斯能畜人矣故曰元吉元始也大也在他卦之爻則元吉云者或為大吉在此卦六四則元吉云者猶之曰吉自此始云爾夫惟吉自此始則始能自畜終能畜人故有喜也六五豶豕之牙吉象曰六五之吉有慶也五之所以自畜之道何也曰以六居五體柔而御剛也夫惟體柔而御剛故有豶豕之牙之象夫豕之不能自巳其剛躁之性則必以是牙為物之害也當止畜之時若強制其牙則用力愈勞安能已其剛躁之性邪惟豶去其勢則牙雖存剛躁自已人君之自畜如此所以吉也夫豕之有牙其剛在內豶去其勢則雖有剛利之具而不自用矣此以六居五之象也艮為黔喙之屬故取象於豕人君處天下之利勢生殺豫奪其權固非輕也若不能謙虛無我去其勢而不恃焉則已且不能自制其能勝億兆欲利之心乎故必去其勢若豶豕然則雖有是牙不為物害矣故象曰六五之吉有慶也有慶之視有喜則有小大之異何者其位異故也書之吕刑云惟敬五刑以成三德一人有慶兆民賴之夫穆王言刑而及於德而曰此一人之有慶而兆民之所賴也則六五之豶豕去其勢而馴其牙之效也易家曰攻其特而去之曰豶上九何天之衢亨象曰何天之衢道大行也彖曰剛上而尚賢則上九是也九以陽德而居五之上為五所尚故能以身任天下羣才之責而尸大畜之功此所以有何天之衢之象天衢通顯之地也下之三陽由已上進故九三曰良馬逐又曰利有攸往又曰上合志也此賢者之道所以亨也故曰道大行也何如何校之何釋文曰梁武帝讀音賀是也言以身任天下羣才之責當畜賢之時為五所尚主張賢路賢者之得志莫盛於斯也童溪易傳卷十二
