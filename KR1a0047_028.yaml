body:
  text: 童溪易傳卷二十八宋王宗傳撰繫辭上聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭初六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之爲物薄而用可重也慎斯術也以徃其无所失矣勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也不出户庭无咎子曰亂之所生也則言語以爲階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致宼至盜之招也嗚呼予學易至此章乃知聖人憂世之心如此其深且至也何也不有其所有而盡以其所有者發之於易故也夫聖人之所有者安在乎曰此性之所見者是也此性之所見而伊尹之所謂先覺也有是先覺故以覺後覺爲已任此聖人憂世之心也然則見天下之賾見天下之動聖人之先覺其在兹乎故易象與爻由是而立焉然則聖人區區於立象與爻何也曰爲天下後世之言動設也使天下後世言无過言行无妄動即是象與爻而有得焉此則聖人作易之本心也夫事物之理寓於幽微深遠之地者天下之賾也兆於紛錯雜揉之地者天下之動也聖人皆有以見之明若觀火故三竒之乾以天而形容之三耦之坤以地而形容之以至震雷巽風之𩔖其所以形容之者莫不各當其所擬而凡物之宜然者如馬如牛如龍如雞之𩔖各得其所取之象易之有象其是之謂歟㑹逢其適而於時爲通若乾之九二出潛離隱則爲天下文明之時若觀之六四觀國尚賔則爲利用賔于王之時凡此之𩔖聖人洞觀其然而典禮於以行焉所謂典禮者時然而然不失乎天之所秩天之所叙者云爾聖人又慮夫人之昧夫此也而繫之辭焉而曰如此則吉反此則凶分别剖斷明以告之易之有爻其是之謂歟夫象之所言者天下之至賾也如言田獲三狐載鬼一車之𩔖近於恢詭譎怪宜若可惡也而聖人之意則於此乎盡故不可惡爻之所言者天下之至動也如言上下无常變動不居之𩔖而其相推相易宜若可亂矣而吉凶之理則於此而斷故不可亂張横渠曰易語天地隂陽情僞至隱賾而不可惡也諸子馳騁説辭窮高極幽而知德者厭其言故言爲非艱使君子樂取之爲貴蘓東坡曰剛柔相交上下相錯而六爻進退於其間其進退屈仲不可必也而順之則吉逆之則凶此可必也故至變之中有常守焉不可亂也擬之而後言擬是象而言也象物象也擬是而言則言有物矣議之而後動議是爻而動也吉凶趨避之理已斷於爻議是而動則動惟厥時矣言有物而動惟時則語黙動靜皆中於道此則擬議之功也其成變化乎何有蓋變化者易也易也者天也吾之言動有契於易是乃契於天也故曰擬議以成變化然則予前之所謂聖人作易立象與爻爲天下後世言動設也其是之謂乎吾夫子既述古人立象與爻之意遂舉易中七爻以實其説故中孚九二同人九五則述君子之言動大過初六謙之九三則述君子之謙謹乾上九之亢反乎謙者也則申文言之辭以警之節初九能以謹密而无咎也又設其不能謹之辭以戒之至解六三小人之不知謙謹而肆爲暴慢者也故聖人直語之曰作易者其知盜乎无非爲天下後世之言動設也夫君子修身於幽隱之間而其應也見於千里之遠其幾甚微其應甚博此所以不可不致其謹也故聖人以居其室出其言善與不善以示其戒然曰言而繼之以行者蓋言行者表裏之符也故後文有曰不出户庭无咎而曰亂之所生也則言語以爲階信乎言也者其行之表歟樞機之爲物也其所繫甚微也然而一發則昏明中否隨之故曰榮辱之主也孟子曰不誠未有能動者也又曰至誠而不動者未之有也吾之言行一无可愧而誠之所格寧有遠邇上下之閒乎此所以能動天地也夫言行至於動天地此所謂擬議以成變化者也夫所謂君子之道出處語黙是也同人六二居柔守靜於下而有或處或黙之象九五體陽履剛於上有或出或語之象宜若不同矣然中直之誠得於同人之先此所謂二人同心也故能斷去九三九四之二剛而終之以相遇焉故曰其利斷金夫言者心之聲也心之同則言亦必同矣故其臭味相感无上下遠近之閒故又曰同心之言其臭如蘭此爻所以有後笑之説大過初六當剛過之世一柔在下而无忤於物可謂能自謹也故有藉用白茅之象猶之置器於地既安且平則亦可已矣又藉之以茅焉其无咎也固宜故曰謹之至也謂其當大過之時而能過於謹也夫天下之物以其微薄也而棄之則所謂物之貴重者亦安所資蓋貴者以賤爲本故也故曰茅之爲物薄而用可重也又曰謹斯術也以徃其无所失矣然則謹而勿失初六有焉夫大過初六則過於謹故曰謹之至也謙之九三則過於厚故亦曰厚之至也且伐其勞德其功此豈胷中之有所蓄者然邪苟无所蓄則獧薄甚矣若夫謙厚之君子則不然吾雖有勞若未始有勞也吾功雖成若未始成功也非能降已以下人者未易至此故聖人推明其内之所蓄則曰德言乎其盛矣又詳觀其外之所形則曰禮言乎其恭矣夫謙之九三處人下之上有成功之勞或不能致其謙恭以守此高位安能𫉬有終之吉乎惟能過於謙厚此聖人深予之也知聖人深予乎謙之九三則知聖人深戒乎乾之上九可知也何也亢者謙之反也九三致恭存位而上九則貴而无位九三萬民服也而上九則髙而无民九三能以功下人而上九則賢人在下位而无輔此九三所以謙而有終而上九所以亢而有悔也言語階亂從古而然故曰言者行之表也當節之初不出户庭則非特身不出也言亦不出也夫言不出則其宻也可謂謹矣苟失此戒則君焉必至於失臣臣焉必至於失身幾事必至於害成此謹節之道必當於其初而致之意焉是故前文所以有樞機之諭也易之作也亦豈直爲知盜而設邪特曰謙謹既失則有暴慢之行而不免於盜之見侵也故解之六三上慢下暴則爲盜之招聖人所謂知盜者如此而已矣孟子曰禍福无不自已求之者解之六三所謂自求其禍也夫三在人下之上高位也六以隂很處之非所宜據也故爻有負且乘致冦至之説而繫辭以小人謚之原其所以然者非他也有暴慢而无謙謹故爾夫藏之慢也是爲誨盗容之冶也是爲誨淫誨之者招之也然則人之言動其可不致其謹乎此聖人之作易必欲天下後世擬象而言議爻而動者蓋慮其失或至於此也予故曰聖人作易立象與爻爲天下後世之言動設也噫人之言動其可不致其謹乎大衍之數五十其用四十有九分而爲二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後掛天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸𩔖而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐神矣易有自然之理斯有自然之數是理也一定而不易故是數也竒則爲竒耦則爲耦亦一定而不易是理也相因以爲用故是數也竒以耦成耦以竒成亦相因以爲用是理也運行而不窮故是數也始則有終終則有始亦運行而不窮然則數生於理理寓於數數之所生理之所在也故易於此取天地之數以爲大衍之數焉所謂天地之數者一三五七九此天數五也積而二十有五二四六八十此地數五也積而爲三十合二十有五與三十是爲五十有五聖人曰是五十有五數也運之於天地萬物之間固足以成變化而行鬼神也然本此數以作易則容有齟齬而不合者故即天地之數而去其五以爲大衍之數焉然去之者非其去之也數始於一備於五小衍之而爲十両其五也大衍之而爲五十十其五也則五者在其中矣王輔嗣曰衍天地之數所頼者五十也是也然數有體有用一者數之體也體則不動四十有九者用也用則見於分二掛一揲四歸竒之際輔嗣又曰其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之太極也是也是數也則於其揲蓍焉見之揲蓍之法以四十九蓍分之左右手而爲二分而爲二之後乃於左手中取一蓍掛於小指既掛一矣先以左手之蓍四四而揲之歸其所揲之餘而扐之復以右手之蓍四四而揲之亦歸其所揲之餘而扐之再扐之後復掛一焉故三揲而一爻成十八揲而六爻成凡爻之或陽或隂皆以所揲之餘或多或少者而爲候故初揲之餘者不五則九再揲三揲之餘者不四則八四五爲少八九爲多三少爲老陽三多爲老隂二多一少爲少陽二少一多爲少隂老陽九也老隂六也少陽七也少隂八也設若於此四十有九之數加一減一皆不成揲此大衍五十之數所以必用四十有九也然揲蓍之法必曰象兩象三象時象閏者以言聖人立法未嘗不循夫天理之自然而非僞爲云爾故易之作以隂陽爲宗曰象兩云者以言象隂陽二氣之分也曰象三云者以言二氣之分有隂有陽必有隂陽之中故也曰象四時云者以言二氣既分中者爲春秋極者爲冬夏故也曰象閏云者以言積四時以成歳更三歳而爲閏閏也者生於日月合朔周天不盡之氣故以歸竒之數象之然置閏之法十九嵗七閏凡三嵗閏者一五嵗閏者二故大率五嵗再閏又以再扐而象之莊周氏曰易以導隂陽亦是意歟夫大衍之數既本於天地之數故復以天地之數繼之天數五地數五以言天地之數竒耦之分也五位相得而各有合又言天地之數竒耦之合也張横渠曰一三相間是相得也各有合以相對合也如一六二七三八四九也太元亦曰一六爲水二七爲火三八爲木四九爲金五十爲土天數二十有五五其五也地數三十六其五也此亦分而言之也凡天地之數五十有五此又合而言之也天地之數不離乎五十有五故二氣之有盈有虚四時之或生或殺萬物之出機入機皆本諸此此變化由是數而成也所謂行鬼神者如月令所謂孟春之月其帝少昊其神勾芒之𩔖是也是故或執規司春或執衡司夏或執矩司秋或執權司冬此鬼神由是數而行也程河南曰易説鬼神便是造化也又曰變化言功鬼神言用揲蓍之法得五與四是爲老陽其爲策數一爻三十有六四九之積也故爲乾之䇿得九與八是爲老隂其爲䇿數一爻二十有四四六之積也故爲坤之䇿以六爻計之乾爻六一爻三十有六䇿則二百一十有六者三十有六而六之也坤爻六一爻二十有四䇿則百四十有四者二十有四而六之也以乾坤六爻之策而計之故曰凡三百有六十三百有六十之策與期之日適相當焉故曰當期之日以上下二篇之策而計之凡爻本諸乾而稱九者一百九十有二本諸坤而稱六者亦一百九十有二夫陽爻一其策三十有六以三十有六乘一百九十有一則得六千九百一十有二策隂爻一其策二十有四以二十有四乘一百九十有二則得四千六百單八策二篇緫筭則得萬有一千五百二十䇿矣夫數自一積而爲十十積而爲百百積而爲千千積而爲萬自然之理也與萬物之數適相當焉故曰當萬物之數也於象両象三象時象閏則謂之象於當期之日當萬物之數則謂之當言各有㫖也營者求也用蓍之法以四而揲之成易之數以四而求之是故老陽數九四而求之其策三十有六老隂數六四而求之其策二十有四至於少陽數七亦四而求之其策二十有八少隂數八亦四而求之其數三十有二隂陽老少六爻之本也故曰四營而成易若夫乾坤之策三百有六十而二篇之策萬有一千五百二十亦以四而求之故乾陽爻六六九五十有四四而求之則二百一十有六坤隂爻六六六三十有六四而求之則百四十有四以乾之五十有四合坤之三十有六爲九十焉亦四而求之則三百有六十而二篇之策陽爻一百九十有二其數一千七百二十有八隂爻一百九十有二其數一千一百五十有二總而言之二千八百八十亦四而求之則萬有一千五百二十也凡此皆求之以四而得之此易之書所以成於四營也謂之十有八變而成卦則三變而一爻成積而至於十有八變而卦成可知也夫易始於八卦方其八卦之未重也屯蒙師訟之𩔖隱然而未形當是時也易之大業未底於悉備故曰小成及夫引而伸之重而爲六十有四故觸乎其𩔖而長之近取諸身遠取諸物凡天地之内百物不廢而治心修身齊家理國之道隨取而足聖人所以垂法立教者亦於此乎盡謂之天下能事畢矣信乎其畢矣故夫顯道神德行此易之能事也而其爲效也見於酬酢而祐神夫神之不顯者道也今而曰顯道則所謂闡幽也顯而不神者德行也今而曰神德行則所謂微顯也易之爲易也在顯亦秘在微亦彰此其用之爲妙也惟其如是故即其顯者而言之有應對事物之功未嘗不暸然而明故曰可與酧酢即其神者言之有助成神化之妙未嘗不窅然而幽故曰可與祐神嗚呼孰謂夫聖人本天地之數以作易其功用一至於是乎子曰知變化之道者其知神之所爲乎易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有爲也將有行也問焉而以言其受命也如響无有遠近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易无思也无爲也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也前章言易寓於數此章言聖人之道寓於易所謂易者變化是也所謂變化者神之所爲也特患人不之知爾欲知易之神捨變化之道何由而知之故曰知變化之道者其知神之所爲乎辭也變也象也占也此四者易之變化也苟知此道則神之所爲舉可知矣聖人之道亦不外是故曰易有聖人之道四焉夫是非當否各當所指者易之辭也以言者尚易之辭則言必有法趨避取舎不可或泥者易之變也以動者尚易之變則動必中度形容物宜有不可掩者易之象也以制器者尚易之象則器必適用吉凶禍福各以𩔖應者易之占也以卜筮者尚易之占則占必知來凡此无非神之所爲也故聖人尚焉尚之者明此道以垂法立敎以覺天下後世之不知乎此者也是以君子將有爲也將有行也問焉而以言其受命也如響无有遠近幽深遂知來物此言尚易之辭與易之占也參伍以變錯綜其數通其變遂成天下之文極其數遂定天下之象此言尚易之變與易之象也夫君子於將有爲將有行之時未知是非當否之所在可不稽易以致其決乎問焉而以言求決於易也向使易之辭也非聖人之所尚君子又烏知以言而問之然問焉而以言苟非以吾之精一之誠深知易之爲可信則雖有問焉徒問也今而曰其受命於易也如響之應聲是必有以黙契乎易而不専在於言語問論之間也不然何以來物之在於遠近幽深也舉无不知曽无毫髪之閒邪故曰至精朱子發曰精之又精謂之至精參伍以變者縱横十五天地五十有五之數也錯之爲七八九六總之爲三百六十以天地觀之隂陽三五一五以變爲候者七十二二五以變爲旬者三十六三五以變爲氣者二十四三百六十五日周而復始故乾之策三十有六者三六而又二也坤之策二十有四者二六而又二也三其二十有四與二其三十有六皆七十二三其七十有二爲二百一十有六得乾之策二其七十有二爲百四十有四得坤之策三畫之卦三變而反六畫之卦五變而復通六七八九之變則剛柔相易遂成天地之文極五十有五之數則剛柔有體遂定天下之象非成文不足以成物變之又變謂之至變夫有行始於有爲有爲始於有思有思有爲者人也无思无爲者天也誰能有思有爲而无於人之累乎其惟易而已易有思者本於无思有爲者本於无爲合五十有五之數本於太極寂然无聲其一不動萬物莫不㑹乎其中有物感之散爲六七八九之變而天下之所以然者无乎不通所謂遠近幽深遂知來物乃其一也精者精此者也變者變此者也神之又神謂之至神精故可以窮深變故可以與幾夫易聖人體之以極深研幾者也天下之志藏於无形非推見至隱者其能盡通乎而易至精者也天下之務其來无窮非曲得所謂者其能成乎而易至變者也疾而速行而至有思有爲者皆然而易至神也不疾而速不行而至者極深研幾之效莫知其然而然也故曰易有聖人之道四焉子發所釋可謂著明矣天一地二天三地四天五地六天七地八天九地十子曰夫易何爲者也夫易開物成務冐天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圎而神卦之德方以智六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏徃其孰能與此哉古之聰明睿知神武而不殺者夫是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫是故闔户謂之坤闢户謂之乾一闔一闢謂之變徃來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇高莫大乎富貴備物致用立成噐以爲天下利莫大乎聖人探賾索隱鈎深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也此章復言易寓於數聖人本之以作易而其功用見於經綸世變垂其法於将來天人之理不外乎是若有以相之故終舉大有上九爻辭而曰自天祐之吉无不利也嗚呼聖人用易之功若此其至乎天一地二天三地四天五地六天七地八天九地十程河南張横渠及前輩皆云當在天數五地數五之上簡編失其次也而横渠又曰聖人之於書亦不欲併以一説盡慮人易知後則不復研究故或在此説或在彼説要終必見但俾學者潜心以是知前輩談經可謂不苟矣夫自天一以至天五此天地生數也自地六至地十此天地成數也河南云旣有上五者斯有下五者二五合而成隂陽之功萬物變化鬼神之用也朱子發亦曰萬物在天地間不離乎五十有五之數聖人雖不言其能逃乎夫易之爲易非有他也於物則開之明其所以然也於務則成之因其所當然也舉天下之大无出乎是道之覆冐此所謂冐天下之道也朱子發曰冐天下之道者日月所照霜露所墜舟車所通凡有血氣者必待此道而後覆冐此言是也易之爲易如斯而已捨此孰謂之易乎故曰易何爲者也又曰如斯而已者也聖人於此道者則用之以經綸世變故天下之志若未易通也易有開物之道聖人盡之則天下之志无適而不通天下之業若未易定也易有成務之道聖人盡之則天下之業无適而不定方其天下志之未通業之未定也趨捨之方動定之際倀倀然適從之无所疑孰甚焉及夫天下之志以聖人而通天下之業以聖人而定其胸中之所欲爲與日用之所當然者了然而无疑伊誰之功邪實聖人有以斷決其疑以致是也故又曰以斷天下之疑凡其所以然者皆聖人有得於易而然也故繼之以蓍卦之德與六爻之義凡物圓則運方則止夫運而有无窮之用者是必有所謂至神者存也故曰蓍之德圓而神止而有一定之體者是必存諸我者固已无所不知矣故曰卦之德方以知蓍之爲用六七八九惟其所爲而人无與焉非神而何卦之既設上下内外有不可易而理實寓焉非智而何若夫六爻之爲義則變易以示人使人知吉之可趨凶之可避而无或秘之説此所謂易以貢也韓氏曰貢告也六爻變易以告吉凶張横渠曰圓神故能通天下之志方知故能定天下之業爻貢所以斷天下之疑夫心也者酬酢萬物之君也心有所累則酬酢萬物也不能擴然而大公是心也不能擴然而大公則亦異於易矣夫无思无爲寂然而不動感而遂通天下之故者易也聖人以此蓍卦六爻洗去夫心之累則是心也擴然而大公易即吾心也吾心即易也用能退藏於密而不窮之用黙存於我焉程河南曰密乃用之源聖人之妙處又曰道乃形而上者形而上者即密也然則退藏於密此即易之所謂无爲寂然不動也夫妙用之源黙存於聖人之心則發而爲用也酬酢萬物而不窮故夫樂以天下憂以天下而天下之民吉在所趨也聖人惟患其不吉凶在所避也聖人惟患其或凶憂患在民而聖人以爲已之憂患也故曰吉凶與民同患此即易之所謂感而遂通天下之故也神蓍之德也吉凶隱於未形聖人神以知來則神在聖人而不專在乎蓍矣知卦之德也吉凶顯於既著聖人知以藏徃則知又在聖人而不專在乎卦矣故繫辭至此侈言聖人之神知而曰其孰能與於此哉古之聰明睿知神武而不殺者夫夫謂之聰明睿知則卦之知非聖人其孰能與之謂之神武不殺則蓍之神非聖人其孰能與之聖人之德无乎不備如此宜吾所謂蓍卦之神知咸在聖人而不專在乎蓍與卦也耿希道曰其曰神武不殺何也布昭聖武不免於殺者將以使人之知懼也今神以知來則未然之祥見於其先知以藏徃則已然之戒存乎其後然豈待殺而後知懼哉荀子曰怠慢剽棄則照之以災禍此之謂也夫天人之理備於易而易之神知又備於聖人則夫在天與人者聖人宜无不知故夫福善禍淫者天之道也聖人明其所必然爲善得福爲惡得禍者民之故也聖人察其所由致而惟恐斯民之用或至於昧其所趨故假是蓍龜之神以發明人心之神夫神无乎不在在人則爲人心在物則爲神物在天地之道則爲易在易則爲隂陽之不測在聖人則爲聖人之妙用方是神之在物爲蓍爲龜尚棄而未用也人曰此枯莖爾朽骨爾不知其爲神也聖人從而興之而易由此兆焉人見聖人之興之也亦惟聖人之從而得其所謂如是而吉如是而凶也而遂至於趨吉若渴避凶若熱而曰此聖人之前知也而不知此神物之前知也特聖人爲能興之以爲前民之具焉爾然聖人如之何而興之也亦曰聖人以此神物齋戒致敬以神明乎神物之德使斯民凡有作用亦皆齋戒致敬不敢忽此神物咸知其德之爲神明而信其所以告我之吉凶也此之謂興神物也前言蓍之德圓而神則齋戒以神明乎神物之德者雖由於聖人而興是神物之德者實神物之固有焉神物固有是德聖人雖不欲齋戒以神明之夫何以前民用乎所謂前民用者神之所爲也故下文歴言乾坤變通象器與法而極於民咸用之神夫誰能出不由户户一也闔則爲坤此斯民之用隱於无用也闢則爲乾此斯民之用見於有用也一闔一闢爲變此又斯民之用不可以拘於一也徃來不窮爲通此又斯民之用不可以有所窮也然於闔闢變通之中何者爲斯民之用乎曰是理也見者爲象形者爲器器制爲法聖人體易以經綸世變而垂其法於將來者无越乎此故斯民利用此道而見於出作入息之間凡所資以爲生養之利者孰不用之而莫知其用之所以然者此即予前所謂在人在物在天地在易在聖人之神也噫語至於此孰謂易爲无用之説也自易有太極至易有四象復申言聖人是興神物以前民用之㫖朱子發曰極中也太極中之至歟四象八卦具而未動謂之太極易有太極四十有九合而爲一乎在人則喜怒哀樂未發是也濓溪周先生曰太極動而生陽動極而靜靜極而生隂隂極復動互爲其根分隂分陽兩儀立焉朱子發曰隂陽匹也故謂之儀凡物有中則有上下有上下則有左右前後有左右前後則有四方有四方則有四維而八卦在是矣此自然之理也張横渠曰一則神兩則化故太極者一也倍一而二而儀分上下故曰生両儀倍二而四而象分四方故曰生四象天之東象龍西象虎南象鶉北象龜此皆象也倍四而八而八卦以成故曰生八卦此易生生之理然也卦者掛也掛此理以示人而吉凶有一定之説故又曰定吉凶夫易始於八卦因八而八之則其爲卦也爲六十有四天道之消長萬物之盛衰人事之得失古今之治亂皆不逃乎八卦所定之吉凶則易之大業又生於八卦所定之吉凶矣故易之爲書也廣大悉備若不可以一言盡也而其説則不離於示人以吉凶趨避之理而已矣惟聖人入乎吉凶之域故能與民同患而立大功業於天下則聖人之大業即易之大業也夫惟易與聖人其大業一也故下文繼之以六莫大之説其所以爲易與所以爲聖人者兼言之夫成象之謂乾效法之謂坤萬物在天地間孰不具乾坤之法象然語其法象之大者莫大乎天地易窮則變變則通通變之理人事之終始也然語其變通之大者莫大乎四時凡物有是形容之可擬者孰无是象具是貌象而不可掩者孰无是明然語其象之懸于天明之著乎物者莫大乎日月天地四時日月此易之所以爲易也然非其有是位則易之道不行非其有是人則易之道不明故繼之以莫大乎富貴與莫大乎聖人夫天下之物亦有所謂崇且高者矣然語其操是利𫝑以令天下而能使天下莫吾違者非富有四海貴爲天子不足以與此故曰莫大乎富貴天下之人亦有所謂以是物爲是用者矣而其用不足以利天下語其備百物致民用立爲成器而使天下共利之爲悦者非聰明睿智之聖人不足以與此故曰莫大乎聖人然則下繫論十三卦制器必曰伏羲氏神農氏黄帝堯舜氏者此所謂有是位又有是人也夫器用之制聖人所以使天下由此趨事而赴功以享其所謂利也而天下或不能惟利之趨焉此建立卜筮在聖人猶不可以已也且天地之機鬼神之奥藏於幽賾隱伏深遠之地必欲探取之搜索之鈎出之從而坐致之使吉凶未形之象无不定亹亹不已之緒无不成者其用又孰大乎蓍龜者乎此上文所謂以前民用必在於是興神物也然則以莫大之聖人處莫大之富貴立成器以利天下興蓍龜以前民用則莫大之天地斯與之合其德莫大之四時斯與之合其序莫大之日月斯與之合其明莫大之蓍龜斯與之合其吉凶於以通天下之志定天下之業斷天下之疑聖人寔優爲之此予前所謂聖人之大業即易之大業也不其然乎天生神物聖人則之此又申言聖人有取於蓍龜之象數以爲易之象數也天地變化聖人效之此又申言聖人有取於四時之變通以爲易之爻也天垂象見吉凶聖人象之此又申言聖人有取於日月之懸象以立易之象也河出圖洛出書聖人則之此又申言聖人有取於天地之法象以畫易之卦也夫神物也變化也垂象也圖書也此天地所以示乎人也聖人與民同患獨无以示於人乎故天以象數寓於蓍龜之神物以示乎人而聖人乃則此象數以爲易之象數以示乎人天地之變化見於四時之運動以示乎人而聖人乃效此變化以爲易之六爻以示乎人天垂日月五星之象而吉凶見焉以示乎人聖人乃象此垂象而爲易之吉凶以示乎人天地以龍圖龜書出於河洛而自然之法象在焉以示乎人而聖人乃則此法象而爲八卦之畫以示乎人曰則云者易之象數即蓍龜圖書之象數其則不相遠也曰效云者效於六爻之動故經曰爻者效天下之動也曰象云者象其所以然者也故經曰象也者像也天地之所以示人者聖人皆有取焉而作易以示人故有所謂四象焉四象在物爲木火金水在方爲東西南北在時爲春夏秋冬而在易則爲元亨利貞然易之示人者有其象而无其辭則知其説者亦鮮矣故必繫其辭以告之以四象之所以然又從而定之以吉凶曰如此必吉如此必凶斷之於一言之下而使之不昧其所趨焉此聖人與民同患之本㫖也夫聖人明於天之道察於民之故而大易以興則天人之理咸備於聖人矣孰能違乎故繫辭至此乃引大有上九之爻辭以賛述聖人之所以有天人之助夫天人之理信順是也天之理行乎自然故所助者順也人之心以誠相感故所助者信也履此之信而思乎順則盡其所以在人者而不忘乎在天自然之理又能以此道而尚乎賢此大有上九所以自天祐之吉无不利也夫大有盛治也大有上九盛治之極也當盛治之世六五之君信以發志則所履者信也柔順處中則所思者順也上九剛德在上而六五下之則所尚者賢也人君當盛治之極備此三德此所以能保極治之盛歟故曰是以自天祐之吉无不利聖人作易以經綸世變垂法將來而天人之理咸備於我故天人之助无以異於大有之上九矣子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情僞繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎德行此章乃言聖人作易自以盡言以盡意至於以盡神或明理或明用而易无乎不盡自謂之道謂之器至於謂之事業或爲精或爲粗而易各有所謂又自存乎卦存乎辭至於存乎德行或在此或在彼而易无乎不存然始言書不盡言言不盡意而終之以黙而成之不言而信則是易也夫豈空言云乎哉由其有言而契之以不言則得聖人所以有望於天下後世之意矣程河南曰言貴簡言愈多於道未必明杜元凱云言高則㫖遠辭約則義微大率言語湏是涵養而有餘意所謂書不盡言言不盡意夫書不能盡難喻之言言不能盡難傳之意聖人之意終不可見於天下後世乎然意之所寓雖不可以言盡而可以形容求之者則象是也如孟子答問之言多假於譬喻凡此皆立象也故以震爲雷則動之意盡以兑爲澤則説之意盡象一立雖无俟於多言而意自盡矣君子小人之所以異者情與僞之别也故卦以隂消陽長爲君子小人之道卦一設而情僞皆不可掩如復見天地之心則其情盡矣如姤女壯勿用取女則其僞亦盡矣或繫之辭或繫之爻告之以吉凶導其所指歸此聖人不能已之辭也辭一繫則向之所謂難喻之言亦盡矣盡意盡情僞盡言此聖人作易以明理而无不盡之理也至於利則是理之見於用也神則是用之不可知也夫自乾至未濟六十四卦之相授受自乾之初九至未濟之上九三百八十四爻之相變易所謂變而通之也夫易窮則變變則通變而不通則復窮矣非利也故終曰變通以利言六爻之間盡吉凶趨避之利非變而通之疇克爾邪横渠曰辭不鼓舞不足以盡神蓋聖人於天下之動效之以爻而繫之以辭發揮旁通洞極微隱故能盡利盡神此聖人作易以明用而无不盡之用也夫象立而卦設卦設而辭繫以至變而通之鼓之舞之凡此皆易之形於可見也究其底藴則自乾坤始故曰乾坤其易之藴邪蓋方其作易之初也三竒爲乾乾陽也象乎天而位乎上三耦爲坤坤隂也象乎地而位乎下上下成列則六十有四卦三百八十有四爻剛柔變化之理君子小人之道吉凶悔吝之辭皆寓於乾坤竒耦之中乾坤不畫則是易也何自而見之故曰乾坤毁則无以見易蓋乾坤者生之本也乾坤不畫則易不可見而乾坤生生之功安得而不息邪夫惟不息則乾坤既畫易自此而見矣故形而上者則謂之道道也者无方无體所以妙是器也形而下者則謂之器器也者有方有體所以顯是道也然道外无器器外无道其本一也故形而上者與形而下者皆謂之形則易之形見蓋有不可掩也化而裁之推而行之舉而措之是又易之見於用也夫道降而爲器化而裁之則是器也有所指别而名體各異故謂之變推而行之則是變也无所凝滯而運用不窮故謂之通舉是變通之用而措之天下之民使之各盡其所以相生相養之道故謂之事業道也器也變也通也事業也此易之爲易或精或麤而各有所謂程河南曰易因爻象論變化因變化論神因神論人因人論德行大抵通論易道而終於黙而成之不言而信存乎德行故繫辭又申前章之言曰是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻而繼之以卦辭變通終之以其人與德行聖人之意豈无待乎夫聖人見天下之賾而立其象然非是卦則天下之賾于何而極之見天下之動而立是爻然非是辭則天下之動於何而鼓之故天下之賾至无形也聖人立是象以象之又設是卦以囿是象而窮極是賾則天下之賾无所逃矣故曰極天下之賾者存乎卦天下之動不一也聖人立是爻以效之又繫其辭以斷是爻而鼓舞是動則天下之動亦无所逃矣故曰鼓天下之動者存乎辭前言化而裁之謂之變推而行之謂之通此復言化而裁之存乎變推而行之存乎通者蓋言聖人作易化而裁之則存乎卦爻之變推而行之則存乎卦爻之通然則卦象爻辭者易之書也變通者易之道也即是書以明是道又存乎人焉然曰神而明之者以言此非口耳之餘習也是必以此心之神而明夫易之所以然如復之初九則存乎顔子明夷之六五則存乎箕子革與明夷則存乎湯武與文王也夫惟如是則易即我也我即易也黙而成之不言而信則卦象爻辭又何有焉故夫卦象爻辭之所云者即吾之德行也程河南曰譬之賛易前後貫穿都説得是有此理然須黙而成之不言而信存乎德行處是所謂自得也童溪易傳卷二十八
