body:
  text: 童溪易傳卷八宋王宗傳撰離下乾上同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志昔者嘗聞聖人建立之極也扶翼人道以配天地人道既植和氣乃通周流磅礴不失一物濟濟有序逺近若一用能與天地相為無窮也蓋自去古漸逺人偽日滋分三才而裂之不已也又併與人道尺寸而分剖之強者侵衆者奪矜者忿愚者詐畦町爾汝德鋤誶箕無所不至昔之所謂氣之和者移而為鍥薄矣昔之所謂序之濟濟者轉而為貿亂矣若是不已則禽獸而後已又豈特闕鬼蜮而已乎嗚呼此易之所以作也此易之所以有同人也或問之曰同人之作其能已後世之睽異歟吾徒見其所以為卦者六二也而六二則曰同人於宗吝二之所應者五也而五之梗於三四未得以應乎二也則不免於號咷逮其相兵相克而獲遇其應也則獲笑焉彼三與四之無與於二命也曽不顧義分或伏於莽或乘其墉以與五立敵焉此何為也哉故程河南曰二同於繫應有所偏與在同人之道為私狹矣故可吝也又曰五以私昵應於二先隔則號咷後遏則笑此乃私昵之情非大同之體也於君道無取誠如是説則同人之任屬之誰歟應之曰子獨不聞夫易之作也其衰世之意邪世道不衰則易可無作也故夫同人之三與四者乃上下之際而同異之分也所謂交爭而迭攻之地也梗難不去則莫有能同之者故當是時也在下者常謹守其分以待乎上在上當去其強梗之難以通乎下強梗之難去則上下相與以施同人之化而天下大同矣彖所謂同人於野此其極也是之謂能任同人之責然則二何嫌於吝而五又何嫌於號與笑乎不然彖之所謂柔得位得中而應乎乾曰同人者誰乎所謂文明以健中正而應君子正也又誰乎亦必曰二與五而後可也夫柔不得位則柔無以立柔不得中則柔至於過柔而不應於乾則又無以濟夫柔也有此三者此六二之所以能同人也蓋無是三者則徒知同之為同而不知其所以為同矣豈不可為同人病邪故曰柔得位得中而應乎乾曰同人同人之彖曰同人於野亨利涉大川云者此六二應乎乾以有行之效也夫同人之道貴乎逺雖然不能近烏能逺同人之道可與處患難雖然不能處平易烏能處患難同人於野亨此同人之道貴乎逺也然近而三與四吾或昧其所之焉豈不害吾悠逺之道乎利涉大川此同人之道可與處患難也然出處語默吾與五或相戾焉豈能處患難如平常乎然則同人於野必期於亨涉大川而必期於利非應乎乾而與之偕行不可也文明以健中正而應此又合離與乾二與五而贊六二應乎乾之義也夫文明則能燭理剛健則能克已二以柔順中正而應乎五五亦以剛健中正而應乎二此二五之君子咸以正道相與而然也故曰利君子貞又曰君子正也彼天下之人其所惡欲趨舍之志雖曰不同而吾以君子之正一以貫之則亦無有不同者矣故又終之曰唯君子為能通天下之志君子之所以通天下之志者以君子之正故也何謂君子之正曰其在卦爻則六二九五是也其在人則吾心之所同然常久而不已者是也聖人所以扶翼人道者扶翼此者也象曰天與火同人君子以類族辨物夫同人之道其所以為同者初非混然無所區别之謂也天下有不同之物吾安能強之使同也則亦隨夫物之不同也而與之為不同焉爾又何害其為同也昔者孟子嘗設喻曰白雪之白無以異於白馬之白夫雪與馬俱是白也今將謂雪為馬可乎不可也又曰長人之長無以異於長馬之長夫人與馬俱是長也今將謂馬為人可乎亦不可也此同人之道所以欲類物之族而後物得所辨也物得所辨則以不同同之乃所以同之也夫天運乎上火亦炎上此雪與馬俱白馬與人俱長之謂也然指天而謂之火不可也指火而謂之天亦不可也兩皆不可而乃以天與火為同人之象何也曰取其俱是上也而已矣蘇東坡曰水之於地為比火之於天為同人同人於比相近而不同不可不察也比以無不比為比同人以有所不同為同斯言得之矣初九同人于門無咎象曰出門同人又誰咎也九以剛明之才方當出而同乎人之初外無其應無所決擇內之誠敬方新而慢易之心不生此正夫子告仲弓所謂出門如見大賓之時也夫當出門而同乎人之初無所決擇則亦無所不同無所不同則亦夫誰不我同也人既我同則亦將敬我之不暇矣所謂咎我者又其誰也然則此非人之不我咎也我其初未嘗取咎於人也六二同人于宗吝象曰同人于宗吝道也易以卦為時以爻為人一卦而六爻則是同時也所以趨是時也不可以同是人也同人天下大同之時也故卦之德有取於同人于野雖然當是時也以六居二卦惟一隂衆陽之志皆欲同之使二於此曽無決擇於其間非所謂君子之正也故當此之時居此之位在夫靜以有守謹其所之彼三與四當上下之交犯義命之戒我乃謹守其操自儉自嗇如處子如貞婦而惟吾所宗者之是同焉可也故曰同人於宗吝宗云者已之所尊而敬者謂九五也如三與四則非二之所尊而敬者也然則六二之吝固其分也其可以吝道少之哉程河南曰二同於繫應有所偏焉在同人之道為私狹矣故可吝也豈亦未之思邪九三伏戎于莽升其髙陵三歲不興象曰伏戎于莽敵剛也三歲不興安行也夫隂陽之情篤於相求又况當同人之時卦惟一隂衆陽之志皆欲同之而三之與二又近而與之比故欲攻五以據其應或伏或升以伺其釁伏戎于莽將以中五也升其髙陵將以阻二也以九三之剛而俯以就其六二之隂伏戎於莽之象也三下卦之上也而以九履之升其髙陵之象也夫當同人之時無所與同不顧義命而徒恃其剛焉然則以剛敵剛安能行其所欲哉是冝三歲之久終不能興也大抵二與五以君子之正相同相應而三與四以小人間於其間冝其終莫能間之也三數之成也在爻為三故曰三歲然亦只取久意九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也四之弗顧義命與三同也然商其罪之輕重則困而反則與三歲不興者有間矣夫墉內外之限也三與四交際之地也四隂在內九履其上故曰乘其墉其志亦欲阻二以攻五也雖然九三以剛敵剛猶不能行其所欲况九四之非全剛乎其弗克攻冝矣蓋非全剛則不敢恃其剛也恃其剛者必其剛過也九三恃其過剛則必至於三歲不興而終無知反之期九四不敢恃其剛故知其攻之弗克也則斷之以義而反其在我之則焉初無待於三歲不興失則而不知反也孟子曰困於心衡於慮而後作四之困而反則故聖人於此以吉豫之豫之以吉者蓋亦以開小人知反之門也嗚呼聖人之設心如此則反天下之睽異而為同也又何難歟九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也易中以號笑兼發其義者凡有三焉而已矣萃之於初六曰若號一握為笑以言乃亂乃萃之無常也亦猶中孚之六三云或泣或歌之謂也旅之上九與同人之九五則以號咷之先後相反為言者夫旅之上九身處乎外亢然居上下無應援非能與人同者而人亦弗之同焉故曰旅人先笑後號咷蓋言初之嘻而終之戚也同人之五則異乎此矣五以君子之正下應六二二以君子之正上應九五二人同心久矣九三九四以二剛間乎其間故二不得不自儉自吝謹其所守以待夫五而五亦不得不自恐自懼以克乎敵而下通夫二也夫夬決小人之卦也以五君子而夬一小人冝無甚難也而九二以莫夜之有戎也而不免於惕且號焉則同人之五雖居利勢而三四二剛腹心之患不輕也烏能無號咷之懼邪惟能有恐懼於其先則能無恐懼於其後矣故曰同人先號咷而後笑大師謂其敵之剛也其曰相克則其恐懼冝多矣大師相克之後乃獲與二相遇則先號咷者大師相克也後笑者與二相遇也夫二五之君子以正相與此所謂中直也當恐懼之初號咷之先二人之心未始不同而二剛不能間焉者以中直故也故繫辭於此爻又釋之曰二人同心其利斷金謂克去者二剛也同心之言其臭如蘭謂先號咷而後笑也司馬溫公曰德之未孚信之未光近者不服逺者不懷故號咷也中則不阿正則不私不阿不私天下歸之始於憂勤終於逸樂故後笑也而程河南乃曰五以私昵應二先隔則號咷後遇則笑此乃私昵之情失大同之體也於君道無取豈亦未之思邪上九同人于郊無悔象曰同人于郊志未得也上九處不爭之地不同乎人而亦不異乎人者也故曰同人于郊夫同人于郊固不若同人于野之廣且逺也然與其爭非其應而動九五之師者固有間矣故曰無悔曷不觀諸九四乎九四之象曰其吉則困而反則也此有悔之謂也若上九處不爭之地則未嘗失則也亦未嘗反則也何悔之云雖然當同人之時以剛健有行之才而處不同人之地亦豈其所願欲然邪蓋亦有不得已焉者矣故曰志未得也何謂有所不得已曰所居之位然也乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨夫衆不能治衆也故善治衆者不以衆而以寡剛不能制剛也故善制剛者不以剛而以柔大有之有五剛有之亦難矣何難乎曰賢者之難乎以勢屈之也材者之難乎以勢驅之也然則孰有之曰非六五之柔不可也故五以言其位則尊位大中以言其應則上下俱應上而上九以吾能尚其賢也降其志而比乎我下而自初至四以吾能用其材也以其類而從乎我其所有豈不大矣哉噫此非以五之勢而能有是大也以五之不自恃其勢而能有是大也夫不自恃其勢此豈君人有大之私術也天為剛德猶不干時人君之德本之以剛健濟之以文明與時偕行而無以異於天焉則天之運動而天下亦莫吾遏矣此其所以元亨也故其在卦德則內剛健而外文明六五與九二居相應之地順而應之無所違也故曰其德剛健而文明應乎天而時行是以元亨大舜之為君也其能盡此道歟不然何其有是大也蓋昔者嘗因孟軻氏大舜有大焉之言而參之以書與莊周之説然後信其有是大也書之稱舜曰元德升聞乃命以位夫帝之位亦尊且大矣而語帝之處此者則溫恭而已非柔得尊位而大中之謂乎然則其在當時朝覲歸之謳歌歸之訟獄歸之無惑乎上下應之多且衆也是以莊周氏得以誦其微言曰天德而出寧日月照而四時行元亨之效可見於此然則語大有之盛大舜有焉象曰火在天上大有君子以遏惡揚善順天休命光無不被然後微小無所遺大有之象有取於火在天上云者光無不被之謂也其所有豈不大乎君子觀此象則吾之明不敢以私心用之懼其所有之不大也惟夫不自私其明故惡者遏之禁天下於未然使天下皆知小人之棄也善者揚之導天下於將然使天下皆知君子之歸也夫天下之生是人也而命之以此性也固欲人君輔而成之也而人君乃能順是命而不違則天之休命實得之矣大抵大有盛治之世也夫茍天下未能皆君子而猶有未免為小人之人者則亦未為治道之大成也故象有及於此初九無交害匪咎艱則無咎象曰大有初九無交害也在下位而不援上此君子處下之道也然當大有之初則以無交為害何者當是時也六五柔德之主也得尊位大中而上下應之故二應於五三亨於天子四與上居近密之地而初九則獨處於下而無交焉豈不害於上下應之之義乎雖然亦非有咎也交道之難其來尚矣使初不知艱以自守而務以茍合茍進焉則雖知無交之為有害而不知茍合茍進之為有咎也故又曰匪咎艱則無咎蓋豫之也夫能務處其身於無過之地則其於交際之地必能謹其所豫矣故象特謹之曰大有初九無交害也九二大車以載有攸往無咎象曰大車以載積中不敗也南豐曽子固曰夫所謂宰相者以已之才為天下用則為天下用而不足以天下之才為天下用則為天下用而有餘大有九二有大車以載之象則以天下才為天下用之謂也故曰有攸往無咎而象曰積中不敗也此為天下用而有餘也何則大車積集衆材而成也大有衆材輻湊之時也九二之材剛而中者也又處衆剛之材之中則集衆剛之材以會於中而成此荷載之功者也則其有所往也夫何覆敗之虞乎大有之世事崇而業巨者也六五之君方且體謙虛之德而以仰成衆賢為心當是時也非有任事之材以荷載為職不可也九二以剛中之材處於相應之地固其任也然當衆材輻湊之時使二也無賴乎衆材之助而獨以已之材為天下用焉寧無咎乎又寧無敗乎然則其象有取於大車之載其旨逺矣九三公用亨于天子小人弗克象曰公用亨于天子小人害也三盛位也而以九居之剛之勝也夫處剛勝之地當盛大之時上有謙虛之主而吾豈可以滿盈而居此位乎惟不以滿盈為心則存諸中者無非奉上之公故在上者無所疑而在下者亦無所嫌此九三之心所以獲上通於天子也故稱公焉若夫小人則不然處剛勝之地當盛大之時徒知騁私縱欲以違戾取害而已其能以奉上之心為心邪故曰小人弗克又曰小人害也夫大有之九三以公處之則能上通於君以非公處之則為小人之害易於此一爻亦兼設其義者所以示戒深矣九四匪其彭無咎象曰匪其彭無咎明辨晳也以九居三處剛勝之地大有之盛也固不得不設小人之戒若九四則不然也何也四隂位也以挹損為事故剛而不至於過四離之初也以明辨物理為智故剛而無待於戒則與九三固有間矣故曰匪其彭彭旁也謂三也以言非如九三之剛勝而復設小人之戒也如是則當大有之時處近五之地夫何咎乎夫大有於九三取其公復慮其不能公於九四與其明復慮其不能明則九四之明辨之晳賢於人逺矣六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也人君能使人不敢違不若使人不忍違夫使之不敢違非有號令隄防之不可也至於使人不忍違則非有所謂號令之煩也亦非有所謂隄防之素也一出於誠信云爾六五以一柔有衆剛上下衆剛惟我是應而無或違之者無他道也虛中無我擴然大公一以誠信之道感發衆志則天下之志亦還以此而應夫我矣此上下交相親之道也故曰厥孚交如信以發志也夫上下交相親則強強則無山溪而固無甲兵而威夷然和易初無備禦而不怒之威自孚於上下之間矣何吉如之此誠信待物之效也故曰威如之吉易而無備也然則六五能使人不忍違者曰孚而已大哉孚乎上九自天祐之吉無不利象曰大有上吉自天祐也六五以一柔有五剛自初至四五能用之故以其類而從夫五上九獨在五上五能尚之故降其志而比乎五繫辭所謂履信思乎順又以尚賢也則上九是也夫以九居五之上而五尚之此非盡處有之道而能以人應天也歟當大有盛治之極而能以人應天則祐之自天冝矣故動罔不吉而無所不利謂大有至此愈有隆而無替故也然則當大有之極莫大於得天而所以得天也又莫大於尚賢尚賢則所謂以人應天也艮下坤上謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也謙者何不居其有之謂也夫既有其有矣而不復居其有者非以為偽也書曰有其善喪厥善矜其能喪厥功蓋不居其有者則欲不喪其有故也亨通也司馬溫公曰人之將有為也將有行也施之以謙則無不通也程河南曰他卦皆有凶咎惟謙未嘗有凶咎他卦有待而亨而謙則便亨蓋謙有亨之道故也天道下濟而光明地道卑而上行此以天地之道而明謙之所以亨也夫天氣下降以濟萬物天之謙也化育之功光明著見則謙之亨也地勢卑順處物之下地之謙也其氣上行以交於天則謙之亨也天地為大矣其道均不外於謙君子德盛如天業廣如地而不以謙將之其何以保其終其曰君子有終則謙之亨也夫盈者謙之反也謙則不盈盈則不謙故又繼之以天道之虧益地道之變流鬼神之害福人道之好惡與夫尊而光卑而不可踰之義以明君子之所以有終也朱子發曰天地也鬼神也人也以分言之則殊以理言之則一故觀日月之進退則知天道之虧益觀山川之髙卑則知地道之變流觀人道之得喪則知鬼神之害福觀物論之取捨則知人道之好惡又曰謙之為德其至矣乎所處尊矣道則彌光也所執卑矣德則彌尊也君子觀諸天地驗諸幽明故處卑而不爭居尊而能降愈久而不厭乃能有終故曰君子有終其在六爻則九三是也故曰勞謙君子有終吉象曰地中有山謙君子以裒多益寡稱物平施天下之物崇髙者莫如山卑下者莫如地地中有山則卑下外施而內藴其崇髙者也夫崇髙藴於內則髙者降卑下施於外則卑者升髙卑適平謙之義也君子之觀此象也則裒取夫多增益夫寡稱物而施適平而止以盡夫天理之所當然者朱子發曰以貴下人則貴賤平矣以財分人則貧富平矣以德分人則賢不肖平矣程河南曰謙者治盈之道故裒多益寡又曰裒取其多增益其寡天理也初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也六謙德也初卑位也以謙德而處卑位謙而又謙者也故曰謙謙以言謙之至也夫躬至謙之事類非自恣自肆者之所能堪也而能堪人之所不能堪者必也有所養之君子也蓋君子之心勇於自勝而不勇於勝物故能委蛇曲折行乎萬物之間而與物無忤用此道以涉大難則衆之所共與而難可濟矣故吉也大抵自卑自牧而不與物爭此涉大難之道也牧養也夫謙卑德也初卑位也養德之地未有不基於至卑之所所養也至則愈卑而愈不卑矣此自養之力也六二鳴謙貞吉象曰鳴謙貞吉中心得也大凡物之鳴者有出於中心之誠然者有出於不得其平而然者六謙之德也二下之正位也以謙德而居下之正位則得其所欲矣故其發於聲音也無非中心之誠然者故曰鳴謙貞吉中心得也乃若上六則不然六謙德也上謙之極位也以謙德而反居謙之極位豈得遂欲謙之志歟故其發於聲音也蓋有不得其平而然者故曰上六鳴謙志未得也然則六二上六其鳴一也其所以鳴則不一也九三勞謙君子有終吉象曰勞謙君子萬民服也謙之成卦在此一爻也故卦之德曰君子有終而九三實當之夫謙以六為謙德也而三則以九居之獨何歟曰所以成天下之功者非剛明之才不可故也然以九居三剛勝而過中也何以知其勞而能謙歟曰三實艮體而止諸坤順之下所謂藴其崇髙於卑下之地其在象則地中有山故也夫以剛明之才居下位之上上為君所任下為衆所從信有勞矣勞而不伐有功而不德此君子致恭以存其位之道也故獲有終之吉夫盈者謙之反也乾上九之亢也而曰盈不可久也則謙九三之有終冝矣亢既有悔則有終而吉冝矣體勞謙之德居下位之上為衆隂之所宗故曰勞謙君子萬民服也然則萬民服也非服其勞也服其勞而能謙故也舜之賢禹也而曰洚水警豫成允成功惟汝賢此服其勞也又曰克勤於邦克儉於家不自滿假惟汝賢此服其勞而能謙也使禹也有是勞而無是謙則天下羣起而與之爭矣故又繼之曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功夫功吾功也能吾能也天下何與焉矜伐之心一不克去則天下羣起而與之爭故雖智如舜不敢謂無是也雖神如禹亦不能免是也故曰萬民服也非服其勞也服其勞而能謙也六四無不利撝謙象曰無不利撝謙不違則也四當上下之衝而以謙德居之何所施而不利乎曰不一而足也其於上也利於恭畏以奉順德之君其於下也利於卑巽以讓勞謙之臣處近君之地據勞臣之上無動而非謙而後可也故曰無不利撝謙撝有動散之義京房曰上下皆通曰撝謙王弼曰指撝皆謙是也四之無不利撝謙則當上下之衝無所不利於用謙故也夫居此之地無所不利於用謙焉則上盡奉上之道而君不吾嫌下盡接人之才而人不吾忌舉動施為繩繩然莫不中度而無失則之愆矣故曰不違則也夫惟不違夫則此其所以無不利也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也隂以得陽為富以謙德居五下無其應不富也然四之與上五之鄰也皆執謙順以親夫五而五與之同德焉多助之象也當是時也既多謙順之助則以順而動何往而不利故曰利用侵伐無不利夫侵伐所以討不順也以至順而討不順雖不免於征伐之事此乃抑髙舉下仆強植弱之義而象所謂裒多益寡者也或曰謙至九三而萬民服矣至六五則容有不服而征之何也曰九三萬民服也服其謙也乃若人君之道則不可以專於謙柔漢之文帝其初蓋謙遜仁柔之主也賈生流涕之䇿置而不用自以和親之一䇿所以待單于也上古帝王之所未喻也然其後世不堪其侮勵兵講武一戎服而胸奴遁故後漢崔子真作為政論有曰文帝以嚴致平非以寬致平則其於不服也而征之此君道之冝也程曰文德所不能服而不用威武何以平治天下又曰威德並著然後盡君道之冝而無所不利也蓋五之謙柔當防於過故發此義上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也六謙德也上謙之極位也以謙德而處極位此執謙者之所不安也故鳴其未得之志雖然當是時也順五之命用坤之衆行師於外以征邑國之不服者而不安其居於上焉則未得之志可以少紓矣又况當是時也謙柔既極不可過用謙柔過用謙柔則謙以取侮柔而不植非大中之道也故謙於六五上六皆以利用征伐為言蓋所以救謙柔之過也童溪易傳卷八
