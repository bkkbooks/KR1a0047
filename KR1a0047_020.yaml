body:
  text: 童溪易傳卷二十宋王宗傳撰乾下兊上夬揚于王廷孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也君子之去小人也雖有去之之勢不敢恃也剛強果敢惟恐或過警懼戒敕惟恐不及故反之於已也無或失則施之於彼也無不當此君子去小人之道然也夫當夬之時以五剛決一柔宜若勢有餘矣無復有可慮者矣而卦德乃曰揚于王庭孚號有厲告自邑不利即戎而聖人深致之意如此其嚴且至也然後乃曰利有攸往此豈恃有去之之𫝑也哉蓋不如是則非全勝之道故也夬決也剛決柔也此五剛決一柔以言夬之義也夫剛則能決而夬之為卦五剛而一柔剛有終長之勢而柔無不盡之理此夬之義有取於剛決柔也健而説決而和此合乾兊二體之用以言夬之道也夫健而濟之以説則其所以決小人也無剛暴之失而有和柔之善故吾不彼疾而彼不吾忌邪正之辨黑白之分脫然而解不相疑也東漢之君子不知出此而乃切齒厲色日與小人爭鋒故小人之謀日深而君子之黨日危以至忠良盡殱而社稷隨之向使即健而説之説而悟決而和之旨無是禍也夫何小人之不可決去之乎揚於王庭柔乘五剛也此又指上六之一柔不容於衆君子而衆君子公去之也夫王庭者公道所自出之地也卦有五剛君子之道已盛然以一柔而乘五剛小人慿陵自肆於上衆君子在下猶未安也故相與揚公道於王庭以共去此小人也夫去小人而不以公道去之則是李訓之謀也昔李訓之謀去宦官也而假甘露以赤其族此盜賊之謀也以盜賊之謀去小人小人不可去徒熾其熖而逞其毒爾謀何在邪孚號有厲其危乃光也此又言雖以公道去小人又當不忘戒備也夫孚其大號以警戒于衆使知以此之甚盛決彼之甚衰猶有危道不可易也如是則雖危無危而決小人之道光矣此與衆棄之之謂也朱翊善曰若舜之誅四凶而天下服是也若隱其誅如唐之李輔國則不光矣告自邑不利即戎所尚乃窮也此又言去小人之道必先自治而無尚於剛武也程曰邑私邑也告自邑先自治也君子之治小人以其不善也必以已之善道勝革之故聖人誅亂必先修巳舜之敷文德是也朱翊善亦曰告自邑者告戒自我私邑云自治也君子將治小人必先自治自治則以我之善去彼之不善小人所以服也舜修文德文王無畔援歆羡自治也夫戎兵戎也決小人之道在於揚公道於王庭孚號於有衆以與衆共棄之苟或以兵戎為尚此剛夬之過也故聖人以不利即戎戒之而曰所尚乃窮也朱翊善曰自古用兵去小人如漢唐之季召外兵以去近習其禍至於覆宗聖人之戒不亦深乎利有攸往剛長乃終也至此則言所以去小人者既盡其道則小人終去之無難也夫君子之所以去小人者既盡其道則由夬以為乾往無不利矣此所謂剛長乃終也若剛之長至夬而不終則餘孽未亡禍胎猶在終為衆君子之患矣朱翊善援桓彥範不誅武三思以為喻是也始五王提衛兵誅嬖臣中興唐室其功卓矣張柬之將遂夷諸武而彥範乃曰三思几上肉耳留為天子藉手俄而武三思因韋氏盜朝權彥範等流逐戮辱若放豚然而唐室為之再危此剛長之不終也向使即利有攸往之説而悟剛長乃終之旨旡是禍也又何小人不可終去之乎象曰澤上於天夬君子以施祿及下居德則忌澤之為水本在下也今也上升於天其勢不居必決而下也故為夬之象君子觀此象也故有所取有所忌其所取者謂取其決散之意也故施布祿澤以及乎下此有所取也其所忌者謂不取其決散之意也故居畜吾德以積諸身此有所忌也他卦之象皆取一義此卦象設彼此二義者亦如諸卦之爻一爻含一義或一爻兼取二義者聖人之意設彼此以相明以謂不有所反則學者或得此而失彼矣初九壯于前趾往不勝為咎象曰不勝而往咎也九以則動之才居夬之初唱決柔之謀者也故曰壯于前趾所謂居衆動之先先衆而動之象也夫先衆而動以決去在上之小人決意而往未有咎也往而不勝則為咎矣何者首決柔之謀者必有全勝之道而後可不勝而往咎將誰執則夫首決柔之謀者其可輕動而躁進也哉宋申錫之謀誅宦官也在唐文宗之世實首其議當對上言請漸除其逼謀固善矣然不能謹其密處以漸謀未必及施而身被其禍伊誰之咎邪然則首決柔之謀者其可輕動而躁進也哉九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也上六以一柔乘五剛五剛之所耻也然恥之甚者莫甚於九五何者以其逼近而厚其侵陵迫脅之辱者也雖然五之辱二之辱也何者以同德而居相應之地故不得不負此辱也負其辱則決柔之責二實任之矣夫任人之責而贊行決柔之事豈可易也故當內懷警惕外嚴誡號而後可以無憂夬所以去小人者也特患其謀不諦戒備無素而小人之謀或先我而發爾宋申錫之謀未及施而鄭注之誣告已為王守澄地矣此旡他不知內懷警惕而外嚴誡號之過也夫惟內懷警惕而外嚴誡號也既有其素則雖有戎作於莫夜可元憂矣何者吾固有以待之故也故曰得中道也何謂中道曰吾之謀未及發而小人得以先之非中也小人之謀既已發而吾無以待之亦非中也以九居二故得中道九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎象曰君子夬夬終無咎也九三上六之應也應之者決之也亦如明夷九三之於上六是也而易家惑於獨行遇雨之一語皆咎九三應上六之為非也而胡安定程河南朱子發又皆前後相承謂九三爻辭差錯至再易之此蓋惑此一語求其意而不得故不免均以差錯待之也殊不知九三以陽居陽又處乾健之極不患剛決之不足也患於太過爾夫以太過之剛當夬決之時與小人居相應之地寧復有相順之理矣乎故曰壯于頄此聖人戒其剛過也夫頄之在顔面也所謂顴也顴剛物也壯于頄則尤非能以柔順待人者也况待小人乎此以九居三之象也而聖人之戒之若曰當此之時健而説決而和者此決小人之道也居乾健之極與小人居相應之地而疾惡之心見於顔面而不知濟之以和説焉此凶之道也何者小人之或我疑故也小人我疑則君子之禍至矣可不知所戒乎故告之以有凶而使知戒也然以陽居陽又處健之極夬夬之才如此其將何以濟之曰君子之所謂夬夬云者夬之至也以和説之道而濟是夬夬則亦終何夬夬之為咎也蓋應之者乃所以決之也則衆陽同行以決上六而吾則獨行以遇雨也雖若有沾濡之失而未嘗無愠憂之心思必決之則其遇雨也又何嫌也此夬夬之所以終無咎也若夫以是夬夬而居小人相應之地而惟壯于頄之是尚焉則雖欲無凶不可得也又安能無咎矣乎然則君子當夬決之時不幸與小人居相應之地當以有凶為戒以有愠為心而以無咎為善如九三所云可也易以陰陽和為雨三與上應故有遇雨之象九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也五陽決一陰其志甚鋭也而決道之不足者莫九四若也何者以陽居陰而所處之位不當故也夫以陽居陰此於剛實之德既有所不足矣而乾之三陽復自下進故四於此失其所安而有臀無膚之象夫決道不足則無勇進之義矣而又曰其行次且謂滯泥而不前也夫當決柔之時而衆陽皆決策上進而四獨有此之象何以鞭其後邪故易於此又設其象以勉進之而曰牽羊悔亡謂與諸羊相牽勉而前則次且之悔可亡也張橫渠曰牽羊讓而先之蓋牽羊者非挽拽之謂也讓之使先行則有肯前之勢故也四也次且而前既有悔矣天下之衆陽讓而先之相牽勉而前則其悔可亡雖然當斯時也告之以牽羊悔亡之説在爻固有是言也而決道不足則雖聞是言也而亦若不聞也何也不足於決則疑畏之心勝而見義之勇消故不以斯言為可信故也聰於聞善言顧如是乎然九四之失亦未必至是也聖人特以其所居者陰也故諄復以詳其戒或曰九二亦居陰也何無是戒乎應之曰夬之九二則以中道論不以居陰論也蓋二與五居相應之地贊五以決柔之事既得中道豈或以居陰為嫌乎九五莧陸夬夬中行無咎象曰中行無咎中未光也九五決柔之主也既以陽德居陽位又藉衆陽之助往決一柔冝若易然故有莧陸夬夬之象莧陸董遇云莧人莧也陸商陸也朱子發曰莧蕢澤草也葉柔根小堅且赤陸商陸亦澤草也葉大而柔根猥大而深有赤白二種此以莧陸為二物也子夏傳云莧陸木根而草莖剛上柔下也程河南曰今所謂馬齒莧也曝之難乾感陰氣多者也而脆易折此以莧陸為一物也要之草之易決者也又況九五以陽居陽又藉衆陽之助此之為決所謂夬夬者也夫以天下之至決而決天下之易決者又豈特摧枯拉朽之比哉於此而又曰中行無咎云者蓋健而説決而和者決之善也苟有剛暴之失則過矣故必中行而後無過咎也夫必貴於中行而後無過咎也者以中道之未光也若有剛過之失而無和柔之善則雖合天下之力足以勝一小人揆之中道未為光大也九五剛而中者也然必云爾者謂其剛長至此五陽之𫝑強盛故戒其或過也九三以陽居陽而處乾健之極九五以陽居陽而藉衆陽之助故曰夬夬云上六無號終有凶象曰無號之凶終不可長也夫夬之五剛所以日夜持嚴不忘警備者徒以上六故也今也剛長將極陰消將盡一陰處剛長乃終之地此雜卦所謂小人道憂之時也故雖號剛以求免夫禍無庸及也終亦凶必矣何者終不可長也程河南曰成曰聖人之於大惡未嘗必絶之也今直使之無號謂必有凶可乎曰夬者小人之道消亡之時也決去小人之道豈必盡誅之乎使之變革乃小人之道亡也道亡乃其凶也巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉豫聞之邵康節曰復次剝明亂中生治乎姤次夬明治中生亂乎時哉時哉未有剝而不復者未有夬而不姤者是以聖人重未然之防嗚呼是言也治亂倚伏之機其在是矣夫姤之所以為姤者前夫此則夬也夬以一柔乘五剛所以為之日夜持嚴不敢忘戒備者蓋以上六一陰之故也一陰既決而一陰復出乎五剛之下若不期而會焉嗚呼此豈吉徵也邪雖曰若不期而然也而倚伏之機已發於此時又殆非所謂偶然者是以古今享治之君謂治無亂遇亂之君已亂無術此所以治世少而亂世多者無怪也聖人之於姤又安得不以女壯勿用取女為戒乎姤遇也柔遇剛也此以一柔遇五剛以言姤之義也夫古者有遇禮謂不期而會也而春秋亂世之君私相會約簡略慢易無兩君相見之禮則多自托於不期之會故春秋書遇者七而書內之遇者三而皆書及如隱公四年夏公及宋公遇於清之類是也書外之遇者四而皆書爵如隱公八年春宋公衛侯遇於垂之類是也夫既簡略慢易無兩君相見之禮則莫適為主矣然春秋之所譏者亦不過譏其無禮云爾未有大變也姤遇也柔遇剛也此豈特無禮而巳哉顧雖若不期而會也然陰長於內陽消於外陰為主而陽為客為主者日勝為客者日負則亦理𫝑之必然者嗚呼此豈偶然小變也耶故又戒之曰勿用取女不可與長也此指初六之一陰有消陽之漸以言姤之戒也夫女弗用取者以其壯也或曰非以巽為長女也而謂之壯乎曰是固然也然聖人之意又不專在是也奚在乎曰一陰在下此消陽之漸也聖人即微以見著此初六所以為女壯也自此以往則為遁為否為觀為剝以至於為坤者皆初六之為也非女壯而何吁女壯如此豈可與之長久也哉故聖人不得不為之戒曰此勿用取之女也以類言之則過惡之方萌姦邪之始長盜賊之初熾闕漸盛此皆何可與之久也惟智者見微而辨早當有以處之矣雖然姤遇也以一柔而遇五剛而有消陽之漸是故在所戒也若夫天地之大人事之要又豈無待於相遇也乎故聖人於此又必援天地君臣以廣言遇道也天地相遇品物咸章也此即姤之時以言天地相遇之功也夫以月建言之則姤也者建午之月也六陽至已而極則一陰生於午矣此天地相遇之時也夫萬物相見乎離離正位乎午當建午之月而萬物各以品目章章乎天地之間故於斯時也在説卦則曰萬物相見在姤則曰品物咸章也剛遇中正天下大行也此即二五同德之應以言君臣相遇之功也夫剛而中者二也剛而中且正者五也然謂之剛遇中正則二剛相遇而九二亦得為中正也何者易以陰居陽則為不正以陽居陰而且得中豈得謂之不正矣乎當是時也布是君有是臣以同德相遇其道可以大行於天下矣蘇東坡曰隂之長自九二之亡而後為遁始無臣也自九五之亡而後為剝始無君也姤之世上有君下有臣君子之欲有為無所不可故曰剛遇中正天下大行也夫當姤之時以天地君臣相遇之義論之如此其不可廢也豈不大哉故贊之曰姤之時義大矣哉程河南曰天地不相遇則萬物不生君臣不相遇則政治不興聖賢不相遇則道德不亨萬物不相遇則功用不成姤之時與義皆甚大也司馬溫公曰姤消卦也孔子何大焉夫世之治亂人之窮通事之成敗不可以力致也不可以數求也遇與不遇而已矣舜遇堯而五典克從百揆時敘禹遇舜而地平天成六府三事允治伊尹遇成湯而格於皇天師尚父遇文王而天下大定姤之時義豈不大哉象曰天下有風姤后以施命誥四方天為尊矣其所以與萬物相遇者以有風也故風一披拂而萬物為之鼓舞而感動焉故曰風者天之號令也人君之尊天也其所以與民相遇者亦如風之於萬物焉則能使之鼓舞而感動者矣故曰后以施命誥四方蓋天之所以與萬物相遇者莫捷於風而人君之所以與萬民相遇者亦莫疾於施命故也然不曰號不曰令而曰命云者蓋命天理也天下之事惟天理不容偽以偽言告之施之跬步不可也況四方乎盤庚曰王播告之修不匿厥旨罔有逸言民用丕變夫人君之所以誥四方也尚容有或匿之旨而不能無或逸之言欲天下之丕變也難矣故人君之尊天也其一話一言亦無違天理而巳矣夫天理所在初無定體在天則曰天命在君則曰君命生死豫奪物無不聼者非謂天與君之尊而聼之也聼夫理而已矣及其失也則不然朝號暮令而誠意不加家至戶曉而衆心愈玩此所謂徒挂牆壁之具爾又安知姤之象有所謂施命之旨也哉初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也夫姤之所以為姤者在此一爻也而吉與凶實於此乎判何也有以制之則吉無以制之則凶故也夫所謂制之之道何也曰猶之止物也必有鎮重之器止之使勿動也柅之為器所以止物也而金為之所謂鎮重之器者也此九二之象也初之一陰始生君子懼其動也從而牽繫之於其所謂金柅者使柔道於此止而不得有所往則君子小人各正其位此吉也故曰有以制之則吉苟或不然在我者鎮重之器有所不足則彼失所繫而縱其所往故陰日長而陽日消小人日進而君子日退必見凶害矣故曰無以制之則凶初六爻辭聖人既設吉凶兩端使君子知所戒矣然慮之也深而防之也周故又設羸豕之象使君子不以一陰之微而忽之也夫豕醜穢之畜也而且羸弱冝若無足慮者此一陰在下之象也然徒知今日如是之羸豕而不信其能蹢躅而害物則誤矣一陰微而在下可謂羸矣然徒知今日如是之一陰而不信其能強盛而害陽不亦誤乎故曰羸豕孚蹢躅此聖人重設其戒也朱子發曰一陰雖弱方來也五陽雖盛既往也其可忽諸自古禍亂或始於牀笫之近給使之賤夷裔荒服之逺易而忽之馴致大亂反求其故必本於剛正不足若柔道有牽君子小人各當其分禍亂何由而作九二包有魚無咎不利賔象曰包有魚義不及賔也東坡曰姤者主求民之時非民求主之時也故近而先者得之逺而後者不得也不論其應與否也河南曰在他卦則初正應於四在姤則以遇為重此二之於初則曰包有魚四之於初則曰包無魚夫魚陰物也貪餌而善逝民之象也初六是也當遇之初二與初相遇為密也故近而包之則曰有魚矣何也蓋無常懷者民也近之則親逺之則疏二居近民之位而有遇民之道故民亦從而親之蓋理𫝑然也又何咎乎賔謂四也夫初既主二則四雖初之應也然其勢睽隔而阻於外故以賔目之夫初六之民既主於二此豈四之利歟故曰不利賔蓋以理義言之一民不可以事二君初既主二則義不及四明矣而二有之庸何咎也不然則民將散亂無所主制而羣小之禍作於下矣豈特賔之不利乎為九二者亦將岌岌乎殆矣然則九二之包有魚也亦其𫝑不得不有之也何也巳亂之道無出乎此故也九三臀無膚其行次且厲無大咎象曰其行次且行未牽也夫初六之民既主於二四其正應也義且不及三何有焉三若乘二而求與初遇失所安也故曰臀無膚夫乘二既不安也則當反乎其處可也而遇情未忘不能遽去而有遲遲顧戀之態故曰其行次且雖然九三剛而正也剛而正則知其非義之遇而不可以過求也而自厲自警雖有爭初之咎可以少損矣故曰厲無大咎然三既知厲矣未能無咎而止曰無大咎何也曰如知其非義也斯速巳矣可也今也雖其行也未牽繫於初而猶不免於次且焉故其咎未可能盡無也夫當遇之時一陰在下衆陽之情皆所欲遇也然相遇之道不貴踰越以三之剛正固不宜非義以求遇然不免於此者蓋巽其窮也躁而三者巽之窮故也凡人不能自反自克以道制欲而安其素分者皆躁之為也故聖人於此以厲責之夫姤之三與夬之四亦無異辭也姤也者夬之反也九四包無魚起凶象曰無魚之凶逺民也夫逺民者民亦逺之近民者民亦近之九四逺而包初遂失其應而曰無魚蓋失遇民之道故也夫遇民之道不可逺也四之無魚而其起也凶禍隨之而象則以逺民罪之云者此非四之逺民也乃四之自逺也何也上之人有所動起也而輒罹其凶曽無親上死長之民非自逺而何魯昭公之去季氏也宋樂祁譏之曰政在季氏三世矣魯君喪政四公矣無民而能逞其志者未之有也魯君失民矣靖以待命猶可也動必憂矣既而昭公伐季氏果不勝而死於外以是觀之無魚之凶吁可畏也蓋嘗因是而論之姤之初與四其正應也初不四之應而惟二之遇何也逺與近之間也有夏之民癸之民也民不癸之應而湯之遇癸實逺之而湯實近之故也有商之民辛之民也民不辛之應而文武之遇辛實逺之而文與武實近之故也然則古人所謂民無常懷懷於有仁云者此非民之無常也上之人所以遇之之道無常故也九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也張子厚曰杞周於下者也夫杞枸檵也木之美者也其才高其葉大而蔭故周於下九五之象也而瓜者草之蓏者也滋於此而蔓於彼其實甘脆虆虆然也亦民之象也夫瓜之潰也必自內始初六之陰自內卦而長之象也九五當陰長之時處高而強盛必當有以芘乎下而豫防乎民之潰故有以杞包瓜之象子厚所謂厚下以防中潰是也夫以九五居中而正者也當陰長之時有中正之美含之以俟天命何所容其心哉故當是時也一陰浸長陽道消剝者天也厚下以防中潰者人也在我者未中歟未正歟吾之憂也在我者既中矣既正矣雖或不遇而至隕越者則亦天之命也吾獨奈之何哉故含章以俟天命者九五之志也子厚所謂盡人謀而聼天命是也雖然命天理也在天謂之命在人則中正之德是也中正之德藴蓄於內則在我之外無别有天矣故人謀既盡天命在是天人之理相合而不相舍則天命之修短又在我而不在天矣夫何隕越之有哉昔召公作召誥一書以誥成王專以天命告之也然一書之旨則在於祈天永命之一語而已爾及吾求其所以祈天永命云者則又不過於敬吾之德焉觀其悉數夏商而告之曰我不敢知曰有夏服天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命夫有歷年與不其延或修或短召公以為凡此皆天命也命在天故皆非我所敢知也然我所以敢知者惟知不敬厥德乃早墜厥命云爾然則厥命之早墜云者乃在於厥德之不敬而疾於敬德者又祈天永命之要學也故曰肆惟王其疾敬德王其德之用祈天永命嗚呼吾以是知九五有中正之德志不舍命其能祈天永命矣有隕自天非所患也上九姤其角吝無咎象曰姤其角上窮吝也剛居一卦之上亢窮而無所遇角之象也夫相遇之道不可逺也以九四之於初也雖應而無所遇故象以逺民罪之況上九乎蓋亢則自絶剛則喜觸以是遇人人望而畏却矣其誰與遇哉噫當遇之時而無與之遇何吝如之夫我有遇人之道而人不我遇則其過在人然孟子於此猶有言曰仁者愛人有禮者敬人愛人者人恆愛之敬人者人恆敬之有人於此其待我以橫逆則君子必自反也曰我必不仁也必無禮也此物奚冝至哉自反而仁矣自反而有禮矣其橫逆由是也君子又自反也曰我必不忠矣自反而忠矣其橫逆由是也君子至此則不得已而以妄人目之以禽獸侣之由是觀之則我無遇人之道而人不我遇則其過又誰在乎噫在我而已矣此上九之姤其角無與之遇既以為吝也而又無所歸其咎也噫是咎也既無所歸歸之已可也故又責之曰無咎童溪易傳卷二十
