body:
  text: 童溪易傳卷二十九宋王宗傳撰繫辭下八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趨時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭上繫首章述聖人作易之意而終之以乾坤之易簡下繫首章亦然故聖人欲人知變以成功業即聖人因易簡以成德業也夫伏羲始畫八卦八卦成列則天地山澤雷風水火八物之象在於八卦之中因此八卦以一至八六位成章則九六二爻又在重卦之中矣剛即九也柔即六也九六相推所以為變則九六之變又在剛柔之中矣聖人從而繫之以辭而命之於人使知吉凶之所以然而明其趨舍焉則趨舍之動又在乎爻辭之中矣是故大者為吉凶小疵為悔吝皆生乎動濂溪周先生曰吉凶悔吝生乎動噫吉一而已動可不謹乎易之本也本於乾坤之剛柔是剛柔立易之本也易之本一立則乾坤闔闢之變往來不窮之通自此而為八卦自此而為六爻惟變所適而六十四卦之序各以時成故曰趨時所謂趨時者亦欲人辨其吉凶而為之趨捨爾故又繼之以吉凶者貞勝也夫至不一者天下之動也吉與凶是也欲一天下之動非是貞不能勝之天地日月所謂動物之尤大者也皆不離乎是貞則是貞也萬物本之以成體所謂動中之不動者也故夫變通趨時者乃其動也剛柔立本者乃其不動也天地之道變化無窮可謂動矣然上下之位不變動也故曰貞觀日月之道往來不息可謂動矣然晝夜之常不變動也故曰貞明孰謂天下之動非是貞以為之體孰能一之乾曰貞固足以幹事是也夫易之作也本於乾坤之剛柔逮夫剛柔相推有爻有象既動夫內有吉有凶功業以成則變通趨時之謂也是故乾德至剛確然而健示人為君為父為夫之道可謂易矣坤德至柔隤然而順示人為臣為子為婦之道可謂簡矣爻之立也效此易簡而已象之立也像此易簡而已謂自剛柔健順之外初無他事故也爻與象動夫一卦之內則吉與凶見乎其外惟能入吉凶之域而不昧於吉凶者則知趨捨之變而功業由此而成矣人其可以不知變乎未能知變此聖人不能已之情又見乎其辭之所命而曰如此則吉如此則凶然則聖人示人以辭亦不外乎乾坤易簡之理而已矣天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為網罟以佃以漁蓋取諸離包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致遠以利天下蓋取諸渙服牛乘馬引重致遠以利天下蓋取諸隨重門擊柝以待暴客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也前章言聖人作易以垂萬世之教此章乃言聖人用易以致天下之利夫立天之道曰隂與陽則天之於物獨隂不能生獨陽亦不能生立地之道曰柔與剛則地之於物獨剛不能生獨柔亦不能生此天地之德合二氣以成大也立人之道曰仁與義故聖人所以配天地而王天下者亦有仁義而已矣夫王天下者必有是位而後是德行焉故聖人大寶曰位孟子曰不仁而在高位是播其惡於衆也播其惡於衆則衆必離而是位也不可以守故曰何以守位曰仁仁德也財仁德之用也孟子曰徒善不足以為政故又曰何以聚人曰財程河南曰富者衆之所歸惟財為能聚人夫天地之生萬物乃所以養人也天地生財以養人而聖人為天地主財以為君能使夫人仰事俯育養生喪死各得其宜而無乖爭之失者非是義不可也蓋義也者乃所以輔仁也理財如所謂作網罟以佃漁作耒耜以耕耨致民聚貨以交易之類是也正辭如所謂易結繩以書契百官以治萬民以察是也禁民為非如所謂重門擊柝以待暴客弦弧剡矢以威天下是也朱子發亦曰義所以為仁非二本也古之聖人如包犧氏神農氏黃帝堯舜氏皆得其道也故下文繼之以十三卦之制作焉然八卦始於包犧重卦成於文王當犧農黃帝堯舜之時重卦未立而有十三卦之制作何也蓋三才既設此理已具聖人有以見天下之賾故通變以宜民是理也邵堯夫所謂畫前有易是也吾夫子發明之爾夫法象莫大乎天地聖人作易必本於天地故曰仰則觀象於天俯則觀法於地然天地之法象散於萬物而聚見於吾身無所不觀無所不取而後易之理無遺矣故又曰觀鳥獸之文與地之宜近取諸身遠取諸物耿希道曰仰觀象於天則所以畫乾者得矣俯觀法於地則所以畫坤者得矣然乾純剛也坤純柔也剛柔未雜也觀鳥獸之文而知剛柔之相雜於是乾坤相索而六子生焉又觀地之宜而知剛柔之異齊於是乾坤六子猶父子之殊體兄弟之異才焉聖人觀象於天觀法於地觀鳥獸之文與地之宜而八卦之理得矣又近取諸身而首足耳目之屬無不契遠取諸物而水火山澤之屬無不類俯仰縱橫遠近合矣於是始作八卦也八卦作則不可測知之妙與無所終窮之變可見於此故曰以通神明之德近取諸身則以一身可以知八物遠取諸物則以八物可以知萬物故曰以類萬物之情包犧之世其俗飲血而茹毛也然與禽獸爭一旦之命聖人閔焉故網罟之設而以結繩為之使之漁魚於川佃獸於山而免山川之害此之為制則取之離也蓋離為目目目相附網罟之象而其義則麗也言以網罟佃漁而禽獸麗之也神農氏時民厭鮮食聖人於是教之耕殖斫木為耜揉木為耒而興耒耜之利其所以取諸益者蓋益之為卦合震巽以為體震木也巽亦木也故或斫之或揉之斫云者欲其適宜也揉云者欲其能直也而耒耜之利興而後其益無窮矣夫有菽粟者或不足於禽魚有禽魚者或不足於菽粟此又懋遷有無之不可以已也日中者萬物相見之時也市者致民聚貨以相交易之地也噬嗑之為卦也合離震以為體離明在上則日中也震動於下則為市也雜卦曰噬嗑食也交易而退各得其所則食貨流通無有餘不足之異矣朱子發曰唐虞氏時洪水之患庶民鮮食然後教民稼穡懋遷有無化居其道萬世一揆夫食貨既備則斯民飽食逸居苟無尊卑上下之分以示之則強弱相陵鬬爭攘奪與禽獸無異矣此黃帝堯舜氏所以用通變之道使天下之民無有倦怠之心而服勤以事其上至於通變之道民皆由之而不知則又各得其宜矣夫通變之道本於易易也者生生不窮之謂也故曰易窮則變變則通通則久聖人通變之道而至於久此斯民之所以不倦所以宜之也故舉大有上九之爻辭曰是以自天祐之吉無不利以言君民上下至此皆吉且利也夫當此之時所以通變之道何也亦曰使斯民自别於禽獸而已故取乾坤一定之尊卑而垂衣裳以示之乾在上為衣坤在下為裳斯民也得於觀感則上下之分定而強弱相陵鬭爭攘奪之禍息矣天下胡為而不治乎又況神農氏時與民並耕而食饔飱而治至是尊卑位定君子小人各有所職則上下無不辨之分韓氏曰垂衣裳以辨貴賤是也自此而下皆黃帝堯舜之所為也渙隨二卦舟車之用也蓋自上古山無蹊澤無梁至是則刳木為舟剡木為楫以通諸川刳云者欲其中虛也剡云者欲其末鋭也渙之卦上巽下坎巽木也坎水也木行水上有舟揖之象而渙之彖亦曰利涉大川乘木有功也故渙有濟險之義而聖人取之上古牛未穿馬未絡至是則服牛乘馬以通諸塗服云者以其能引重也乘云者以其能致遠也隨之卦上兑下震兑説也震動也動而説隨有車馬之象而隨之上六亦曰拘繫之乃從維之故隨有隨人之義而聖人取之川塗既通則暴客之來不免有意外之慮於是重其門以防之擊其柝以警之此聖人待暴客之道也豫之為卦有逸豫之義又有備豫之義逸豫則不知戒備豫則知戒爾坤為闔户則為重門震木處上則為擊柝蓋震為木又為雷以木而遇雷則有震擊之聲也此聖人取以為備豫之道亦以示逸豫之戒也朱子發曰知耒耜而不知杵臼之利則利天下者有未盡故教之以杵臼之利蓋取小過知門柝而不知弧矢之利則威天下者有未盡故教之以弧矢之利蓋取諸睽小過之卦上震動也下艮止也上動有杵之象下止有臼之象鄭氏少梅曰震以卯木而在上艮以寅木而在下二卦中分之斷木也艮為土而木克之掘地也睽之卦上離下兑其彖曰火動而上澤動而下又曰二女同居其志不同行而其象則曰君子以同而異夫聖人之制弧矢也何所取乎亦取其所以同而異之義云爾夫弧與矢其機未之發也兩者相麗未嘗不同及其既發也則所謂弧者不離乎吾之掌握而所謂矢者已在百步之外矣此以同而異也易之所謂睽者如此又況睽也者乖爭之謂也弧矢也者聖人所以定乖爭也曰弧矢云者欲其徑且直也剡之義亦與剡木為楫之義同棟宇之制所以逸人之生棺椁之制所以逸人之死此皆器用之大者上古朴略之風至是而無存矣鄭氏少梅曰棟宇必固其基故大壯下纍四陽以為基此聖人所以有取於大壯也棺椁必堅其中故大過中存四陽以堅其中此聖人所以有取於大過也大壯外震震動也風雨漂搖之義大過內巽巽入也殯葬入土之義此皆養生送死自然之理鄭氏又曰八卦之位分於八方而震巽二木乾兑二金坤艮二土坎離一水一火分於四維兩不相合兩相合者惟震巽之木乾兑之金也而書契之作取兩相契合之義以代結繩不取震巽而取乾兑者終始之道也八卦始乾而終兑兑與乾俱為金兩相符合而又適相會於西北西北為天庭夬決之象夬曰揚於王庭是也百官以治萬民以察之理於是乎在此書契所以取諸夬也又曰由歷代聖人制器而觀之則易之道無非象矣何則天之所垂者象也天有弧矢之象有杵臼之象有天網天市之象有天庭天田之象無一而非象聖人所制之器豈非像其象邪惟像其象故六十四卦未畫之前其道已備矣聖人畫卦之後又有一聖人出焉為彖辭以繫之而曰所以為彖者制器像象之材也爻也者效制器像象之動也使悟易者莫不因其材而效其動則吉凶悔吝豈不明白乎哉陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪易曰公用射隼於高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于包桑子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不遠復無祗悔元吉天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶十三卦論聖人之制作而繼之以十一爻論君子小人之道吾是以知易之為易無非為經綸世變而作也噫此非吾夫子其孰能發而明之以至於此乎陽卦一竒而二耦也故曰多隂隂卦一耦而二竒也故曰多陽聖人曰此其故何也蓋曰其故在於竒耦也陽卦竒震坎艮是也隂卦耦巽離兑是也聖人又曰此其德行何也蓋曰其為德行在於一與不一也一者何也曰陽之為卦二民共事一君一也故為君子之道不一者何也曰隂之為卦二君共爭一民不一也故為小人之道蓋易以陽為君以隂為民陽為君子隂為小人是故十一爻之所論無非君子小人之道也咸之九四君子之道也咸之卦德曰咸亨利貞而九四則曰貞吉悔亡蓋咸道貴亨而所以亨者貞也憧憧往來此心有不一之思也此心所以有不一之思者何也咸道欲其亨也咸道欲其亨而未亨故其象曰未光大也若爾之所思一出於正則所感者大其孰不惟爾思之從也哉此則亨矣故曰朋從爾思而彖亦曰天地感而萬物化生聖人感人心而天下和平然則天地聖人之所以感一於正而已矣天下何思何慮云者以言天下萬物何所思何所慮也朋從夫爾之思而已矣使九四之思一出於正則天下之萬物雖趨捨殊塗好惡百慮皆惟爾正之是適故曰同歸一致而又申之曰天下何思何慮蓋確言天下萬物朋從夫爾之思也而或者必曰九四憧憧然或往或來以有思之私心而感物則感道狹矣故思之所及者有以致朋類之從思所不及者其能使之從歟殊不知帝堯之所以光宅天下者特以聰明文思而文王之所以聖者亦本於思齊孰謂思可無乎又況聖人以此心感人心無思則木石爾奚感之云日月寒暑之相為往來此則以言萬物之理或往或來之不一也寧不由憧憧往來此心有不一之思乎然雖或往或來之不一也而有所謂同歸一致者存故日月往來之不同而同於生明寒暑往來之不同而同於成歲明生而嵗成此感道之所以亨也感道欲其亨雖欲不往不來可乎往者其勢屈來者其勢信此勢也乃其理也天下萬物孰能逃此乎夫苟不往不來則感道息矣奚利之云故往來屈信相為感召而利由此生焉而九四之象亦曰貞吉悔亡未感害也以言未感則類於木石而利何從而生乎故為感道之害尺蠖龍蛇之屈蟄所謂屈也然其屈也乃所以求信其蟄也乃所以存身蓋不屈且蟄則信不可求而身不能存感道之在物也如此而况於人乎况於聖人乎神之外無人人之外無神神之與人特有隱顯之異爾凡吾平日所謂宜然之事者致其精一之誠以至於自然而然此入神也於以致用則用無非神矣身必資於用用必資於身身與用特動靜之異爾凡吾平日所謂當然之用者泛應曲當無適不利而吾之身若無與焉此安身也於以崇德則德積諸身矣此全內外之道而感道之所以亨也吾之所知者知此理而已舍此理而往又何知乎此爾之思一出於正也夫精義以入神則能窮神也於神無隙而可入安能窮神哉利用以安身則能知化也吾身或有所纍而不得安安能知化哉存神過化全盡於我則上下與天地同流以此感人則殆如天地之感而化生之德無以形容其盛矣困之六三此則小人之道也易傳曰石堅重之物也而非隂柔之才所能勝也往而犯之祗自困爾故曰非所困而困焉名必辱謂九四九五二剛之堅重不可犯也而三犯之以取困也蒺藜蔓草之有角刺者不正之人濫乘非據而處正人之上豈所安也故曰非所據而據焉身必危謂九二之剛中豈可乘也而三乘之非其所安猶藉刺負芒然也夫六三所以輕犯二剛以取困者徒以上六吾配故也六三隂也而居陽自以為陽也而求配乎上六而上六隂虛宫則是也而非其妻故曰入於其宫不見其妻凶小人輕進妄動無與親合危極困辱如此豈吉祥之徴也哉故不免於凶禍也繫辭於此又言其所以凶也而曰既辱且危死期將至妻其可得見邪蓋甚之也解之上六與噬嗑之初六皆君子所以待小人也易傳曰解之上六解之功已成故極言解悖之道夫隼鷙悍之禽也所謂上慢而下暴六三之象也解之六爻惟三與上各處一卦之上而非其應故上以震動之極而尤在諸爻之上於位則正於勢則便於器則成於時則宜以正而去不正獲之蓋無難者仁義人性之所固有也勸懲人君之大權也亡其所固有者而至於必待勸且懲者此失其良心之民也是故恥畏之心不存則勸懲之術不得已而施焉施之於早則噬嗑初九是也小人蒙福多矣若夫失是則此雖小人之罪而上之人亦不能無失焉然而聖人教人不以此義為言而曰善惡之積云者聖人之意可知也夫聖人之意何在乎曰上之人以至於用刑用戮者此非我之本心也皆自汝致之吾不得已而應之云爾此聖人之心即天地之心也何疑焉善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解此初九屨校滅趾所以無咎而上六何校滅耳所以凶也否之九五與鼎之九四其所以為安危之慮者甚相反也此又可以見君子小人之情狀夫安其位則危保其存則亡有其治則亂此必至之驗也君子知其然故此心常存不亡之念宜其身獲其安而國家由之而可保也鼎之四則異於是不自知其德之薄智之小力之少而任至重之寄宜其不免於傾覆之凶也若夫豫之六二則不然何者以其能知幾也惟夫知幾則當豫之時不屈已以徇人而無上交之諂不屈人以徇已而無下交之瀆存諸我者無毫髮之失故聖人嘆之曰知幾其神乎又曰其知幾乎而美之曰君子知微知彰知柔知剛萬夫之望夫幾之為言事之初也於事之初而能豫知之此中庸之所謂前定也吾之所知者不在於臨事之後此所謂動之微吉之先見也非神而何惟與乎神則見幾而作不俟終日斷然而識此幾矣夫所謂知幾者天下之理日彰者常寓於至微至剛者常始於至柔知幾之君子則無不知也其所以無不知者何也豫之六二居坤之中靜中之靜也震在乎外動作萬變而吾之此心安然而無事此萬物之理皆於靜中得之故在爻有介于石之象雖有多智之萬夫其孰不仰望乎我而取之以為法乎殆庶幾乎者此顔氏子其人也故繼之以復之初九夫君子之道在於善小人之道在於不善惟顔子知其善也則拳拳服膺而弗失之知其不善也則非惟未嘗不之知也而又知之而未嘗復行焉此所謂不二過也聖人安得不以復之初爻而豫之上繫曰默而成之不言而信存乎德行此非顔氏之子其孰能當之君子小人之道即天地之隂陽也故在易則為隂陽之卦然其本一也所謂一者何也天地絪緼男女搆精是也夫惟天地隂陽二氣相合而絪緼則萬物由此而化醇致一之謂也男女隂陽二氣相合而搆精則萬物由此而化生亦致一之謂也所謂致一之説則損之六三詳而明之易傳曰夫兑之三爻皆志於益上然初九九二則以剛應柔而六三則以柔應剛故三人同行而語其自損之至者則六三是也故曰損一人是一人也獨往以應上故艮兑相合男女搆精而盡天地交感之義成萬物化育之功矣此謂得其友也蓋六三者兑之主而上九者艮之主少男少女隂陽相配夫婦之道貴於專一若三人行則疑所主矣故曰一人行三則疑也夫君子小人之道不難知也君子之動也安其身而後動小人之動也則危以動焉君子之語也則易其心而後語小人之語也則懼以語焉君子之交也則定其交而後求小人之交也則無交而求焉君子修此三者故全其在已與其在人者而小人無一焉宜其莫之與也吁莫之與固無害也而傷之者至則又豈特莫之與也故益之上九有莫益之或擊之之辭是何也立心勿恆之故也噫人之心其可以勿恆矣乎以是言之則此章所謂君子小人之道於是乎判矣子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意邪夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其旨遠其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報此章復言易之作也本諸乾坤學易者當自乾坤而入故曰乾坤其易之門邪夫萬物以氣則不離乎隂陽以形則不離乎剛柔大而為天地妙而為神明其見於易之書也名稱萬端雜然不一其能越於乾坤也哉此乾坤所以為易之門邪夫隂陽之氣相與合德則通隱顯而為一也故曰以通神明之德剛柔之形各有定體則體萬物而不遺也故曰以體天地之撰撰所以造物也易自伏羲畫之文王重之夫子贊之皆本於乾坤而稽考其類故大而天地微而事物莫不悉備觀象繫辭視上古為尤詳此其故何也蓋世既下衰人不知道不顧理之順逆時之否泰倒行逆施而昧夫吉凶之所以然故聖人不得已詔之以是書而不厭其詳此聖人作易之本意也故曰其衰世之意邪且夫人之所以昧夫吉凶者以其心之有二而所見之不一也此聖人作易所以因其二以濟民行而明得失之報以示之使之勿二爾心也然易之所以明得失之報以示人者蓋天下之理往者吾能彰之使人稽其所以然來者吾能察之使人逆其所未然顯者吾能微之使人有所不敢玩幽者吾能闡之使人無或有所蔽開明此理而寓之於其書故當夫稱謂之名辨夫隂陽之物正夫告戒之言斷夫吉凶之辭以此書載此理則聖人所以示人者無不備矣故夫所稱之名雖小而取類則大如曰牛曰馬而上比天地豈非取類也大乎所寓之旨雖遠而其辭則文如元亨利貞吾求其旨則天地之四時人心之四端實在於是以訓釋求之則曰善之長嘉之會義之和事之幹其辭豈不文乎見豕負塗載鬼一車等語詭怪不經可謂曲矣而象則曰羣疑亡也此乃中理之言也包羲之網罟神農之耒耜萬古而下其事顯然而肆其誰不之知也然取之離取之益非吾夫子不能發而明之豈非隱乎嗚呼易之為易也如此此其所以能明得失之報以示人也童溪易傳卷二十九
