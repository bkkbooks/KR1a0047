body:
  text: 童溪易傳卷十九宋王宗傳撰兌下艮上損有孚元吉无咎可貞利有攸徃曷之用二簋可用亨彖曰損損下益上其道上行損而有孚元吉无昝可貞利有攸徃曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行昔者聖人之作易也盖所以抑人欲而就天理者也始終六十四卦大抵然也而其尤深切著明者予又於謙也節也損也之三卦見之矣是何也盖人之情莫不欲倨肆之為便而誇尚之為髙也而聖人則抑之曰是不可也易有謙退之道焉此卦之所以有謙人之情莫不欲侈縱以自適而滿溢以自盈也而聖人則抑之曰是不可也易有節止之道焉此卦之所以有節人之情莫不欲裒剋以自肥而忿戾之是騁也而聖人則抑之曰是又大不可也易有自損之道焉此卦之所以有損聖人之心何其仁也盖聖人者天理之盟主微易則斯人天理日負而人欲日勝易微此三卦則所以抑人欲而就天理者又或緩而未切晦而未明者矣夫卦之所以為損者聖人曰損下益上其道上行諸儒之言曰損乾之九三益坤之上六此之謂其道上行也噫未也此泥於卦變而曰此卦自泰来也而予之所見則曰聖人之心不如是之徒然也以徒然之學而求聖人之心此所謂終日談飲食而无益於飢渇者也又況其所談者非真可飲真可食之物也如飢渇何然則其說何也曰予聞之六子之卦皆由乾坤父母隂陽二氣相感而然也八卦成列因而重之則以艮重兌是以為損非謂以坤重乾而為泰復由泰而為損也故夫所謂損下益上云者以卦之才言之不過曰乾三索於坤而得兌而兌之在損也則為下體故曰損下謂六三之為隂也坤三索於乾而得艮而艮之在損也則為上體故曰益上謂上九之為陽也如是足矣又何用自泰來乎以卦之義言之則兌之三爻以說居下而皆上應說以奉上者也故凡天下之有餘才餘智者不自有也損之以益上則獻替之道行於上矣凡天下之有餘粟餘布者亦不自有也損之以益上則供奉之道行於上矣故曰其道上行雖然損之道以誠信為本損而不本於誠信則有餘才餘智者損之則以為屑有餘粟餘布者損之則以為怨此无吉而有咎非可貞之道不可行也其能舉天下之君子小人以仰事一人矣乎故損而有孚則元吉而无咎矣此之謂可貞之道有攸徃而利也所謂有攸徃而利者无施而不可也且以享祀言之享祀之禮其文雖繁然以誠敬為本曷之用謂何用乎文之繁也夫苟誠敬則於其享祀也雖二簋之簡且薄亦可用矣何者以有孚故也左氏曰苟有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釜之器潢汚行潦之水可薦於鬼神可羞於王公是也而夫子從而釋之曰二簋之簡且薄而可用以享者惟損之時為然夫末之勝而本之衰文之盛而實之衰則二簋亦可用以享矣此所謂當損也夫苟本實未喪而過用裁損則又失之矣故曰應有時謂時然而然而吾之應之不可泥也故又繼之曰損剛益柔有時夫剛易失之强强則或過柔易失之弱弱則不足損剛以益柔損强以益弱損過以益不足此時中之學也故又終之曰損益盈虚與時偕行夫易之為易時焉而巳矣君子之於易亦隨時以從道而巳矣或損也人曰此虚也或益也人曰此盈也而不知君子无容心於此也與時偕行而巳矣夫惟與時偕行則或損也或益也而惟時之為聽則當此時也而二簋之是用不亦可乎此卦之徳所以有曰有孚元吉无咎可貞利有攸徃曷之用二簋可用享也象曰山下有澤損君子以懲忿窒慾山下有澤澤宼山而山塞澤也夫彼日為吾冦而吾日有以塞之則吾之所以塞彼之冦者用力多矣盖塞之者止其勿吾冦而巳也吾非從彼也夫吾非彼之從則其能自克者甚矣此所謂損也君子於此故懲忿窒欲程曰天下之害无不由末之勝也損者損過而就中損浮末而就本實也淫酷殘忍本於刑罰窮兵黷武本於征討此君子之忿在所懲峻宇彫牆本於宫室酒池肉林本於飲食此君子之欲在所窒有所懲有所窒者皆損之力也初九巳事遄徃无咎酌損之象曰已事遄徃尚合志也兌體三爻皆損下以益上也然九二則以弗損而為益六三則以獨行而得友初九之陽方盈在下則當損下之盈以益上之虚此所謂出粟米絲麻以事其上者也夫耕穫蠶繅之事旣以巳矣則當速徃以奉於上乃能不失以下事上之職而𫉬免厥咎雖然損下之道又不可過過則害民故當酌而損之量其勢度其宜使下之所以供於上者其心不厭而上之所以取乎下者其道不窮如是則君民之志庶㡬其可合而上下无齟齬之嫌矣然則下事方休而速徃以繼之其孰曰不可巳止也遄速也酌量也尚庶㡬也九二利貞征凶弗損益之象曰九二利貞中以為志也庸人之事君也惟知曲意媚說竭力順從而以為忠也而曰此益上之道然也然以媚說順從為事則在己者所損多矣安能裨益於人主之萬一哉君子於此則以无所損於己者益於上也夫所謂无所損於己者何謂也曰中正是也君子以中正之道自守自守如此則雖不若世之庸人曲意媚說竭力順從而以為忠也而益上之實无出諸此此乃所以益之也故曰利貞征凶弗損益之而象曰九二利貞中以為志也九二說體也故有利貞征凶之戒然以九居二中也中則正矣故知弗損益之之義書曰若射之有志夫射期於中也故設鵠以為志而射者之志亦志於鵠君子之志亦志於中而已矣中以為志則在已者无失而益上之實亦无出諸此又何待於枉己而曲從損己以為益也哉李大亮之都督涼州也臺使至諷大亮獻名鷹大亮密表曰陛下絶田獵乆矣而使者求鷹如陛下意乃乖昔㫖如有擅求是使非其才太宗報書曰有臣如此朕何憂倪若水為江州刺史明皇遣使江南採鵁鶄若水論之為反其使李徳裕之在浙西也詔造銀盝子粧具二十事織綾二千疋德裕上疏極論罷之又詔益州織半臂背子琵琶捍撥鏤牙合子等蘇頲不奉詔唐家諸臣所以益上也如此正得利貞弗損益之之義六三三人行則損一人一人行則得其友象曰一人行三則疑也程曰三人謂下三陽上三隂三陽同行則損六三以益上三隂同行則損上六以為三此未免泥於卦變而謂損自泰來一也然則所謂三人云者舍損以泥泰亦惑矣夫兌之三爻皆志於益上然初九九二則以剛應柔而六三則以柔應剛故三人同行而語其自損之至者則六三也故曰損一人是一人也獨徃以應上故艮兊相合男女搆精而盡天地交感之義而成萬物化育之功矣此所謂得其友也盖六三者兊之主而上九者艮之主少女少男隂陽相配夫婦之道貴於專一若三人行則疑所主矣故象曰一人行三則疑也而繫辭於此爻又以致一之說釋之坤之彖曰西南得朋乃與𩔖行東北喪朋乃終有慶亦是意也六四損其疾使遄有喜无咎象曰損其疾亦可喜也六四以柔順之才處近君之位所謂人臣之髙位也處此之位當損之時宜如何哉務在順民之心損其疾苦而又不至於困憊然後加檢省焉則天下之心以為上之人我恤而不我忘也其孰不舉欣欣之喜色而以為庶㡬无疾病也又孰我咎乎孟子謂鄒穆公曰凶年饑嵗君之民老弱轉乎溝壑壯者散而之四方者幾千人矣而君之倉廩實府庫充有司莫以告是上慢而殘下也夫饑饉之來賑之䘏之惟恐其後如六四之所謂使遄有喜可也今也不能損其疾苦使之流離轉徙及至兵戈之日斯民疾視其長上而不救其死則怨咎之心至此始𫉬逞矣為穆公者又從而尤之則上下相咎何時而已邪故曰夫民今而後得反之也君无尤焉謂其旣不能使下之无咎於上而上之人又安可歸咎於下乎六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也夫居天下之中而能虚中而无我自損以逮下此甚盛之徳也故天下之益皆歸焉其曰或益之謂益之不一也故有十朋之龜之象焉夫龜靈智之物也古者用之以稽疑一人虚中而無我自損以逮下則天下智者效其謀才者奏其技而有不能自巳之心焉其為吉也不亦大乎夫人謀之從違天命之予奪也一人自損於上而天下之益皆歸焉此人也而天之理實行乎其中矣故象又曰六五元吉自上祐也詩之卷阿言求賢用吉士而作也其首章曰有卷者阿飄風自南豈弟君子來游來歌以矢其音詩人之意盖曰一人虚中无我自損以逮下若卷阿然則飄風可得而入矣故來游來歌者於此得以矢其音焉其七章曰藹藹王多吉士維君子使媚於天子其八章曰藹藹王多吉人維君子命媚於庶人則益之不一其勢盖如此也然於其四章乃曰爾受命長矣茀禄爾康矣豈弟君子俾爾彌爾性純嘏爾常矣則六五元吉自上祐也又可知也然則成王之所以能為持盈守成之主者此盖有得於損之六五也歟上九弗損益之无咎貞吉利有攸徃得臣无家象曰弗損益之大得志也夫損極必益處損之極若以剛亢在上損下不巳是非處上之道也故上九以不損而益下為義夫君子之志志於益下而巳方其益下之功未及於斯人也則吾之此志未為得也益人之功所及者一二而所不及者猶不可勝計也則吾之此志亦未為大得也及其位人之上而曽无損於下焉惟有益於下而巳也則吾之平日窮之所養而見於達之所施也容有少慊云乎哉故曰大得志也如是則位人之上可以无咎過也揆之正理庸非吉乎夫執此之志以徃益於下此上九之所利也卦徳有曰元吉无咎可貞利有攸徃上九以之故論其所得則上九處人臣之極位而專以益下為心豈遑家謀乎夫六三以隂柔在下專應上九故有一人行之義上九以陽剛居上得損極必益之理故志在益人而不遑家謀易之為易隨爻取義𩔖皆如此不可泥也震下巽上益利有攸徃利渉大川彖曰益損上益下民說无疆自上下下其道大光利有攸徃中正有慶利渉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行益合震巽而成體以卦之才言之坤一索於乾而得巽而巽之在益也則為上體故曰損上謂六四之為隂也乾一索於坤而得震而震之在益也則為下體故曰益下謂初九之為陽也此主初九六四二爻以言益也夫陽本居上今也初九居一卦之下又有自上下下之義亦如屯之初九以貴下賤之謂也此再指初九一爻以言益也以卦之義言之則凡人君損四海之供奉以益天下之不足則天下之心以為此吾君之惠也其為說懌豈有紀極也邪損萬乗之尊嚴以下天下之賢者則天下之心又以謂此吾君之謙也其道下濟豈不大光矣乎夫損四海之供奉以益天下之不足宜若所損者偏在上而所益者偏在下也而民說无疆則所益又在上矣損萬乗之尊嚴以下天下之賢者又宜若所損者偏在上而所益者偏在下也而其道大光則其所益又在上矣然則益之為道上下俱享其利矣故卦德曰利有攸徃利渉大川无適而不利焉利有攸徃中正有慶此指震巽二五各得其正以言益也利渉大川木道乃行此指巽震二體皆為木而以言益也益動而巽日進无疆此又指巽震二卦之用以言益也天施地生其益无方此又指乾坤一索而得震巽長子長女相與用事以言益之功用之所以大也至於凡益之道與時偕行則結一彖之文以言益之道與益之時所以相為无窮者也夫以九五居中履正為益之主六二居中履正為益之臣二五以中正居君臣相應之地當益之時相與以成益之功何徃而不利哉此所以有慶也益之為言利濟夫物之謂也利渉大川云者易之所謂濟世之大功也夫渉大川則舟楫之是恃也有舟楫之足恃則亦何不濟之云乎益之時貴於无所不濟也今也合巽震而成卦則木道固无所不足矣以之而濟物此木道之所以行也震動也巽順也益動而巽則凡有所動順乎理之謂也夫循理而動則人偽去盡而誠意有餘以此為益則其進也日進而无已也彼天施而地生其所以益萬物也未嘗以一方拘者是亦循理而動焉爾故一氣旣施而感是氣者无逺邇无小大莫不於此而肇其生焉則天地之益豈以一方拘之乎哉以是言之則大凡益之為道本於順理而動而極於天地其大者又可以一言而盡也何也曰誠而已矣誠則始焉而日進无疆終焉而其益无方此非至誠之德與時偕行而无有窮巳其能至是乎噫大哉誠也象曰風雷益君子以見善則遷有過則改雷以動之風以散之雷風二物相繼有序此雷風所以為恒風得雷而威益彰雷得風而聲益逺雷風二物相益為用此風雷所以為益君子觀風雷相益之象而盡其所以相益之道故見善則遷不以是善之在人也而忌之有過則改不以是過之在己也而吝之外不忌其在人者内不吝其在己者此外内之義相益之道然也初九利用為大作元吉无咎象曰元吉无咎下不厚事也他卦以九居初雖有剛明之才而處下位不可以有為也在益則初九震之主也上之人方且自損以益下而投之以艱大之事其責之也厚倘或避難辭重而无以副上之責則在己者為不勝任矣故居此之任者以用大作為利謂其所利者利於成大功集大事盖初與四居相應之地而九五在上又有同德之君四巽之主也初震之主也震巽相與當益之時而艱大之事義不可辭故也故有能為之才而當可為之時而上又有同德之君知己之大臣則其成大功集大事也何徃而不利故居一卦之初而有元吉也謂其得吉也處衆賢之先而且大也旣有元吉則在已者无有不勝任之咎矣夫當此之時事之投我者旣厚吾苟以其位之下也而厚其事焉則避難辭重不能成大功集大事人且以不勝任咎之矣故象曰元吉无咎下不厚事也彼衛之忠臣不得其志詩人為之賦北門其二章曰王事適我政事一埤益我我入自外室人交徧讁我其三章曰王事敦我政事一埤遺我我入自外室人交徧摧我夫所以適我益我敦我遺我者若是其厚也疑若得我之志而展我之才矣然我入自外而讁我摧我者又若是其衆而无有我知而我信者則我之志亦安能得而我之才亦安能展邪欲如益之初九元吉无咎難矣然則君子於此當如之何曰亦歸之天命而巳矣故詩人為之三歎曰巳焉哉天實為之謂之何哉六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也益之六二即損之六五也在損為六五則為𫉬益之君在益為六二則為𫉬益之臣語其能虚中无我自損以逮下則一也故二爻无異辭也昔者魯欲使樂正子為政而孟子為之喜而不寐而公孫丑乃疑而問之曰樂正子强乎有智慮乎多聞識乎孟子皆曰否但曰其為人也好善而已盖嘗論之矣强則自用有智慮則多疑多聞識則務以所長盖人人心有是三累其能使四海之内輕千里而來告之以善乎夫惟好善之心勝則雖非强也雖非有智慮也雖非多聞識也此正秦穆公所謂一个臣之无他技者然其心休休能容而天下之益皆歸焉以是而輔相人主優於天下矣此好善之力也然損之五則曰元吉而益之二則曰永貞吉何也以六居二雖正也然震體也震則動動則不常矣故以永貞戒之以言永得其正則吉矣王用享於帝吉云者謂以二之虚中而且永貞故雖王者用此道以享上帝則上帝降格猶可以𫉬吉又況用此以逮下則四海之内其有不輕千里而來告之以善乎是宜或益之者自外而來之多且衆也夫以衛文公臣子多好善賢者樂告以善道而詩人猶為賦干旄以美之又況六二為益之大臣矣乎其益之之多且衆宜也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也天下未嘗无凶患之事此古今之所固有也當益之時无所不用其益而後可也夫古今天下固有所謂凶患之事也苟坐視而不之救此豈居民上者之職歟雖然用是事也𩔖非拘常而襲故者所能為也是必有所謂沉鷙淵謀之才而後能處此六三之在益也居下之上所謂在民上者也以六居三又有所謂沉鷙淵謀之才者也以如是之才居如是之位而當如是之時知天下固有所謂患難凶災之事也則撫機應變以盡其所以益之之道乃其所長者故天下之人頼我以得益而在我者旣无用事之咎而上之人亦信之而无疑矣夫旣无我或咎而且有以信乎我故曰无咎有孚如是則九五中行之君自有告命之至以為六三有救患之公心而用圭瑞以錫之也故又曰中行告公用圭泰之九二曰得尚于中行盖中行之君謂五也詩之崧髙美宣王襃賞申伯而作也其曰錫爾介圭以作爾寳盖圭之為瑞也所以逹上之信也六三旣无用事之咎而有見信之實故九五中行之君有達信之告命以旌其人也三與四皆公位也故六三曰中行告公用圭六四曰中行告公從而大有之九三亦曰公用享于天子鼎之九四亦曰覆公餗也夫天下未嘗无凶患之事此古今之所固有也然亦未嘗无善救凶患之才則六三是也故象又曰益用凶事固有之也漢武帝時河内失火上使汲黯徃視之黯還報曰家人失火不足憂臣過河内河内貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河内倉廪以賑貧民請歸節伏矯制罪上賢而釋之夫益之六三无用事之咎而有見信之實汲黯以之六四中行告公從利用為依遷國象曰告公從以益志也四巽之主也以巽順之道輔九五中行之君此所謂以柔乗剛以巽為益者也故中行之君亦有告命之及以六四有益國之志也從其所為而成其公焉六四當此之時以吾君之我從也如此則用其所為之利者當何如哉亦曰吾旣以益國為志則凡國家之所當依者依之而不敢遷所當遷者遷之而不必依或依或遷吾无容心也視國家之如何而盡吾之所以益國之志而已矣四之志其公如此宜乎中行之君有告命之及從其所為而以成其公也夫五等之爵惟公為盛苟非以至公為心奚稱哉今也六三公於益民六四公於益國是宜中行之君皆有告命之及謂之公而无愧也九五有孚惠心勿問元吉有孚惠我徳象曰有孚惠心勿問之矣惠我德大得志也夫聖人之益天下也必有至誠惠益之心行之於不言之間而非家至而人提之也此所謂益之大者故曰有孚惠心勿問元吉而元吉之效見於天下則天下之䝉益於聖人也亦皆至誠以歸惠乎上之徳此以誠召誠之道然也夫舉天下之大皆知以至誠以歸惠乎上之德則其為益也孰大於是故曰元吉而象謂之大得志也夫聖人惠益天下之志至是而大得焉非其益之大孰至於是且聖人之益天下也自夫使之絲身糓腹仰父俯子各遂其生之外豈无勞苦恐懼之事使之趨之而天下皆曰此上之人所以生我也所以安我也則上之所以益乎下者豈非有至誠惠益之心而天下之所以䝉益乎上者亦豈非至誠以歸惠乎上之徳而然哉以誠召誠理固然也又豈待於區區告問之勞而後致其我信也哉夫聖人之心本乎至誠然必曰勿問云者此所以設後世人君務行小惠者之戒也上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也夫益極必損處益之極又以剛亢在上求益不巳此豈處上之道哉故莫有益之者謂其求益不已知益己而不知益人而人亦莫之益也故曰莫益之偏辭也若知己與人為无異豈曰偏辭云乎哉夫六二以虗中无我自損以逮下故益之者衆而曰或益之自外來也上九以剛亢居上旣莫益之則傷之者亦衆矣故曰或擊之自外來也然則人之立心其可以求益為常乎其曰立心勿常凶此聖人戒人鑒上九之失而曰勿以求益為常此凶之道也夫所謂凶者莫益之或擊之是也童溪易傳卷十九
