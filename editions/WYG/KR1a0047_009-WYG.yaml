body:
  text: 童溪易傳卷九宋王宗傳撰坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉豫樂也和也和易恱樂之謂也豫之成卦在於九四上下二體則合於坤震而成也四以一剛羣隂應之故其志行坤順也震動也順以動則順夫理而動之謂也順理而動衆所共與此所以豫也夫君子有能行之才未嘗无欲行之志然我動而彼不應焉則有齟齬而无聴從欲其志行難矣今也以剛居四為豫之主可謂有能行之才矣上下羣隂惟四是應其在爻也既有大有得之辭又有朋盍簪之象爻賛又曰志大行也則欲行之志莫之禦矣夫理之所在人心之所在也順理而動則有以順夫理也乃所以順人心也其在人也又烏有不豫矣乎故曰豫剛應而志行夫天下之事无小大皆不可以不順動也然語其順動之大者則建侯行師是也分民以與之共治分土以與之共守使内外逺近之勢如脈絡之相通感此而彼應感近而逺應此則豫之利在於建侯害焉而與之去之亂焉而與之除之使強梗暴悍之徒皆芟刈而无餘害去而利興亂除而治生此則豫之利又在於行師建侯之與行師二者雖慶賞刑威之不同其為順動則一也茍非順動則侯之建也乃為私喜師之行也乃為私怒安能致豫乎雖然此人事也而天地亦若是矣故繼之以豫順以動故天地如之而况於建侯行師乎蓋三才一理故也夫天地之大也猶如此之順動則建侯行師其可以非順動歟不可也何謂天地之順動曰日月有明也而相為徃來四時有叙也而相為代謝徃來之度既无過差則代謝之期亦无愆忒此天地以順動而然也雖然此天地也而聖人亦若是矣故繼之以聖人以順動則刑罰清而民服蓋天地聖人亦一道故也夫慘莫慘於刑罰也人之心冝若不豫乎此也今也刑人罰人而人不以為慘而反我服何也人皆曰刑罰之清也清則不濫不濫則民服噫是固然也然服生於清清生於順動不以順清何生焉清无從生服何生焉語至於此則順動之義其在豫之時豈不大矣哉故賛之曰豫之時義大矣哉以言天地聖人之功皆不離夫順動故也夫由天地如之之言以觀則天地之順動亦如建侯行師之順動也由聖人以順動之言以觀則聖人之順動又如天地之順動也故曰三才一理也天地聖人一道也象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考天下之物其聲與氣舒發而通暢者无若雷之出地奮迅震薄而不可禦焉者也方雷之復於地中也隱焉寂焉濳養其和鬱結而不通及出地而奮震也則向之所謂濳養地中者旁通而上達矣故為豫之象夫樂由陽來其播於八音五聲者亦所以宣暢和氣耳徳者樂之實也樂者徳之文也先王觀雷出於地而有奮然之象也則作為聲樂以襃崇其徳夫徳者祖考之徳也古者於有功者則祖之於有徳者則宗之猶以為未也而作為聲樂以襃崇其徳盡其專一之誠薦之上帝以配祖考夫以祖考作配上帝則所以崇其徳也可謂至矣非盡其專一之誠曷至是也哉故曰殷薦殷專也禮有殷奠殷祭易有殷薦皆言專也初六鳴豫凶象曰初六鳴豫志窮凶也初六以隂眇之材初出而當逸豫之時恃有九四剛強之應此正人家弱子幼弟席其父兄之庇之象也當此之時志足意滿不勝其豫以至發於聲音此取凶之道也故曰鳴豫凶以言其凶有所不免也何者初六豫之始也於始也志於樂豫至於末流則樂豫之志不得不窮矣夫樂極必悲安極必危能无凶乎故嘗謂志之在人不可以輕用之也豫之初六一輕用其志於樂豫則志窮而凶當其志之窮也雖有賢父兄亦末如之何矣况非賢乎吾儕用志當用於其所不窮之地也而後可或曰當逸豫之時將以用吾志也何者為不窮之地歟曰介于石此不窮之地也六二介于石不終日貞吉象曰不終日貞吉以中正也當豫之時耽於豫則失正故豫之諸爻之才多不得其正時然才亦然故也惟六二一爻以中正自守不溺於豫故雖介於初六六三不正之間然如石焉之不可轉也又豈相與淪胥而溺於豫哉惟其所守也堅故不惑而明此易於繫辭以知幾其神予之也凡人之情於逸豫之事心焉悦之遲遲而不去則必至於耽戀而不舍何者有所溺故也惟知幾之君子其視樂豫之事如將凂已斷而識之速而去之又豈俟終日而後識之去之也哉此其所以當豫之時以守正而獲吉也繫辭之釋此爻也而曰君子見幾而作不俟終日又曰介如石焉寧用終日斷可識矣蓋深予之也六三盱豫悔遲有悔象曰盱豫有悔位不當也六二之君子以中正自守故能上交不謟下交不瀆六三不中不正曷足以語此哉故上交於四也有盱豫之象夫四豫之主也即四以求豫而媚以悦之睢盱而日不瞬此蓋小人之態然也悔將及之也故聖人戒之以速去而曰遲有悔猶之曰不知睢盱以求豫之為悔而安於不當之位遲戀而不去則有悔矣夫睢盱以求豫未必得豫也而將有悔復不知巳其睢盱之態慕戀而不去亦未必得豫也而終有悔聖人諄諄然反復詳而詔之如此其明也為六三者當如何哉九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也豫之成卦在此一爻也故彖之辭有由豫剛應而志行九四實當之夫九四以一剛處羣隂之中羣隂順從得以大行其志而天下之豫皆由我而致故曰由豫大有得然聖人於此戒之以勿疑者蓋奉柔弱之君處危疑之地羣隂不從五而從已故當此之時處此之位上下之情俱不免於有疑也雖然勿懷疑慮積誠於已以交通於上下則上下之情亦自相親相信而无疑矣故有朋盍簪之象朋類也盍合也簪貫髮之具也九四以一剛處上下衆柔之中交而通之則凡散亂而不理者亦皆以類為合恃已以為固也猶之簪也所以貫衆髮而衆髪亦恃簪以為固也夫惟積誠於已上下信之率天下之從已者而還以從夫五又何由豫大有得之嫌乎故曰志大行也六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也六二於貞則吉以中正故也六五於貞則疾以不正故也夫五之於貞既疾矣則冝其當逸豫之時恣驕侈之欲而死於安樂有餘也然乘九四之剛恃四以拂弼於已而五也常惟貞疾之是救故得恒不死也孟子曰入則無法家拂士出則無敵國外患者國恒亡然後知生於憂患而死於安樂也則六五之得九四所得法家拂士也故雖當豫之時不得以縱其所樂夫惟不得以縱其所樂則恒不死冝也夫六五貞雖疾矣而恒不死則中未亡也夫中以位言之則五之位以人言之則人之心也位號猶存人心猶在此所以恒不死也夫當豫之時而不爲豫者以正自守也六二是也當豫之時而不得豫者見正於人也六五是也此豫之六爻惟六二六五所以不言豫焉上六冥豫成有渝无咎象曰冥豫在上何可長也上六以隂闇之才當豫之既成溺於豫而不自知者也故曰冥豫夫以隂闇无覩之才而處豫之極過惡既成則亦何所可冀也而聖人猶不之棄焉乃為開其遷善之門以詔之曰成有渝无咎渝變也猶之曰冥豫之過惡既成有能變前之為者則可以補其過而无咎也其於爻賛又申之曰冥豫在上何可長也猶之曰上豫之極也豫至於極災咎將至何可長之如是也速渝之可也程曰聖人發此義所以勸遷善也故更不言冥之凶專言渝之无咎或曰聖人於初六鳴豫則斷之以凶於上六冥豫則開之以无咎於初六之象則逆知其志之窮於上六之象則又諭之以何可長也夫何甚於其初而恕於其終邪曰甚於初者所以遏其惡也惡而遏之禁天下於巳然也恕於其終者所以開其善也善而開之導天下於將然也禁之導之始之終之聖人之心所以无負於天下後世也而豫之初上二爻見之矣震下兑上隨元亨利貞无咎彖曰隨剛來而下柔動而說隨大亨貞无咎而天下隨時隨時之義大矣哉隨者何有所從之謂也事无所從則失物无所從則逆人无所從則惑此蓋理之固然者而非有所謂得巳而不巳者也譬之影之隨形響之隨聲此豈可強有而亦豈可強无也哉故夫泛觀事事物物動皆有隨而况於人乎程曰凡人君之從善臣下之奉命學者之徙義臨事而從長皆隨也是故隨之道利在於正隨而不正則枉道以從俗矣此又隨之過也故隨之卦徳曰元亨利貞无咎蓋曰隨之所以能大亨者利於貞正而後咎可无也不然則有咎矣剛來而下柔動而説隨此指初九一爻與合震兑二體以言隨也初九之一陽震之主也乾一索於坤而得震則初九之剛實在二隂之下故曰剛來而下柔夫陽剛非在下之物也今也得隨時之義來下於隂柔則是能以上下下以貴下賤吉也物安得不隨之乎震動也兌說也動而説則此有所動而彼无不説之謂也彼无不説則亦無不隨矣夫剛來而下柔剛隨柔也動而説説隨動也當隨之時剛隨柔也而非失已説隨動也而非得物卦之所以為隨也如此是何也蓋吾所謂正者存也故繼之曰大亨貞无咎而天下隨時蓋隨之所恃者正也隨而有咎則非正矣欲大亨得乎其曰天下隨時則所謂大亨也夫天下之所隨者時也而君子之所隨則正焉而已矣然則天下之所隨者時也非隨時也隨吾君子也亦非隨吾君子也隨吾君子之正也朱子發曰時无常是以正為是君子之得其正而天下是之是吾隨時之義也何謂隨時之義曰貞是矣君子之所以為隨者一得其正而天下隨之以為時則夫所謂時也者即君子之正也以是觀之則正之在隨也其體段可知矣故賛之曰隨時之義大矣哉大即正之功用所以為大亨者是也或曰易家以隨自否來蠱自泰來其義如何曰非也乾坤重而為泰否故隨蠱无自泰否而來之理世儒惑於卦變故隨曰剛來而下柔噬嗑曰柔得中而上行咸曰柔上而剛下益曰損上益下渙曰剛來而不窮柔得位乎外而上同則曰凡此者皆自否而來也蠱曰剛上而柔下賁曰柔來而文剛分剛上而文柔恒曰剛上而柔下損曰損下益上節曰剛柔分而剛得中則曰凡此者皆自泰而來也誠如是則睽之柔進而上行謂自遯來可也鼎之柔進而上行亦謂自遯來可也此猶可諉也晉之柔進而上行則謂自誰卦而來乎无妄之剛自外來而為主於内則謂自誰卦而來乎兌之剛中而柔外明夷之内文明而外柔順則又謂自誰卦而來乎世儒求其說而不得則曰凡卦之具三陽三隂者此皆自泰與否而來也凡卦之具二陽二隂者此皆自臨與遯而來也凡卦之具一陽一隂者此皆自姤與復而來也殊不知八卦成列因而重之而内外上下徃來之義已備乎其中自八卦既重之後又烏有所謂内外上下徃來之義乎夫自復至乾自姤至坤凡十二卦當十二月其隂與陽消長勝負均也除乾坤之外更凡十卦豈泰否臨遯復姤六卦獨能生卦而夬剥大壯與觀獨不能生卦乎又何取彼而舍此也程河南釋隨之剛來而下柔也而曰乾之上來居坤之下坤之初往居乾之上釋蠱之剛上而柔下也而曰乾之初九上而為上九坤之上六下而為初六豈亦未之思邪然於賁之彖又釋之曰卦之變皆自乾坤先儒不達故謂賁本泰卦豈有乾坤重而為泰又有由泰而變之理夫由賁彖之所釋則我心之所同然河南實得之由隨與蠱二彖之所釋此乃先儒之所不達者不然前後背戾文字舛錯未可知也當黙識之象曰澤中有雷隨君子以嚮晦入宴息動萬物者莫疾乎雷說萬物者莫說乎澤雷動物也今也處之莫說之地則動者說矣夫處莫說之地而動者說非說於動也説於不動也動者或以不動為説是亦有時而然而不得不然爾故為隨之象使動者以常動為説而不説於不動則歸妹之説以動固有永終知敝之戒矣非隨時之義也君子有運動之才其或嚮晦而息焉者冝其所不説也今而曰宴息云者則動者亦以不動為説矣夫時之運於天也有晦而有明則君子之隨夫時也亦有動而有息晦明之叙大者為古今為治亂小者為晝夜為寒暑故君子之或出或入也在所隨也然則澤中有雷云者説以養其動也君子嚮晦入宴息則亦説以養其動故爾夫有能動之才而不説以養之則其動也烏能不匱矣乎初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也有所守之謂官離所守之謂渝九以陽動之才當隨之初非有隨也亦非无隨也惟正之是隨而後吉於隨矣所謂惟正之是隨何也曰出門而交是也出門交官有渝也其曰有功則從正吉也正則有渝而有功有功而无失矣此所以吉也何謂出門交曰不牽於私之謂也程曰常人之情愛之則見其是惡之則見其非故妻孥之言雖失而多從所憎之言雖善而為惡茍以親愛而隨之則是私情所與豈合正理故出門而交則有功也朱子發亦曰人之情隨同而背異隨親昵而背踈逺故朋友責善或牽於妾婦附耳之言溺於私也故戒之以出門交有功夫同人之初出門同人又誰咎也則隨之初出門而交其能有功而无失宜矣六二係小子失丈夫象曰係小子弗兼與也隨之六爻其半隂也其半陽也陽剛之才則有所隨而无所係初九九四九五是也故初之有渝四之有獲五之孚于嘉此有所隨而无所係者然也以柔從之才而當隨之時則均不免於有所係矣六二六三上六是也故二則係小子失丈夫三則係丈夫失小子至於上六則不勝其時勢之窮而反窮以為通故曰拘係之上窮也王用亨於西山此均不免於有所係者然也夫柔之為道不利逺又况當隨之時以柔為隨其能取諸逺乎故二逺舍諸五而近比於初小子孰謂謂初九也初以陽剛在巳之下故曰小子丈夫孰謂謂九五也五以陽剛為巳正應故曰丈夫夫下從上順也二應五正也二若係應於初則失五之正應矣故為之戒曰係小子失丈夫以言是非邪正无兩從之理比邪則背正就非則失是從於此者違於彼者也豈能兼與之哉雖然二有中正之徳非必舍正而從不正者也以其隂柔之質當隨之時故為之戒云不然卦之徳曰元亨利貞无咎二舍正應而從不正其咎大矣而爻无凶咎之辭何也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也柔之為道不利逺當隨之時故二與三均以近於已者為隨二近於初故曰係小子失丈夫三近於四故曰係丈夫失小子所失之小大視所係之小大也顧其所遭如何耳四以陽剛在已之上故曰丈夫初居下則小子也三近係於四故下失於初舍下隨上隨之冝也此賢賢長長之人也夫當隨之時有賢賢長長之志則雖愚必明雖柔必強矣此隨有求得也茍或棄大而即小舍上而趨下則昧所隨矣雖然三與四非應也求之不以其道合之不以其人徒謂其勢利之可附也茍取媚悦以遂所求而已此乃邪諂小人之為也君子恥之故又戒之以利居貞謂自處於正則有求而得无惡於求矣三不中不正故有此戒司馬温公曰三无中正之徳而不凶者所隨得其人也昔孔子見羅雀者所得皆黄口小雀問之曰大雀獨不得何也羅雀者曰大雀善驚而難得黄口貪食而易得黄口從大雀則不得大雀從黄口亦得顧謂弟子曰善驚以逺害利食而忘患自其心矣而獨以所從為禍福故君子謹其所從以長者之慮則有全身之階小者之戇則有危亡之則易曰係丈夫失小子九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也隨有三陽初九在下方且以從正為務則在上而為下所隨者四與五而已然五君也四臣也在下者之隨乎上先四而後五而四有其獲焉則嫌疑之道也故於隨之義則為凶何謂隨之義曰正是也言有其獲而不以歸之君此非人臣之正也然則處此之地則奈何曰有要道焉修吾胷中之誠不以一毫私意為吾之累其所以獲乎下者為吾君而獲也吾何有焉如此則其所施為舉動无徃而非道也又何咎過之有哉然此非明足以燭理知君臣之大義上下之大分道之所在可從而不可違正之所在可守而不可失其孰能如此哉此四所以能處其身於无過之地轉凶變咎而為无凶无咎也凡此皆明哲之功也程曰古人有行之者伊尹周公孔明是也皆徳及民而民隨之其得民之隨所以成其君之功致其國之安其次如唐之郭子儀威震主而主不疑亦由中有誠孚而无其失也非明哲能如是乎九五孚于嘉吉象曰孚于嘉吉位正中也經曰亨者嘉之㑹也隨之卦徳曰元亨利貞无咎而夫子釋之曰大亨貞无咎而天下隨時而九五實當之故曰孚于嘉吉而象曰位正中也夫九五處正中之位而尸隨之功則是能致是亨嘉也信有其道矣九五所以致是亨嘉也何道也曰正焉而已處是正中之位既无不足於正此易於隨之九五所以信其能致是亨嘉也故曰孚于嘉吉謂之吉則咎固謝之矣彖之所謂无咎又豈足為五道也哉上六拘係之乃從維之王用亨于西山象曰拘係之上窮也孟子曰昔者太王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所養人者害人二三子何患乎无君我將去之去邠踰梁山邑於岐山之下居焉邠人曰仁人也不可失也從之者如歸市夫隨至上六隨道之窮也以柔從之才而隨乎人之不暇至於此則不勝其時勢之窮反窮以為通正在此時也故上六在一卦之外正兊之體所謂西山也此太王之隨也夫我之係志於彼也實彼有以制乎我也故曰拘係之此孟子所謂事之以皮幣犬馬珠玉不得免焉之謂也夫事人之禮既无不用其至而均不得免焉狄人之志何在也在於吾之土地故爾故凡人之拘係夫人也始也欲空其資次也欲空其人又其次也欲維其土地而後巳故曰乃從維之此狼子野心吞噬之計然也太王之處此也誠有所不忍也始也為之所拘為之所係故不得已而以皮幣犬馬珠玉為是請命之計既而吾資屢空矣吾人將及害矣吾人之害是乃吾顧惜留戀夫此土地而不以予之之過也故不勝其窮而忍其墮於維之之計之中遂决其策而去焉嗚呼隨道之窮一至於此者此時也此勢也而天之理則未窮也故上六於此侈言之曰王用亨于西山則歸市之隨至此亦莫之禦矣夫太王之於狄人始也餌之懼吾人之罹其害也餌之之䇿既窮而吾人之害將及則不得已而為是杖策之計曾何心於歸市之隨也既而去邠而之岐而隨之道愈窮而愈亨則夫所謂大亨无咎而天下隨時者實基於此矣故曰岐山也者此周家王業始基之地也童溪易傳卷九
