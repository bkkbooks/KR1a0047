body:
  text: 童溪易傳卷二十四宋王宗傳撰兊下震上歸妹征凶无攸利􅂏曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也无攸利柔乗剛也夫易之道貴於不窮而惡於或窮故聖人之於易也於其所貴者則每每援引天地大義而以告夫人於其所惡者則又重為之戒而以明示夫人是何也所不可滅者天理也所不可不戒者人慾也人慾之縱而天理之害也夫惟天理之不可滅也故於家人則曰男女正天地之大義也聖人又引天地大義為歸妹言者亦非他也人之終始又在於所重故也此之謂天理之不可滅者也吾故曰易之道貴於不窮乃若人慾之縱而能爲天理之害者則尤在於所戒焉爾故於姤則曰勿用取女不可與長也聖人於姤既曰勿用又曰不可云者此非惡夫柔也惡夫柔之能為剛害也柔能害剛則歸妹之位不當柔乘剛所以有征凶无攸利之戒也此之謂人慾之縱而天理之害不可不戒也吾故曰易之道又惡於或窮夫歸妹之義所以得為天地之大義云者蓋歸妹合震兊二體而成卦震東方也兊西方也此天地生成之義然也其在人也則震長男也兊少女也古者制嫁娶之禮男以三十而娶女以二十而嫁故其所歸妹也妹少女之稱也天地之大義而震與兊見之故曰歸妹天地之大義也此即震兊相合以明歸妹之義也大抵天地不相交感則萬物之既衰者无自而復興女不歸男則生生之理廢矣又安能前者有終而後有始如是之不窮矣乎故又􅁇之曰天地不交而萬物不興歸妹人之終始也此又即天地之大義以明人之終始然也由是觀之豈非易之道貴於不窮矣乎說以動所歸妹也此合震兊二體之用以示歸妹之戒也夫說者小人之情也其所歸者妹也故說以動然說无紀極而動无止息鮮有不失其正者故繼之以征凶以言惟說是動則縱其所往莫之知止而凶隨之矣何者失正故也以六爻之位觀之九二六三九四六五位皆失正初與上雖當隂陽之位然陽在下隂在上亦不當位也隂陽所處俱不當位如此何動而不凶乎故曰征凶位不當也此又言六爻俱不當位以明歸妹之所以征凶也雖然不特位不當也又有乘剛之過焉以兊之六三而乘初九九二之剛以震之上六六五而乘九四之剛夫以柔乘剛則下制乎剛剛為柔所乘則受制乎柔剛柔易位尊卑貿亂而家政替矣又何往而利乎故又繼之曰无攸利柔乘剛也此又指三隂乘剛以明歸妹之所以无攸利也程河南曰夫隂陽配合男女交搆理之常也然縱欲而流放不由義理則滛邪无所不至傷身敗德豈義理哉此歸妹之所以凶也又曰男女有尊卑之義夫婦有倡隨之禮此正道也苟不由正道狥情肆欲惟說是動則夫婦瀆亂男牽欲而䘮其剛婦狃說而忘其順如歸妹之乘剛是也此所以无往而利也由是觀之豈非易之道又惡於或窮矣乎夫由前之言以觀則易之道貴於不窮由後之言以觀則易之道又惡於或窮聖人懼天理之或滅也此易之所以有歸妹聖人又懼人欲之或縱而天理之或害也此歸妹之卦辭所以又重為之戒云噫微吾聖人則天理之盟主伊誰尸歟象曰澤上有雷歸妹君子以永終知敝夫澤之為物也鍾莫說之性必有所說也而後澤水為之動摇今也澤上有雷陽之氣既以奮震則澤水從而感動於其下此女從男之象也故為歸妹程河南曰雷震於上澤隨而動陽動於上隂說而從是也然隂陽之相感也雖至於動說而動說之不已則又失永終之道焉何謂永終之道曰男女有尊卑之序夫婦有倡隨之禮是也此道或失而動說不已則狥情肆欲棄禮亂倫女无雞鳴之誨士无昧旦之警而家政日廢醜德日彰矣欲永終得乎君子知此弊之所由生也常生於動說之不已故於女也懼其狃於說而忘其順也則帥之必以禮於男也懼其牽於欲而喪其剛也則其動必以正以此而始以此而終又何弊之有哉不獨夫婦之道為然也天下之事莫不有弊知其弊之所由生也而致其謹焉則終无弊矣訟之象曰君子以作事謀始亦是意也初六歸妹以娣跛能履征吉象曰歸妹以娣以恒也跛能履吉相承也初下位也九陽德也當歸妹之時以陽德居下位乃諸娣之賢明者諸侯娶妻諸娣從之韓侯之詩曰韓侯迎止于蹶之里諸娣從之祁祁如雲是也故初有歸妹以娣之象夫娣不正而合者也故稱跛焉然而能執謙之志以說承上故曰跛能履夫有賢明之才執謙卑之志安恒處分以助承其君而不失厥職以是為得故曰征吉而象曰歸妹以娣以恒也跛能履吉相承也九二眇能視利幽人之貞象曰利幽人之貞未變常也孔氏釋義曰九二不言歸妹者既在歸妹之卦歸妹可知故略不言也蘓東坡曰九二亦娣也其不言歸妹何也因初九之辭也而龔氏耿氏又皆指二為嫡而曰初以娣承二二以嫡承五今以文義考之俱未然也夫九二正得下體中位不應取娣象而六五位上體之中以貴為行既稱其君矣則所謂嫡者五也二亦不應復為嫡也然不言歸妹何也曰二處下體中位居隂守常未適乎外所謂女子之賢明而妹之未歸者故爻辭但以女子守常為正而以幽人象之而曰𦕈能視利幽人之正而已蓋以九二賢明之才位下體之中當斯時也何所用其明哉但當居隂守中而自托於幽眇之地夫然後不失其常矣故曰眇能視利幽人之貞而象曰未變常也蓋謂眇能視者以二有賢明之才未始自鬻自衒而其視不過寄諸幽眇之地以是為能而已矣此九二所以不言歸妹不取娣象亦无嫡義而獨取幽人以為象歟幽人猶詩人所謂窈窕淑女有幽閒正静之象六三歸妹以須反歸以娣象曰歸妹以須未當也蘓東坡曰古者謂賤妾為須故天文有湏女朱子發亦引天官書云須女四星賤妾之稱夫三下體之髙位也不應有賤須之名然以六居三居不當位德不正也柔而尚剛行不順也為說之主以說求歸動非禮也夫女子之可貴者為其正也順也動以禮也今也六三犯此三不韙其目之曰須也固宜此象所謂未當也夫歸以須六三也歸以娣則初九也若以六三而比初九誠相反也何也初有賢明之才執謙卑之志處常安分用𫉬其吉三有是乎夫三與初既如是之相反也則雖欲為娣不可得也宜其惟須之為也故曰反歸以娣謂三之歸以須與初之歸以娣相反也夫是之謂未當九四歸妹愆期遲歸有時象曰愆期之志有待而行也九二妹之未歸也故不以歸妹言九四妹之可歸而未歸者故曰歸妹愆期何也九四賢明之才雖與二同而所處之位則與二異故也夫二與四皆居隂也何謂其所處異也曰卦爻有六巳居其四以九居四已離兊體此所謂愆期之歸妹也夫女子於歸妹而或愆者何也曰禮以女子二十而嫁或有大故則以二十有三為節九居四位既離兊體此所以有愆其期而遲其歸之象也何也有時而然而非悖於禮經故也夫生而願為之有家者女子之志孰无是也然或有待而行而至於愆其期焉者亦各言其志也而已矣故曰歸妹愆期遲歸有時而象曰愆期之志有待而行也四雖上體然亦居隂故有遲滯而不遽前之象若陽貨謂孔子曰懷其寳而迷其邦可謂仁乎好從事而亟失時可謂知乎日月逝矣嵗不我與而夫子從而諾之曰吾將仕矣夫時之失而日月之逝在夫子豈不知此然夫子之志蓋亦有待云爾故嘗以匵玉自况而曰我待價者也又嘗以匏𤓰况其不然而曰吾豈匏𤓰也哉則聖人之志非固為是愆期之事以取誚於人也亦曰遲遲吾行者此非我也時也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也五君位也歸妹之處此位也所謂嫡夫人小君位也莫尊且貴焉雖然尊且貴也以六居五體謙從禮而无亢滿之失故曰帝乙歸妹子夏傳曰天乙湯也湯嫁妹之辭有所謂往事爾夫必以禮義之言則欲其无亢滿之失可知故泰之六五去驕去泰與此爻同象夫惟雖尊且貴而能體謙從禮也故尚禮而不尚飾衣袂所以為容飾也而曰其君之袂不如其娣之袂良者其良在德不在袂也良美好也若娣則以容飾為事者也袂之良則其德未必如袂也何也其君其娣各有所尚故也葛覃之稱后妃也不過曰刈濩是中谷之葛以為絺綌而服之云爾及其薄汚也而又薄澣之以為后妃恭儉節用之德則其良在德不在袂可知也夫隂陽之義配日月也日君也月則小君也小君體謙從禮而无亢滿之失以况則月㡬望也夫五君位也當歸妹之時而以小君位焉可謂尊且盛矣然以六居之則雖盛未盛也則月之㡬望是也此非六五之所謂吉乎若夫月望則與日並隂盛則與陽敵此女媧吕武所以亂天下也其禍可勝言哉然其所以至此者无他不知亢滿之是戒云爾乃若歸妹之六五以帝乙之貴行謙遜之德而不失乎處中之道寧有是過乎故象又曰其位在中以貴行也上六女承筐无實士刲羊无血无攸利象曰上六无實承虛筐也夫婦女之職所以輔相夫子承先祖供祭祀者也故詩之采蘋述其采彼蘋藻盛之筐筥湘之錡釡奠之室牖尸之者有齊季女也禮亦稱祭祀之禮主人親割牲取血以祭而執其鸞刀以啓其毛取其血膋是烝是享而信南山之詩亦以此責幽王之不能則夫先祖之是承而祭祀之是供也孰大於是今也上六處歸妹之終勢已窮也居震之極動不静也柔弱无能才不堪也隂虛不實誠不存也愚闇處上好自用也有是數者以女言之則承筐无實矣以士言之則刲羊无血矣其如承先祖供祭祀何未見其有所利也故曰无攸利而象則特取虛筐无實以為言者蓋歸妹上六女子也女子不才重責之也離下震上豐亨王假之勿憂宜日中􅂏曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎豐者時之極盛者也何謂極盛曰在萬物則為衆多在生齒則為繁庶在幅員則為廣遠在庶事則為詳備在人材則為茂盛在國家則為殷富在天下則為平治而在功業則為光明而盛大也故卦之德曰豐亨而􅂏曰豐大也夫卦之所以為豐者合離震而成也離明而震動明則足以有照動則足以有行明動相資此致豐之道也故曰明以動故豐此合離震二體之用以言豐也夫數榱之室非甚大也功力不至則積日累嵗而不能成豐大之世其所謂大也固若是其盛也為人君者苟无其道以致是大則是大也其能如是其盛乎故夫致豐之道惟王者為能至之何則所尚者大也何謂所尚之大曰明以動是也非明則无以照非動則无以行故夫所以致是豐者此道也語其能盡此道者非王者則不可故曰王假之尚大也假至也此又即明以動之義以言惟王者為能盡致豐之道也夫所謂致豐之王者非六五乎六五以隂柔居尊位而屬震體有震懼驚憂之象當此之時聖人則戒之以勿憂離明在下日未中之象也日而未中則照有所不周當此之時聖人又勉之以宜日中蓋以驚憂自沮則動有所不足也照有所不周則明有所不足也此非尚大之謂也聖人於此又不得不有所戒又有所勉也故曰勿憂宜日中宜照天下也此又即六五與震離之象以為王者之戒與勉也雖然致豐易保豐難人知今日之豐生於前日之不豐也又烏知後日之不豐生於今日之豐邪故聖人於此又因勿憂宜日中之一辭而别演其義曰日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎所以示萬世人主處豐之大戒夫日既中矣則當傾昃月既盈矣則當缺食此豐不常豐之譬也何則天地之理時息則盈時消則虛今日之盈乃後日之虛息而不已之所致也後日之虛又今日之盈消而不已之所致也是理也此天地之所不能違也故夫天地之盈虛在隂陽則為進退在萬物則為盛衰而其章章在目可以日夜驗之者則日之中昃與月之盈食也由是觀之則時消時息而盈虛繼之此雖天地之大猶不能違而况人與鬼神乎蓋天地之間聚而為人散而為鬼神者此即天地盈虛之理然也經曰精氣為物遊魂為變是故知鬼神之情狀是也夫觀日月之昃食而知天地之盈虛觀天地之盈虛而知人鬼之聚散天地萬物之理不可常蓋如此也不因此之理而知豐之不常豐也而盡其所以保豐之道可乎何謂保豐之道曰持其盈守其成如成周之成王是矣夫成周之世以萬物則盛多矣以四方民則和㑹矣以土宇則昄章而孔厚矣以禮與樂則庶事大備矣以人才則蕩蕩乎其多矣以曽孫之稼之庾則如茨如梁如京如坁矣以當時之治則既醉太平矣以功業之盛則又有酌以告成矣此所謂豐大之世而極盛之時也使其不能持其盈守其成安能保是豐邪然成王所以持其盈守其成者何如曰吾嘗以詩考之嬛嬛在疚見於朝廟之言成王不敢康見於郊祀之什予其懲而毖後患莫予荓蜂又見於求助之作此其故也象曰雷電皆至豐君子以折獄致刑雷既至電亦至焉兩者相㑹而震耀於天地之間使人掩耳閉目之不暇何其盛哉此雷電皆至所以為豐之象也夫震雷離電施之人事則刑獄也故傳曰為刑罰威獄以𩔖天之震曜然刑獄之事豈君子之得已也不過將以聳懼夫人而使之皆知警畏云爾故夫法離明以折獄象震動以致刑明以折獄則足以照其幽枉之情動以致刑則足以施其剛威之用震曜並行下皆警畏此所以法雷電皆至之象也河南曰噬嗑以明在上而麗於威震王者之事故為制刑立法豐以明在下而麗於威震君子之用故為折獄致刑旅明在上而云君子者旅所以愼用刑與不留獄君子皆當然也初九遇其配主雖旬无咎往有尚象曰雖旬无咎過旬災也初九明之初也九四動之初也在他卦則陽與陽為非應在豐卦則雷電皆至明動相資以成其功蓋明而非動則明无所用動而非明則動无所之兩者可以相有而不可以相无故初遇四則謂四為配主四遇初則謂初為夷主也配如廣大配天地變通配四時以言其均敵也夷等夷也猶之曰莫適為尊卑也故兩者相遇皆曰主云夫人之情勢均則不相下不相下則怨隙生矣惟豐之初與四明動相資故雖勢均而力敵不為過咎故曰雖旬无咎旬十日也十日之數天地相函竒耦錯居而无或贏或踦之處何者適均故也初與四其勢雖均而非其應往與之遇明動相資以成其功故曰往有尚有尚云者謂有功也故坎曰行有尚往有功也是也雖然明動相資以成其功則不以勢均力敵為過咎也或有求勝之心而无相濟之意則相先以相失嫌怨搆而災害生矣此災害不生於相資而生於相勝也故象復戒之曰雖旬无咎過旬災也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也六二明之主也无應而不動有明而无用者也故體柔居隂以自蔽晦而有豐其蔀之象蔀草芥隂蔽之地也當明之時而居隂蔽之地不豐其明而豐其蔀者也日中明盛之時也當明盛之時而所應者六五昏暗之君故曰日中見斗斗昏見也居中而主運平六五之象也夫二與五居相應之地然以隂應隂未能必其見用乃所以自取嫌疑忌嫉也何者嫌疑忌嫉之心闇主之所不免也明而復昏故易得此故曰往得疑疾雖然當此之時居此之位以其見疑見嫉也而遂已乎曰未也程河南曰君子之事上也不得其心則居其至誠以感發其志意而已苟誠意能動則雖昏蒙可開也雖柔弱可輔也雖不正可正也古人之事庸君常主而克行其道者已之誠上逹而君見信之篤爾管仲之相桓公孔明之事後主是也故曰有孚發若吉而象曰信以發志也九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也按陸氏釋文云沛古本或作斾謂幡幔也王輔嗣胡安定程河南朱子發蘓東坡皆因之又曰沬字林作昧斗杓後星也鄭氏亦讀作昧子夏傳云昧星之小者胡安定程河南亦云昧微星也朱子發依字林所釋曰昧斗後小星微昧之光夫幡幔懸於上而蔽於下障蔽光明之物也此上六之象也五有斗象上居五後則沬居斗後也則沬亦上六之象也九三以陽居陽有能為之才者也然當此之時為豐之主者六五也五既柔暗而三之所應者又上六也則上者既有以蔽乎下而九三雖有能為之才亦无所施也故曰豐其沛以言其有所障蔽而然也又曰日中見沬以言其所見者微而昧也肱之在人也所以輔佐上體者也所謂右肱尤其有力者此九三以能為之才而應乎上之象也然三固有是才矣而其所應者昏闇之人也則无以施其用矣此所謂折其右肱也然則當此之時有能為之才而无所用也又何所歸咎乎故曰折其右肱无咎以言君子之心初无所怨无所尤也象曰豐其沛不可大事也者夫豐大之世明動相資乃能成豐三有是才而上之人既旡足頼如此則豐大之功何自而可成邪故曰不可大事也人之所恃者右肱也所謂可以大事者此其具也今也右肱既折所以勝大事也者无其具矣故又曰折其右肱終不可用也此蓋重歎九三有是才而其用不𫉬施也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也九四動之主也當明盛之時處近君之位然其所居者隂也而又位重隂之下故與六二同其象而曰豐其蔀日中見斗而象曰豐其蔀位不當也日中見斗幽不明也蓋二之豐其蔀日中見斗體柔而居隂而所應者又隂也四之豐其蔀日中見斗者居隂而位重隂之下而所承者亦隂也雖然當明以動之時而四也實為動之主豈以位不當也與幽不明也而可以己乎曰未也初與四居相應之地同德而相濟所謂夷主也四若下而與初遇則當此之時其為輔助豈小也未可以勢均力敵而不下應之也故曰遇其夷主吉行也六五來章有慶譽吉象曰六五之吉有慶也程河南曰六五隂柔居尊而正體旡虛中巽順下賢之象聖人設來章之爻以為教耳愚竊謂未可以此罪五也何也蓋以六二九四見斗之象觀之則五也誠闇主也然當豐大之時所謂以柔闇居尊而正體旡虛中巽順下賢之象者則上六之豐其屋蔀其家是矣六五則未然也何也其所處者中也所處者中則无自豐自亢之失矣夫古之人君固有闇而明者矣何也闇者我也明者人也以人之明而為我之明則我雖闇何嫌焉固有弱而强者矣何也弱者我也强者人也以人之强而為我之强則我之弱何嫌焉夫惟六五之所處者中也故雖隂柔也而无不斷之失雖體震也而无過動之愆此爻辭所以有來章之吉也夫章云者剛柔之雜而成體者也經曰分隂分陽迭用柔剛故易六位而成章六五以闇而資明以弱而資强則自初至四所謂明以動之才者皆入吾彀中矣何者蓋吾有以來之故也君臣之相得曰慶有是實而名隨之曰譽當豐大之時而五也有來章之吉焉故曰有慶譽吉蓋謂有慶有譽此六五之所以吉也而象特曰有慶云者舉慶以見譽焉上六豐其屋蔀其家闚其户閴其无人三嵗不覿凶象曰豐其屋天際翔也闚其户閴其无人自藏也上六豐之極也豐之極必亢以六居上所謂愚自用賤自專也其誰與之夫在上曰屋取其能覆而巳矣今也豐其屋翔于天際亢髙之象也在下曰家取其可居而已矣今也蔀其家掩蔽其内幽闇之象也夫屋雖豐而家則蔀則莫之與居矣故又曰闚其户閴其无人闇寂也以言居幽處闇亢髙自絶而人莫之與也故曰自藏也謂之自藏則非人之逺己也乃已之逺人也至於三嵗之久而人猶不之覿焉欲无凶得乎此九三所以甘心於折肱而无所歸其咎也然則程河南所謂隂柔居尊而震體无虛己下賢之象也者非六五也乃上六也艮下離上旅小亨旅貞吉􅂏曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉入而麗乎内者處家之象也故合巽離而為家人止而麗乎外者旅人之象也故合艮離而為旅旅也者聖賢失位之時也夫君子之道固无往而不亨然時乎得位則其亨在於天下時乎失位則其亨止於身故卦之徳曰旅小亨而已孟子因周霄之問仕也而曰士之失位也猶諸侯之失國家也故君子三月無君則皇皇如也而公明儀亦曰古之人三月無君則弔曰古之人云者蓋指孔子也以其皇皇如也故以弔言之夫孔子以皇皇一旅人今日之齊明日適衛然進以禮退以義得之不得曰有命故吾孟子得以知其心㫁然以或者之言為非是而曰若孔子主癰疽與侍人瘠環則何以為孔子此卦之徳又曰旅貞也而彖復釋之曰旅小亨柔得中而順乎剛止而麗乎明是以小亨旅貞吉也此則指六五一爻與艮離二體之用以言旅之所以小亨與貞吉也夫用剛非旅道也故莫尚乎用柔然柔不可過也故莫尚乎得中旅人失位而寄乎外夫苟徒以媚說順從乎人而己也此固柔也而不得謂之得中孔子見南子諾陽貨此所謂順乎剛也然而无失中之柔焉則亨德在孔子矣其在爻也則以六居五得中位而屬外體麗乎二剛之間故曰柔得中乎外而順乎剛此釋旅之所以小亨也孟子曰吾聞觀近臣以其所為主觀逺臣以其所主何者君子有所止也不可以不麗乎明故也故孔子亦曰君子之居是邦也事其大夫之賢者友其士之仁者誠如或者之言於衞主癰疽於齊主侍人瘠環則旅之正不在孔子矣非所謂麗乎明也故曰止而麗乎明此釋旅之所以貞吉也夫失位者旅之時也亨與貞者旅之義也當旅之時非亨則旅道窮矣非正則旅道失矣故旅之卦德曰旅小亨又曰旅貞吉旅一也而再言之蓋謂其時義之大在此兩者故也故孔子於此又歎之曰旅之時義大矣哉象曰山上有火旅君子以明慎用刑而不留獄山髙逺之地也火明曜之物也山上有火則明寓髙逺足以有照而其勢迅疾不能久留旅不處也故其象如此夫刑非輕用之物而獄非可久留之地故君子觀旅之象也而得之明无不照之義則於刑也每致其明而謹用之得其迅速而不留之義則於獄也亦隨而决之而不留焉大抵旅道宜慎而不宜留刑獄之事適與相𩔖故象取其義云初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也初六以隂眇之才居卑下之位當覊旅之時非所謂行道救世之志也此不過謀小利為小人而已爾故曰旅瑣瑣夫君子之志固有所謂逺且大者存也何也欲行道以救世故也夫如是故旅道不窮而亨无災而吉若卦德之所云是矣今初六之旅也瑣瑣然也則其志窮矣窮則无動而吉此其所以自取災害也六二旅即次懷其資得童僕貞象曰得童僕貞終无尤也次旅之居也資旅之用也童僕旅之役走者也旅即次則其所舎也有其居懷其資則其所蓄也有其用得童僕則其所以奔走而服役也又有其人旅道何修而得此哉盖以六居二之為正故也夫旅道患不正爾正則吾无尤於物而物亦莫吾尤也此其所以有安而无危有得而无喪也而象特曰得童僕貞云者此省文之例也而程河南朱子發皆云得童僕之忠貞者親信之而不疑此於義固无害然九三喪其童僕貞厲而象曰以旅與下其義喪也則又上之所以遇下也其失固有在也而非童僕不正之罪也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也九三以剛居剛剛之過也處下體之上又艮之上自髙也夫自髙則不能順乎上而上不與故曰焚其次謂離火在上有焚象也過剛不能柔乎下而下不附故曰喪其童僕謂剛止於上无逮下之象也夫易惡亢而戒剛大過剛亢平時猶不可用也而况於旅乎故九三之焚其次誠異夫二之即次矣喪其童僕又異乎二之得童僕矣何也以九居三此雖正也然而剛過則於正為厲故也故象又曰旅焚其次亦以傷矣以旅與下其義喪也盖謂既已有焚其次之傷矣而又喪其童僕焉此暴厲之過也夫旅親寡之時也朝夕之所與者童僕而止爾豈可以旅視之也九三以旅視乎下則彼童僕也亦必以旅視乎上矣其能久留乎此喪其童僕其人固然也曽子曰上失其道民散久矣夫上之於下也能來之而不能留之則上下相視皆旅人也欲其不喪得乎故書曰民罔常懷懷于有仁九三之厲可謂不仁矣而又當旅之時用其不仁之術宜其然也或曰九三之與六二固異矣而不曰亡其資何也曰其次既焚資何有焉舉重以見輕也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也九四以陽動之才而居隂静之位得所處也故曰旅于處然隂静之位宜若可處也當旅之時旅于外猶未為得位也資貨用也斧利物也夫君子以行道救世為心者也位未得而道未行故雖身旅乎外得其所處而貨利之交至也君子之心蓋亦未快於是也孟子之在齊在梁在薛也兼金之餽或受或不受其受之也或曰饋贐或為兵餽以其有辭其不受之也則以无處而饋之也故曰君子而可以貨取乎此四之雖得資斧而我心未始以是為快也或曰用剛非旅道也而四亦剛也何也曰處上體之下而又居隂位故无亢剛之失六五射雉一矢亡終以譽命象曰終以譽命上逮也程河南曰人君无旅旅則失位故五雖君位不取君義此一爻孔子之象也夫雉文明之物也六五離之主故取雉象矢射雉之噐也離為戈兵故取矢義夫有文明之才斯有文明之化聖人之志盖在是矣然聖人之志雖在於是其如一矢之遺亡何謂其失位而旅故也春秋之君蓋亦有知孔子之為聖人者矣若魯哀公衛靈公齊景公楚昭王是也其次則孟僖子季康子楚子西呉太宰嚭之𩔖蓋亦不乏人也然而不能用也故雖終以譽命而上逮乎巳也徒足以致旅之小亨而巳矣而文明之化卒不見於當世可不為之重歎矣乎上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也上九之視九三尤為剛亢者也凡物棲髙處亢而寄諸危地者鳥之巢是也故旅之上取以為象夫髙極必危離火有焚象也故曰鳥焚其巢以况則旅之好尚自取焚害其義固然也先笑謂喜居物上也後號咷謂巢焚之故也夫牛順物也旅道以柔順謙下為本上九喪其至順之德於其􅀏樂平易之時今也以巢焚之故而號咷也其誰與聞邪蓋言剛亢自絶一至於此而終莫之與也此上九之所以凶也童溪易傳卷二十四
