body:
  text: 童溪易傳卷十八宋王宗傳撰艮下坎上蹇利西南不利東北利見大人貞吉􅂏曰蹇難也險在前也見險而能止知矣哉蹇利西南徃得中也不利東北其道窮也利見大人徃有功也當位貞吉以正邦也蹇之時用大矣哉蹇合坎艮以成體坎水在前艮山在後前有險後有阻何適而可哉此所以為蹇也蹇之為義有止塞而无流通故曰蹇難也蹇難之世君子不幸而㑹逢其時則亦奈之何哉在我者務知所以處蹇之道而巳矣故蹇之所以為難者以坎險之在前也見險而能止此處蹇之道也􅂏合坎艮之義以言處蹇之道故曰險在前也見險而能止夫險難在前人所共見固不待明者而後見之也然蹈危履險亡軀害人而无益於救難者明者不然也故君子於此體艮之止而止焉其曰能止則救難之心非若是恝也相時度勢而不以衝冐强聒為能故也此之所見又在人所共見之外也故賛之曰知矣哉以言見人之所見者不足謂知於人所共見之外而又有所謂能焉者斯足謂之知也矣夫所謂相時度勢者何也卦之徳曰利西南不利東北是也西南之維坤實位焉夫坤地也其勢寛平而順易以寛平順易之道徃以濟難則其難舒矣故蹇利西南徃得中也此即九五一爻以言濟蹇之道也夫當蹇難之時徃以濟難而不得中正之道焉則是與難爭也與患難爭鋒而求以濟難惑也矣何謂中正之道曰寛平而順易是也以九居五而得中正之位則是徃以濟難而得中正之道也五實坎體而謂之利西南云者盖坎體本坤九徃居中而成坎夫九以剛明之才而徃處坤之中位非利西南徃得中也之義乎若夫不知西南之為利而反其所詣焉則有所不利矣故易於此指其所之而避其所忌而以利不利明以告之夫東北之維艮實位焉此正坤之對而西南之反也盖艮山也其勢險阻而危極以險阻危極之道而濟難何難之能濟乎故曰不利東北其道窮也此即艮上有坎以言蹇之所以為難也利見大人徃有功也此又即六二徃應九五以言濟蹇之有功也當位正吉以正邦也此又謂自初至上六爻皆得其正以言蹇之必濟也或曰六二九三六四九五上六正也初六正乎曰當蹇之世陽居下位則陽為失位以隂居下位詎非正乎夫以九居五有陽剛中正之徳所謂大人也六二以柔中之徳徃而應之則其見之也何利如之此所以能相與而成濟蹇之功也六爻自初至上隂陽各當其位此易所謂正也在人則為貴賤履位賢不肖襲情上下各守其分而不相踰越以此道而正邦則邦自正矣又何蹇之不濟乎此所以吉也夫天下之所以不理患難之所以難去者以上下之分不明也今也六爻之間其剛柔素定如此則求以濟蹇也又豈必他求云乎哉盖正之在人也所謂其本心也以人之本心也而還以正之則不勞而功成矣盡是道而成是功者則六二之與九五是也故卦之德曰利見大人貞吉由是觀之則當蹇之時盡蹇之道而以為蹇之用也豈不大哉故蹇之時用大矣哉何謂時用曰正而巳矣象曰山上有水蹇君子以反身修德曰蹇云者有止塞而无流通之謂也山上有水則无下流之象也此豈有他哉盖有所止塞之故也夫山上之水无有止塞則建瓴之便孰能禦之其曰有水云者有而未决之義也君子之道所以未孚於人未亨於世者亦豈有他哉時使然也故夫水之蹇也反其流而豐其蓄而巳其蓄既豐則盈科而放海矣孰能吾蹇邪君子之蹇也反其身而修德而巳吾德旣修則己正而物正矣亦孰吾蹇邪孟子曰行有不得者皆反求諸己而巳矣求諸己者旣至則其行也豈復有不得矣乎嗚呼此君子之學以自反為之本也夫自反之學其在平夷无事之時猶不可舍而況蹇之時乎故蹇之六爻皆以徃為蹇來為宜也初六徃蹇來譽象曰徃蹇來譽宜待也夫可以行則行可以止則止出處之大致然也又況當蹇之時而居諸下位其可以冐昧而輕進乎故曰徃則有蹇來則有譽夫初六以柔而居下當斯時也衆人皆以冐昧輕進而失而吾獨以謹重待時為得庸非譽乎其曰宜待云者戒之也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇中无尤也六二以柔靜知止在蹇之時為逺於難可以无蹇矣然身雖无蹇而與九五大人居相應之地蹇而不濟難而不救將焉用居此位也故必盡王臣之義而後居此中位可以无愧矣蹇蹇謂時之方蹇而吾當力任此蹇之責此雖非其躬之蹇也而上而吾君下而天下之民皆予頼也予其敢謂其非躬之故而不以為蹇也乎惟能如是故居此中位𨼆於吾心而可以无過尤也中以位言之則二之位也以人言之則王臣之心也昔退之作爭臣論嘗引此爻與蠱之上九以譏陽城矣而曰若蠱之上九居无用之地而致匪躬之節以蹇之六二在王臣之位而髙不事之心則冐進之患生而曠官之刺興志不可則而尤之不能无也亦曰居此位者則必及此事若視政之得失若越人視秦人之肥瘠忽焉不加休戚於其心則過矣夫諫諍言官也猶不可曠而況居大臣之位而當蹇難之時其可以自處於靜止之地而巳乎九三徃蹇来反象曰徃蹇來反内喜之也九三艮之主也内之二隂所以能自立於蹇難之世者以三為之捍蔽也三若舍内而之外則徃而蹇矣故莫若來而反諸内體之上以為二隂之主則在内者得所附矣其喜慰之心宜如何哉春秋書季子來歸榖梁子曰其曰季子貴之也其曰來歸喜之也盖當莊公死子般弑慶父主兵季友力不能支固嘗避難而出奔矣當是時也魯國方危内難未定國人思得季友以安宗社故閔公即位之元年書公及齊侯盟於落姑盟納季子也而公羊子亦曰其言來歸何喜之也何休釋之曰季子來歸則國安故喜之此則蹇之九三所謂徃蹇來反内喜之也之謂也六四徃蹇來連象曰徃蹇來連當位實也四隂位也而以六居之當位者也夫居其位而輕去之則徃而蹇矣故亦莫若來而連下之諸爻以靜止自守則得其所安矣實誠實也夫處蹇之道在於以誠實為本處蹇而不以誠實為本則内無所執守外无所據依人誰我與哉故徃旣蹇矣必欲來而連乎下之諸爻相恃以為安則莫若以誠實為之本也􅂏曰當位貞吉此不云當位正也而云當位實也何也程曰上下之交主於誠實用各有其所也九五大蹇朋來象曰大蹇朋來以中節也六爻皆蹇也而九五則處坎險之中所謂蹇之大者夫有剛健中正之徳而以身任天下之大蹇則亦何所不可而古者聖帝明王於此則又必汲汲焉務於來天下之助焉者以為戡難而正邦者非羣才之助不可也此九五處大蹇之任而又有頼於朋來之助焉􅂏曰當位貞吉以正邦也盖謂收正邦之功者雖九五也而所以正邦者則上下六爻皆當其位而然也然則處大蹇之任以中正之道節正天下者非有頼於朋來之助可乎蹇之六位皆正人也故曰朋來夫旣得朋來之助而以中正之道節正天下此九五所以收正邦之功歟上六徃蹇來碩吉利見大人象曰徃蹇來碩志在内也利見大人以從貴也蹇至上六蹇之極也又復何所徃乎徃則自為蹇蹙爾非真有蹇也故亦曰徃蹇碩大也寛綽舒肆之謂也來則從五應三其志在内而難頼以紓故曰來碩吉夫蹇至上六始言吉者以為蹇至此極物極必反蹇極則通故也彖曰利見大人大人謂九五也夫九五朋來之主也當此之時利見之者豈惟上六也哉而上六獨云爾者處一卦之外尤不可以不知所從故也不然當此之世不寜方來而上六獨後乎五故不能无凶上六之在蹇也可不知所從乎其曰利見大人以從貴也者易之於上六也懼其或恃己之尊忘己之賤而不知有所從也故為之戒云嗚呼聖人厭亂之心即此亦可見矣坎下震上解利西南无所徃其來復吉有攸徃夙吉􅂏曰解險以動動而免乎險解解利西南徃得衆也其來復吉乃得中也有攸徃夙吉徃有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉天下未嘗有无難之時亦未嘗无濟難之道顧人謀如何爾人謀一至則反有難而為无難特其餘事爾此易之所以有解解合震坎以成體震動也坎險也解險以動動而免乎險解此即震坎之體以言解也解利西南徃得衆也此則即震九四一爻以言解也其來復吉徃得中也此則即坎九二一爻以言解也有攸徃夙吉徃有功也此又即震九四之爻以言解也夫需也蹇也皆險在前也而當解之時險旣散則險不在前矣故曰險以動動而免乎險解猶之曰曷謂乎險以動也盖動而出乎險之外巳免乎險難云爾險難旣免此所以為解也夫所以濟難者以寛平順易之道蹇之利西南是也今難之旣解也此道奚宜置哉成湯之代虐以寛及其旣代虐也亦不聞廢是寛也此得衆之道也其在卦也則震體本坤九以一陽徃居坤下是以成震夫九以一陽而徃居坤之下非利西南徃得衆也之謂乎坤為衆故曰得衆九四所謂朋至斯孚是也夫天下之難旣巳解散則是无所徃也旣无所徃則當來而復諸安靜之地使天下知有息肩之暇奠枕之安矣此吉也不然則亂去而兵未休財匱而賦愈急民疲而役不止難何時而可解邪此殆非所謂時中之道也其在卦也爻惟二陽陽在四則為震陽在二則為坎坎中之一陽來居二位此所謂乃得中也雖然難旣解矣旣巳無所徃矣治不忘亂安不忘危此又人君之至戒也其可以難之旣解而恝然忘其所謂警戒之心哉若有攸徃尤當夙致其警戒之念可也益之戒舜曰警戒無虞而臯陶亦曰屢省乃成欽哉此有攸徃而以夙為吉也夫惟能夙致其警戒之心則有所不徃徃而有功矣其在卦也則亦震之九四是也震之為義在於恐懼修省而九四居動而免乎險之地故又以有攸徃夙吉為之戒云夫􅂏之所言者皆人謀也人謀旣至則天下无不解之難而天地之解實如之故又以天地之解以終一􅂏之義天地解而雷雨作此又即震坎之象以言天地之解也夫震為雷坎為雨雷雨一作而百果草木皆甲拆則天地之内容有不解之物矣乎此天地之解也夫百果草木皆甲拆惟解之時為然天下之難无不散亦惟解之時為然然則古今之時孰大於解也乎故終賛之曰解之時大矣哉象曰雷雨作解君子以赦過宥罪昔孔子誦成湯之言曰萬方有罪罪在朕躬百姓有過在予一人盖以天下之有罪與過者皆由上之所化故也孟子曰文武興則民好善幽厲興則民好暴是也夫當大難方解之初天下之人始出塗炭去昏而即明去亂而歸治苟惟上之人追罪其罪追尤其過而盡誅之則更起天下之難矣此非所以為解也故必也法天地之解有聳動之大號滂沛之大恩如雷雨之作而萬物均被其澤焉則向之有罪與過者咸釋然有更始自新之望矣故曰君子以赦過宥罪赦者舍也宥者寛也於過誤則赦而舍之於罪惡則宥而寛之此雖不能无輕重淺深之異然待之以不死一也雖然人君之政有所謂赦宥云者特因亂難既解之後而有是也若屢行而不已焉則􅆘所以長宼而滋姦非政也其後世之過乎此駁赦之論所以作於五代之張元初六无咎象曰剛柔之際義无咎也夫當解難之初𩔖非柔弱之才所能勝也然身居下位能以己之柔而濟夫二之剛使二之剛得已之柔以為輔而亦以剛際夫柔則剛柔相資於解之義為无咎矣不然位旣不足而才復歉然當解之初豈能无咎也歟盖九二坎之主也初六以隂柔之才當解之初近而際諸九二而九二亦自近而際之此所謂剛柔之際也夫同居内體柔者能以柔而際剛而剛者亦以剛而際柔同心居内以賛成解難之功得之矣又孰得以才之不足而咎初也乎或曰初與四居相應之地今而謂之與二相際何也曰初為坎底勢不上逹四為動主性非下逮凡曰際云者上下相鄰之謂也泰之九三曰天地際也是也故初雖與四為應而无際四之象九二田𫉬三狐得黄矢貞吉象曰九二貞吉得中道也田狩事也狐疑物也黄中色也矢直器也二以剛中之才為坎之主受解之任卦徳所謂无所徃其來復吉而􅂏所謂乃得中也是也夫天下之難常生於人情之疑惑方其未解也故不免於田狩之事三狐者人情衆多之疑也九二則以田而𫉬之旣𫉬矣夫復何所徃哉來而復諸安靜之地以中直之道待天下而巳矣故曰得黄矢此九二之貞吉而象謂之得中道也夫方其難之未解也受是解之任而不以任是解之責此固非二之所謂正也及其難之旣解也三狐之旣𫉬而不知中道之為得此又豈二之正也歟六三負且乘致㓂至貞吝象曰負且乗亦可醜也自我致戎又誰咎也夫亂難旣解則貴賤履位朝廷清明容有非據之人加諸上位則其致宼戎也必矣六三以隂柔居下之上所謂小人而處髙位者也夫小人宜在下者也故三有負且乗之象繫辭釋之曰負者小人之事也乗者君子之器也則以六居三之謂也夫以負荷之質而且乗車非所宜據可知矣安得不召宼戎也哉故繫辭曰小人而乗君子之器盗斯奪之矣上慢下暴盗斯伐之矣何者以小人而加諸上位天下之所不容故也若昏亂之世則彼之志得以行矣其孰能誰何之哉貞吝云者以六居三不正者也故於正道為可醜吝而象曰負且乗亦可醜也夫人必自侮然後人侮之國必自伐然後人伐之六三之負且乗自侮自伐亦甚矣則其致宼戎也孰使之然哉无所歸其咎矣故曰自我致戎又誰咎也我謂三也象曰又誰咎也疑貞吝下有无咎二字今逸之九四解而拇朋至斯孚象曰解而拇未當位也夫處近尊之位遇有為之時又有能為之才而其事業或未能厭滿於人心者此九四所以有解而挴之象而象曰未當位也拇之為物在下體而微者也初六之象也四與初正居相應之地其所解者至微至狭而其功未足以稱乎其位故有是象也惟夫解之所及者不特至微至狭而巳使凡朋𩔖之至而吾无所不用其孚焉則解之功大矣斯足以當夫位矣故又曰朋至斯孚是言也所以勉四也夫當解之時在上而有功乎下也易在下而致力乎上也難故四與初雖居相應之地初無際四之象而四有解初之功惜乎其未大也此所以有朋至斯孚之勉焉六五君子維有解吉有孚于小人象曰君子有解小人退也夫天下之難所以未去者在於小人有不肯巳之心故也夫小人之心所以不肯巳者非果難己之也以君子之舉動无以保信之而彼遂不肯已也嗚呼小人之心而至於不肯已也此天下之難所以作而不休而君子日夜用其智竭其謀求以巳其難而難卒未巳也然則如之何而可以保信之乎曰維有解而巳矣君子維有解則彼小人者必曰吾君子我赦也不我殛也我宥也不我廹也吾有更生之望矣吾有自新之路矣曩者吾以為斯世之棄人也今復得以齒於天地之間矣曩者吾以為逃刑避罪之不暇也今復得以為太平之人矣吾何為而為此亂民也哉如此則雖不用智不竭謀以與小人爭一旦之命而彼之不肯巳之心釋然散去而无餘而難自巳矣何者盖吾有以保信之故也故曰君子維有解有孚於小人而象曰君子有解小人退也曰退云者巳其不肯巳之心而无復與我爭衡故也然則巳難之道其事甚約其效甚速也如此夫武王之旣伐商也歸馬於華山散牛於桃林示天下不復用兵此維有解之謂也而又發鉅橋之粟散鹿䑓之財大賚於四海而致萬姓之恱服此有孚於小人也當是時也為小人者雖欲不巳其不肯巳之心得乎􅂏曰解之時大矣哉盡是大者則六五是也於古人則武王是也上六公用射隼于髙墉之上𫉬之无不利象曰公用射隼以解悖也解至上六解之功巳成矣故極言解悖之道夫隼鷙悍之禽也所謂上慢而下暴六三之象也解之六爻惟三與上各處一卦之上而非其應故上以震動之極而尤在諸爻之上於位則正於勢則便於器則利於時則宜以正而去不正𫉬之盖无難者故曰公用射隼於髙墉之上𫉬之无不利三居下之上内外之限也故有髙墉之象若同人九四乗其墉則内外之限又在九四矣繫辭之釋此爻也而曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有𫉬語成器而動者也此又申解悖之道也童溪易傳卷十八
