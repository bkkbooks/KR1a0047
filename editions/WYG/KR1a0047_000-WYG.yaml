body:
  text: 童溪易傳易類提要臣等謹案童溪易傳三十卷宋王宗傳撰宗傳字景孟寧徳人淳熙八年進士官韶州教授董真卿以為臨安人朱彛尊經義考謂是書前有寧徳林焞序稱與宗傳生同方學同學同及辛丑第則云臨安人者誤矣宗傳之説大概祧梁孟而宗王弼故其書惟慿心悟力斥象數之弊至譬於誤注本草之殺人焞序述宗傳之論有性本無説聖人本無言之語不免涉於異學與楊簡慈湖易傳宗㫖相同盖弼易祖尚元虚以闡發義理漢學至是而始變宋儒掃除古法實從是萌芽然胡程祖其義理而歸諸人事故似淺近而醇實宗傳及簡祖其元虚而索諸性天故似髙深而幻窅考沈作喆作寓簡第一卷多談易理大抵以佛氏為宗作喆為紹興五年進士其作寓簡在淳熙元年正與宗傳同時然則以禪言易起於南宋之初特作喆無成書宗傳及簡則各有成編顯闡别經耳春秋之書事檀弓之説禮必謹其變之所始録存是編俾學者知明萬厯以後動以心學説易流别於此二人亦説周禮者存俞庭椿邱葵意也乾隆四十五年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易傳原序易不可以易言也蓋自漢魏以來世之言易者特多於他經而其失也比之言他經者亦多此其故何也易而言之之過也夫人之情有所難乎此也則必有所畏謹乎此而後獲免輕議乎此之失苟惟有所易也則將爭奇競巧而不知中庸之爲至德騁私任臆而不知正直之爲王道如是則擇焉不精語焉不詳貿貿然不知朱紫苗莠之固有其辨而吠聲覘影之流始受其誤矣昔者夫子蓋嘗致謹乎此也觀其言曰加我數年五十以學易可以無大過矣夫學易而可以無易之過此豈童心淺智者之所能爲也故聖如夫子亦曰吾猶有待焉爾聖人之心其不敢有所易如此也而客有註易與本草孰先之問爲陶隠居者則告之曰易先其説曰註易誤不至殺人本草誤人有不得其死者嗚呼自斯人不至殺人之言一發而易之誤自此始矣世之輕議是經者始紛紛矣夫豈知本草誤誤人命註易誤誤人心人心一誤則形存性亡為鬼蜮為禽獸將無所不至其禍不亦慘於殺人矣乎隠居之言曰本草誤人有不得其死者殊不知註易誤人有不得其生者可謂智乎或曰若之何而可以無易之過如吾聖人之學易矣乎曰竊嘗聞之綱一舉而目張領一挈而裘順天下之有是物也孰從而然歟是故有所謂形而上者之制乎命而後是物也得以肇其長短小大之形吉凶消長之變世之言易者孰不曰捨是數不可以言易也捨是象不可以言易也而聖如夫子亦必曰是數與象易所不廢也然所以爲是數與象者或不知其説焉則自一以往而有不可勝計之數自形色貌象以往而有不可勝計之象雖夫子亦末如之何矣何也聖人之於易徒知據乎其㑹而已矣據其㑹則凡憧憧於吾前者莫吾眩也聖人之於易也徒知立乎其顛而已矣立其顛則凡紛紛乎吾下者莫吾度也然則是數也是象也不知務其所以然之説也而可乎夫苟捨是而役役於不可勝計之地此夫子所謂易之過也然則捨數與象不可以爲易而其過也乃數與象也則金石草木所以爲本草也而其殺人也乃金石草木也天下同知本草誤誤人命而不知易誤誤人心吁亦異哉余不敏一經之教奉以周旋有日矣然學愈久而心愈雜故雖疲神剔思於此非不勤且至也而未嘗敢下輕議之筆雖然抑嘗思之加我之年亦行甫及矣進無用於時退無補於身不於此時也而有所勉焉豈其志歟若夫所謂大過亦不敢自謂果可無也願就有道而正焉王宗傳謹述性本無説聖人本無言童溪之論性然也易盡性書也而何至於多言我知之矣六丁勅易在天三爻呑易在人天而人之易其顯乎余與童溪生同方學同學同及辛丑第知其出處最詳公性能酒飲已輒論易嘗曰吾逺祖文中不善辨爲負苓者詘使與我遇當瞪目張膽滅其苓而飢之曰爾不有於人又何有於身自是與人論易不倦而於二繫爲詳出其門者十九青紫既第之三年教授曲江越二年而書成大書其影曰三十卷之易書自謂無愧三聖其篤於自信者歟公姓王諱宗傳字景孟世謂天下王景孟則其人也開禧更元族子䮐客武陵以書來曰劉君日新将以童溪易傳膏馥天下後世叔大夫父當序是以序儒林郎知衢州開化縣主管勸農公事林焞炳叔序
