body:
  text: 童溪易傳卷二十五宋王宗傳撰巽下巽上巽小亨利有攸徃利見大人􅂏曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸徃利見大人八卦之德語其剛柔之履位者无若艮之與巽也何也艮以一剛履諸上位故止於上而為二隂之主巽以一柔定位乎下故上順二剛而甘處乎下夫在上者能使在下者順之而不我違在下者能順乎上而不之違此豈上之於下也有所脅迫而下之於上也有所畏懼而然哉理之所在不得不然也故卦德曰巽小亨利有攸往利見大人蓋所謂小亨云者指下卦之一柔而云也夫㢲以一柔而處卦之下有順入而不迫之義故易以㢲為風上下皆㢲是為重㢲故有申命之義今夫風之播於物也夫豈遽焉而巳哉披之拂之鼓之舞之在此者有不能自已之誠則在物也亦將披靡動蕩而惟風之從有不能自已者矣是故上之所以命乎下也亦然孔子曰不戒視成謂之暴孫武子曰約束不明申令不熟將之罪也必也先後之告戒終始之諄復而後下之觀聼也既熟則順從乎上者斯衆矣王輔嗣所謂上下皆㢲不違其令命乃行也是也故曰重㢲以申命此指上下二㢲以言㢲之象也夫㢲雖以一隂為主然在㢲之時二五以陽剛而居中正之位則是剛亦㢲也剛而亦㢲則剛无過剛矣故二與五以同德而居相應之地㢲乎中正為㢲之大人而志行乎下初與四各居一卦之下皆以柔而順乎上夫以初與四之柔處一卦之下以其才則微也以其位則卑也此易之所謂小者小者烏能亨歟蓋皆順乎剛而然也是故居二之位者以大人而為之臣而初六之柔順之居五之位者以大人而為之君而六四之柔順之剛中正者之志既行則小者亦亨矣此㢲之一柔其在初也所以為㢲之始其在四也所以為㢲之終故夫體此道以有往與夫所以見大人也宜无不利者矣故曰剛㢲乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人此指二五之剛與初四之柔以言㢲之所以亨與利也朱子發曰九五之剛㢲乎中正而於九二之剛則不以正予之特曰㢲乎中而已又曰六四利有攸往利見大人而不以大人與二也夫豈知九二居中正之位亦得謂之中正解之九二貞吉得中道也是也乾之二五以同德相應故俱稱大人何獨於㢲之二五而疑之乎若程河南之論則不然其曰如二五之剛中正大人也此則於二五无異辭矣象曰隨風巽君子以申命行事㢲以申命為義􅂏以重卦言之則曰重㢲象以二象言之則曰隨風曰隨云者前之風既播後之風繼之相隨逐而不巳之謂也亦如洊雷為重震之象水洊至為習坎之象也夫上之所以命乎下者為行事而設也將行是事知所以命乎下而不知所以申夫前日之命焉則觀感之未孚而聼從之不一吾欲是事之必行而在人者未有不以為上之人有所脅迫乎我而强乎我之必從也然則先後之告戒始終之諄複此豈上之人為是過㢲不情之舉哉盖入之既深令之既熟則在我者无拂民以從欲而在彼者无傲上而從康者也初六進退利武人之貞象曰進退志疑也利武人之貞志治也初六居重㢲之下㢲而又㢲者也夫㢲而又㢲亦有二義而已矣何謂二義曰當與否是也所謂否者志之疑也所謂當者志之治也志之疑則或進或退初无决擇此㢲而又㢲者然也志之治則㢲而又㢲云者吾非過於㢲也將以審處時宜斷决物情而未敢遽焉故也夫如是又何惡於過㢲已乎蓋過於㢲者所以為决也故曰利武人之貞夫武人以沉鷙而不暴為貞若過於悍勇非正也夫過於悍勇則亦不免於亂耳何治之云履之六三曰武人為于大君六三履之主故也㢲之初六亦曰利武人之貞云者初六重㢲之主故也夫一爻而具二義者㢲之初六之類是也九二㢲在牀下用史巫紛若吉无咎象曰紛若之吉得中也昔者孔子嘗有言曰事君盡禮人以為諂也夫禮少有缺失則為未盡又况禮也者順乎理之謂也於理焉既順矣若有所未盡又焉得為順己乎㢲之為義盖言順也二之於五以剛應剛在㢲之時或有不順焉則失其義矣故有㢲在牀下之象夫牀所以安也在牀下則退㢲而不安乎其居之謂也二之於五也謹其事上之禮退㢲謙抑如是之甚者非諂也謂吾於禮焉而未盡則事上之道實有缺失故也故夫下之事上也如人之於神焉史巫者事神之人也用史巫之道以事上是以事神之禮事乎上也如是則其𫉬吉也紛紛乎其多矣故曰用史巫紛若吉夫孔子盡禮人以為諂則疑於有咎矣然世皆倨我獨恭於禮焉既盡則人以我為諂无害也何也理之所在人以我為諂而我以我為當然故也故曰无咎謂於當然之理而无或過也故象又曰紛若之吉得中也所謂中云者當於理之謂也是道也在㢲則為九二之中位在人則為孔子之盡禮也九三頻㢲吝象曰頻㢲之吝志窮也九三居兩㢲之間一㢲既盡一㢲復來故曰頻㢲夫謂之頻㢲則頻失可知盖九三以剛處剛又居下體之上非能㢲者當㢲之時勉行㢲事以救頻失故爾夫卑㢲之志不出於自然而勉為之則前倨後恭動而易窮豈其志歟故曰吝而象曰志窮也盛德之君子則不然謙恭順㢲本於自然如孔子之於鄉黨則自然恂恂於宗廟朝廷則自然便便與下大夫言則自然侃侃與上大夫言則自然誾誾以至或與與或踧踖或色勃或足躩或鞠躬或戰色隨處隨當動出而不窮何其盛哉此无他執謙之志曽无不足故也若九三頻㢲之吝其志窮也何足以語此六四悔亡田𫉬三品象曰田獲三品有功也㢲至六四離下體而居近五之位承乘皆剛宜於有悔然柔順无忤居㢲之道以此承上則其道上信於君以此與下則其道下信於人此悔所以亡也夫㢲道施諸上下舉无少失如此故以田狩之事喻之夫三品之𫉬田狩之有功也古者以田狩之𫉬分為三品一為乾豆以奉祭祀一供賔客與充君庖一頒徒御此三品也三品之𫉬遍及上下以况則四之㢲道施諸上下而无失也夫四居㢲之道如此非特悔亡也而又有功焉可不謂之善處㢲矣乎九五貞吉悔亡无不利无初有終先庚三日後庚三日吉象曰九五之吉位正中也九五以陽剛居中正之位出命之主也夫命出於上得中正之道則下无不從故曰貞吉悔亡无不利盖不正則有悔於貞既吉則悔斯亡矣以九居五貞也故无不貞之悔此所以无不利也无初謂始未善也夫始既未善故不得不有所更有終謂既更斯善矣若初之既善則又何更為也故􅁇之以先庚後庚之說庚更革也十日自甲乙至戊已為中過中則當變故謂之庚盖庚於五行為金於四時為秋金主斷制秋主嚴厲自甲乙至戊已春夏生物之氣既已備矣庚則能成物之氣當施於此時故華者落之實者完之此有更革而然也夫變更事之大者此豈可易也亦如造物之初戒之警之而不敢忽焉可也蠱造事之初也故以先甲後甲言之㢲更事之日也故以先庚後庚言之夫當未更之先也則必一日二日至于三日致其戒謹之心更之欲其善也及既更之後也則又一日二日至於三日致其戒謹之心慮其未盡善也如此則吉於變更矣故曰先庚三日後庚三日或曰蠱言先甲後甲而曰終則有始㢲言先庚後庚而曰无初有終何也曰甲者十日之首而事之始也此有始也庚者十日之過中而事之當更者也此无初而有終也蠱之六五尚夫柔也故曰甲㢲之九五尚夫剛也故曰庚揚子雲曰庚斷義甲斷仁是也上九㢲在牀下喪其資斧貞凶象曰㢲在牀下上窮也喪其資斧正乎凶也九二居下體之中㢲而得中則㢲在牀下乃以為得故曰得中也上九居重㢲之極㢲過極矣則㢲在牀下乃以為喪故曰喪其資斧資所有也斧利物也所以㫁也陽剛則能㫁此上九所本有也今也喪其本有失孰甚焉故於正道為凶也夫居上而過於㢲此豈通變之道也又焉得為正乎曰非正也乃於正而凶也故象又曰㢲在牀下上窮也喪其資斧正乎凶也朱子發曰魯自襄公三家分其民四世從之至昭公失國无所竄伏盖處上極㢲亡其資斧乃正凶也兊下兊上兊亨利貞􅂏曰兊說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉夫兊以一隂居二陽之上柔說外見故曰兊說也卦以亨利貞為徳者盖說有致亨之道謂内外之情交通而无壅也然所利者又在於貞盖說之非其道則失正矣如夫婦之以滛姣朋友之以諂諛君臣之以媚佞是也惟在我之剛存諸中而无失柔順在外接於物而无忤内外兩得此說之所謂正也故曰剛中而柔外說以利貞此指二五之剛與三上之柔以言兊也夫正道之在天下此天人之心也正道盡於此則上之所以順乎天者此道也下之所以應乎人者此道也此湯武所以出斯民於水火之中而民大說者天人之心實在於是故也故曰是以順乎天而應乎人此人即說以利貞以言說之功也朱子發曰夫就佚辭勞好生惡死民之常情用之以說乃忘四體之勤決一旦之命而不顧非說之以道能如是乎古之人有行之者周公之東征是也故曰說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉此又極說道之大而其效若是也象曰麗澤兊君子以朋友講習程河南曰天下之說不可極惟朋友講習雖過說无害盖兊澤有相滋益處又曰兩澤相麗交相浸潤互有滋益之象朋友講習互相益也朱子發曰兊為江為講兩兊為習蘓東坡曰取其樂而不流也初九和兊吉象曰和兊之吉行未疑也初九雖剛然居下位當說之時未見其有用剛之失也故曰和兊以言雖剛也而反處下說而能和者也此其所以吉象曰行未疑也者以言其行未有可疑未見其失故也河南曰陽剛則不卑居下則能㢲處說則能和无應則不偏此所以吉九二孚兊吉悔亡象曰孚兊之吉信志也􅂏稱剛中在兊之下體則九二是也夫以剛居中則誠實之德充足乎内未嘗非道以求說故當兌之時自信有餘而无失巳之嫌故曰孚兊吉夫六三隂柔而不正所謂非道以求說者也而二比之疑於有悔矣然二居中自信故雖與三同體而未嘗說之此其悔所以亡也河南曰二剛實居中志存誠信豈至說小人而自失乎朱子發曰夫石碏石厚父子也叔向叔魚子産伯有同族也雖比也豈能說之六三來兌凶象曰來兌之凶位不當也六三居兩兌之間一兊既盡一兊復來故曰來兌以言左右媚說相繼而不絶者也夫以不正之才居兩兊之間處四剛之際左右逢迎惟以容說為事此小人之失正者故於兊為凶而象曰位不當也夫上下四剛皆君子也三以小人厠乎其間而所居之位又髙位也豈其當乎九四商兌未寕介疾有喜象曰九四之喜有慶也夫當兌之時九五兌之主也六三上六皆五之疾也當此之時欲去五之疾所賴者誰歟九四是也蓋四以剛德處近君之位則進謀獻議欲去君之疾而後已吾君之疾未去則吾之所以商此二兌也其能自寕己乎是必去此二疾而後有喜也介云者介於其間以剛輔上而欲去此二疾故也二疾既去此九四之喜而天下之慶也故象曰九四之喜有慶也昔楚莊王日夜為樂令國中曰有敢諫者死伍舉入諫莊王左抱鄭姬右抱越女坐鐘皷之間伍舉曰願有進𨼆莊王曰舉退矣吾知之矣居數日滛益甚大夫蘓從入諫王曰若不聞令乎對曰殺身以明君臣之願也莊王於是罷淫樂任伍舉蘓從以政國人大恱此所謂九四之喜有慶也九五孚于剥有厲象曰孚于剥位正當也􅂏稱剛中在兊之上體則九五是也夫以九居五以陽剛之德而居正中之位所謂剛明之主也寕有孚于小人之失而致是剥道也哉盖當說之時近比上六故易於此設是戒也河南曰堯舜之盛未嘗无是戒也是也又曰雖舜之聖且畏巧言令色安得而不戒也有厲云者剥隂消陽也五孚于剥而不之疑焉此危道也故為之戒云象曰位正當云者此責九五之辭也若曰五以陽居陽位正當也而惟小人之是孚焉則有厲矣豈所宜然上六引兌象曰上六引兌未光也夫兌之所以為兌者六三上六是也上六之位尤髙於三此又隂小之尤見幸者故其為媚說也必九五引之而後發非若三之左右逢迎以求容悅也故曰引兌昔者襃姒不好􅀏萬方皆不􅀏幽王為熢燧以召諸侯冦至則舉熢燧諸侯悉至至而无冦襃姒乃大笑幽王說之為之數舉熢燧然雖得􅀏於一女而失信於諸侯此所謂引兌也夫引之而後說其无意味甚矣故象曰未光也猶之曰以說事人已為非矣而又待引焉未足多也蘓東坡曰六三上六皆兌之小人六三履非其位以求說為兊者故曰來兌言不招而自來也其心易知其為害淺故二陽皆吉而六三凶上六超然於外不累於物此小人托於无求以為兌也故曰引兌言九五引之而後至也其心難知其為害深故九五孚于剥坎下巽上渙亨王假有廟利渉大川利貞􅂏曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利渉大川乘木有功也渙散也以㢲重坎是以為渙其象則有取於風行水上盖風行水上无有凝礙其行迅疾而水亦為之動蕩而流散其在人則奔走而從事之時也夫當奔走從事之時必也有所謂剛柔共濟之才而後致渙道之亨今也渙以九之剛來居於二位而有不窮之義以六之柔得四之位于渙之外體而上同乎五此所謂剛柔共濟之才也故九五於此得以盡有廟之道居中履正為渙之主乗㢲之木以濟坎險而有利渉大川之功也此渙之所以亨歟萃與渙皆云王假有廟者萃聚也欲祖宗精神之聚於此也故假有廟以亨之渙散也懼其散也又假有廟以收之鬼神之理聚散而已矣王者以孝治天下者也故設為廟祧以萃祖宗之精神於其間常欲其聚而或懼其散此於萃渙而併及之所以起天下孝子順孫思親之心而盡奉先之道也卦徳有曰利貞云者九五正位乎上利以正道奔走天下之羣才而成此渙功也􅂏釋卦德而不及利貞􅂏辭之末疑有逸文盖於中孚可見矣象曰風行水上渙先王以享于帝立廟風行水上上下散動渙之象也先王觀此象故為之設其郊祀之禮以享上帝則神明通矣又為之立其廟貎以萃祖宗之精神而盡其奉祀之心則散者聚矣河南曰係人心合離散之道无大於此初六用拯馬壯吉象曰初六之吉順也夫當渙散之初則時未至於渙也居坎難之始則難未至於極也當此之時順此之勢而亟救之財用拯之道得矣然必有是才而後可初六之才順有餘矣而所不足者健也故必馬壯而後吉謂以壯濟順而後用拯之道為全然初陽位也六隂德也以隂德居陽位則亦剛柔之不偏也而爻賛獨曰初六之吉順也者蓋多其能因時順勢而亟救夫渙也九二渙奔其机悔亡象曰渙奔其机得願也彖曰剛來而不窮者謂九二也故爻辭又有渙奔其机之象謂當渙之時九以陽剛來居二位二安静之位也故有奔其机之象此剛來之所以不窮也若以九居二而失所安焉則剛之來不能不窮也豈机之象乎夫惟安静然後能一天下之動五奠王居於上而二奔其机於下二五以同德居相應之地而各得所安此所以能合天下之渙也豈非君子救世安民之志願然歟故象曰得願也所謂悔亡何也曰二居坎難之中宜若有悔然九二行乎患難而不動聲色而卒以渙其難故曰悔亡王輔嗣胡安定程河南蘓東坡以初六為机龔深甫耿希道洪成李以九五為机朱子發又以六四為机此皆未深究夫剛來而不窮之義而知机即二也其則不逺又何逺之求六三渙其躬无悔象曰渙其躬志在外也三居坎難之極當渙之時志於渙難而出險而其渙也止於其身而已不遑他恤也故曰渙其躬夫渙其躬與渙其羣固異矣然與其不能於其躬如坎之六三險且枕而以危為安者不亦遠乎故曰无悔上九之渙其血去逖出而渙以无咎與之謂其能逺害也六三與之居相應之地而象曰渙其躬志在外也其亦慕上九之為乎其能无悔宜矣六四渙其羣元吉渙有丘匪夷所忍象曰渙其羣元吉光大也􅂏曰柔得位而上同者謂六四也九五渙之君也以陽剛正位乎上以主天下之渙六四五之佐也以㢲順居近宻之地以渙天下之難故曰渙其羣謂其所渙也渙乎天下之衆而不止於其身如六三而已也此其吉所以為光且大也夫六四能渙天下之難則能合天下之渙矣故曰渙有邱邱聚之大也合天下之渙而聚之此其吉所以大也夫豈渙其躬而巳哉故又曰匪夷所思夷等夷也謂六三也夫四與三均是柔也然三渙其躬而巳四則渙其羣而能合天下之渙而聚之此豈六三思慮之所及也河南曰四五二爻爻義相湏故通言之方渙散之時用剛則不能使之懷附用柔則不足為之依歸四以㢲順之正道輔剛中正之君君臣同功所以能濟渙也元吉光大不在五而在四者二爻之義通言也朱子發曰宣王承厲王之後天下離散召伯之徒佐王建國親諸侯遣使勞來安集渙其羣也九五渙汗其大號渙王居无咎象曰王居无咎正位也九五渙之君也當渙之時為渙之君宜有新民之大命合渙之大政以施諸人故曰渙汗其大號謂其號令一渙而不復反也故取汗為象渙王居无咎象曰王居无咎正位也者朱子發曰渙之時民思其主故王居正位乃无咎在他時安居不能順動則有咎矣故禹别九州而始於冀湯勝夏而歸於亳武王勝商而至於豐王正位則渙散者知所歸矣渙一也而再言之者汗其大號取其散所以欲渙也王居正位取其正所以合渙也上九渙其血去逖出无咎象曰渙其血遠害也上九以陽剛之才當渙散之終禍難既散脫然處无用之地所謂功成而身退也故曰渙其血去逖出血有所傷也渙其血則能遠去禍害而无所傷矣逖逺也時當避去而猶昧夫逺引之義則亦未能无謗咎也故去必逖出而後无咎此張子房從赤松子逰大夫蠡去越之時也兊下坎上節亨苦節不可貞􅂏曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民有一言足以盡天下事物之理曰中是也中則无過无過則可以通行而不窮否則易窮矣易之有節以言事之有所止也所止者何止於中而已矣惟中故亨此卦德所以言亨也夫天下之事不剛則柔剛過則暴柔過則縱惟節之六爻以六三之柔而節初九九二之剛以九五之剛而節六四上六之柔剛柔有節各居其三而九五九二又居二卦之中剛而不至於過此節道之所以亨也故曰節亨剛柔分而剛得中此指六爻三剛三柔與二五之剛中以言節之亨也夫節貴於中不中則過過則苦矣此非人情之所堪也豈可以此為正乎上六之苦節貞凶是也朱子發曰凡物過則苦味之過正形之過勞心之過思皆曰苦苦節則違性情之正物不能堪豈正道也哉申屠狄之潔陳仲子之亷非不力也立節太苦不可正也故曰苦節不可貞其道窮也此又指上六以戒苦節之過也夫人之情樂於縱肆而惡於止節今也務行乎人情之所惡者而於人情之所樂者則務禁止之凡此皆人情之所難者夫務行乎人情之所難行之事凡易之所謂行險者然有道焉使人於其所難行者行之而不憚而惟上之從焉者盖有以說之故也夫惟有以說其心則俾之行其所難行者將如履平地矣又奚以險為哉此節道之善也故曰說以行險此又指兌坎二體之用以言節之義也司馬温公曰兌說也和易也坎險也嚴峻也知說而不知險則民不肅知險而不知說則民不親不肅則慢不親則乖慢與乖亂亡之道也是以說以行險得節之宜也夫節物者无其位則不能行无其道則不可久九五節之位也以九居五於位為當此節物之有其位也中正節之道也既中且正可以通行而不窮此節物之有其道也故曰當位以節中正以通此又指九五一爻以言節之主也雖然節之為道此豈特人道為然也而天地之道亦莫不然今夫天地二氣之運行也十有五日一氣四十有五日一節故一嵗之中凡為氣者二十有四而為節者八而後四時由此而成使其无節則二氣失序矣制度之立也實似之故十一者取民之制而量入以為出者用財之度財用於上既旡或傷則上之取民亦旡所害故曰天地節而四時成節以制度不傷財不害民此又即天地之節以明人君之節也然則中正也者固節之道而制度也者又中正之道所寓焉象曰澤上有水節君子以制數度議德行澤水所鍾也澤上有水當其分限而止不滿溢也故為節之象數度所以為節也德行欲其中節也古者之制噐用宫室衣服也莫不有多寡之數隆殺之度存乎其間使賤不踰貴下不侵上以是為節故貴賤上下各安其分存於中為德發於外為行隨時合宜无過不及則為中節如禹稷之於平世顔子之於亂世曽子之去子思之守是也而孟子於此數君子也則槩以同道與之其善議德行也歟初九不出户庭无咎象曰不出户庭知通塞也節當止之時也初至下之位也九能動之才也夫當止節之時居至下之位雖有能動之才未可動也故曰不出户庭无咎户庭所處之尤􅃉而不與物接者也夫有能動之才以時與位之未可者也故謹宻以自守而非務為離世絶俗之事故无過咎大抵通則行塞則止吾非戾通以就塞也當此之時居此之位分所當然故也所貴乎君子者知此而已故象曰不出户庭知通塞也此回居陋巷之時也九二不出門庭凶象曰不出門庭失時極也二視初位已得中中則不塞而通矣故有門庭之象盖門庭之視户庭已非尤䆳故也夫苟以時當止也吾雖有能動之才亦宜如初之不出焉則有失時之凶矣夫通則行塞則止此君子之所當知也初塞則止二通則行斯不昧於通塞矣而二也亦效之而不出焉則其失時一至於此能无凶乎故象又曰不出門庭凶失時極也極至也謂其當出不出失時之至也然九二之剛得中亦未必至是也易特因初九知通塞之義而示之戒云此韓退之貽書少室山人之時也六三不節若則嗟若无咎象曰不節之嗟又誰咎也三說體也而居下體之極失正而不中所謂極乎說而不知節也夫說極則憂來憂之來皆不自節致之何所歸咎乎故曰不節若則嗟若无咎而象曰不節之嗟又誰咎也君子以禮約巳以道制欲非无所說也說而不至於極故无不節之嗟若六三極乎說而不知節何足以語此朱子發曰此爻與離之九三不鼓缶而歌則大耋之嗟凶象異而意同六四安節亨象曰安節之亨承上道也夫天下之事不可以勉强為也而節道尤不可以勉强為也盖節而勉强則在巳者為難行而在人者為難從此非可久之道也九五居中履正為制節之主而四也以柔居柔正也上乘乎五故剛柔相濟而成制節之功此非有所勉强而然也故曰安節亨而象曰承上道也盖中正者九五之節道也六四以柔順利正之德承之而无所違此非安於節者能若是乎其亨宜矣河南曰節以安為善强守而不安則不能常豈能亨也九五甘節吉徃有尚象曰甘節之吉居位中也􅂏曰當位以節中正以通盖謂五也五當位居中以中正之道制節於上在己則安行在人則易從故曰甘節吉謂其无苦刻難行之道故也夫其為節也无苦刻難行之道則自斯以往可以通行而无窮无窮則有功矣故曰往有尚有尚謂有功也坎曰行有尚往有功是也安定曰味之甘人所嗜也節之道人所惡也今五為制節之主能以中正為之使人樂從如嗜甘味也所以得其吉矣上六苦節貞凶悔亡象曰苦節貞凶其道窮也司馬温公曰三極說而過乎中故曰不節若則嗟若上極險而過乎中故曰苦節不可貞盖節道至九五為中且正過乎此則非中正矣上六所處過乎五而極乎險人所難堪者也此所謂節之苦也故於貞為凶而其道不得不窮謂其道不可通行於世也然又曰悔亡何也曰世之單人匹夫行一介之行以佛氏之寂滅老氏之空虛徃往自信其說至於老死而不知悔者𩔖皆如此此上六之悔所以亡也童溪易傳卷二十五
