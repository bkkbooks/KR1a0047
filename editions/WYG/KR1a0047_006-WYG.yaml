body:
  text: 童溪易傳卷六宋王宗傳撰坤下坎上比吉原筮元永貞无咎不寕方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寕方來上下應也後夫凶其道窮也師以一陽居二位衆隂順之於外大将統軍之象也此卦之所以為師比以一陽居五位衆隂順之于内大君朝諸侯之象也此卦所以為比比有吉之道凡物无所比者不可以獨存於天下故比乃吉也夫比之所以吉者以其有所親附也故繼之曰比附也比之所以有親附者以其上下順而從之也故又繼之曰下順從也順謂坤也向使在上位而无輔則為乾之亢而有悔矣何吉之云向使上下違行而不順則為訟之不親矣何輔之云占筮之道人之所取信也書曰若卜筮罔不是孚益曰未占有孚則占筮者誠信之謂也比之為道以誠信為本故曰原筮謂推原吾之誠信以為比之道也元始也永終也貞不變之謂也吾之誠信始終而不變此比之道所以无咎也故曰以剛中也夫剛而中則誠信之道充塞乎其内又何終始之或變乎盡此道者九五是也不寕謂未得其所以比也方來謂无方而不來也未得其所以比者无方而不來故曰上下應也以爻言之則居正應之地者二而已以卦言之則九五以一陽而五隂莫不比之故謂之上下應也亦猶小畜柔得位而上下應之大有柔得尊位大中而上下應之之義雖然上六之後夫五非果能應夫五也故視下諸爻則其道為窮謂獨背夫五而不之應勢逆而不順故也夫當比之時顯比之主若揭日月於上自四而下皆靣夫五而順從之上六獨背夫五而後之此迷悞失道而不知比之謂也其能獨存於天下乎其凶冝矣故上六又曰比之无首凶東漢之隗囂李唐之李宻本朝之李煜是也象曰地上有水比先王以建萬國親諸侯嗚呼吾觀比之象而知君民相須之勢不容髪也夫萬物之所以比者地也然求其勢之相比而无間然者則莫水若也子夏傳曰地得水而柔水得地而流是也君民之勢亦然先王於是建萬國親諸侯使上下逺近脈絡相通則君民之勢交相比矣盖國者所以域民也侯者所以君國也建萬國則君之所親者諸侯而諸侯之所親者民四方萬里之逺不患其不相比也或曰後世罷諸侯而置守令其與先王之勢同乎異乎曰後世之心患諸侯之難制也故守且令焉而分茅胙土之恩薄矣守令有過則賜之一札奔命而服罪之不暇得保終更則亦指日以求去此易制之法也然更易紛紛官吏民情愈不相親矣初六有孚比之无咎有孚盈缶終來有它吉象曰比之初六有它吉也大凡位之卑者則與之者必狹交之淺者則信之者必寡六居比之初所謂位之卑而交之淺也以此比人人誰比之然有要道焉修吾胷中之誠而已矣故曰有孚比之孟子曰不誠未有能動者惟誠者則无上下之間有所不比比无不善矣故曰无咎缶之為器朴陋而微賤者然虚而能容初六之象也有孚盈缶則又誠无不足者不特有孚而已也終來有它吉者吾誠之效也孟子所謂能動也夫隂之所比者陽也初六之於九五近而承不得為六四逺而應不得為六二然至誠无上下之間誠存於此終應於彼其亦效之必至者故曰有它吉也誠之可恃也如此矣六二比之自内貞吉象曰比之自内不自失也子曰君子周而不比小人比而不周易之有比豈亦小人之道也曰所惡於比者為其不正也如比而得其正則无惡於比矣五比之主也二其應也隂陽各當其位所謂正也夫君臣上下相比以正此所以吉也比之自内者夫正者吾性之所自然而不變也比而不失於吾性之自然者故曰自内凡相此之道而或失之偽為者皆非自内也六三比之匪人象曰比之匪人不亦傷乎以六居三比之所謂不正人也故曰比之匪人夫相比之道以正而吉也比而不正則傷敗乃至是自貽其禍之道也三以不正間於二四之間聖人以匪人目之亦懼夫二四之或比之也其曰不亦傷乎者所以示戒於二四也亦明矣唐之七司馬皆世所稱才而栁子厚劉禹錫尤其傑者一失足於王叔文之門蹉跌含恨以至於死者昩不亦傷乎之戒故也六四外比之貞吉象曰外比於賢以從上也處於邪正之兩間則誰從孰不曰從夫正而吉也然已之不正則亦未有能從夫正也以六居四盖正人也已之既正則所從者亦必正矣故外比於賢以從上也則不内比於不賢之匪人以舍下也可知矣若四者所謂可與語上也歟朱子發曰易曰東北喪朋安貞吉六四之謂乎九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也九五居正中之位則所以比天下之道亦正中也道而正中則大公而不私也故曰顯比陽為明故稱顯夫顯明比道於天下而天下冝无不比者而或容有不吾比者聖人亦未嘗有心於求比之也比之以不比而已故以王用三驅失前禽為喻三驅禮所謂天子不合圍也夫顯此之道順則取之逆則舍之若三驅然故前禽之失以不比比之也順則取之謂自四而下皆順夫五之謂也逆則舍之上六之後夫五是也亦謂失前禽也然以前禽為逆已而舍之則近而順乎已者亦豈上之人有以誡語之而致然歟故曰邑人不誡吉邑近邑謂近而比乎已者也聖人之比天下无逺近親踈之間不以近夫已者而加親不以逺夫已者而加踈此顯比之道也上使中也者夫近而順於已者雖非有以誡之原其所以然者亦非无自而然也夫明中正之道於天下而天下皆惟吾之中矣書曰皇建其有極又曰凡厥庶民惟皇作極此之謂也上六比之无首凶象曰比之无首无所終也知所比而後能比人有足比然後能比於人上六之後夫五非知所比者也以隂居上又非有足比者也故曰比之无首一卦之上所謂首也在比而无為首之道能无凶乎故曰无所終也謂比道之窮也夫君子有終以其謙也上六以隂暗而乗五逆道也其无所終冝矣乾下巽上小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚徃也自我西郊施未行也昔者常疑柔能制剛弱能制强而不知其所以能者何也盖學易而至於小畜而後得其説喟然而歎曰噫此亦出於情投而勢便也已矣夫勢便則事可順成情投則物莫吾忌小畜云者小者之有所畜也畜者止也人臣有所止制之謂也故其為卦也則巽上而乾下其為爻也則六四以一隂位乎五陽之間而且近五焉乾之為物剛而健者也而巽則以順巽之道行乎其上剛而健者不吾忌焉何也是必有以得其情故也四以一隂位乎五陽之間而且近五焉乾之三陽雖剛而健乃居乎其下而不之辭焉又何也勢使之然故也情投而勢便故雖剛矣而此有以入之入之者為主則受入者為客矣此小者之有所畜也故曰柔得位而上下應之曰小畜盖柔不得位則受制於衆剛之不暇矣如制剛何上下不應則衆剛之情俱不我協矣又如制剛何然則昔者君子之為人臣也所以汲汲於得位得君云者非有他也盖曰位卑而言髙罪也又曰信而後諫未信則以為謗已也為是故也古之人有行之者則魏鄭公其人也賈洛陽則踈矣劉去華尤其踈者也夫頃刻不離左右握手入卧内其尊寵何如也以房杜之元勲猶以直遜之也則上下之情寕有或吾忌者故魏鄭公得以肆其志於太宗賈生以踈賤少年足跡方踵殿陛間遽然痛哭流涕驚人耳目絳灌輩詎能平哉其見棄冝矣去華以一介草茅裂眥誦言切齒宫閫其視賈誼抑又甚矣曽何補於萬一哉此无他是皆昩夫小畜之義故也故小畜之義必期於亨不期於亨俱无補也健而巽剛中而志行乃亨此又合二體與中爻而言小畜之所以亨也夫乾健也而在内巽順也而在外九二九五剛也而在中健而濟之以巽則施諸人也為易入剛而不過乎中則存諸我者无悻悻之態而志自行矣所謂志者何也孟子曰畜君何尤畜君者好君也君子之志志於好君而已矣君子之志行此小畜之所以亨也宻雲不雨自我西郊此又昩於健而巽剛中而志行者之戒也夫雲行而雨施者隂陽之氣通也宻雲不雨則隂陽之氣壅而不通矣西郊隂位也自我西郊謂六四用事也不雨之雲徒宻於西郊豈有他哉隂陽之氣不通故也隂陽之氣不通則西郊之雲徒知尚徃而已无惑乎其施之未行也夫小畜之義期於亨也今西郊之雲徒知尚徃而已則失健而巽剛而中之義也不雨之雲徒宻於西郊則欲志之行其可得乎故曰志未行也噫此賈洛陽劉去華之象也象曰風行天上小畜君子以懿文德天下之物疾於行者莫風若也其所以疾於行者以善入故也惟善入故物莫能礙莫能礙故其行也雖欲不疾不可得也故易以巽為風又曰巽入也天下之物惟天為萬物之上惟其在萬物之上為髙且大故舉天下萬物莫能踰於天今也風猶行乎其上何也盖善入故也以天之髙且大而猶不礙於風而風得以行其志焉此小畜之象也剛柔不偏之謂文行於萬物之間而无所忤之謂文君子之畜夫君也亦貴於有所入之爾然德非文德則健而不巽剛而不中其能有所入而使吾志之必行乎故觀風行天上之象必以懿文德為本何謂懿曰積小以至大由微而至著之謂也揚子雲曰浸以光大不亦懿乎文德之發用如風之行无髙不暨无逺不至而物莫我禦盖亦發於細㣲而行於至著云爾是之謂懿文德荆公曰小者之畜其可以暴為之乎懿文德為之以不暴也初九復自道何其咎吉象曰復自道其義吉也初九之陽動乎一卦之初動之㣲也當動之㣲去道未逺制之使不愆於道則用力寡而見功多而无制之之勞矣故曰復自道如復之初九所謂不逺復是也夫君子之畜夫君必待其非心既形舉措既愆去道既逺然後從而止制之其能免咎乎必也於方動之初制之使不愆於道則无制之之勞君焉不見非於其臣臣焉不見猜於其君事君之義了无所失矣故曰何其咎吉而象又曰其義吉也以言事君之義莫吉於此故也孟子曰惟大人為能格君心之非小畜之初動之㣲也所謂心之非也復而自道其盡格心之業乎楊中立曰六四隂得位為一卦之主而初與之為應受畜於四者也過未形而畜之其復自道矣又何咎之有故其義吉也九二牽復吉象曰牽復在中亦不自失也九二視初九則動已形矣所謂動之㣲也亦既有間矣雖然未過乎中也故君子於此牽而引之使復歸諸中而无過中之失則在君非惟无失也而在人臣者亦不自失也夫以牽復而視初之復自道則其制之之勞與逸亦豈不有間矣乎伊尹之戒太甲也而曰若虞機張徃省括于度則釋又曰欽厥止率乃祖攸行夫曰虞機曰省括曰欽厥止曰率乃祖无非牽而復之使歸之中也然則縱欲如太甲而至於思庸伊尹牽復之力益有勞矣郭仲和曰不能辯之於早至二尤艱矣故牽而後復也牽勉强之義九三輿脫輹夫妻反目象曰夫妻反目不能正室也初九動之㣲也其曰復自道則制之之力无勞矣九二動之已形也其曰牽復則制之之力已勞矣若乾至九三行過乎中而剛動之才已極矣制之之力不亦勞甚矣乎猶之輿也其行也有輹如欲制之使不行非脫去其輹不可也夫脫人之輹而制之使不行則在我失之強聒而在彼者易以怨憝故雖以正相與也而亦未有能正者矣此六四用力以制九三之象也故又有夫妻反目之嫌而象曰不能正室也夫制之於中不若制之於初制之於終不若制之於中人臣之有所畜制者其勞逸難易之分於此三爻盡之矣六四有孚血去惕出无咎象曰有孚惕出上合志也小畜之成卦在此一爻也夫四以位則多懼以才則至柔以時則有所畜止之時也禀至柔之才處多懼之地而任畜止之權上下衆剛環然而卜吾之舉動焉於斯時也盖亦難矣况脫三之輻而常遭反目之嫌乎其憂傷恐懼何如也雖然以勢而論則柔一而剛五其不敵固也以理而論則君子以眇然之身而處上下之際亦必有道矣何也即吾之誠意以感之固也吾之誠意既至則金石可動而况於人乎故夫四之血去惕出而无傷害恐懼之咎者吾非恃夫有五也吾恃夫有孚也使吾非有孚則位雖近五而君之志或不我合焉則位雖親矣而心之親則未也其能使吾之志必行乎故象又曰有孚惕出上合志也但云惕出則血去可知盖謂恐懼猶免則傷害斯逺矣舉輕以見重也程河南曰以人君之威嚴而㣲細之臣有能畜止其欲者盖有孚信以感之故也或曰小畜之為小畜者六四也四處近君之位而以柔巽為畜止之道小人邪君子邪曰易雖以陽為君子隂為小人而上下二篇所謂以六居四者凡三十二焉未必皆小人也若槩以隂居隂而謂之小人則凡為人臣者必以陽居陽而槩謂之君子可乎聖人於小畜之六四也而曰有孚曰无咎於大象又以懿文德為君子之事業至上九也又從而戒之曰君子征凶則四也者非小人也夫君子之所存患无孚爾苟有是孚則時剛而剛時柔而柔亦将何所適而不可哉但當有所止畜之時上下皆剛非以柔巽行乎其間不可昔人有身不勝衣而能以全德終始者則小畜之六四是也而槩以小人論之可乎九五有孚攣如富以其鄰象曰有孚攣如不獨富也六四有孚而九五亦曰有孚此四所以上合志也而五則曰攣如又曰富以其鄰不獨富也夫君臣之間所恃相與以无間者曰誠而已臣焉不有以信乎其君君焉不有以信乎其臣則有言而无從也有諫而无聼也君子不能拱手以固寵則懼傷懼讒以求去之而已人君不能恱霽以求益則无陪无卿而自用而已今也不然四以有孚而合五之志五以有孚而攣四之鄰故四得五而无傷讒之吝而五亦得四而有其鄰之富也此小畜之所以亨也以九居五陽之純者也陽之純則為充實充實有孚也以六居四隂之純者也隂之純則為謙虚謙虚亦有孚者也陽以隂為富則隂亦以陽為富故曰富以其鄰不獨富也謂五與四皆以有孚相得不獨五有是也成湯之於伊尹桓公之於管仲蜀先主之於諸葛孔明皆能盡其義矣上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也小畜之道至上九成矣君子之志至此亦已行矣始也彖著宻雲不雨之戒者懼其強聒以用事而上下之情不協焉故也故有健而巽剛中而志行乃亨之說今也畜道之於五而君臣之志不謀而合則凡君子之所欲言而欲施者无不如志矣故上九當畜道之成而有既雨之象謂隂陽之氣至此而交暢矣雖然宻雲不雨猶戒於尚徃其能无疑乎故又戒之以既處謂君子之於此時也若猶有所徃而未已則嫌疑之不免矣夫成天下之功易處其成功難若成天下之功而不處之焉則天下之人皆能之何必君子也何也才有餘而德不足故也惟君子當夫功之既成也吾之處之若无功焉此非所積所養之厚不矜不伐而能至是邪故曰尚德載而象曰德積載也言其德器之不薄故能有所任載而无滿盈之愆也婦道以順為正也若愆於正則為厲月遡日以為明也月至於望則與日敵矣何者隂盛故也故曰婦貞厲月幾望此聖人為畜道既成之戒也此所以終之曰君子征凶有所疑也兊下乾上履虎尾不咥人亨彖曰履柔履剛也說而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也履者何經曰履德之基也韓子曰德有凶有吉吉凶相遼奚啻燕越然皆自所履而始故北首則燕南轅則越顧其所履如何耳是以君子所履常虞傷害恐懼戒敬不敢夫足書云若蹈虎尾是也故履有取於履虎尾之義履之成卦在於六三兊以少女柔弱之資而履乾之剛故曰柔履剛也夫以眇然柔弱之資而履乾之剛尊卑小大之勢至不侔而剛不吾害者何邪盖有道也説而應之而不與之校是也涉世之道以和說為尚以眇然之軀行之萬物之間物至衆而已至寡也不以和說為行而務與之忤焉庸免患乎故曰說而應乎乾是以履虎尾不咥人亨兊恱也初九九二雖與九四九五敵應其體兊也其性恱也老子曰吾有大患為吾有身噫吾身豈能為吾患邪特患不能行是身耳吾身得所履則亦何徃而不服又何身之為吾患邪故曰亨剛中正履帝位而不疚光明也此九五之所履也又非柔履剛之謂也夫涉世之大莫大於應帝王故也剛也中也正也此九五所履之三德也剛則所履之不息中則所履之无過正則所履之不變以是三德而履帝位庸有慊然之病乎疚病也大抵有所慊於中則行之於外也亦必有所不足今也備是三德以履帝位初无不足之慊則履道之善莫盛於斯也故曰光明也書之稱堯曰聰明文思光宅天下稱舜曰帝光天之下至于海隅蒼生謂以帝者之德履帝之位故其效不得不如是光明故也象曰上天下澤履君子以辯上下定民志天下有自然之理常寓於自然之分之中禮曰天髙地下萬物散殊而禮制行矣禮者自然之理也循理而行不踰其節則得其所履矣故履亦禮也上天下澤有自然不易之分故為履之象天下之民尊卑貴賤自有等差然或至於卑踰尊賤妨貴者盖以上下之分不辯故也是故古者謹禮之君子為之立五常之教制五品之爵異士農工賈之業使之車服宫室起居飲食各有常分則天下之民卑不踰尊賤不妨貴其所存蓄自有一定之志可殺可辱而不可使為亂矣初九素履徃无咎象曰素履之徃獨行願也初九以剛明之德而居履之最下之位而上无其應所謂素貧賤者夫素貧賤則亦行乎貧賤而已矣中庸曰君子素其位而行不願乎其外則履之初九是也故曰素履徃无咎夫上无其應而吾之志願則亦求其在我者而已矣吾遑他念乎故曰獨行願也所謂在下位不援上初九有焉孟子之无官守言責進退之有餘裕是也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也夫當履之時進居中位其視初九為得位矣然上无其應則亦與初九同也九二之時履坦坦之道而不忘乎靜正而後吉也苟為不然則輕進躁動失其所之中心摇摇與物交戰豈不失其中心所守者邪故有幽人貞吉之戒謂以幽靜无欲之人而處此地則行道之心不為利禄富貴之所縈亂而後為得其正而吉也孟子曰居天下之廣居立天下之正位行天下之大道得志與民由之不得志修身見於世又曰富貴不能淫貧賤不能移威武不能屈此之謂大丈夫則履之九二是也石守道曰九二以陽履隂有幽人之象六三眇能視跛能履履虎尾咥人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也以全卦觀之則兊之柔弱履乾之剛説應乎乾則曰履虎尾不咥人亨以六三一爻論之則以六居三剛很在内隂暗在外外无所見很以待物故不免涉世之害而曰履虎尾咥人凶卦與爻非固為異也聖人不盡之意互相發明故爾夫是之謂易楊中立曰易中隨時取義固不同也夫眇者非能視也比之无目者特一髪之間耳跛者非能履也比之无足者亦一髪之間耳然不可與未嘗眇未嘗跛者並駕而爭明何也眇能視不足以有明故也跛能履不足以與行故也此六三之才也六三以此才而涉世不量可否輕重忤物必罹傷害故曰履虎尾咥人凶盖其所履之位不當故也夫三履之髙位而以隂柔履之豈其所冝邪故曰位不當也九二以陽履隂其才剛明自處隂晦之地乃幽人也六三以隂履陽内幽暗而外剛明武人也以武人而履三之髙位為一卦之主為大君也外无所見很以待物而不免涉世之害昔人所謂盆成括是也張横渠曰大君為衆爻之主也武人者剛而不德也九四履虎尾愬愬終吉象曰愬愬終吉志行也經曰四多懼處多懼之地而復以恐懼自處所謂愬愬也四處三陽之後故亦曰履虎尾也始也履虎尾終也无忘其愬愬之戒故曰終吉夫九四之志无忘其愬愬之戒故履虎尾而終吉此其志之所以行也謂其能免涉世之患也在卦德曰履虎尾不咥人亨其九四之謂乎九五夬履貞厲象曰夬履貞厲位正當也九五以剛中履帝位剛則足以有決中而且正則其決也莫不當也矣故曰夬履夬決也夫渉世之大莫大於應帝王履以虎尾為喻而九四所以无見咥之傷者處多懼之地而不忘於愬愬故也以九居五其位固正當矣剛中正之德既无不足之疚然或不知以危懼自處則剛有時而息中有時而過正有時而變矣故居此正當之位又當以危懼自處則夫履之德終无疚病矣故戒之以貞厲厲危也夫當履虎尾之時而危懼戒敬之心不可俄頃而弗置之念而况於九五之位者乎上九視履考祥其旋元吉象曰元吉在上大有慶也上九以剛明之德處履道之成涉世之患吾知免矣其惟此時乎視履考祥者凡吾平生所履歴者迎而距之平心而熟視之而善惡禍福之祥皆不逃乎吾之所考焉故曰視履考祥由是自反而仁自反而有禮則其所履之吉復自此始矣故曰其旋元吉夫以元吉而履諸上位此豈武人為于大君之比哉其大有慶冝矣童溪易傳卷六
