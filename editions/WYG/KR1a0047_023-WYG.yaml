body:
  text: 童溪易傳卷二十三宋王宗傳撰震下震上震亨震來虩虩􅀏言啞啞震驚百里不喪七鬯􅂏曰震亨震來虩虩恐致福也􅀏言啞啞後有則也震驚百里驚逺而懼邇也岀可以守宗廟社稷以為祭主也震者陽始生之卦也夫陽生必自下始故乾坤之交一索而成震其在六子則為長子謂一陽之始生也然陽剛非居下之物也故有發動之義其取象也則於物為雷雷之為物也奮擊以達陽氣則震之一陽處重隂之下之象也上下皆震是為重震故大象又有洊雷之象夫陽動於下其勢上達故震有亨之道焉震來虩虩恐致福也笑言啞啞後有則也此指初九居重震之初以明震之所以亨也夫笑樂不能生􅀏樂而所以生􅀏樂者恐懼也初九以剛明之才居長子之任當震動之初而震懼之來虩虩然其恐懼也則其與魯哀公所謂寡人未嘗知憂未嘗知懼者異也豈不足以致福乎故以􅀏言啞啞繼之蓋始於恐懼終於􅀏樂者此先後之序而理之所不能違也故曰後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也此又再申震亨之義也夫震來虩虩懼在我也震驚百里懼在人也警諸我者无失則施諸人者无嫌矣猶之雷也震及百里逺者驚邇者懼其威浸廣矣故夫邇之懼則自初九之身始逺之驚則震不于其躬于其鄰又可於上六見之夫威之所加者廣則下之所服者衆下之所服者衆則出而守宗廟社稷而主其祭祀也又寧懼於喪乎此卦德所以有不喪七鬯之吉也程河南朱子發徐氏皆云􅂏謂出可以守宗廟社稷以為祭主也上文脫不喪匕鬯一句以文義考之是也夫有國之事祀為大大器之重長子是主故長子之出也而宗廟社稷之主在是焉七詩所謂棘七也謂以棘薪為之所以登鼎實于俎也鬯書所謂秬鬯也謂以秬黍為之所以灌地以求神也二者皆所以祭也而長子能不喪之焉可以守宗廟社稷可以為祭祀之主矣吾原其所以可則亦始於恐懼終於獲福而已矣不然則宗廟也社稷也此豈可以慢易守之歟昔者成王蓋足以語此矣嘗觀之詩清廟之祀執競之祀此有事於宗廟也載芟之祈良耜之報此有事於社稷也而天下後世徒知成王能守宗廟主祭祀如是也而不知清廟之作固有所謂閔予小子遭家不造嬛嬛在疚之懼我將之享又有所謂我其夙夜畏天之威于時保之之懼則成王恐懼之心蓋未嘗一日忘于懷也嗚呼此其所以荷太平之休享假樂之福歟象曰洊雷震君子以恐懼脩省上下皆震故曰洊雷洊雷與水洊至之洊同蓋一坎既盈復至一坎謂之水洊至一雷既震一雷繼之謂之洊雷也君子之法此象也則亦有不一之恐懼者矣故曰以恐懼修省蓋恐懼云者作於其心此一恐懼也修省云者見於行事此又一恐懼也夫然後有合於重震之象李博士曰詩美宣王遇災而懼側身修行天下喜於王化復行知恐懼而不能修省則見於聲音顔色之閒而已非所以為恐懼也初九震來虩虩後􅀏言啞啞吉象曰震來虩虩恐致福也􅀏言啞啞後有則也初九成震之主也以剛明之才當震動之初疚心於恐懼而盡卦之德故爻之辭即卦之辭不嫌其重襲而夫子亦以所以釋卦者而釋爻不以重襲為嫌也或曰九四亦震也聖人何不以此予之曰以陽居隂震遂泥也恐懼有所不足矣解見卦􅂏六二震來厲億喪具躋于九陵勿逐七日得象曰震來厲乗剛也夫當恐懼之時人皆怵於有所喪而君子則獨安焉而不之懼者蓋吾有所謂深足恃焉者存也夫其所恃者何也曰在已者足恃則不肯役於得喪之間以失其正而惟正之是守在人者足恃則知其必不以不正之禍而加諸守正之人初九震之主也以九之剛威動而上奮孰禦之者而六二乃以至柔當其鋒岌岌乎殆哉而其喪失者多焉故曰震來厲億喪貝何者彼方來而我乗之故也然六二方不降其操不移其守而安處自若曽不怵於所喪而有躋于九陵之勢與所謂勿逐七日得之理焉曷為知其為厲也而反躋之又曷為所喪之既多而所得之可必也亦曰時雖當懼矣其人亦足懼矣然吾之正或棄而不守此則大可懼也吾安能舎其大可懼者而惟區區之得喪是計哉此之謂在已有足恃也彼初九也亦將曰吾當震懼之初而自恐自懼之不暇安敢妄加恐懼於人哉況當此時與吾同體守正道為正人如六二者幾人哉在我欲其亨而在六二則所處如此之危在我致其福而在六二則所喪如此之多吾之心亦豈所安也然則六二所以躋于九陵而无患得所喪而无逐者亦賴有此耳此之謂在人有足恃者夫震來厲時也億喪貝勢也躋于九陵勇也勿逐七日得智也以勇處時以智審勢孰謂六二之至柔而勇且智若是乎此无他當恐懼之時而所恃以无懼者以正自守故也厲危也億多也鄭氏云十萬曰億六五億无喪象曰大无喪也億大數也貝貨也二所有之資也居則其位用則其財也躋登也九陵即初九也九在初其勢上進故曰九陵躋于九陵即象所謂乗剛也勿戒之也逐追也七日者程河南曰卦有六位七乃更始事既終時既易也得對喪言之也六三震蘇蘇震行无𤯝象曰震蘇蘇位不當也傳曰愛我者美疢也惡我者惡石也六三處兩震之閒前之震懼未去後之震懼又來三處其閒不敢寧居追尤塞愆故得以起廢立懦神回氣醒而生理復還矣不其幸歟故曰震蘇蘇既殪而復生曰蘇六三之在震不正而且不中无足取者以斯人而處斯世其見惡多矣然惡之者能使之不遑寧居追尤塞愆乃所以生之也故象曰震蘇蘇位不當也然三當此時能自震懼以不中不正慊然於心不敢當位而寧居也夫惟能自震懼則其見於有行也可无眚過去不善以從善矣故又曰震行无𤯝嗚呼吾以是知天下未嘗有可棄之人也一不幸而生於无事安樂之世耳聞諛言目見諛事居前无喪處後无恐迷年没齒終无警悟以至於委靡不振積尤累釁而比屋皆可誅故不得不為可棄之人矣豈不謂之不幸矣乎若六三者不中不正冝若可棄矣然生震懼之世處兩震之閒動輒震懼遂得以起廢立懦而為无眚之人此君子所以為之喜幸也朱子發曰震為反生三震之極也反生蘇也九四震遂泥象曰震遂泥未光也九四離下體而之上體其位髙矣然比之初九則所慊多矣何也以陽居隂故也夫陽剛震動之物也而反居隂隂則厎滯而不能亨不能亨豈震動之義歟故曰震遂泥而象曰未光也夫離下體而之上體冝若震道至此光矣然乃滯泥而未光者是則其在已也威德雖修而未隆也勇斷雖行而或止也其在人也衆心雖服而猶疑也羣情雖畏而尚玩也此震道所以為未光也以唐憲宗之剛明果斷自初即位慨然發憤志平僣叛而捍命者誅悔過者服固可稱矣然淮西既平而驕侈浸生信用非人而功業不竟故史臣止稱之曰唐之威令幾於復振而已夫威令之復振也而曰幾云者未光之辭也豈非有所泥而然歟六五震徃來厲億无喪有事象曰震徃來厲危行也其事在中大无喪也震之成體雖在於初九九四二爻而得尊位大中以主天下之動者則六五是也夫五之所以能主天下之動者以是大中故也故當此之時處此之位恐懼戒謹務危其行徃來之閒不敢失足則能无喪其所有之事矣蓋五之所有之事者不在乎他在乎中而已矣中之為道天地得之而覆載日月得之而照臨維斗得之而不窮堯舜禹得之而相授受皆在此一事耳苟於此事也而无或喪失之焉則其大者在我矣故曰億无喪有事而象曰其事在中大无喪也億大也六五之所謂大者在於中於其大者而无喪焉則隨冝隨變而不越乎時中此所以能主天下之動也然則非能於徃來之閒而務其行則亦未易至此故先之以震徃來厲而象曰危行也而後繼之以此上六震索索視矍矍征凶震不于其躬于其鄰无咎婚媾有言象曰震索索中未得也雖凶无咎畏鄰戒也上以隂柔之才居震動之極中无所主而驚懼之甚者也夫中无所主則外有所眩故曰震索索視矍矍夫以中无所主之人驚懼既甚何徃而可哉故戒之曰征凶然處恐懼之外而恐懼之來未切於已而過為是恐懼則與其恐懼既至而不知恐懼者固有閒矣故聖人於此又以无咎予之而曰震不于其躬于其鄰无咎謂二剛在下尚逺於已而其鄰若六五者於徃來之閒如彼危厲故上六覩此鄰戒亦生畏懼則雖凶而无咎矣夫當此之時中无所主而驚懼太甚使其有親已之人恃之以為應援亦豈至此故曰婚媾有言謂其无與為應也司馬温公曰震不于其躬于其鄰者禍在彼而恩在此也楚人滅江秦穆公為之降服出次不舉過數曰吾自懼也君子曰詩云維彼二國其政不𫉬維此四國爰究爰度其秦穆公之謂乎艮下艮上艮其背不𫉬其身行其庭不見其人无咎􅂏曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不𫉬其身行其庭不見其人无咎也凡物處不當其所則動震之一陽是也當其所則止艮之一陽是也艮以一陽處當其所於上而二隂亦處當其所於下上下各當其所此艮之所以為止也以艮重艮則上下二體亦无不然者矣夫天下有當然之理无乎不在在止則為止在行則為行惟隨其當然而各止其所止者常得之而拘之者則失之也故時止則止止也時行則行亦止也何則當然之理散在行止之閒是為當止之地人能於其當止之地也而止於其所當止不以行止二其見焉則在止亦止也在行亦止也故聖人於此一言以蔽之曰時所謂時云者亦不過曰當然而然也夫其靜而止也其動而行也均不失其時焉此在我所謂不窮者故曰其道光明彼認止以為止而蔽於時止之止認行之非止而蔽於時行之亦止者果足與語止道哉昔孟子以可之一言斷孔子之行止久速又以時之一言斷孔子之聖其知夫子亦審矣至其形容之也又曰金聲也者始條理也玉振也者終條理也夫聖人於其始終之際也皆有所謂條理云者此時止之為止而時行之亦止也此夫子所謂不窮者冝其道之光明至於今而猶不揜也艮之卦德曰艮其背不𫉬其身行其庭不見其人无咎此即艮之卦體以明艮止之道也夫背之在人者止於其所不見之地者也人之所以不能止其所止者以其牽於欲也欲牽於前則求其止有不可得故艮之道當艮其背謂所見在前而背乃背之則止於其所不見之地莫或為吾亂矣王輔嗣所謂目无患也是也故曰艮其止止其所也謂得其所止之地也大學曰於止知其所止此止其所之謂也而其所止之目則曰為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信則當然之理无乎不在患不知所止焉爾艮之為卦也上下二體剛柔相敵无相與之義故命之曰敵應夫相應則相親不相與則相背此所以有艮其背之象也艮其背故不𫉬其身此時止之為止也行其庭不見其人此時行之亦止也何者艮止其所而吾之所知者則止其所而已自止其所之外皆吾所不知故也故夫艮之為艮也吾知其為背而已矣又何求於身之𫉬也哉此時止之為止也然時乎行之也吾亦未嘗不行也故雖行之於庭除也亦不見其人焉此時行之亦止也行止之閒无適而不得其所也如此於止之道所以為无咎也夫近而不相得則凶易之情大抵然也然艮止之時故雖上下敵應不相與也而不以為過何者當止故也故曰无咎乃若施之他卦則不能无咎矣象曰兼山艮君子以思不出其位上下皆艮故曰兼山夫兩山兼峙各止其所重艮之象也君子體此象故曰思不出其位程河南曰位者所處之分也萬事各有其所得其所則止而安若當行而止當速而久或過或不及皆出其位也況踰分非據乎張橫渠曰如素夷狄行乎夷狄素患難行乎患難也朱子發曰位者所處之分君子據正循分亦各止其所而已周公之忠大舜之孝皆分當然也耿希道曰不出其位其身止也思不出其位其心亦止也所以象兼山也初六艮其趾无咎利永貞象曰艮其趾未失正也蘇東坡曰艮自趾而上至於輔與咸一也咸以上六為輔而五為脢艮之輔在五而脢不取何也脢則背也艮之爻皆取於動者而已艮何取於動也曰卦合而觀之見兩艮焉故取其體之靜者而配之曰艮其背爻别而觀之各見其所遇之位位有不同而吉凶悔吝生焉故取其體之動者而不取其靜以為其靜者巳見於卦矣夫艮既以人身取象則初六艮體之極下者趾之象也其體則下其事則初也夫事止之於初而其止早矣故曰艮其趾當止之初而或不知所止者則必失正而有咎今也止之於初故未至於失正而能无咎也其曰利永貞云者戒之也趾之為物也在下而好動易於失正而初六不純乎柔非能守正者故當止之初為之戒云司馬温公曰君子於其所止不可不謹擇也止於永貞利莫大焉六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也六二處下體之中腓之象也腓足腹也處足之隂足之動止而腓實相之者也夫以六居二中且正者也當艮止之時冝若其所止在已而不在人也然九三下體之主也故二之行止係乎所主而巳不與焉猶之腓也動止在股而不在腓也夫以中且正之人又當艮止之時而其所止不自夫巳而自夫人曽不能自救其隨人之失則其心冝如何想其退聽以隨夫人也殊非其本心也故曰艮其腓不拯其隨其心不快而象曰不拯其隨未退聽也夫以二之中且正之才而不𫉬自施而施於人焉於已則不能自拯其隨人之失於人則又未甘心而退聽之其憤懣不自足如此者誠為中正之累者矣古之人或不幸而𩔖乎此者西京之揚子雲是也吾讀班孟堅漢書見其嘗以清淨无為少嗜慾稱之矣又嘗以不汲汲於富貴不戚戚於貧賤稱之矣又嘗以非其意雖富貴不事也與三世不徙官恬於勢利稱之矣而子雲亦有知𤣥知黙爰靜爰清等語以自稱述吾切意當有漢之季守中蹈正者莫子雲若也夫何新室既建子雲乃受止而不辭及法言之作乃有明哲保身之語又有龍以不制為龍之語又有鴻飛冥冥弋人何慕之語吾竊謂此豈子雲快于其心而為是言邪蓋亦聊攄其憤懣爾然則能為中正之累者子雲有焉九三艮其限列其夤厲薫心象曰艮其限危薫心也九三下體之終也以上下二體觀之則交際之地也故曰限夫人之身雖有體節程度或高或下然其脉絡血氣必也周流㑹通曽无上下之閒然後耳目聦明手足便利而中外无恙故能屈伸俛仰无不如意而心得以夷然居中而享其无事之樂今也艮其限而有所止焉則上體自上下體自下截然不相關屬而其所謂夤者不得不列矣夤膂肉之下接者也夤之列則所謂心者其能獨寧乎吾見其岌岌焉危矣何者上下二體之相絶則不堪其憂者心也故曰艮其限列其夤厲薫心蘇東坡曰憂之及心也謂之薫程河南曰止道貴乎得冝人之固止一隅則處世乖戾與物睽絶艱蹇忿畏焚撓其中豈有安裕之理六四艮其身无咎象曰艮其身止諸躬也身者百體之緫名也四巳離下體而之上體故得緫百體而謂之身焉艮其身謂施止道於其身也夫人之一身患不知所止爾如知其所止則能置其身於无過之地以此齊家以此治國以此平天下皆自此身始矣可不知所止乎孔子曰射有似乎君子失諸正鵠反求諸其身太甲自怨自艾之言曰欲敗度縱敗禮以速戾于厥躬古之聖賢施止道於其身也蓋汲汲如此誠知所本矣孟子曰天下之本在國國之本在家家之本在身身與躬即一物也或者有身信而躬屈之說非也六五艮其輔言有序悔亡象曰艮其輔以中正也艮之成體雖在於九三上九二爻而以中正之道主天下之止者則六五是也夫五之所以主天下之止者雖不在於區區之話言而一嚬一􅀏之微實足以係天下之休戚而召當世之治亂可无戒乎故五在上出命者也其在上體則言語所自出之地者輔也故有取於輔焉夫言輕發而无叙則有悔五施止於輔頰以中正之道自守故有所不言言必中節而无招憂之悔矣故曰艮其輔言有序悔亡而象曰艮其輔以中正也或曰五於正有所不足而云以中正也者曰以中故正也惟其以中故正則以此道而主天下之止缺乎何有上九敦艮吉象曰敦艮之吉以厚終也上九成艮之主也夫艮至上九艮之終也艮之終則篤實之德愈久而愈堅故曰敦艮吉而象曰敦艮之吉以厚終也河南曰人之止難於終久故節或移於晚守或失於終事或廢於久人之所同患也上九能孰厚於終止道之至善所以吉也夫震莫善於初而艮則莫善於終而九三九四不與焉者艮者震之反艮之上九即震之初九故也君子以是知震貴始艮貴終艮下巽上漸女歸吉利貞􅂏曰漸之進也女歸吉也進得位徃有功也進以正可以正邦也其位剛得中也止而巽動不窮也易中多以男女夫婦發其義者蓋亦本隂陽而作也隂陽之用見於造化則為天地施之人事則君臣也而其較然易知者則男女夫婦也然人皆知發生之德皆屬諸陽而抑知陽之不得隂則發生之功將施之何地邪故夫天必得地而後成造化之功男必得女而後有生育之理君必得臣而後致升平之效其相須之勢固如此也然上之所以須乎下者固若是其急也而下之所以徃就乎上者亦未冝遽然也何也上之汲汲乎下也則於禮為无闕而下之或汲汲乎上者則於禮為深諱故也惟其然也故女子无輕動之失而君子有難進之風此易之所以有漸而漸之卦德所以有女歸吉利貞之辭也蓋漸之為義未遽然之謂也天下之理於其未遽然之中雖日望之不足也猶之木也始於毫末終於合抱此豈一朝一夕之故哉而其進也蓋亦自有漸也故􅂏曰漸之進也以言天下之理固有所謂未始遽然者存也女子之歸於人也其始也納采其次問名其次納吉又其次請期而後繼之以親迎之禮於是夫婦之道始成此所謂漸之進也以此為進故曰女歸吉也朱子發曰臣之進於君人之進於事學者之進於學君子之進於德未有犯分躐等而能進也而漸專以女歸為義者禮義亷耻之重天下國家之本无若女之歸也夫男女之合禮所重焉故君子之仕也亦然孟子曰丈夫生而願為之有室女子生而願為之有家父母之心人皆有之不待父母之命媒妁之言鑚穴隙相窺踰牆相從則父母國人皆賤之古之人未嘗不欲仕也又惡不由其道也不由其道而徃者與鑚穴隙相窺之𩔖也夫不由其道而徃則不得謂之女歸吉也安得謂之正矣乎惟其進也以漸則不愆於正矣進得位徃有功也進以正可以正邦也此則指漸之六爻各得其正以言漸也夫漸之六爻六二九三六四九五正也而初上二爻雖不當位亦陽上而隂下得尊卑之正矣隂陽各得其正此所謂進得位也此所謂進以正也夫位位也而正則道也有是道而无是位則功无自而成有是位而无是道則下无所觀法矣故夫所謂有功者必曰得位而所謂正邦者必曰以正也位猶馬也正猶轡勒也有是馬矣而致逺之功固在是矣然而无是轡勒焉則顛蹶之患隨之矣欲正得乎故正也者位之所寳而漸之利也其位剛得中也此又專指九五一爻以言漸也夫進得位進以正此六爻之所同也然語其位之剛得中也則九五之所獨也夫惟以九居五剛而得中此所以履至尊緫衆正而成漸之功也止而巽動不窮也此又合艮巽二體之用以言漸之所以有功也夫止立我之道也巽應物之道也知有我而不知有物則有止而已矣非能動也知有物而不知有我則喪其所止而動易窮矣何者不動則无漸進之義動而窮則是躁動也夫漸之義非戒於動也而戒於躁動焉則止於此而巽於彼而立我應物之道兩得而无遺此動之所以不窮也夫在我有不窮之理則亦无越乎是正而巳矣漸之所利者正而六爻之位各得其正此不窮之源蓋有所自來也歟象曰山上有木漸君子以居賢德善俗艮為山巽為木山固髙矣上有木焉則木又出於山之上矣夫木之所以能如此之髙者夫豈一朝一夕之故哉其所由來者漸矣惟其有漸故始於毫末終於合抱而有不可禦之勢焉此蓋止於此而巽於彼之道然也君子將以善天下之風俗也亦豈一朝一夕之所能致哉賢善之德居之在我而所止於此者既足以為風化之本原矣而至誠未有不能動者故其美化流行自身而家自家而國自國而天下此所謂止於此而巽於彼之道也􅂏曰止而巽動不窮也其是之謂歟初六鴻漸于干小子厲有言无咎象曰小子之厲義无咎也漸之卦德有取於女歸漸之大象則有取於木漸漸之六爻則又有取於鴻漸或取諸人或取諸物所取不同其所以發明漸進之義則亦一也鴻之為物也非其徃不徃非其居不居其行有叙徃來有時者也六爻之位自初至上尊卑小大各得其正故有取於鴻漸焉六以隂柔之才初有所進固未離乎下位也故有于干之象干水湄也未得位之象也夫當始進之初進未得位而又上无應援故當以謙卑自處而致其危警之心則於進退之義可无過咎也小子云者此古人之謙辭也湯曰予小子履武王曰予小子發周公曰予小子旦初六以謙卑之志處此下位自危自警不敢妄進而恐失進退之義故曰小子厲也有言猶所謂有說也夫初六之所以自危自警如此者蓋有說也其說謂何亦曰吾當始進之初上无應援故不得不如是之自危自警故也夫如是則於其進退之義夫何有一毫之失歟故曰小子之厲義无咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也由于而之磐君子得位之象也磐石之平夷而可據者而鴻也漸乎其上莫安之地也君子處莫安之地而飲食乎其上則有寛閒和樂之道而无迫促顧懼之憂矣故曰衎衎謂以六居二居中履正而以中正之道上應剛中之君故居其位食其禄而无愧焉故曰吉夫君子居人之位食人之禄患不稱爾苟在我者居中履正而以中正之道上應於君而得以行其道則進居其位安享其禄不為素飽也不素飽猶詩人所謂不素飱言不徒食其食也九三鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也九三之視六二其位抑又髙矣故有于陸之象爾雅曰髙平曰陸鴻以漸而得髙平之地君子得髙位之象也然君子之進也不難於得位而難於守正以九居三正也上无其應而比於六四以六居四亦正也而下亦无應而比於九三三四相比疑於以不正而合此漸道之所忌也故為之戒曰夫征不復婦孕不育凶三與四俱无其應故以夫婦目之謂三也若離其羣徃與四合而不復於正道四也亦失於正道而得孕於三而不成乎字育如此則凶矣故象曰夫征不復離羣醜也婦孕不育失其道也征徃也醜𩔖也謂漸之六爻皆无不正三若獨徃而不復於正道則是離其羣𩔖也婦人未有孕而不育者四若失其道而得孕於非交此所以不育也三與四各得其正未應至是而易於此必云爾者以二爻既俱无應而且相比故為之戒也既戒之又勉之曰利禦寇夫嗜慾之寇人甚於盗賊惟禮義可以巳之使三也以道制慾以禮制心而不失吾正則四也亦不陷於不義矣此順以相保之道也朱子發曰夫人之所以致非道之交者罔不自巳求之我无隙以乗之彼何自而來乎程河南曰君子之與小人比者自守以正豈惟君子自完其已而已乎亦使小人得不陷於非義是以順道相保禦止其惡故曰利用禦寇然則聖人獨以利用禦寇順相保也之辭而責之九三者蓋謂禦巳之寇以自保者乃所以保四也為四禦寇以保四者乃所以自保也凡此皆九三之責也四何與焉此蓋聖人責備賢者之義然也夫三艮之主也貴於知止故發此義六四鴻漸于木或得其桷无咎象曰或得其桷順以巽也六四之視九三其位抑又髙矣故有于木之象蓋四巽體也處艮之上山上之木也然鴻之掌不能握木則位雖髙矣豈鴻之所安也而語其所安之地則或得其桷而後可也蓋桷者木之方平而其才之可以中榱桷者然後為得所安焉爾夫君子之所恃以為安者亦必曰正而已矣今而進處近君之地以正道居正位則能順事乎上而有所入焉以六居四柔順而正者也又為巽之主是皆體順巽之德而不失其正焉此所以進處髙位而无冒進之咎也九五鴻漸于陵婦三歳不孕終莫之勝吉象曰終莫之勝吉得所願也爾雅曰大陸曰阜大阜曰陵九五得尊位大中故有于陵之象朱子發曰鴻水禽也進而至陵其位莫髙焉然非其樂也君子之樂王天下不與存焉故曰鴻漸于陵夫五之婦二是也二五以中正相許久矣然當是時也三與四以无應介乎其閒聖人方且有失正之戒故二也其進不遽以正自守而至於三嵗不孕焉又何遇合如是之難也蓋正者婦之德而孕者婦之功君子之心與其汲汲於有功无寧汲汲於守吾之正故也雖然中正之道有必合之理故始雖難進而終莫為之閒焉故曰終莫之勝吉而象曰得所願也蓋五之所願者願得正臣以為吾中正之輔而二之所願者亦願以正道而事中正之君故也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也胡安定釋上九鴻漸于陸而曰陸當為逵字逵雲路也而程河南是之竊因二先生之意而深考六爻之義則知以陸為逵者誠是也何者古人之文章多尚音律而於易尤多焉以漸之六爻觀之初之干言二之磐衎三之陸復育四之木桷五之陵孕勝而上之逵儀何疑焉又況上漸之極也而在六爻之上所謂一卦之外也冝有于逵之象不應復為九三之于陸也爾雅曰九達謂之逵以言虚曠无蔽礙之謂也鴻之漸也于其雲路則翾翾其羽進退可觀故可以為在下之表儀此於漸之道為吉也何也其來徃也有時其進退也有度蓋有所謂不可亂者存也故曰其羽可用為儀吉不可亂也程河南曰於漸之時居巽之極必有其序如鴻之離所止而飛於雲路在人則超逸乎常事之外者也進至於是而不失其漸者此賢達之髙致也童溪易傳卷二十三
