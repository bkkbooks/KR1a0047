body:
  text: 童溪易傳卷十七宋王宗傳撰離下巽上家人利女貞􅂏曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉又母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣易有同人焉有家人焉同人之道在於无所不同故其卦德曰同人于野亨家人之道在於无所不正故其卦徳曰利女貞何者正家之道以女正為之本亦以女正為成功女而正則家之正可知矣孔子曰惟女子與小人為難養也近之則不孫逺之則怨此豈易正也邪今而女正則亦无所不正矣故家人以女貞為利其在爻則六二六四是也女正位乎内男正位乎外此即六二九五二爻以明男女之位正也家人有嚴君焉父母之謂也此即九三上九二爻以論父母之為嚴君也父父子子兄兄弟弟夫夫婦婦而家道正此又謂自初至上六爻之皆得其正也或曰初九六二九三六四九五正也上九正乎曰家人以隂居陽位則非正也以陽剛居一卦之上詎非正乎夫以六居二而位乎内卦之中此女正位乎内也以九居五而位乎外卦之中此男正位乎外也男女各正其位則尊卑上下之義得矣然此非人為之所能為也盖天地之大義然也何者論天地化育之功則雖由於二氣之交感然上下之位固有所謂不易者矣此其義之大者夫六二九五男女之象也則九三上九父母之象也何者二與五各在一卦之中而三與上各在一卦之上故也是故男女則欲其正而父母則欲其嚴二與五隂居隂陽居陽正也九三上九剛而過中嚴也故父母俱稱嚴君焉以其各尸内外之尊故也李博士元量曰九三上九父母之嚴者謂之君則主於出命以正一家猶國之有君焉有國者主於義過於義者常至於陽恩故為君者欲如父母之子萬民書以元后作民父母是也有家者主於恩過於恩者常至於害義故為父母者欲如君之正一家易以父母為嚴君是也夫一家之中有父子焉有兄弟焉有夫婦焉曰父父子子則父子各盡其道也曰兄兄弟弟則兄弟各盡其道也曰夫夫婦婦則夫婦各盡其道也尊卑上下各盡其道則家道庸有不正矣乎家道既正則天下庸有不定矣乎盖風化自近始天下者一家之積也治天下之道即治一家之道也家道正於此天下定於彼矣故聖人於此又要其必至之效而終之曰正家而天下定矣不云正家以正天下而云正家而天下定矣此又有所謂自然之感通而无逺近内外之間焉經曰惟神也故不疾而速不行而至此自然之感通而无逺近内外之間者然也象曰風自火出家人君子以言有物而行有恒風者變化之物者也火者著見之物者也風自火出則外之有所化者由於内之有所著見乎外者也夫正家而天下定者家人之道然也在内者无所著見於外則在外者亦何所觀而化乎故曰風自火出為家人之象君子觀此象以為風化之本皆自内出故一言一行不敢易焉言有物而行有恒此君子不敢易其在我者然也夫有形可指謂之物言而有物此誠然之言也不改其度謂之恒行而有恒此誠然之行也君子之言行其不敢易也若此則自内而出者足以著見乎外矣彼得之觀感者庸有不化矣乎故夫君子之言行所謂著見乎外者火之象也得之觀感而无不化者風自火出之象也初九閑有家悔亡象曰閑有家志未變也初正家之始也九以剛明之才當正家之始宜如何哉曰正家之道莫先於制其始始之不制末如之何矣人有常言涓涓不遏將成江河毫末不去將尋斧柯此言始之在所制也夫一家之内有長幼焉有男女焉當正家之始苟不有以制其變於未然之初則長幼失序男女无别害恩義害倫理將自此始也能无悔乎故曰閑有家悔亡而象曰閑有家志未變也夫惟於其志意未變之初而盡其所以防閑之道謹其序嚴其别无使凟亂而失其有家之則此悔之所以亡也程曰不云亡悔者羣居必有悔以能防閑故亡爾魯桓公之於文姜也不能防閑之使為二國之患故詩人所為賦敝笱也鄭莊公之於叔叚也不知早為之所遂至於同氣交兵故激祭仲蔓草之諫此无他不知家人初九閑有家之戒也六二无攸遂在中饋貞吉象曰六二之吉順以巽也六二以柔順之德居中履正而與九五居相應之地夫何為哉陽倡而隂和男行而女隨而已故曰无攸遂遂專也語曰遂事不諫以謂夫人旣專是事也何諫之云爾春秋傳曰大夫无遂事示不敢專也而或專之故春秋之所為書也如公子遂如京師遂如晉是也此坤所謂先迷也九五二之應也則二者亦何敢有先迷之失乎此所以无攸遂也夫所謂无攸遂云者示不敢有所專也然六二之職其亦有所專矣乎曰有之在中饋是也此六二所專之職也盖九五在上二當以巽順之道承事之凡九五之事旣不敢專其所專者專其職守而巳婦人之職守亦不過曰奉祭祀饋飲食而已此外无他事也詩曰無非無儀惟酒食是議是也故詩有采蘩以奉祭祀為不失職采蘋以供祭祀為能循法度此雖指夫人與大夫妻而云也然推而上之推而下之其職守莫不然也夫是之謂貞而吉也盖不順則不能順承乎上而有先迷之失不巽則不能居為下之道而曠其職守故曰六二之吉順以巽也夫為人臣之道亦若是而己矣故在家人則六二是也若在坤則六三是也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也三處内卦之上主治内之道也故以家人婦子言之然以九居三剛過者也故云嗃嗃謂剛厲之過也夫治家之道不知寛猛適中之為尚而惟嗃嗃然此悔也然董之以威束之以禮使在下者肅然而有畏懼之心故雖厲而吉何者於家道未為失故也苟惟不然使婦子嘻嘻然笑樂無節則終至於恣情適欲棄禮亂倫而家道衰微矣故曰終吝而象曰失家節也然則與其嘻嘻而失家節也寜嗃嗃而未失也程曰在卦非有嘻嘻之象盖對嗃嗃而言謂與其失於放肆寜過於嚴也六四富家大吉象曰富家大吉順在位也易以隂陽相得為富家人至六四二卦之中也當剛柔相際之地而以隂靜之才處之所謂居而有之者也故曰富家大吉盖家人六位内外終始俱得其人而四以鎮靜无營處近五之位故能大富家之吉則五之所委任者得其人可知也夫六四以隂居隂正也而以至柔順至剛剛柔相濟而與六二故无忌嫉之嫌此家道之所以殷富也大抵家人六爻各得其正故雖隂陽錯居舉无嫉妬使四也比五而有妬二之心使二也應五而有嫉四之嫌又使三也在下而侵四之志則四也安能順在此位而大富家之吉乎家人之卦徳曰利女貞至於此乎見之矣九五王假有家勿恤吉象曰王假有家交相愛也家人六位俱得其人者以九五為之君也故有家之道莫此為至為五者復何憂乎故曰王假有家勿恤吉假至也恤憂也夫有家之道旣極其至則上下内外之心莫不交相親愛此豈復有督責廹促而使之然歟故勿恤而吉也夫以二五言之則二爻居相應之地二有内助之德而五愛之五有刑家之道而二愛之此所謂交相愛也以六爻言之則六爻剛柔各得其正而以正道交相親愛此九五所以得為一家之主也故以假有家獨歸之五焉以天下言之則王者盡此有家之道以逹之天下故親其親以及人之親長其長以及人之長幼其幼以及人之幼使天下之内无逺近无小大无衆寡交相親愛雝雝睦睦濟濟有叙若在一堂之上焉則王假有家之道至此又无復有加矣故􅂏曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣盡是道者九五是也上九有孚威如終吉象曰威如之吉反身之謂也家人至上九家道之大成也夫能正家而至於家道之大成也豈無所自而致然歟盖正家之道以正身為本孟子曰天下之本在國國之本在家家之本在身其身不正則未有能正家者也況能國與天下乎夫家道以嚴終常人之情其於妻孥也則以恩掩義其於臣妾也則以慢勝禮語其能以不失其威嚴而使家人有祗畏之心者則未也雖然徒能威嚴乎人而不能威嚴乎其身則在人者未有能我信而我從者故威嚴之道當先施諸其身自反自克使吾之身无一毫之可愧焉則將不施威而有自然之威矣何者人深信之故也有孚威如終吉而象曰威如之吉反身之謂也夫家道以嚴終是故吉於用威也然語其有自然之威而若未嘗用威而人我從焉者則以人之深信我也夫人之深信我者非信乎我之能用威乎人也而信我之能用威乎我之身故也夫惟能用威乎我之身則所以信乎人也自有不威之威矣雖欲人之不我從不可也孟子曰身不行道不行於妻子是言也盖為不能用威乎其身而徒用威於人者設也然則不能用威乎其身而徒能用威於人則雖妻子亦不吾信而吾從也況他人乎嗚呼吾以是知易之有家人也聖人不以責之家人而責之吾之身也兊下離上睽小事吉􅂏曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事𩔖也睽之時用大矣哉天下之物自至理之外君子亦聽其勢之如何爾未嘗强同之也此易之所以有睽睽乖也睽合離兊以成卦離火也兊澤也離為中女兊為少女火動而上澤動而下此即離兊之象以言在物之睽也二女同居其志不同行此又即離兊之象以言在人之睽也說而麗乎明柔進而上行得中而應乎剛此則合離兊之義與六五之下應九二以言睽之小事吉也夫澤火二物俱以動為用未始不同也然或動而上或動而下在物之睽有如此者中少二女生而同居亦未始不同也然志各有歸其行不同在人之睽有如此者即物與人以論睽而睽之義曉然矣兊說也離麗也離又為明以說順之道而附麗於離明得所附也當睽乖之時說而不麗乎明則私昵之情爾如睽何六五之君以柔進而上行居尊得中而下應乎九二剛明之臣當是時也雖不能合天下之睽成天下之大事則亦可以小濟矣故曰是以小事吉也胡安定曰夫睽乖之時上下之情異雖有大才徳之人亦不能大有所為但小事則可以得吉也天地睽而其事同也男女睽而其志通也萬物睽而其事𩔖也睽之時用大矣哉此又廣言睽之時用以明天下有不同之物而无不同之理也夫天髙地下此天地之睽也然二氣交感而成化育之事則同也男陽女隂此男女之睽也生而有室家之願而相求之志則通也萬物散殊長短小大各各不同此萬物之睽也然賦性禀命出入生死之事則𩔖也夫睽乖也天下之物固有以睽而合者此又物理之不異也聖人明物理之不異故天地之大人物之衆聖人不務强同其勢而務嘿通其理此所以處睽之時盡睽之用而能和合萬𩔖也夫舉天地之大人物之衆聖人以一理通之而能合萬𩔖之睽其用若此此天地人物之所不外也故賛之曰睽之時用大矣哉象曰上火下澤睽君子以同而異火與澤燥濕之性既不同而上下之勢復爾異此睽之象然也雖然火與澤以理觀之固亦未嘗不同也何也為火者必上為澤者必下此盖理之所謂不得不然者夫以理觀之知其不得不如是也非同乎然以燥濕之性與夫上下之勢觀之則誠異矣君子之心固未嘗欲自異也然或所居之位所守之職有不同焉者人曰此異也而君子則曰此即吾之所謂以同而異焉爾如孟子論禹稷顔子與曽子子思槩以同道目之是矣其次若魯之男子以吾之不可學桞下惠之可是亦以異而同也初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以避咎也睽之六爻惟初與四居敵應之地夫當居睽乖之時而居相應之地者乃敵應也則两剛齟齬之勢其乖異可知此有悔也悔而能亡者謂初居下位而不與四校得喪故也夫馬者所以行也喪馬勿逐自復者謂雖喪其所行之具而不與之校也故曰勿逐曰勿云者戒之之辭也夫當睽異之時身處下位而能不與人校得喪則吾之所以行之具初亦未嘗喪也故曰自復謂其雖䘮而无喪也此悔之所以亡惡人即九四也所謂與初九為敵應者是也夫彼以剛在上與吾為敵應而吾復以剛與之校焉不可也然不與人校固可也而其失也又易至於棄絶夫人則於悔雖亡而於怨咎又不能无也盖以剛傲然居上而吾惟以不校之說是守焉則或至於一切棄絶之而睽異之勢又何自而合邪故曰見惡人无咎而象曰以辟咎也此處睽異之道而然也不然悔亡雖在所取也不能免咎又焉足尚乎九二遇主于巷无咎象曰遇主于巷未失道也睽自二至上各以隂陽相應然睽乖之時火動而上澤動而下隂陽之情乖異而不通故相應之道比之他卦特不同爾夫二以剛中之才上應六五柔中之主亦足以行其道矣然睽之時小人當路正道否塞非君臣上下道合志同之日也故當委曲宛轉以求通上之意然後可以變睽離而為遇合也故曰遇主於巷巷者委曲之道也遇者遇合之謂也以言當此之時小人未去正道未闢其所以能遇合於君者在委曲宛轉引之於當道云爾故曰无咎而象曰未失道也夫當堯舜之時朝廷清明无有蔽欺為君者以予違汝弼望乎下為臣者以无若丹朱戒乎上直言正論或吁或俞故无待於委曲宛轉以覬其遇合也孟子之於戰國則不然是時楊墨塞路儀秦縱横故孟子於此因齊王之好色也則亦對之以好色之說好貨也則亦對之以好貨之說好勇也則亦對之以好勇之說此委曲宛轉以覬其遇合者然也然對之好色也則以太王為言對之好貨也則以公劉為言對之好勇也則以文武為言此雖遇主於巷也曽何失道之有若商鞅之說秦也帝不入則王王不入則伯此雖有所遇合也然失道多矣能无咎乎六三見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也當睽之時九四獨無其應而六三以隂柔近而比之所謂起疑似而招陵犯者也夫輿者所以行也牛者所以行是輿也六三欲徃以應上九而四阻之其能免侵陵之患矣乎故見輿曳而不進其牛掣而有所止其人天且劓而重有所傷也何者位不當故也使其以陽剛居此位則无是患矣夫天髠其首也劓截其鼻也首所以上向而鼻所以上通也而重見傷焉者盖四也欲阻其上向絶其上通而怒其不惟己之從故也雖然睽極則有終合之理三與上居正應之地其能終睽矣乎特以所處之位遇乎九四之剛故初雖不免於見傷而終獲其應也故曰无初有終遇剛也凡寇難在己之下則曰乗剛也若屯六二之於初九是也冦難在己之上則曰遇剛也則睽六三之於九四是也夫同人之世宜若无所不同也而九五又居天下之利勢其在當時容有不顧於分並起而爭其應者九三九四是也又況睽異之時乎然則六三之不免見傷无足怪也九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也於時旣睽所處又无應故曰睽孤雖然初以陽徳居下位所謂同徳之君子也四能去其剛傲之氣而與之遇焉則未為睽孤也故曰遇元夫初以剛陽居一卦之始以不校為勇以辟咎為智所謂善士也故稱元夫雖然過合之道不可苟也吾不彼忌而後彼不吾疑夫苟疑忌之情未能盡去則睽異之勢又何自而合邪故四必得初交相孚信而後四可以无狐危之咎也故曰交孚厲无咎以言四旣以孚信下交乎初則初亦以孚信上交乎四則雖孤危其咎可无也而象曰交孚无咎志行也者夫在睽而求通方孤而思合處危而欲安患其无道爾今也誠意一孚而同徳相遇則反睽而為通不孤而有合去危而即安特在於一交孚之際爾四之志安得而不行邪此其所以无咎也雖然四之遇初則曰元夫而初之見四則曰惡人初之待四无乃太甚矣乎曰君子不以時之方睽也而睽其所守不以己之无與也而與非其應四之无得於三命也而能使三之曳其輿掣其牛天且劓其人以滋上九之羣疑者孰使之然哉得非四之過邪四也所為若此若以初之不校之徳視之豈不薫蕕之異臭而鳳鷙之異禀歟故在四則目初曰元夫貴初也在初則目四曰惡人愧四也此易奨善嫉惡之微㫖也六五悔亡厥宗噬膚徃何咎象曰厥宗噬膚徃有慶也夫古今天下未嘗无睽異之時然究其所以然也則其咎宜誰歸歸之天下之人不可也歸之羣臣亦不可也而人君實任此責爾此六五所以不能无悔也然而其悔可亡者蓋以謙柔自處而能下應乎剛明之臣故爾夫惟能以謙柔自處而所宗敬者九二剛明之臣也故雖當睽異之時小人當路正道否塞而九二以剛明之才噬而去之其噬也易若噬柔脆之物然故曰厥宗噬膚則五於此得以徃而與二合夫何咎之有盖小人之勝君子也尚矣以六三不當位之才而居睽卦之中所謂起疑似而招陵犯之人也二之於五居相應之地能為五之所宗敬則力於濟睽者也故以剛明之才噬去此小人若噬膚然去其否塞以通道乎五而五遂得徃與二合君臣共濟以成此濟睽之功則在五也豈不謂之有慶矣乎夫四與初在下而非其應也徒以同徳相遇尤能使其志之行則五之於二居君臣相應之地其效宜如何故爻曰徃何咎而象又賛之曰徃有慶也然易於此時勉進六五之意深矣上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪冦婚媾徃遇雨則吉象曰遇雨之吉羣疑亡也六四无應故曰睽孤上九有應亦曰睽孤何也程曰居卦之終睽之極也陽剛在上剛之極也在離之上用明之極也睽極則咈戾而難合剛極則暴躁而不詳明極則遇察而多疑上九有六三之應其實不孤而其才性如此自睽孤也如人雖有親黨而自多疑猜妄生乖離雖處骨肉親黨之間而常孤獨也夫見豕負塗載鬼一車此多疑之象也豕穢畜也而又身被其塗泥穢莫甚焉三兊體也隂物而居澤豕負塗之象也上九視三鄙其行之醜惡故其象如此車人所乗也鬼非人也而載之一車載非其人之象也上九謂三自下乗四而不惟己之是應故又有是象焉先張之孤始疑而惡之欲射之也後說之弧而弗射則釋疑而睽解矣盖物極必反睽極必通易之理然也若睽極而不通則終於睽而巳矣此豈易之理也哉繫辭以弧矢取諸睽故睽之上九有張弧說弧之象夫後說之弧而弗射之者以三非與宼為婚媾是故弗射之也夫惟嫌疑旣釋則徃而應之得所遇合矣故曰徃遇雨則吉夫隂陽和則雨終也睽合而和此睽之所以吉也向之所謂羣疑者如豕負塗如車載鬼之𩔖也豈不一切釋去之邪故曰遇雨之吉羣疑亡也夫睽生於疑而孤又生於睽今也羣疑既亡則睽者合矣又何孤云此上九之於六三所以有遇雨之吉也故上九有先張之弧後說之弧之象則六三亦有无初有終之辭二爻必以先後終始為言者以言向也睽而今也通易之理然也童溪易傳卷十七
