body:
  text: 童溪易傳卷二十二宋王宗傳撰巽下坎上井改邑不改井无喪无得徃來井井汔至亦未繘井羸其缾凶􅂏曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其缾是以凶也朱子發曰此卦􅂏文脫錯當曰巽乎水而上水井改邑不改井乃以剛中也无喪无得徃來井井井養而不窮也汔至亦未繘井未有功也羸其缾是以凶也以文義攷之理當然也井之為物體用備者也君子之學備夫體與用者也故體欲其居用欲其不居體居則其德有常用不居則其功不匱德有常而功不匱井之所以為井也而君子實得之巽在物為木其義則入也巽之木入乎坎水而上出之則井之功用見乎外矣故曰巽乎水而上水井此合坎巽之義以言井之功用也井田之法八家為井四井為邑邑者人所聚井者人所食然邑可改遷而井不可改也何也水之所在故也猶君子可以富也可以貧也貴可使為王公賤可使為匹夫此邑可遷改也道之所在不為堯存不為桀亡此井不可改也何者以其剛中也如使其中之不剛則易涸矣安在其不可改邪盡乎此者於爻則二五是也故曰改邑不改井乃以剛中也此指二五之爻以言井之體也夫井之為物也取之而不竭无喪也存之而不盈无得也无喪无得則凡有求於我者皆賴我以為用故也得乎我而徃者井井然也未得乎我而來者亦井井然也然井之所以為井者未嘗不一也何者有所謂不窮者存也故曰无喪无得徃來井井井養而不窮也此又合井之體用以言井之所以不窮也汔幾也繘綆也夫井以濟用為功幾至於井而未及於濟用則亦與未施綆於井同也何也无益於用故也君子之道推已以及物而已矣雖曰知推之而未嘗及物則亦與不知推者同也何也无補於物故也故曰汔至亦未繘井未有功也此又言井以濟用為功而不可以中廢也若夫所以上水者缾也而或羸焉則又非特未有功而已終於无功焉爾矣何也未至者可勉而至已壞者終於无成故也夫君子有善用之才則取之於已用之於人有餘也在我之才或至於不善用焉則如東漢不知謹密之君子自保其身之不暇又何暇於濟世而救物也哉故曰羸其缾是以凶也此又因井以言不善用其才者之戒也吾故曰未至者可勉而至已壞者終於无成象曰木上有水井君子以勞民勸相巽為木而在下坎為水而在上其曰木上有水云者木上本非有水也以木巽乎水而上水故也此木上有水所以為井之象也夫水之蓄聚乎井也其初蓋未嘗勞也及夫以木巽之登水於木則動盪汲引以至於或灌或濯或烹或煎其用始勞矣君子之於民也亦然春使之塗足而耕夏使之曝背而耘以至於為商也則使之竭力於負販為工也則使之精心於技能為士也則使之銳志於行藝何其勞也蓋以謂不如是則不免為无用之棄民故也而民之趨之亦曰此雖上之我勞也然不如是則吾其棄民矣又安得不如是之勞也所謂勸相云者木一物也水亦一物也二物相合而後井之功用見矣若木自木水自水則如功用何君子之於民也既勞之其道蓋有以使之相資以為用者若六府之交修三事之咸和其出入也相友其守望也相助其疾病也相扶持至於父子以仁親君臣以義合夫婦以禮别長幼以序秩朋友以信遇此皆勸相之大凡也初六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舎也初在下而居隂井之況也泥則不可食不可食則廢而无用矣故曰舊井夫養而不窮者井也无得无喪徃來井井又安有新舊之閒乎夫惟廢棄而不用則无日新不窮之功矣故目之曰舊井云謂之无禽則禽鳥且不至況人乎此泥濁在下為一時之所棄也小人汚辱之行人所不取也以至於禽𩔖亦舎棄之則初六之井泥是也程河南曰舎上聲與乾之時舎不同九二井谷射鮒甕敝漏象曰井谷射鮒无與也他卦九二少有可議者惟井之九二則異於是何也九雖陽剛也而居隂隂虚則下漏又巽體也巽之隂虚在下而復缺无有隄防之者夫缺漏在下故无所容蓄而井之水注射於下以此為井未也乃澗谷也故曰井谷而有甕敝漏之象甕之為器也完則能蓄今也敝且漏焉冝其注射於下也鮒魚生長於澗谷之閒者也井谷之水初无停積從注射鮒魚而已鮒魚物之在下而微也初六之象也若使在下而有陽剛之助則能隄防此水而不為井之谷也故象曰井谷射鮒无與也困之九四曰來徐徐志在下也雖不當位有與也九四所謂有與云者指初六也今九二井谷之水注射於下初六隂虚在下而无有隄防之者故曰无與也程河南謂上无應援朱子發謂九五不應无與之者皆誤矣或曰九二之在井既有甕敝漏之象而􅂏乃例稱之曰改邑不改井乃以剛中也何也曰澗谷之水尤非易涸者也此豈可改易者邪以其漏下故曰井谷然語其剛中則亦自若也或者又曰羸其缾凶此豈非九二之所謂甕敝漏邪曰羸其缾云者此為不善用其才者之設也甕敝漏則以喻井谷也其所指異矣學易者觀象而得其影非善觀象者也凡此皆諸家之誤也九三井渫不食為我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也九三以陽居陽陽為實為明明則无初之泥實則无二之漏其渫也固冝渫云者清之謂也水既清矣此可食也而或不見食焉孰不為九三惻心邪惻云者憫其不食故也我謂三也蓋君子有可用之實而不見用於時君子无庸過自惻也為我心惻者人也象曰行惻云者以九三之行清渫如此而不見食焉豈不為人所惻邪可用汲王明並受其福此亦惻者之辭也此九三之清渫之行如此可以汲之而食也汲之者誰乎王之明也謂以我之渫王之明兩者不可相无故也如此則並受其福矣王者享任賢之福而賢者有福天下之功非並受其福而何象曰求王明云者求謂汲之也知九三有可汲之實而遂求之者此非王者之明不可也在九三也有可汲之實在王者又明知其可汲也而遂求之則賢者之福遍及上下矣若王不明而不知九三之是求焉則為九三惻者將何時而已邪此人主之不幸而生人之无福也又何並受其福之有司馬子長曰王之不明豈足福哉此之謂也六四井甃无咎象曰井甃无咎修井也六四以隂居隂隂虚亦敝漏也然在已雖漏而下有九三隄防之助焉則其與九二之得初六亦異矣故有井甃之象謂在已雖陋而修治隄防之力則有賴焉爾此所以能補其過而无咎也朱子發曰古者甃井為瓦裏自下達上然則二之所謂甕敝漏云者則亦瓦裏之不修故也瓦裏之不修非初六之在下乎夫以敝漏之資所與處者曽无修治隄防之助此九二所以无與也所與處者有修治隄防之助而免敝漏之患此六四所以无咎也然則君子之所與處者欲其有補於己而異乎九二之无與則不可以不謹所與也九五井洌寒泉食象曰寒泉之食中正也九五以坎中之陽而居正北方之位故其為井也洌其為泉也寒夫以中正之德居中正之位此堯舜禹湯文武之君所以有功於養人也故曰寒泉之食中正也若孔子孟子有養人之德而无養人之位此九三之井渫而不食而萬世之下猶有為之惻心者雖然渫與洌性也食與不食命也孟子曰性也有命焉君子不謂性也又曰命也有性焉君子不謂命也君子之所謂性命云者而九三九五之爻求之過半矣上六井收勿幕有孚元吉象曰元吉在上大成也井至上六井道之大成也夫井道既大成矣冝无物我之嫌可也故戒之曰井收勿幕上六以隂居隂隂道吝嗇故為之戒云收謂其井道之功成也夫井道至此功成矣若居有其成而不以與人猶為未成也故以勿幕戒之懼其以成功自居也能若是則有孚矣何者我不拒人而人亦不以我為拒人故也其為吉也豈不大乎故聖人於此以元吉與之夫井與鼎皆養人之具也鼎之上功已成矣則不可以无鉉井之上功已成矣則不可以有幕何也幕所以覆井而鉉所以舉鼎也鼎之功巳成而无以舉之功猶未成也井之功已成而或有以覆之得為成功矣乎故井之上曰井收勿幕有孚元吉而鼎之上則曰鼎玉鉉大吉无不利離下兊上革已日乃孚元亨利貞悔亡􅂏曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉予學易至於革喟然而嘆曰噫革之在易也其變易之尤大者乎何也得失之報理亂之數始終之變具在諸卦未嘗不歴歴焉及之惟革命一說必待革而後盡其辭此其故也而或者必曰文王之於卦德也特曰巳日乃孚元亨利貞悔亡而止耳其子文公之於九五也特曰大人虎變未占有孚而止耳至於孔子然後廣及革命之事噫夫豈知微其辭於卦德者此文王之㫖也又微其辭於九五者此文公之㫖也即是辭是㫖而申之以其事實之以其人而无復隱諱焉者此則孔子之㫖也孔子之於春秋也而曰我欲托之空言不如載之行事為深切著明也今於易亦然故夫托之空言而使人嘿喻夫革者文王文公是也載之行事而使人欲明夫革者孔子是也然則易微孔子革之㫖或幾乎晦矣又孰知夫革之在易也其為變易之尤大也乎故夫革之所以為革也以離火兊澤言之則為水火相息以離中女兊少女言之則又為二女之不相得夫水得火而竭火得水而滅今也澤在火上則水火相止息者也如此亦豈物理之常也二女雖均女也今也少女反乗中女故雖同居也其志豈相能哉此亦非人情所可常也即是人情物理而並論之革之所以為革也如此故曰水火相息二女同居其志不相得曰革此合離兊二體之象以言革之義也夫聖人之舉動也初无待於積日持久而人皆知其為當然也此所謂已日乃孚也已止也乃斷辭也止於一日之間而无有不孚者此豈有它哉蓋其為革也有以深信夫人故也是說也在爻則為九五未占有孚在聖人則為成湯之彰信兆民是也故曰巳日乃孚革而信之此指九五以言革之效也夫暗亂之與人心怨懟時乎革也則革暗亂而文明革怨懟而為和說文明離也兊說也故曰文明以說此又合離兊二體之用以言革之時也革之六爻皆正也故初九六二九三九五上六正也而以九居四以陽居隂亦正也乃若統攝衆正而尸革之功者此又九五所以為革之大人也故卦德曰元亨利貞而􅂏以大亨以正釋之此又緫六爻之正而尸之五以言革之道夫當革之時去亂而即治舎故而趨新此生常事也然苟揆之人心而然質之天地萬物之理而皆合蔽之古聖賢之說而无異辭則是事也雖若越常異者而有悔也然革之而當又何悔云成湯之既伐於夏也有慚德焉曰予恐來世以台為口實此有悔也而仲虺則曰天錫王勇智表正萬邦纉禹舊服兹率厥典奉若天道此則悔亡也夫革道患不當爾苟當也則雖成湯有南巢之役可以无慚又況天下之事所謂小小變革也乎故曰革而當其悔乃亡此又曰大亨以正此言革道之善也夫世事之推遷而天地之變易也故􅂏於此又以天地之革以明湯武之革焉夫革春而為夏革秋而為冬雖曰寒暑之不同而二氣之相推四時以成則一而已革夏而為商革商而為周雖曰世代之不同而其上順天命下應人心則亦一而巳一者何也所謂理之當然是也天地聖人均所不能違也夫天地變易世事推遷以時為大故又賛之曰革之時大矣哉噫知革之時為大則予所謂革之在易也其變易之尤大者信乎其尤大也象曰澤中有火革君子以治歴明時離火也而在下兊澤也而在上故曰澤中有火此即􅂏之所謂水火相息也時之運於天也日月之相推寒暑之相盪此水火相息之謂也然人皆知日月之相推寒暑之相盪如是也而不知其所以相推相盪之由此厯學之所由設也故夫厯之設也以二至明隂陽之始以二分正隂陽之中以閏餘定隂陽之終始中終具舉而日月星辰之運動不失其序故天道運於上而人事應於下而无有圭撮之異矣此革道之明效也初九鞏用黃牛之革象曰鞏用黃牛不可以有為也中庸有曰雖有其德苟无其位亦不敢作禮樂焉則革之初九是也夫九以剛明之才當變革之時冝若可以有為也然其位在下也以能為之才處在下之位而或過為改作之事此豈所謂君子之時中矣乎故處此之位惟以中順之德自守而已可也故曰鞏用黃牛之革而象曰鞏用黃牛不可以有為也鞏固也黃中色也牛順物也夫革變革之謂也其曰黃牛之革則堅而不變此又不革之革也以況則君子在下以中順自固而无過動之愆此所謂時中也六二已日乃革之征吉无咎象曰已日革之行有嘉也六二以中正之德上應九五中正之君當革之時无有可愧者矣卦德所謂巳日乃孚元亨利貞悔亡則六二與有勞焉故曰巳日乃革之征吉无咎而象曰巳日革之行有嘉也夫卦德所謂巳日乃孚云者人之深信乎五也六二所謂已日乃革之云者二之有功於五也人之深信乎五初无待於持久焉者以二之有功於五也亦初无待持久之勞故也是何也中正之德相革之主成革之功不難而易故也以是而行故有嘉美而无過咎此􅂏所謂革而當其悔乃亡也而六二則曰征吉无咎又曰行有嘉也以言革道之善如此也九三征凶貞厲革言三就有孚象曰革言三就又何之矣嗚呼吾觀革九三而知革道不可以或過也夫天下之弊不可以不革也不革則弊不去弊既革矣亦不可以過於革也過於革則下不安九三居下體之終所謂革道之小成也而又以剛處剛或過用其剛焉此革之所戒也故曰征凶貞厲自古不明此戒而或至於過用其剛者多矣夫朝綱不振吏治苟且糾之以嚴可也嚴而不已以至禍及縉紳動罹戮辱者此剛過也奸宄害治罪惡既稔懲之以刑可也刑之不敬以至禁網苛密刀鋸橫施者此亦剛過也戎虜伺釁猾我中夏威之以兵可也兵或不戢以至中外騷擾民不堪命者此又剛過也夫以九居三正也剛而或過得為正乎糾吏治以嚴懲奸宄以刑威戎虜以兵正也嚴而不已刑之不敬兵之不戢得為正乎然則處九三之時者冝如何曰當以危厲自警而无愆於是正斯可矣故又曉之曰革言三就有孚蓋以革道言之自初至三已三就矣謂革道之小成也有孚謂亦已著信於人矣此豈可以復有徃歟故象又申之曰革言三就又何之矣則九三征凶之戒不其著明矣乎九四悔亡有孚改命吉象曰改命之吉信志也九四以剛陽之才處近君之位而當水火相革之際事之可悔者從而革之革之而當故曰悔亡夫處近君之位而所改革者何事也曰子從父之令不得謂之孝臣從君之令不得謂之忠惟四也近而親五以同德佐上而其孚信素結主心故上有所命當改則改之在我不為嫌而在君子亦不為疑嫌疑兩忘此所以吉也故曰有孚改命吉而象曰改命之吉信志也夫事君之道以誠信為本又況居獻替親密之地命在上出也而我乃得以改之自非孚信之志素結主心安能有此吉乎唐太宗嘗欲以鄭仁基息女為充華典冊已具魏徴言之帝即詔停其冊髙昌王麴文泰將入朝西域諸國欲因文泰遣使奉獻帝詔迎之徴又言之帝追止其詔至於遣使立葉䕶可汗也使者未還復遣使諸國市馬徴又言之帝為之止凡此𩔖者所謂改命也然苟非徴也展盡底藴不事形迹而剴切之誠上當帝心則改命之吉未易至是也九五大人虎變未占有孚象曰大人虎變其文炳也乾之九五有大人飛龍之象革之九五有大人虎變之象均是人也而象則異云者亦各乗其時故也夫革之五革命之主也特爻辭不顯言之爾蓋其為德也大故其發見也亦大當此之時舉事應變文理昭著猶之虎變也炳然之文有不可揜而其威信所格罔有不服故无待於占決而知天下有信順之心焉噫非上順天心下應人心其孰能變化感通如此其至矣乎上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也革至上六革道之大成也又不特九三革言三就而已也故以君子小人並言之以言革之成效也向也君子隱於巖穴遁迹自晦今也離隱而之顯見於有道之世功業著見如豹之變其文蔚然而盛也向也小人苟免虐害悱然不服今也去虐而歸仁中恱而誠服曽无矯飾之態故革去面從而以恱順之心從乎君也夫舉天下之君子小人莫不皆有所革如此則革道之大成也當此之時豈可復有所徃哉務在鎭静以安人心以漢承秦之後蕭規曹隨以興清静之化可也夫苟昧此則斯民又未有息肩之暇矣放又戒之以征凶居貞吉蓋天下之弊始則患乎不能革故六二應五當革之任則勉之曰征吉弊已革又患乎不能守也故九三上六俱以征凶戒之然三之征凶則曰貞厲而上之征凶則曰居貞吉者革於三則防其剛過於上則以隂静終也巽下離上鼎元吉亨􅂏曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聦明柔進而上行得中而應乎剛是以元亨鼎也者致潔以養人之具也故鼎有新義凡天下之事所謂日用而日新者必曰鼎新以其致潔故也序卦曰革物莫若鼎雜卦曰鼎取新也是也易也者日用而日新之道也故其卦有取於鼎焉古者制器必取諸象鼎之為卦也實具鼎之象焉故以全卦觀之則分植乎下者足也初六是也完實乎中者腹也二三四是也對峙乎上者耳也六五是也橫亘乎上者鉉也上九是也夫物有足有腹有耳有鉉非鼎乎故曰鼎象也此以卦之六畫以言鼎之象也以二體觀之則巽為木也而在下離為火也而在上以木巽火而火出乎木則又鼎之功用見矣故曰以木巽火亨飪也此以離巽二體言鼎之用也夫鼎之為用至重也天下莫不用之然惟聖人為能極其用故繼之曰聖人亨以享上帝而大亨以養聖賢蓋以是惟新之命而畀之聖人者上帝也故聖人必有以享之然於享上帝必曰亨而養聖賢則曰大亨云者孔氏疏義曰享上帝尚質特牲而已故直言亨聖賢既多養須周徧故亨上加大字也朱子發曰以享上帝之心推之以養聖賢人有不樂盡其心者乎其曰聖人亨以享上帝而大亨以養聖賢此又即鼎之用以言惟聖人為能極其用也巽而耳目聦明柔進而上行得中而應乎剛是以元亨此則即巽離之用與六五之柔中以言卦德之所以元亨也夫鼎之為卦巽下也故有人君卑巽下賢之象離上也離為目又六五鼎耳也故有耳目聦明之象夫人君能卑巽以下賢則天下之賢孰不為吾用哉故以天下之耳為耳則其耳聦以天下之目為目則其目明此所謂巽而耳目聦明也夫人君之耳目既聦明矣則以柔居尊位无愧也故柔順之道巽於下則為下賢進於上則為六五而且得中焉以與九二剛中之賢居相應之地此所謂柔進而上行得中而應乎剛也夫巽而耳目聦明則巽之效也柔進而上行則柔之效也得中而應乎剛則中之效也鼎之君具此三者故卦德曰元吉亨而􅂏曰是以元亨也蓋謂之元亨則吉在其中矣河南曰凡卦離上者皆云柔進而上行柔在下之物也乃居尊位進而上行也斯言也不惑於卦變矣象曰木上有火鼎君子以正位凝命李博士曰木上有火非鼎也鼎之用也猶之木上有水非井也井之功也語井而不及功語鼎而不及用非觀象知意也夫鼎之為器也其形端正其體鎭重其用日新故鼎之奠於此也而木上之火亦凝然於此而後亨飪之功見焉君子之觀此象也則亦正其位而已矣其位既正則命令遂於此而凝焉如木火之凝然於鼎也則造化之功亦於此見矣蓋木火相資以成變化有凝命之象凝聚也中庸曰苟不至德至道不凝焉予亦曰苟不木火鼎之用不凝焉然則鼎之用不凝則鼎也者无用之器也君子之位不凝則位也者亦豈非无用之器乎故曰語井而不及功語鼎而不及用非觀象知意也初六鼎顚趾利出否得妾以其子无咎象曰鼎顚趾未悖也利出否以從貴也初鼎之最下趾之象也鼎當致用之初也傾而倒之去其故穢以取新潔故曰顚趾夫趾顚則鼎覆矣此冝若非順道也然時乎當顚也則於理為未悖也故穢者不去則新入者亦穢矣庸可以顚趾為嫌乎故曰鼎顚趾未悖也利出否以從貴也其在人則棄不善以從善也夫鼎趾之顚不正者也然出否以從貴則雖顚未悖也故又曰得妾以其子无咎蓋妾非正者也猶之鼎之顚也然而有子焉則不正之咎可无也何者有可貴者在也故夫善之出於不善也君子不以尤前之不善也而棄夫今日之善若追其前日也而尤之則殆非棄瑕録善之道也蘇東坡曰聖人之於人也貴其身不問其所從論其今不考其素苟騂其角犂牛之子可也朱子發曰得賤臣者苟利於宗廟社稷則或出於屠販奴𨽻夷裔俘虜不問其素可也九二鼎有實我仇有疾不我能即吉象曰鼎有實愼所之也我仇有疾終无尤也九二以剛實居中此鼎之有實而居中者也夫受任而得中則任无過分而能有其實矣否則必致滿溢之愆如九四之覆餗實何有焉此君子所以貴於自謹也故象曰鼎有實愼所之也若九四不知自信而有覆溢之愆則所之之不愼故也我仇謂六五也四繆當髙位重任而上比乎五其得君亦既專矣五欲下應以助二而四實閒之故曰我仇有疾不我能即夫五之不我能即則惟四之是即可知矣此過分之任莫大之責不以加之二而四實當之故二也得以適當其分而无過其實而不失之也故曰吉而象曰我仇有疾終无尤也夫五之有疾乃所以為二之无尤使二也不知愼其所之而冒越以干五則過分之尤終亦有所不免矣其能无尤矣乎王輔嗣曰有實之鼎不可復有所取才任已極不可復有所加胡安定曰鼎之實必有齊量若過其盈溢則有覆餗之凶君子有才德亦有分限若職事過其才分則亦有隳官之謗九三鼎耳革其行寒雉膏不食方雨虧悔終吉象曰鼎耳革失其義也九二鼎實之得中也九三則鼎實之將盈也而又以陽居陽其實充充然美且甘也是故可食也然君子能為可食不能使人必食之故曰鼎耳革其行塞雉膏不食夫鼎耳六五也五以无為為鼎之主而尸舉措之功然其所以舉措者又在乎鉉鉉上九也九三與上九非其應也故上不以鉉而授之五則五亦不以耳而聽之三此鼎耳之革也革云者謂失其所以相從之義也如此則鼎有滯塞而无行移矣故三雖有美且甘之可食者如雉膏然又何望於見食已乎雖然藴其德􆂺而必彰守其道其終乃亨以五之耳目聦明決非棄才之主以上之剛柔有節亦非蔽賢之士方將隂陽和而雨焉則不食之悔可以虧去而終𫉬其吉也為九三者冝守其正以有待焉可也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也鼎之實自二至四无餘地矣无餘地則溢溢則覆此理之常也又況以九居四中非九二而正非九三其才與德視二與三固已有慊矣而且居近君之地位髙位謀大謀任重任其能无傾覆之患矣乎此所以不勝其任下折而上覆也故曰鼎折足覆公餗足初六也四本應初今也鼎折其足此非初之誤四也乃四之累初也餗鼎之實也覆公餗如漢王所謂敗乃公事也夫足折而餗覆則淋漓於外鼎之形體為之汙辱也任不勝而公事敗則醜惡外見堂堂國體豈不為汙辱已乎廢興存亡未可知也故曰其形渥凶原其所以至是者何也繫辭曰德薄而位尊知小而謀大力少而任重故也故象曰覆公餗信如何也夫不度德不量力而遽當其任以致凶患何如其信也昔呉起與田文論功起發三問而文皆應之曰不如子起曰此三者皆居吾下而位居吾上何也文乃曰主少國疑大臣未附百姓不親方是之時屬之子乎屬之我乎起黙然良久曰屬之子矣王陵讓平勃以阿吕后意背髙帝約平曰於面折庭爭臣不如君全社稷定劉氏君亦不如臣卒之誅吕安劉者平與勃也夫田文陳平方之古大臣雖曰未可然位髙位謀大謀任重任言與事符亦庶幾於能信者六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也六五以中虚之德為鼎之主中則不亢虚則能受此所以居无為之地而尸舉措之功者也故曰鼎黃耳然在鼎之上受鉉以舉鼎者耳也六五之象也在鼎之外貫耳以舉鼎者鉉也上九之象也上既曰玉鉉矣而五又曰金鉉何也曰六五之中虚而資上九剛實之助故謂上九曰金鉉以上九之履柔不純乎剛而且與五接也故又曰玉鉉鉉即上九也亦猶耳即六五也而諸家乃謂金鉉九二也鼎耳革九三也夫二與三既為鼎之實矣而復得為鉉為耳五與上既為耳為鉉矣而復不得專為耳為鉉此何義歟又況鼎之形模度數古人蓋於此尤嚴也自鉉至趾其位分固自有次第其法象固自有顚末不應如是之重複而倒置也六五之有取於金鉉云者蓋謂以虚而受實體柔而納剛以六五之中虚而能來上九剛實之助此黃耳之得金鉉也以是為正非所利歟故曰利貞然則人君欲受人之實而以為已之實也非有所謂中虚之德則不可故象又曰鼎黃耳中以為實也上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也鉉居鼎之上鼎之外物者也非若耳趾之𩔖之相聨屬焉者也此上九之象也然鼎之舉措在乎耳而其所以舉措者又在乎鉉鉉也者雖鼎之外物也舎是則不可何者烹飪之事既已也則是鉉也必也勇然相五以尸舉措之功而惟恐其覆功既成矣則是鉉也復脫然无所累而自處於鼎耳之外若无與焉其動也其靜也无適而不得其冝如此也此之為德蓋不可以一偏名也求之於物必也謂之玉鉉而後可蓋玉也者不偏於剛而亦不偏於柔剛柔之有節故也鼎之上九處一卦之外以剛而履柔得動靜之冝此玉鉉在上剛柔之有節也故聖人於此侈言其功而曰大吉无不利蓋鉉也而金為之特為其剛而已猶未足以語其德之全也語其德之全而有剛柔之節者非玉不可古之君子不以禄位累其心時然後應功成而不居動靜進退无適而不利者蓋其德全故也此上九玉鉉之象也童溪易傳卷二十二
