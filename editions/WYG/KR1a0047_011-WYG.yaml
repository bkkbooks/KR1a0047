body:
  text: 童溪易傳卷十一宋王宗傳撰震下離上噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也易之立卦其命名取象也蓋亦各有所指矣鼎有鼎之象井有井之象大過有棟橈之象小過有飛鳥之象若比類者逺取諸物而然也艮有背之象頤有頤之象噬嗑有頤中有物之象若此類者近取諸身而然也頤之成卦上艮而下震上下二剛中存四隂外實而内虛頤之象也而噬嗑則上離而下震上下亦剛中存三隂亦頤之象也九四以一剛閒乎其閒此則頤中有物之象矣夫頤而中虛則无事於噬而自嗑也頤中有物則頤中為之閒塞茍不致齒頰之餘力而噬以決之烏得而嗑邪故噬巳則嗑嗑則頤中之間塞通矣此噬嗑之所以亨也夫古今天下天地之内朝廷之間鄉黨閨門之際所謂強梗讒賊朋邪怨隙蓋未嘗无是也而能使上下不安志意不通事勢乖隔彼此齟齬而至於不合者此所謂頤中之有物也茍噬而去之若齒之決物焉則強梗去讒賊息朋邪逺怨隙消向之不合者合矣夫何往而不亨邪剛柔分動而明雷電合而章此又即爻與卦與象以明噬嗑之所以亨也夫噬嗑以決間塞施之有政則用獄之道也用獄之道莫先於辨曲直析是非故其爻也則三剛三柔相間而不相雜此所謂剛柔分也剛柔有所分則是非析而曲直辨矣由是動吾之威而明吾之罰雷動而電明兩者相合以為用而章章乎宇宙之間矣故其在卦也則震動而離明其在象也則震雷而離電此所謂動而明雷電合而章也然則雷電相合即噬嗑之象也相合而章即噬嗑之所謂亨也雖然用獄之道在乎威明之並用而能用是威明使威而不至於暴明而不至於察者惟仁厚之主為然此六五柔得中而上行所以為用獄之利也夫柔而得中則其與仁柔不斷者亦異矣所謂上行則以此柔中而行乎上也夫五君位也惟剛健中正足以當之今也以柔居之不當位也然雖不當位當噬嗑之時而施之用獄則莫若柔而得中之為利也故曰雖不當位利用獄也臯陶之稱舜也而曰帝徳罔愆臨下以簡御衆以寛且有及於好生之徳洽于民心之説夫曰簡曰寛曰好生此柔徳也然必曰罔愆云者此柔得中也故其效至於民无有司之犯焉夫孰以處帝之位而不當於用柔以議帝也哉故曰當噬嗑之時而施之用獄則莫若柔而得中之為利也象曰雷電噬嗑先王以明罰勅法震雷離電二者相合以致威明之用噬嗑之象也􅂏所謂雷電合而章是也噬嗑利用獄故以明罰勅法為言夫罰有輕重故欲其明明其罰則曉然以有示所以效電之明也勅如勅命之勅勅其法則動之於上而下莫敢不震所以法雷之動也夫惟曉然以有示則上无濫罰矣動之於上而下莫敢不震則下无玩法矣此先王所以為善法夫雷電之象也初九屨校滅趾无咎象曰屨校滅趾不行也噬嗑用獄之時也故六爻皆言用獄之事初九用獄之初也故於小人過惡方騁之初禁之使不行而有屨校滅趾之象趾在下而有行之物也校用獄之具也施校於其趾猶趾之納屨焉則趾以校滅雖欲縱意以往得乎滅趾謂滅没其趾見校而不見趾也夫有以見其行於過惡方騁之初此繫辭所謂小懲而大戒小人之福也故能使之補過而无咎六二噬膚滅鼻无咎象曰噬膚滅鼻乘剛也服人之道莫尚於中正六二居中得正其道固足以服人矣而又下乘初九之剛剛柔相濟資諸人以為助故當去惡之時刑人而人易服而有噬膚之象焉夫噬囓人之肌膚則有以切中乎人者矣而噬之之深又至滅没其鼻焉豈亦二之過歟曰六二中正非過也天下之罪惡固有所謂不可赦者故君子痛以待之在已不以為慘在人亦不以為怨又况資諸人以為助而與衆治之豈其過歟故雖噬膚滅鼻也而曰无咎六三噬腊肉遇毒小吝无咎象曰遇毒位不當也六三之視六二非所謂中且正者也又非四之剛且直者也故其道不足以服人而且无六二六五乘剛之助則其所噬也視諸爻獨為難焉故曰噬腊肉遇毒夫禽獸全乾者謂之腊噬之最難者也腊肉既難噬而以六三噬之則遭其傷毒也必矣何者六三之才有所不足故也當去惡之時刑人而人不服必欲服之力既不勝則未有不為之傷害者也雖然此小有所吝也而亦无咎何也曰六三之才有所不足故不免於噬之之難此所謂小吝也然當去惡之時而務為去惡之事夫豈過舉此所謂无咎也特以六居三自處不當故至於遇毒亦其勢然也若六三者其能因時任責志有餘而才不足者乎九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也以一卦言之則九四頤中之物也所以為強梗者也以六爻言之則九四剛直之才也所以去強梗者也易之取義其不一如是哉夫肉之附骨者謂之胏而又乾焉亦最難噬者也比之腊肉亦其𩔖也然三之於腊肉則遇毒而四之於乾胏則无是患者剛柔之才異也故曰得金矢金矢剛直之才也以剛直之才而施之乾胏冝其无六三遇毒之患也夫暴悍強梗之在天下固非易服之也亦非難服之也服之有其道則雖難而易九四之乾胏是也茍无其道則其所謂難者信乎其難矣此六三之於腊肉所以遇毒也雖然九四之得金矢固有得矣而其所以不足者正也故戒之以利艱貞吉謂其以剛居柔知艱難以自守而不輕用其剛焉則吉也夫惟四之所不足者正也故曰未光也此其所以利於艱貞則吉也易之為君子謀也蓋如此六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也六五操利勢挾人謀當去惡之時比之諸爻冝若易然故曰噬乾肉肉雖乾矣然其視腊肉乾胏則亦固有間矣夫五之去惡如此其易者以其得位得人故也故曰得黄金黄中色也金剛物也六五體柔而居中居中而得位體柔而四以剛輔之又為得人也此所謂得黄金也雖然六五之得黄金亦固有得矣而其所以不足者亦正也蓋四則以剛而居柔而五則以柔而居剛其為不正一也四既以利艱貞而後為吉則五之欲无咎也可不於正而知所厲乎夫惟五之所不足者正也茍知自警而以危厲自守則當去惡之時柔既得中而又得剛徳之助焉則凡其所得无不皆當以此去惡夫何咎之有哉故曰貞厲无咎得當也然此既曰得當也而􅂏乃曰雖不當位何也曰雖不當位云者謂其以六居五也得當云者謂其得位得人也其所指異矣上九何校滅耳凶象曰何校滅耳聦不明也上九用獄之終也世之小人其於罪惡稔積既極若將終身焉此豈復有改悔之冀歟原其所以然則亦非有他也蓋不聦之過也故何之校焉以校滅其耳責其有耳之形无耳之用也夫耳者所以納聲聽受之具也其形存其用亡罪大惡積陷于凶而不知聦之不明孰甚焉故校以滅之謂終塞之也繫辭曰惡不積不足以滅身蓋甚之也離下艮上賁亨小利有攸往􅂏曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下昔棘子成曰君子質而已矣何以文為子貢曰惜乎夫子之說君子也駟不及舌文猶質也質猶文也虎豹之鞟猶犬羊之鞟夫文與質非二物也有是質必有是文蓋亦表裏之符不可強有而亦不可強无之也故子貢於此得以謂之文猶質也質猶文也猶之曰文與質二名也其實一物也故設喻曰此虎豹也則其鞟必虎豹也此犬羊也則其鞟亦犬羊也故虎豹之鞟與犬羊之鞟二鞟也而其實則一理也所謂一理云者顧其質如何耳而文則稱是故也程曰理必有對待生生之本也有上則有下有此則有彼有質則有文一不獨立二則為文非知道者孰能識之賁者飾也天下之物其文見於所飾者莫昭於天之文又莫大於人之文故賁之爻有所謂剛柔相為往來之㫖聖人則曰此天之文也賁之卦有所謂離明艮止之旨聖人又曰此人之文也夫賁之所以亨者以六二之柔來而文初九九三之剛故也離本乾體也坤再索于乾以成離故曰柔來而文剛此非世儒所謂坤之上六來居二位也所謂小利有攸徃者分上九之剛上而文六四六五之柔故也艮本坤體也乾三索於坤以成艮故曰分剛上而文柔此非世儒所謂乾之九二之剛往居上位也夫柔來而文剛則剛矣而有柔故剛有所濟而賁之所以亨分剛上而文柔則柔矣而有剛故柔有所附而小者利於往剛柔相文聖人謂是為天之文豈不曰日月之晦明星辰之運動雲霓之合散凡致飾乎上者无非天之文也然其所以分而為晝夜變而為寒暑積而為歳時其能外是剛柔相文之旨乎不能也離以明而處乎下則是以明而為文也文而明則无不足之文艮以止而處乎上則是以止而為文也文而止則无或過之文明止相文聖人謂是為人之文亦豈不曰父子之有仁君臣之有義夫婦之有禮凡致飾乎下者无非人之文也然其所以嚴而為尊卑辨而為貴賤别而為大小其能外是明止相文之旨乎不能也雖然賁六爻與二體之用所謂天與人之文不可揜也如此奉天理人以斯文為已任者又在乎觀文之主焉何則在天固有是文也不有以觀之則天下之化无自而成曰觀云者固非騁其智任其巧以増益遷就之也因其理之自然而我无拂焉爾故夫因其在天者以求其變則隂既極而陽巳生暑方徂而寒適至盈虛消息之有其期進退遲速之有其度凡變之兆乎時者不容有所隱故於變而无不察此觀於天之文而有得也因其在人者以致其化則位乎上者使各由其道於其上位乎下者使各由其道於其下禮義亷恥以維其心忠厚豈弟以陶其俗風化之行乎人也不容有所遺故化之而无不成此觀於人之文而有得也在昔所謂觀文之主吾於唐虞成周之際見之即夫厯象以授人時在璣衡以齊七政與夫致日致月以辨四時之序則變之在時也豈容有所隱和萬邦而黎民於變敷五典而五典克從與夫禮防樂防以合天地之化則化之在天下者豈容有所遺然則曰煥乎有文曰重華曰文明曰郁郁乎文後世語賁文之盛舍此將焉稽象曰山下有火賁君子以明庶政无敢折獄山止於上火明於下山下有火明有所止之象也夫賁者飾也賁飾之道豈能増其實也夫苟以文明為尚而不知有所止焉非賁飾之道也故君子之於庶政則欲致其明此明也於庶獄則无敢折之此止也蓋折獄之道不恃苛察不貴辭飾惟其情實而巳矣初九賁其趾舍車而徒象曰舍車而徒義弗乘也車者所以飾其行也然可以車而車則以車為榮不可以車而車則車祇為辱剥之上九君子得輿民所載也此可以車者也故車以為榮解之六二以小人而乘君子之器盗斯奪之矣此不可以車者也故車祇為辱賁之初九雖具陽徳然居下位故曰賁其趾舍車而徒夫趾在下而有行之物也今也賁吾之趾不以車而以徒則世俗以徒為辱而君子以徒為賁何者義之所在可車則車不可車則徒吾居下位以徒為賁者也豈可冐昧而不顧其義乎昔彭更曰後車數十乘從者數百人以傳食於諸侯不已泰乎孟子曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰子以為泰乎孟子所謂非其道則初九所謂義弗乘也以爻應言之則初應四義也從二非義也故舍近而之逺舍易而即難此舍車而徒之象六二賁其須象曰賁其須與上興也六二以一柔文二剛初九舍二以即四二與三俱无其應故二之所賁者上隨夫三而巳矣六二柔而靜者也其動也其止也惟剛之是隨焉猶之須也其動與否惟頤之是隨焉得所附也自三至上外實而中虛有頤之象夫賁之道非能増加其質也因其質而加飾之爾然須之在人亦豈外物也血氣盛則蕃滋血氣衰則減耗蓋亦表裏之符爾冠弁衣裳文章黼黻所謂文也君子服之則隆殺等差各稱其徳人非君子則雖有是服不足敬也詩人所謂彼其之子不稱其服是也故曰賁其須與上興也若曰視其體質如何爾猶之須也上隨夫頤而巳矣其動與否不在我也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也賁飾之道在於以剛柔相文相文是也相文而非其道則失之矣六二六四以二柔而文九三之一剛九三以一剛而文六二六四之二柔在賁之時其相文是也然或至於非其道而相文焉此所謂不正之交君子不貴也故曰賁如濡如永貞吉剛柔相賁相與潤色以成其文此所謂賁如濡如也然而相賁而或至失其正焉此則賁之過也故必以永貞而後吉何者六二六四柔之正也九三剛之正也相比而相賁不失正道則吉於賁矣夫人必自侮而後人侮之君子之於正道而无少玷缺則誰敢予侮哉故賁與九三設永貞之戒而曰永貞之吉終莫之陵也於六四亦曰匪宼婚媾終无尤也賁於永終之道望此二爻者深矣六四賁如皤如白馬翰如匪宼婚媾象曰六四當位疑也匪宼婚媾終无尤也四當賁之時隔於九三而未𫉬與初相賁故曰賁如皤如皤白也初動於下亦曰白馬皆未受賁之象也雖然白馬翰如則初之與四相即之志其疾如飛非為宼難之所隔則相親以相賁也久矣故曰匪宼㛰媾夫四與初居相應之地初之剛動於下有翰如之疾豈三之所能隔哉但三无其應而四當其衝居可疑之位故曰六四當位疑也雖然四正也三亦正也其迹可疑而其實則匪他焉但當賁之時剛柔相比而有可疑之迹故爾若三與二皆无其應而近以相徒如須之於頤焉則无可疑之迹也然三曰終莫之陵也四曰終无尤也其能以正相比也歟六五賁于邱園束帛戔戔吝終吉象曰六五之吉有喜也儉嗇者隂之性質朴者隂之才當賁飾之時以六居五儉朴之主也夫邱園絲枲所自出之地也當此之時制度禮樂儉朴之主謙遜未遑也其所賁者邱園之地而已爾此亦重本節用之意故束帛於此不得不戔戔也戔戔者委積之貌也夫此之所賁雖若吝嗇然海内士庶百姓充實則亦由此而基焉故曰終吉而象曰有喜也漢至文帝雖已轉秦為漢矣制度未立禮樂未興故賈生太息之書有曰夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壞故有定經制之請夫生於此時而請定經制則賁飾之道也而帝則謙遜未遑也然開籍親耕皇后親桑勸農之詔无歳无之敦本之風既行而殷富之效乃見則賁之六五之吉文帝以之上九白賁无咎象曰白賁无咎上得志也昔者夫子嘗有言曰周監於二代郁郁乎文哉吾從周又曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進夫子既欲從周之文矣又欲從先進之野何其從之之異歟曰非異也監二代以為文即先進之禮樂故也禮樂之失也其當周之末世魯之僭擬邪又重之以八佾雍徹與泰山之事邪是故夫子欲反其本而未能也而有如用之則吾從先進之說蓋傷其失也賁至上九賁之極也賁飾之極則嫌於失實故欲其无過飾之咎也必曰白賁而後可所謂白賁云者非不受賁之謂也去其偽落其華使无勝質之文如所謂先進禮樂之野是也夫所謂先進禮樂之野何也曰古者非不知酒醴之美也而𤣥酒明水之尚非不知黼黻文繡之美也而䟽布之尚非不知莞簟之安也而蒲越藳稦之尚先進之禮樂如此曽何足以動蕩人之侈心歟夫惟不足以動蕩人之侈心故其意在於著誠去偽使人知有所謂簡敬之所在而不失其本真云爾及其末流也則質以文勝人有侈心而无復反本此豈賁飾之初志歟故大禮必簡至敬无文賁極反本飾无過咎而後上九之志始得矣夫上九之志得此夫子所謂吾從先進者也坤下艮上剥不利有攸徃􅂏曰剥剥也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也剥之成卦五隂而一陽隂始於姤至於剥而五隂盛剛為柔之所剥故曰剥剥也柔變剛也以時言之則柔變乎剛下剥乎上邪剥乎正小人剥君子之時也當是時也五隂既盛一陽僅存小人道長君子道消徃亦何所利哉故曰不利有攸往小人長也夫當小人道長之時既不利於有所徃矣則順時而知止乃能觀剥之象也蓋剥之象其下坤也其上艮也坤順而艮止此順而止之之義也夫當小人道長之時苟不知順時而止而強聒以有徃則與小人立敵而至於隕身流禍也必矣故易於此為君子謀則以觀象曉之而又以尚消息盈虛戒之蓋處剥之道然也夫有息必有消有盈必有虛理之常也是理也天且弗違而况於人乎所貴於君子固當深知此理也語曰不知命无以為君子也所謂命者即天之理也知天則知天理之所在矣故曉之以觀象云者欲其知天也戒之以消息盈虛云者欲其事天也凡此皆處剥之道故也易之為君子謀也如此而東漢之季隂小得志賢人君子不知觀剥之象而尚夫消息盈虛之理方且以口舌與之爭鋒至使刊章逮捕駢首受戮而士𩔖為之一空其能不為危言激論身處濁世而怨禍不及者惟一郭泰而止爾絶迹於梁碭之間因樹為屋自同傭人者惟一申屠蟠而止爾故司馬温公有曰天下有道君子揚于王庭以正小人之罪而莫敢不服天下无道君子括囊不言以避小人之禍而猶或不免黨人生昬亂之世不在其位四海横流而欲以口舌救之撩虺蛇之頭踐虎狼之尾以至身被淫刑禍及朋友士𩔖殱滅而國隨以亡不亦悲乎夫惟郭泰既明且哲以保其身申屠蟠見幾而作不俟終日卓乎其不可及也象曰山附於地剥上以厚下安宅山髙而地下其勢至不侔也今也山附於地則髙者下矣此地剥之象也原其所以然蓋亦下不厚而髙者頽址不安而髙者危故也為人上者欲安其居而无傾危之患者則亦務厚乎下而已矣蓋下者上之本也務厚乎下則其本固矣未有基本既固而能剥者也書云民惟邦本本固邦寧蓋謂是也初六剥牀以足蔑貞凶象曰剥牀以足以滅下也牀者身之所安也以況則君子所處之位也小人之害君子也必先去其所處之位使之窮悴无所之也而後得肆其害焉故初則剥牀以足二則剥牀以辨四則剥牀以膚蓋其叙然也夫牀之所頼以安者足也足之見剥則正者傾矣故曰蔑貞凶初六之隂剥始自下猶之牀足先見剥焉則君子之貞始見滅於此時矣滅亡也蔑滅同義六二剥牀以辨蔑貞凶象曰剥牀以辨未有與也隂之剥陽進至於二猶之剥牀自足而辨其勢愈上矣辨上下交際之地也夫牀之所頼以正者上下交際之地也辨復見剥則止者愈傾矣故亦曰蔑貞凶當是時也使六二如六三焉則見與於上九之君子而小人之禍庶乎其未至於斯也惟其未有與也故小人无所顧忌而得以馴致其害焉此剥道之所以浸長也六三剥之无咎象曰剥之无咎失上下也六三處衆隂之中獨與上九居相應之地有輔上救亂之志所謂小人中之君子也故在剥之時為无咎也夫處衆隂之中而能與上下衆隂相失獨與上九居相應之地易於此可不以无咎與之乎與之以无咎者所以録小人之善也子曰君子不以人廢言夫一言之當其人未必然也君子猶不以人廢之則當剥之時衆隂用事而六三獨於衆隂之中失其上下以與上九協焉可无取乎程曰如東漢之吕強是也六四剥牀以膚凶象曰剥牀以膚切近災也六四卦之上體也夫剥至六四已及上體所謂膚也其切近於災莫此為甚也君子之正至是而无可滅者故不云蔑貞但云凶也夫小人之剥君子也始焉剥牀以足次焉剥牀以辨至於六三則雖與上九居相應之地於剥為无咎然剥道浸長亦末如之何也至六四則身及其害矣復何有所處之位乎小人之禍害吁可畏哉六五貫魚以宫人寵无不利象曰以宫人寵終无尤也六五羣隂之主君之位也在剥之時君道不可以剥故取下制羣隂為義魚隂物也相羣於下流小人之象也五能下制羣隂使之駢然順序如貫魚然則是以小人之道待小人也故曰以宫人寵宫人嬪御侍使也所謂隂小之人也以宫人之寵寵之是以小人之道待小人也夫所謂待小人以小人之道何也曰小人之志不過於希恩望寵而巳茍惟時其錫予均其恩惠使之充滿其意而无觖望之心此待小人之道也夫小人之心所以易生尤怨者不以其道待之故也惟能以小人之道待小人故怨尤不生禍害不作此所謂无不利又曰終无尤也上九碩果不食君子得輿小人剥廬象曰君子得輿民所載也小人剥廬終不可用也天地不可以一日而无陽天下不可一日而无君子當剥之時五隂既盛上九以一陽居衆隂之上而有碩果不食之象者存陽道也夫以一陽而居衆隂之上果之碩大者也果既碩大不剥而食諸者生育之萌正寄諸此者也墜地而復生則剥反為復矣此復初九之一陽即剥之上九也君子得輿者以一陽而居衆隂之上而有衆民共戴之象此君子得輿也故曰民所載也衆隂在下而頼一陽之芘故又有室廬之象焉若夫剥道既終九復見剥則室廬壞矣小人无所芘其軀矣此乃自撤其芘之過也然則君子存則小人安君子去則小人禍若飛廉惡來趙髙楊國忠之徒終亦自取禍敗爾故曰終不可用也然則君子亦何負於小人而小人亦何利於剥君子也童溪易傳卷十一
