body:
  text: 童溪易傳卷十四宋王宗傳撰離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也離以一隂而麗乎二陽之間在物為火火之體虛麗於物而著其明者也故火性善麗而曰離麗也豈惟火哉天下之物莫不各有所麗苟無所麗則不可以獨立於天地間故其顯而甚著者仰觀於天則日月是也俯察之地則百榖草木是也日月非麗乎天則無以大照臨之功百榖草木非麗乎土則無以廣其生殖之利求之於卦則離上離下重明是也君臣上下皆有明德之象然重明而不麗乎正則明矣而或失之察智矣而或失之鑿非正也重明而麗乎正則本是正以為化而成天下文明之俗矣於爻則二五是也故又繼之以柔麗乎中正故亨夫附麗之道易失於不正又況於其質本柔也乎以唐人之君多定䇿於刑餘唐人之臣多失足於權幸者失所麗也故卦之德曰利貞亨以言其貞則亨不貞則不亨也離之二五以柔順之德而麗乎中正之位此得所麗也其能本是正以為化而成天下文明之俗冝也此所以謂亨也牛順畜也而又牝焉順之至者畜牝牛謂畜其所謂至順者也離之二五利在於正利於正而能亨其與唐之君臣亦異矣故雖蓄其至順之德未嘗或失於不正又何惡於柔順也邪故曰是以畜牝牛吉也以言柔而或失於所麗則為不正不正則不能亨徒曰此吾之順德也而君子則曰此非吉德也夫惟離之道利在於正正而能亨此所以畜牝牛而吉也程河南曰或曰二則中正矣五以隂居陽得為正乎曰離主於所麗五中正之位六麗於中正乃為正也學者知時義而不失其輕重則可以言易矣象曰明兩作離大人以繼明照于四方豫學易而至於離觀其象曰明兩作離大人以繼明照于四方掩卷而嘆息曰噫此大人之所以大也夫古今之所謂大人者夫豈無自而然歟已之明與人之明兩不廢焉故也已之明不廢故能用人惟已人之明不廢故能舍已從人夫以一人之明而能照見四方而無遺者是必有所謂相繼而不絶之明故也夫四方固廣且逺也其事與物纎悉幽隱固未易盡照見之也吾之明固不可廢矣而人之明或偏廢焉則吾之明亦有所止也能照一事其如他事何能照一物其如他物何故夫所以繼已之明而不絶者人之明也大人以此故能照見四方而無遺也噫此大人之所以大也重離之象上離也下亦離也明兩作離謂上之人之明與下之人之明兩不廢焉故也若惟已之明是恃而人之明或偏廢之焉則不可謂之明兩作也是象也非大人孰能體之初九履錯然敬之無咎象曰履錯之敬以辟咎也離隂麗乎陽者也然初九在下在下者必麗乎上則初也者亦麗乎二者也夫離之所利者正也初九六二正也當文明之時以正相麗其剛柔相與之文見於交錯之際故初之麗乎二者而曰履錯然夫下之有麗乎上剛之有麗乎柔也苟在我者不盡其莊敬之禮不諂則慢矣蓋諂則失已非以下承上之道也慢則失人非以剛接柔之道也故初之所以為是敬者非有他也所以辟去其諂與慢之咎也此所以無咎夫初九之所以能敬者何也曰以正故也六二黃離元吉象曰黃離元吉得中道也六二居中履正柔而得其所麗者也故曰黃離蓋黃中色也其在離也則中道也離之卦德曰利貞亨而彖曰柔麗乎中正故亨則中正之道離之本也而六二得之所謂宗本者舉在此矣故曰元吉以言離之居中履正莫吉於六二故也河南曰不云正者離以中為重所以成文明由中也正在其中矣九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也九三處下卦之上前明垂盡後明當繼之時也故曰日昃之離夫日之昃矣則暮光晚景斯須入於地矣其明安能久邪然以理論之有始必有終有明必有晦有生必有死逹者觀之此特寒暑晝夜之常爾奚足怪哉瓦缶之為器也日用之常器也鼓缶而歌樂吾之常也汨於常理者不知樂吾之常則以大耋為嗟此昧於死生之道者然也其安於死乎必不能也故易於此以凶告之夫八十曰耄九十曰耋大耋猶不免於嗟焉其不能平心待盡可知矣是自為其凶也雖然離之所麗者正也以九居三正也豈不能得其正而斃乎特易於前明垂盡後明當繼之時而設日昃之離之戒者以言日既傾昃明不能久也程河南曰明者知其然也故求人以繼其事退處以休其身安常處順何足以為凶也九四突如其來如焚如死如棄如象曰突如其來如無所容也離也者明也故其取象或為明或為日或為火顧其義如何爾象曰明兩作離此取夫明以為義也九三曰日昃之離此取夫日以為義也九四曰焚如此又取火以為義也夫一離既盡一離復來九四以不中不正突然而處近君之地其來甚遽而火性炎上有犯上迫五之象故曰突如其來如夫六二黃離之臣也而初九之際必敬而後無咎六五君也以柔順之德而處尊位大中所謂文明之主也而四以突然之剛迫之可乎然則恃突然犯上之剛者乃所以自焚也故曰焚如自焚乃所以自速斃也故曰死如速斃乃所以自棄也故又曰棄如夫當文明之時君臣如此其明也而九四獨失之而至於自焚以速斃速斃以自棄然則象所謂無所容也非人之不之容也四之自處如此無適而可以自容其軀故也六五出涕沱若戚嗟若吉象曰六五之吉離王公也夫居天下之至尊而能知憂知懼者此非明者不能也人君之勢固有萬鈞之重矣以萬鈞之勢為可恃則享之而樂樂之而肆矣遑他恤乎故敵至而不知憂禍生而不知懼此無他明有所不足故也六五以柔順之德而處尊位大中文明之主也惟其明也故能知懼而至於沱且涕知憂而至於戚且嗟則雖以隂柔居五而處乎剛強之間而能保其位而吉也象曰六五之吉離王公也者夫六五王公之正位也惟其明也故知憂知懼而麗乎王公之正位而吉也使其非知憂知懼其能麗是正位而獲吉乎坎之彖曰王公設險謂守其國也離之五曰離王公也謂麗正位也上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也離麗既極而有不麗者焉以九居上剛而明者也王者當此之時則宜用此剛明以征討夫不服者夫出征之道貴在折去其首惡者與執獲其非類者如是則無害於文明之治矣故曰有嘉折首獲匪其醜無咎如九四當離麗之時恃剛以陵上由上九觀之所謂非其醜類而首惡者於以征之則不正者去而邦正矣艮下兊上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣程河南曰天地萬物之本夫婦人倫之始故上經首乾坤而下經首咸繼以恆也天地二物也故乾坤二卦分天地之道男女交合而成夫婦故咸與恆皆二體相合而成夫婦之義夫咸合兊艮而成體兊少女也艮少男也少男少女相與用事此夫婦之始也夫婦之始其情篤於相感故咸之為義感也若王臨川所謂有心曰感無心曰咸此泥於字學也初不知咸之為義即感也亦如恆之為義即久也柔上而剛下二氣感應以相與止而説男下女此則即兊艮二體以明其所以相感之義以言咸也夫剛柔上下自有定位然咸以相感為義故男本在上今也兊女居上此柔上也女本在下今也艮男居下此剛下也蓋不如是則隂陽二氣非所謂感應以相與也惟其此感而彼應見於相與之際故艮男在下止以待説兊女在上説以應止以是為男下女之道故女無自媒之失而男有身帥之禮故曰是以亨利貞取女吉也大抵取女之所以吉者在於亨利貞而已矣柔上而剛下二氣感應以相與此亨也止而説此利於貞也是謂男下女之道而取女之所以吉者也若夫以取女之吉而施諸天地人物之際則亦無適而不亨無適而非正者矣故繼之以天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣此又因男女相感之義而廣言咸道也夫天地之感即天地交泰之時而見之方泰之時天氣下降地氣上騰故凡受氣於天地者無有不通而萬物由此而化生聖人體天地之化而密庸於不言之際故凡有此心可以感而通者如桴之於鼓焉此動而彼應舉無物我逺近之間而天下由此以和平故觀天地交感而萬物所以化生之理與聖人感人心而天下所以和平之道則大而天地衆而萬物雖曰不同而其情實可見矣何謂天地萬物之情曰其在咸則所感是也河南曰感通之理知道者默而觀之可也象曰山上有澤咸君子以虛受人山上有澤髙而有容之象也夫天下之物至髙者莫如山至虛者莫如澤今也至髙之山上有至虛之澤則無亢髙之纍而有容受之地矣此山上有澤所以為咸之象君子之觀此象也亦豈以吾之所謂髙者足恃哉必也虛中無我方寸之地擴然有容不使有一毫亢髙絶物之失或為吾纍夫然後足以容受夫人矣夫天下之人其善不同智者有謀材者有技武者有勇而賢者有德使吾不能虛中無我擴其所謂容受之地而或有亢髙絶物之纍焉則彼與吾何自而相為感通也哉故曰君子以虛受人以言惟虛則能受人不虛則不能受之故也初六咸其拇象曰咸其拇志在外也咸之六爻自下至上皆取諸身以為象者蓋人之四支百體雖有上下小大之不同而其血氣脈絡之相感通固有至理行乎其間故大而天地衆而萬物感通之理即諸身而可見矣此聖人制爻取象之意初六以隂小之才居在下之位其在小人則拇之象也夫拇之在足也所謂指之大者也足之行也而拇實處先其止也亦未嘗易其處先之位故足之行與止而拇也未嘗不向乎外者此蓋自然之天也故曰志在外也艮止也初六居隂當艮止之初未嘗動也然當咸之時初與四居相應之地故取拇之向於外也以為象而曰咸其拇以謂雖處下位而未動也而其志之所向則未嘗不在外也此感道之固存也君子之在下位也未嘗求應夫物亦未嘗却夫物而不之應也感道固存不因行而存亦不因止而滅也是理也所謂不為堯存不為桀亡者也六二咸其腓凶居吉象曰雖凶居吉順不害也六二以隂柔處下體之中腓之象也腓足之隂也所謂足腹也足之行也而腓也隂以相之而已其止也則處靜而不動焉非如拇之志在外也六二之在艮也止中之止也夫以靜止為道而當咸之時與五居相應之地而動以應之則失其所靜止之道矣故曰咸其腓凶夫惟知其凶而戒之也安其居而不動而順其所謂自然之理則吉而無害矣夫感道之在人也不可強有亦不可強無也居止靜之地則貴於安時而順理夫苟失其所守而動以應上而不待夫上之命焉其所守必喪而於感道斯為害矣豈非凶歟咸以六二設咸腓之戒而以吉與凶兼言之者以謂處此地者在所擇焉爾蓋以六居二正也恐其失正故有此戒九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也九三處下體之上所謂股也三雖艮體然以陽居陽又有應在上非能止也故曰咸其股夫股隨上體而動者也以剛過之才不能為主於內而其所秉執者則在於隨上體而動焉豈不可少之邪故曰執其隨往吝吝謂可少之也夫九三以剛陽如此之才不能自主而隨物以往故人動已亦動其所秉執之志則在於隨人而已汙下如此故可少也夫感之道非能彼有動而此無隨也顧其所感如何耳感道利於貞貞則無彼已先後之異夫苟失其正也則志之所在在於隨人而已豈足多哉夫九三正也曷謂其失正也曰以陽居陽剛過也剛之過則躁動而失正矣九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也六爻既以人身取象則四也位股之上脢之下其心乎四心之位也故為感之主而以感之道為言焉何謂感之道曰正是也感不以正則有悔矣其曰貞吉悔亡云者洪範之稽疑有曰貞曰悔之説以言貞悔二物不可以相有也於貞既吉則於悔斯亡矣司馬溫公曰執一以應萬守約以御衆者其惟正乎河南曰聖人感天下之心如寒暑雨暘無不通無不應者亦正而已矣蓋四説體也而又居隂而應初體説則害於剛果居隂則妨於流通應初則有所偏係故其戒在於正也夫感物也以正則無所不通苟憧憧然或往或來以有思之私心而感物則感道狹矣故思之所及者有以致其朋類之從思所不及者其能使之從歟非所謂無所不通也故曰憧憧往來朋從爾思象曰貞吉悔亡未感害也者夫係於私應則感道之為害於貞既吉於悔既亡則未為感道之害也夫苟憧憧然或往或來以有思之私心而感物則所感也狹故曰憧憧往來未光大也此繫辭之釋此爻所以極論感道而申之以天下何思何慮之説以明同歸一致之理也何謂同歸一致之理曰正而已矣九五咸其脢無悔象曰咸其脢志末也九五居中履正人君之感也夫人君感天下之道在於廓然而大公而尤不可以有所比有所説也若有所比有所説則失中正之道矣五與二居感應以相與之地皆中正也故冝相與以中正之道感天下然五亦説體也若逺舍二而比説乎上非人君之感也夫上六處咸之末以口舌為容説之道所謂小人也而五也或以其近已也比而説之不可也故有咸其脢之象以戒之使背其心之所向焉脢背肉也與心相背者也上六在上五能背其心之所向而不以其近已也比而説之則無親狎小人之悔而中正之道得矣象曰咸其脢志末也者謂五有咸其脢之象者以其志意之所向在於一卦之末故欲咸其脢以背去之也然則小人之不可比也如此人君以中正之道感天下若斯人者其可比而説之乎上六咸其輔頰舌象曰咸其輔頰舌滕口説也上六以兊之隂柔居諸爻之上其在人者所謂居衆體之上者則輔頰舌是也故取以為象也夫上六感之極也居感之極專以兊之口舌務為柔媚極感之事此小人女子之常態也故曰咸其輔頰舌曰輔曰頰曰舌三者俱舉以言無所不用其媚也夫以心思感人所感已狹騰口説以求感其能感人乎此感道之衰也巽下震上恆亨無咎利貞利有攸往彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣夫恆合震巽以成體震長男也巽長女也長男長女相與用事此夫婦之終也夫婦之終其道貴於有恆故恆之為義久也剛上而柔下雷風相與巽而動剛柔皆應恆此則即震巽二體與卦象卦義卦爻之用以言恆也夫咸柔上而剛下則少男處少女之下以男下女為男女交感之義夫婦之始不得不然也至恆也則務為恆久之道故當正其位分使尊卑有序是則於咸有所反也故曰剛上而柔下震長男也而在上此剛上也巽長女也而在下此柔下也男女尊卑剛柔履位此夫婦居室之常道也所謂夫婦之終也雷風相與云者謂震雷動於上巽風隨於下二者相與以為用此男行而女隨之義也乃所謂恆也巽而動云者謂長女巽於內長男動於外在下者有巽順之德而在上者有動為之才此所以能恆也夫剛不應柔柔不應剛此豈恆理也哉故恆之六爻剛柔皆應自初至上三剛三柔各居相應之地理之常也以卦體言之則剛上而柔下剛柔之常也以卦象言之則雷風相與雷風之常也以卦義言之則巽而動動巽之常也以卦爻言之則剛柔皆應又六爻之常也合此四者恆久之道然也此卦之所以為恆也恆之卦德曰恆亨無咎利貞而彖釋之曰久於其道也天地之道恆久而不已也者蓋道患不恆爾苟恆也則亨之效著矣恆而能亨乃無咎也恆而不可以亨者非可恆之道故也其能無咎矣乎所謂恆而能亨者何也曰利於貞是也苟失其正則非可常之道也故能久於其道者久此而已可恆之道利在於正若夫不恆其德與恆於不正皆不能亨而有咎也天地之道其所以能不已者以恆久故也人能常於其所可恆之道則天地之理在我而已豈他求云乎哉卦之德又曰利有攸往而彖釋之曰終則有始也者夫利有攸往惟有常者能之此所謂不已也請即天地之道而明之今夫天地之道自百刻積而為晝夜自晝夜積而為寒暑晝夜之相為晦明寒暑之相為往來遲速進退機緘不停故終始相循如環之無端者此蓋有常而然也惟其有常故有往而利如此也如使有往而不利則有今日之晝夜而止爾又烏有來日之晝夜乎有今歲之寒暑而止爾又烏有來歲之寒暑乎殆非所謂終則有始矣故曰利有攸往惟其有常者能之伊尹之訓太甲曰終始惟一時乃日新湯之盤銘曰苟日新日日新又日新凡此皆以利往為常也至哉恆乎夫所謂終則有始非日月四時不足以喻之非聖人不足以盡之故彖至此又引日月四時之能久以明夫聖人之久而終之以觀其所恆而見天地萬物之情所以極言恆久之理也夫誠者天之道也日月之照所以能久者以其得天之誠也使其不得天之誠則臨照之功安能與天地相為長久哉故曰日月得天而能久照天之道惟其誠也故以此誠妙而為四時不窮之用所謂變化也四時之成功所以能久者以其變化之不窮也使其非變化之不窮則往來之敘又安能遷變推蕩如是之悠久哉聖人之明日月也其序則四時也而其誠則天也故能久此道以為吾之常夫石以久溜而穿澤以久熯而乾一人持久於上而至誠之化其行有常則天下化之而成其美俗矣何者久使然也由是觀之日月得是常故能久照四時得是常故能久成聖人得是常故能致天下之化成則天地萬物之情其能外是恆乎蓋天地之大萬物之衆其往古來今之變出生入死之説曽無間斷者皆其情也觀其所恆則可見矣象曰雷風恆君子以立不易方震為雷也而在上巽為風也而在下雷動而風隨雷風之常用然也夫雷風有恆用故君子體之亦當有恆德方也者不易之地也君子所謂不易之地何也大學曰於止知其所止而其所止之目則曰為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信此不易之地也君子立其身於此地則所謂有常之德也外乎此以為常於中則為過於正則為拂非可常之道也初六浚恆貞凶無攸利象曰浚恆之凶始求深也恆之彖曰剛柔皆應謂下體之一柔二剛與上體之一剛二柔各居相應之地也然夷考諸六爻而求其所謂相應之義則俱無有也何哉豈易之旨淵微而未易以文字索之邪不然其旨隱焉而明學者未之詣邪又不然易更數聖人前後立辭命意各各不同邪蓋嘗思之俱不然也易之謂易未易以概論之故也夫易以應而論爻固也恆之彖所謂剛柔皆應亦固也然爻之所指或不於是義而取義焉者吾必左右勉強而附合焉亦過矣此世儒之失也而愚也亦何敢效其尤邪初六之在恆亦不過取其巽入之義云爾蓋初巽之主也當恆之初而以深入為恆故曰浚恆而象曰始求深也浚深也夫日月四時之所以能久者夫豈一日之故邪今也當恆之初而遽焉求深猶之造事也未嘗有一日之勞而遽求其事成猶之為學也未嘗有一日之功而遽求其造道猶之與人也未嘗有一日之雅而遽求已合猶之事君也未嘗有一言之投而遽求我從是也夫造事而欲其有所成為學而欲其有所造與人欲其有所合事君欲其有所從固所當然也此在理所謂正也然以未嘗為恆則望之太深責之太遽俱不免於無成而已此於正而凶又曰無攸利也然則如之何而免是患也曰養之以誠敬持之以悠久而已矣九二悔亡象曰九二悔亡能久中也九陽動之才也二隂靜之位而且得中也所謂動靜之適中者也夫所貴於常者非以常為常也以中為常故也若動靜而或失乎中此非可常之道也惟能以中為常則孔子所謂君子而時中是也子曰中庸其至矣乎民鮮能久矣於中而不能久焉其能無不足之悔矣乎九二之在恆也以陽動之才處隂靜得中之位是謂適動靜之中而能久乎中者也能久乎中則無不足之悔矣故曰九二悔亡能久中也夫中也者天地萬物之所共由天地之所以長久日月四時之所以不息聖人之道所以亘古今而無弊者以是中也九二其能久乎此則天地萬物之理盡在我矣庸有不足之悔矣乎九三不恆其德或承之羞貞吝象曰不恆其德無所容也以九居三在恆所謂貞也然而於恆無益焉則所謂貞云者亦未足多也何也九陽也三亦陽也以陽動失中之才而責之以能恆過也故曰不恆其德謂其以剛處剛當巽之極其究也躁而不能恆故也夫君子自立於天地之間所以俯仰無愧驗之千古之聖賢之心而皆合者徒以此心存焉爾此心不存則無所執守在已者以為不足為吾纍而不知羞辱承吾後矣何所逃此患邪故曰或承之羞由是言之則九三於恆無益則所謂貞云者亦奚足多也故曰貞吝吝謂不足多之也孔子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉三之不恆其德則親戚不親朋友不友人類不人辱孰甚焉所謂州里行乎哉其曰無所容也深絶之也然則人而無恆果何所利也哉九四田無禽象曰久非其位安得禽也九陽動之才也四隂靜之位也九以陽居隂與九二同而位不得中與九二異夫四之所以為恆也而與二異則處動靜之道所失必多矣故以田無禽喻之夫田狩之事為禽設也田而無禽謂無功也然田非無禽也動靜失中則宜有而無也四處動靜之道不得如九二之中則其所久非所久也安得而有功邪故曰田無禽失其所久也而得得中之位則於久為有功其所久也而非得中之位則於久為無益由是言之以常為常不若以中為常也其旨明矣六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也恆其德與不恆其德反也何也九三之剛太過而六五以隂居中故也夫五以隂居中則婦之象也婦人之道守正從一此身有盡而此道不改以此為恆不知有他也此婦人之吉德也故曰恆其德貞婦人吉雖然天下事變其來為無窮君子之處事也亦當與之為無窮夫然後不失吾恆焉魯之男子學栁下惠而乃不學栁下遂號為善學栁下者則栁下之過豈可常也蓋以吾之常而學彼之常又何害其為常也若學栁下而泥栁下豈足為善學栁下也哉此所謂制義也夫有一事必有一義此豈可泥也夫子之職制此義者也若曰從一以為常若婦人然也則夫子之職曠矣故曰夫子凶五君位也易於此設人君泥常之戒故以婦人夫子兼言之詩之大序曰言之者無罪聞之者足以戒則六五之爻辭是也上六振恆凶象曰振恆在上大無功也人有恆言天下本無事庸人擾之上六以隂柔之才居振動之極而且在一卦之上此所謂擾亂天下之庸人也故曰振恆凶謂以振動為恆而擾亂天下者也夫當天下守常而無事之時而以庸人加諸上位彼庸人者豈能為吾守常而無事也哉天下被其擾亂之禍也必矣如大漢之業至建元元光間已七十餘載矣文景恭儉富庶之餘天下廓然無事而王恢一唱馬邑之謀以致胸奴侵擾北邉兵連而不解天下共其勞干戈日滋行者齎居者送財賂耗衰而不贍入利者補官出貨者除罪武力進用法令嚴具興利之臣自此而始而桑𢎞羊孔僅輩言利事析秋毫矣然則首漢世騷擾之禍者王恢也若恢者其庸人哉恆之上六曰振恆凶象曰振恆在上大無功也此正為恢等生事者設也童溪易傳卷十四
