body:
  text: 童溪易傳巷四宋王宗傳撰震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧乾坤之後繼之以屯與蒙者經曰有天地而後萬物生焉盈天地之間者惟萬物屯者盈也屯者物之始生也初生必蒙故受之以蒙蒙者物之稚也此夫子序卦之旨也而愚之意則曰繼天地以用事者長子也其次則坎又其次則艮此三男相繼以效其勞於天造草昧之日闢天荒理地脈發初性而盡開物成務之道也故震之一陽實繼於乾坤之後當天地玄黃雌雄既決之後而以貴下賤為屯之初九也故屯之下體震而上體坎蒙之下體坎而上體艮也三男相繼以效其勞不亦有序矣乎屯之初九曰利建侯蒙之九二曰子克家蓋謂是也元亨利貞乾坤之四德也乾坤萬物之父母也故具此四德自乾坤而下若屯隨無妄革能具其大體而不能盡其全用則閔子顔淵之於聖人具體而微之謂也又其次則有具三德者若離咸萃兑渙小過有具二德者若大有蠱漸大畜升困中孚有具一德者若蒙師小畜履泰謙噬嗑賁復大過震豐節既濟未濟則子遊子夏子張得聖人之一體之謂也方屯之時難未亨也所謂天造草昧者也當此之時未亨之難必期於大亨故曰元亨夫有一言足以當天地萬物之心曰正是也則所以已天下之難者正也故未亨之難而期於大亨非利於正不可也勿用有攸往者非無所往也當往而往往而不在我故也夫往而不在我而奚在乎曰在乎正而已矣初九謂盤桓則欲其當往而往也所謂志行正也則往不在我而在正也解坎下震上屯之反也其曰無所往其來復吉有攸往夙吉夫既曰無所往也未幾而又曰有攸往者何也天地之解已在此時故也然則方屯之時所謂有攸往也則勿用焉而惟正之是卜可也侯者共理之人也當屯難之時民思其主而欲以吾之一身濟焉難矣故又利在建侯乾坤一索而得震而震之一陽用事於羣隂之下是為初爻故曰剛柔始交坎水也水善陷故曰難生又曰險也動乎險中謂初九也初九以陽德居陽位正也此大亨之道也朱子發曰安乎險與動乎險而不正皆非濟屯之道震為雷坎為雨雷以泄隂陽之怒氣雨以播隂陽之膏澤所謂雷雨之動也動謂震也滿盈謂雷雨之動充足乎宇宙也雷雨之動充足宇宙則無一物不蒙其功誠異乎屯膏未光之施也夫天造之初草創冥昧既難以吾之一身濟焉則衆建諸侯宜矣瓜分碁布之勢既連屬於宇內則雖有強暴誰與為亂哉然既建侯以翼已而未始忘乎險難故又曰不寧則又安不忘危存不忘亡之戒也象曰雲雷屯君子以經綸彖取雷雨象取雲雷者以言既雨則非屯象矣故雷雨作則為解雲雷屯則為屯也夫措之天下則為事業藴之吾心則為經綸當理亂解紛之時而經綸之無素焉則欲亨屯也難矣故緻謀締慮屯結乎吾中若雲雷之欲雨而未雨焉此則屯之象也初九盤桓利居貞利建侯象曰雖盤桓志行正也以貴下賤大得民也九以天德居下位亨屯之主聖人之拔閭閻者也故行止動靜盡彖之德盤桓利居貞即彖所謂元亨利貞勿用有攸往也庖丁之解牛也曰每至於族吾見其難為怵然為戒視為止行為遲此所謂盤桓也盤桓即象所謂經綸也使初九無行正之志則不待當往而往矣所謂行正之志何也曰行一不義殺一不辜而得天下不為也能居是正則能行是正矣建侯為民建也建侯以為民則吾知有民而已又安知有已也哉故貴與賤所不必辨也此盛德事也陽貴而隂賤陽少而隂衆陽為君而隂為民初九一陽處三隂之下故曰以貴下賤大得民也六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也君子守道不回不苟合而失正六二正也當屯之時欲上應於五而未果下乘初九之剛而不與合欲上應於五而未果屯如邅如也下乘初九之剛而不與之合乘馬班如匪寇婚媾女子貞不字也屯邅不進之謂也初九動乎險中馬之象也下馬曰班與馬異處欲行而止之謂也二與五隂陽之正也而居相應之地時方屯難莫與之合初非吾耦而二與之迫焉則以寇目之未暇論初之德如何也夫二既以寇目初豈與之為婚媾乎此女子之貞而忠臣之義也字育也女子以正為德以字為功若失德而有功寧貞而不字也若夫屯極必通數極復始而正應乃獲故曰十年乃字十謂數之極也夫天下不常治亦不常亂亂極必治不字終字事勢有所反也故又曰反常也若屈突通盡節於隋而為唐忠臣則六二所謂不字而得乎反常之道也六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也傳曰秦失其鹿天下競逐六三當屯之時所謂競逐之夫也漢高祖語諸將曰諸君知獵乎逐獸者狗也指蹤者人也坎為隱伏五以一陽伏於衆隂之中鹿之象也夫初九所以大得民者建侯以翼已故也用能作於閭閻而為亨屯之主六三居不以正動而無應猶之即鹿也志在得禽而無指蹤之人也所謂無虞也虞人山林之導也入於林而無其導焉徒往也上六處一卦之外而非其應也故有入于林而無虞之象君子則不然與其往取窮吝而無所獲也殆不如舍旃而安於屯居貞以待時而無妄動之失夫惟有所不動動必獲矣則初九是也幾殆也六四乘馬班如求婚媾往吉無不利象曰求而往明也昔孔子之取虞人也取非其招而不往而孟子亦以不待招而往謂之枉已四與初居相應之地不即應之亦曰乘馬班如者待招而往故也初之以貴下賤有求婚媾之禮故四之往應於初亦有乘馬之象於時為屯故亦不免於班如焉夫婚媾之道不待求而往枉已也蒙之六三所謂不有躬無攸利是也求而不往亦不謂智成湯之三聘伊尹也尹乃幡然而改曰我豈若使是君為堯舜之君幡然之改尹之明也夫蒙之三不有躬無攸利則屯之六四求而往吉無不利宜矣九五屯其膏小貞吉大貞凶象曰屯其膏施未光也當屯難之時居坎險之位則五其致屯之主也夫九五之剛中正非有失德也特以膏澤不下而德施未光民心未歸而思亂者衆故屯難不得不生於此時也坎為雨故稱膏當屯之時故曰屯其膏夫出納之吝謂之有司則屯其膏者特有司之事爾故小者之職以屯膏為正則吉雲行雨施天下平也此大君之體天也故大君之道以屯膏為正則凶傳曰長國家而務財用必自小人矣彼為善之小人而使之為國家災害並至所謂災害並至其屯也哉上六乘馬班如泣血漣如象曰泣血漣如何可長也上六乘九五之勢而居屯之極故亦曰乘馬班如夫能使五之施澤未光而致此屯難者皆上六隂蔽之力也屯極至此易窮則變上六之傷可勝既邪故曰泣血漣如坎為如憂為心病為血卦故屯之極備此象也何可長也者謂乘君之勢而相與以成是屯屯極矣居此高位其能久乎湯武一出而飛廉惡來之誅不可逭也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙合艮坎而成體艮止也而為山坎險也而為水山下有險遇險而止昧其所適蒙之義也人性本明一發其機則矢去川決而蒙者亨矣亦乾元者始而亨也之義夫蒙之能亨者以亨道而行也所謂亨道時中是也中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和又曰君子之中庸君子而時中夫喜怒哀樂未發故為蒙及其既發而又皆中乎節此以亨道而行也所謂時中也六五為蒙之主而九二則發其蒙也五艮體艮少男也故曰童蒙我謂二也居相應之地有剛中之德五實資之以發其蒙故曰匪我求童蒙童蒙求我謂五有順巽之志以下應於二然後二從而應之也蓋其尊德樂道不如是不可與有為也韓退之師説有曰古之學者必有師師者所以決疑而辨惑也發蒙之道而曰筮云者所以決其疑也占筮以誠敬為本不誠未有能動故也故初筮則告之告之云何告之以吾剛中之德而已爾曰剛中云者即君子之時中也以吾之剛中而亨彼之亨此以性覺性之道也若夫筮以決疑也而有再三之瀆則誠意亡矣故以不告告之孟子曰教亦多術矣豫不屑之教誨也者是亦教誨之而已矣此以不告告之之謂也夫天之豫我以此性也正而已矣自正之外無他事也當蒙之初務養吾正則用力寡而成功多正之體不搖而正之用日長而日益矣此作聖之功也故曰利貞謂當蒙之初所利者養正也程河南曰未發謂之蒙以純一未發之蒙而養其正乃作聖之功也發而後禁則扞格而難勝養正以蒙學之至善也朱子發曰學未至於聖未足謂之成德故夫子十有五而志於學至於七十而從心所欲不踰矩則蒙以養正作聖之功也象曰山下出泉蒙君子以果行育德艮山也而在上坎水也而在下蒙之象也不曰山下有水又不曰山下有險而曰山下出泉云者夫山下有險彖既言之矣象者所以言彖之未言也泉者水之源所謂純一而不雜者是矣泉之始出於山下也以況則蒙之欲亨而未亨之象故不取山下有水之義孟子曰源泉混混不舍晝夜盈科而後進放乎四海有本者如是混混蒙也不舍晝夜則所蒙者亨矣至於盈科而後進則所蓄厚矣君子以是果行而育德德者行之源也所謂果行者以亨行也不舍晝夜之謂也所謂育德者以養正也盈科而後進之謂也孟子養氣之説曰行有不慊於心則餒矣此君子行欲其果也又曰配義與道無是餒也此君子德欲其育也初六發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也傳曰禁於未發之謂豫書曰制官刑警于有位用訓于蒙士以六居初隂暗而未明所謂蒙士也欲發其蒙不於此時而豫以禁之不可也故曰利用刑人而象曰以正法也夫所謂刑人者非必殺戮之也正其法以示之立其防束曉其罪戾而豫以禁之使蒙蔽者知所戒懼欲有所縱而不敢為然後漸知善道可得而化之也當是時也夫苟説其桎梏而不豫以禁之則過此以往不可復制矣雖有善教何由而入乎故於發蒙之初用刑人則以為利用説桎梏則以為吝也噬嗑亦明罰敕法之卦也初九屨校滅趾無咎象曰屨校滅趾不行也夫當噬嗑之初屨校滅趾而使之不行乃能無咎則當發蒙之初用説桎梏而縱之使往能無吝乎桎梏與校皆刑具也程河南曰或疑發蒙之初遽用刑人無乃不教而誅乎不知立法制刑乃所以教也蓋後之論刑者不復知教化在其中矣九二包蒙吉納婦吉子克家象曰子克家剛柔接也傳曰以位則子君也我臣也以德則子事我也在蒙之時則二與五是矣故二之一爻以二與五剛柔相接而兼發其義曰包蒙吉納婦吉子克家即此三語足以見二與五之懿也夫二與五居相應之地二有包蒙之德故以剛接柔而蒙者資之五有順巽之德故以柔接剛而二則納之順巽之道婦之道也匪我求童蒙故五之於二不得不盡順巽之道童蒙求我故二之於五不得不擴包容之德包蒙吉此二之吉於五也納婦吉此五之吉於二也或曰五君也而又有婦之象何也曰泰之六五曰帝乙歸妹則亦下交於九二也庸何嫌乎説易者不以象害意可也坎與艮皆乾之子也二與五相與以用事則柔剛相接而家道成矣故曰子克家剛柔接也求之古人則商之保衡太甲周之周公成王是也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也夫昧其所適至於喪軀失德者所謂下愚之不移也蒙不足以盡之故此爻獨不言蒙且人之所恃以自立於世者以其有廉恥之維在也廉恥之維一或廢缺則無所不至矣故蒙之六三隂迷妄動而以勿用取女為義焉夫女之所以勿用取者以其妄動故也上九其正應也上九艮體艮止於上而無下女之義此六三以坎水之性趨下而從二焉見金夫也金夫以利合也以利而合則喪軀失德矣故曰不有躬夫知以利合而不知喪軀失德之為非利甚矣其惑也故又曰無攸利然則上九正應也而乃勿用取之者以六三不能靜以待上之求而失足於二焉哉也故曰勿用取女行不順也夫失德之女人勿用取失德之臣君所不臣失德之士君子不友其或取之臣之友之是亦蒙矣六四困蒙吝象曰困蒙之吝獨遠實也孟子曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士以友天下之善士為未足又尚論古之人讀其書誦其詩不知其人可乎是以論其世也是尚友也君子之學求以亨吾蒙也蓋汲汲於此而後足以有立六四以隂居隂蒙昧無覩曽無剛明之親授以誘掖之孔子所謂困而不學者故曰困蒙吝吝者虛空無得歉然而不足也陽為實九二是也二發蒙之主四於初非應也固不得因初以親二三以不正實間忌夫已也又不得如五之應二故曰獨遠實也六五童蒙吉象曰童蒙之吉順以巽也不順則不能從善不巽則不能下賢五雖君位而以六居之又艮體也故稱童蒙童蒙尤不可以不資於人也故虛中無我而順以巽以下求於二如是則優於天下矣故吉也太甲之於保衡也拜首稽首曰豫小子不明于德自底不類既往背師保之訓弗克于厥初尚賴匡救之德圖惟厥終成王之於周公也亦曰公明保豫沖子公稱丕顯德以豫小子揚文武烈夫二主沖主也志於亨蒙亦篤矣其所以為是巽順也亦至矣商周之所以隆也有由哉上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也上九以陽剛之才處蒙之終很然而不服所謂蒙之極者而不可告語者也故至此不得已當擊而去之夫所以擊而去之者務以已其寇暴之亂故也寇去則止若又擊之不已而寇自我作焉則是為寇也孟子曰古之為關者將以禦暴今之為關者將以為暴夫關一也何古今之巽歟禦之不已而或至於生事造怨則是為暴也故蒙之初發蒙利用刑人而用説桎梏則以為吝上之擊蒙利用禦寇而為寇則以為不利上無過暴下無不服故曰上下順也程河南曰若舜之征有苖周公之誅三監禦寇也秦皇漢武窮兵誅伐為寇也童溪易傳卷四
